<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>지옥의 탑</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;padding:12px 20px;display:none}
#timer{color:#fff;font-size:28px;font-weight:bold;text-shadow:0 0 10px rgba(255,100,0,.5)}
#floor-info{color:#aaa;font-size:14px;margin-top:4px}
#best-info{color:#ffd700;font-size:13px;margin-top:2px}
#height-bar{position:fixed;right:16px;top:50%;transform:translateY(-50%);width:6px;height:50vh;background:rgba(255,255,255,.08);border-radius:3px;z-index:10;display:none}
#height-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#ff4400,#ffaa00,#00ff88);border-radius:3px;transition:height .3s}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.screen.hidden{display:none}
#startScreen{background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0a0f 70%)}
#startScreen h1{font-size:52px;color:#ff4400;text-shadow:0 0 30px rgba(255,68,0,.6),0 0 60px rgba(255,68,0,.3);margin-bottom:4px}
#startScreen .sub{color:#777;font-size:16px;margin-bottom:36px}
.start-btn{padding:14px 44px;font-size:18px;color:#fff;background:linear-gradient(135deg,#ff4400,#ff6600);border:none;border-radius:28px;cursor:pointer;font-weight:bold;box-shadow:0 0 20px rgba(255,68,0,.4);transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.controls-hint{color:#555;font-size:13px;margin-top:28px;text-align:center;line-height:1.8}
#victoryScreen{background:rgba(0,0,0,.85)}
#victoryScreen h1{font-size:48px;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.5)}
#victoryScreen .time{color:#fff;font-size:26px;margin:12px 0 4px}
#victoryScreen .best{color:#ffd700;font-size:16px;margin-bottom:20px}
#deathOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,.25);z-index:50;pointer-events:none;display:none;transition:opacity .3s}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:11;display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.6)}
#crosshair::before{width:2px;height:16px;left:50%;transform:translateX(-50%)}
#crosshair::after{height:2px;width:16px;top:50%;transform:translateY(-50%)}
#clickMsg{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:14px;z-index:11;display:none;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.75}}
@media(min-width:1025px){#mobileControls{display:none!important}}
#mobileControls{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none}
#m-joy{position:absolute;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);left:20px;bottom:30px;pointer-events:auto;touch-action:none}
#m-joy-knob{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.25);border:3px solid rgba(255,255,255,.2);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 10px rgba(255,255,255,.1)}
#m-jump{position:absolute;width:76px;height:76px;border-radius:50%;right:20px;bottom:30px;background:rgba(80,160,255,.3);border:3px solid rgba(80,160,255,.5);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);font-size:20px;font-weight:bold;box-shadow:0 0 15px rgba(80,140,255,.2)}
#m-jump:active{background:rgba(80,160,255,.7);color:#fff}
#m-look{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:auto;touch-action:none;z-index:-1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="timer">00:00.0</div><div id="floor-info">1구간 / 8구간</div><div id="best-info"></div></div>
<div id="height-bar"><div id="height-fill" style="height:0%"></div></div>
<div id="crosshair"></div>
<div id="clickMsg">화면 클릭으로 조작</div>
<div id="deathOverlay"></div>
<div id="startScreen" class="screen">
  <h1>지옥의 탑</h1>
  <div class="sub">Tower of Hell</div>
  <button class="start-btn" id="playBtn">도전 시작</button>
  <div class="controls-hint">WASD 이동 | 마우스 시점 | Space 점프<br>떨어지면 처음부터! 체크포인트 없음!</div>
</div>
<div id="victoryScreen" class="screen hidden">
  <h1>클리어!</h1>
  <div class="time" id="victoryTime">00:00.0</div>
  <div class="best" id="victoryBest"></div>
  <button class="start-btn" id="retryBtn2">다시 도전</button>
</div>
<div id="mobileControls">
  <div id="m-joy"><div id="m-joy-knob"></div></div>
  <div id="m-jump">점프</div>
  <div id="m-look"></div>
</div>
<script>
// ===== Constants =====
const GRAVITY = 25, JUMP_VEL = 12.5, MOVE_SPEED = 8, EYE_HEIGHT = 1.6;
const PLAYER_RADIUS = 0.3, COYOTE_TIME = 0.1, JUMP_BUFFER = 0.1;
const SECTION_HEIGHT = 10, NUM_SECTIONS = 8, TOTAL_HEIGHT = SECTION_HEIGHT * NUM_SECTIONS + 2;
const NEON = [0xff1493,0x39ff14,0x00bfff,0xff6600,0xbf00ff,0x00ffff,0xffff00,0xff3344];
const isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0) && window.innerWidth <= 1024;

// ===== State =====
const player = {x:0,y:1,z:0,vy:0,prevY:1,onGround:true,coyoteTimer:0,jumpBufferTimer:0};
let yaw = 0, pitch = 0, gameState = 'menu', timer = 0, attempts = 0, highestY = 0;
let standingPlatform = null; // 서 있는 플랫폼 (이동 플랫폼 캐리용)
let bestTime = localStorage.getItem('toh-best') ? parseFloat(localStorage.getItem('toh-best')) : null;
const keys = {};

// ===== Audio =====
let audioCtx = null;
function ensureAudio(){if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();}
function playTone(freq,freq2,dur,vol){
  ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g).connect(audioCtx.destination);
  o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if(freq2) o.frequency.linearRampToValueAtTime(freq2,audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxJump(){playTone(350,700,.12,.12)}
function sfxLand(){playTone(200,100,.08,.08)}
function sfxFall(){playTone(500,80,.5,.15)}
function sfxVictory(){
  ensureAudio();
  [523,659,784,1047].forEach((f,i)=>{
    setTimeout(()=>playTone(f,f*1.01,.3,.12),i*120);
  });
}

// ===== Three.js Setup =====
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080818);
scene.fog = new THREE.Fog(0x080818,60,160);

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,.1,300);

// ===== First-Person Arms (GLB 모델) =====
let armsModel = null;
let leftArmGroup = null, rightArmGroup = null; // 왼팔/오른팔 그룹 (개별 애니메이션용)
let armsMixer = null;
let armsActions = {};
let armBobTimer = 0;
let isMoving = false;

scene.add(camera); // camera를 scene에 추가해야 children이 보임

const gltfLoader = new THREE.GLTFLoader();
gltfLoader.load('models/fps_arms.glb', (gltf) => {
  const loaded = gltf.scene;

  // 모델의 바운딩박스로 중심점 계산
  const box = new THREE.Box3().setFromObject(loaded);
  const center = box.getCenter(new THREE.Vector3());

  // 왼팔/오른팔 분리 (x 좌표 기준)
  leftArmGroup = new THREE.Group();
  rightArmGroup = new THREE.Group();

  // 모든 메시를 x좌표 기준으로 왼쪽/오른쪽 분류
  const meshesToSort = [];
  loaded.traverse(child => {
    if(child.isMesh){
      child.castShadow = false;
      child.receiveShadow = false;
      child.frustumCulled = false;
      meshesToSort.push(child);
    }
  });

  meshesToSort.forEach(mesh => {
    const meshBox = new THREE.Box3().setFromObject(mesh);
    const meshCenter = meshBox.getCenter(new THREE.Vector3());
    const clone = mesh.clone();
    // 월드 포지션 유지
    mesh.getWorldPosition(clone.position);
    mesh.getWorldQuaternion(clone.quaternion);
    mesh.getWorldScale(clone.scale);
    if(meshCenter.x < center.x){
      leftArmGroup.add(clone);
    } else {
      rightArmGroup.add(clone);
    }
  });

  // 각 그룹의 피벗을 어깨 위치로 설정 (상단 중앙)
  const lBox = new THREE.Box3().setFromObject(leftArmGroup);
  const rBox = new THREE.Box3().setFromObject(rightArmGroup);
  const lPivot = new THREE.Vector3(lBox.getCenter(new THREE.Vector3()).x, lBox.max.y, lBox.getCenter(new THREE.Vector3()).z);
  const rPivot = new THREE.Vector3(rBox.getCenter(new THREE.Vector3()).x, rBox.max.y, rBox.getCenter(new THREE.Vector3()).z);

  // 피벗 중심으로 오프셋
  leftArmGroup.children.forEach(c => c.position.sub(lPivot));
  rightArmGroup.children.forEach(c => c.position.sub(rPivot));

  // 래퍼 그룹 (피벗 포인트가 어깨)
  const leftWrapper = new THREE.Group();
  leftWrapper.position.copy(lPivot);
  leftWrapper.add(leftArmGroup);

  const rightWrapper = new THREE.Group();
  rightWrapper.position.copy(rPivot);
  rightWrapper.add(rightArmGroup);

  armsModel = new THREE.Group();
  armsModel.add(leftWrapper);
  armsModel.add(rightWrapper);

  // 참조 저장 (애니메이션용 - wrapper를 회전)
  leftArmGroup = leftWrapper;
  rightArmGroup = rightWrapper;

  armsModel.scale.set(0.045, 0.045, 0.045);
  armsModel.position.set(0, -0.32, -0.45);
  armsModel.rotation.set(0, Math.PI, 0);

  camera.add(armsModel);

  // GLB 내장 애니메이션이 있으면 설정
  if(gltf.animations && gltf.animations.length > 0){
    armsMixer = new THREE.AnimationMixer(armsModel);
    gltf.animations.forEach(clip => {
      armsActions[clip.name.toLowerCase()] = armsMixer.clipAction(clip);
    });
    if(armsActions['idle']) armsActions['idle'].play();
  }
}, undefined, (err) => {
  console.warn('GLB 팔 모델 로드 실패, 기본 박스 팔 사용:', err);
  const fallbackArm = (side) => {
    const g = new THREE.Group();
    const skin = new THREE.MeshStandardMaterial({color:0xf5c6a0,roughness:.6});
    const sleeve = new THREE.MeshStandardMaterial({color:0x3366cc,roughness:.7});
    const u = new THREE.Mesh(new THREE.BoxGeometry(.12,.35,.12), sleeve);
    u.position.y = -.05; g.add(u);
    const f = new THREE.Mesh(new THREE.BoxGeometry(.10,.30,.10), skin);
    f.position.set(0,-.32,.04); g.add(f);
    const h = new THREE.Mesh(new THREE.BoxGeometry(.12,.08,.14), skin);
    h.position.set(0,-.50,.08); g.add(h);
    g.position.set(side==='left'?-.35:.35, -.45, -.5);
    g.rotation.x = .15;
    return g;
  };
  leftArmGroup = fallbackArm('left');
  rightArmGroup = fallbackArm('right');
  armsModel = new THREE.Group();
  armsModel.add(leftArmGroup);
  armsModel.add(rightArmGroup);
  camera.add(armsModel);
});

// Lighting
scene.add(new THREE.AmbientLight(0x404060,.5));
const dLight = new THREE.DirectionalLight(0xffeedd,.7);
dLight.position.set(20,80,30);scene.add(dLight);
const pLight = new THREE.PointLight(0xff8844,.4,50);
scene.add(pLight);

// ===== Platform System =====
let allPlatforms = [];
let dynamicPlatforms = []; // platforms with motion (rotate/slide/spin)
let sectionColors = [];

function addPlatform(p, color){
  const geo = new THREE.BoxGeometry(p.w,p.h,p.d);
  const mat = new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.25,metalness:.3,roughness:.5});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(p.x,p.y,p.z);
  scene.add(mesh);
  allPlatforms.push({...p,mesh});
}

function addDecorEdge(p, color){
  const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(p.w,p.h,p.d));
  const edgeMat = new THREE.LineBasicMaterial({color,transparent:true,opacity:.4});
  const edge = new THREE.LineSegments(edgeGeo,edgeMat);
  edge.position.set(p.x,p.y,p.z);
  scene.add(edge);
}

// Dynamic platform: moves/rotates each frame
// motion: {type:'slide',axis:'x',center,range,speed} | {type:'rotate',cx,cz,radius,speed,startAngle} | {type:'spin',speed}
function addDynamicPlatform(p, color, motion){
  const geo = new THREE.BoxGeometry(p.w,p.h,p.d);
  const mat = new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.4,metalness:.4,roughness:.4});
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(p.x,p.y,p.z);
  scene.add(mesh);
  const entry = {...p,mesh};
  allPlatforms.push(entry);
  dynamicPlatforms.push({entry,motion,origX:p.x,origY:p.y,origZ:p.z});
  // glow edge
  const edgeGeo = new THREE.EdgesGeometry(geo);
  const edgeMat = new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.5});
  const edge = new THREE.LineSegments(edgeGeo,edgeMat);
  mesh.add(edge);
}

function updateDynamicPlatforms(now){
  const t = now * 0.001;
  for(const dp of dynamicPlatforms){
    const m = dp.motion, e = dp.entry;
    // 이전 위치 저장 (플랫폼 캐리용)
    dp.prevX = e.x; dp.prevY = e.y; dp.prevZ = e.z;
    if(m.type==='slide'){
      const offset = Math.sin(t * m.speed) * m.range;
      if(m.axis==='x'){ e.x = dp.origX + offset; }
      else if(m.axis==='z'){ e.z = dp.origZ + offset; }
      else if(m.axis==='y'){ e.y = dp.origY + offset; }
      e.mesh.position.set(e.x, e.y, e.z);
    }
    else if(m.type==='rotate'){
      const a = m.startAngle + t * m.speed;
      e.x = m.cx + Math.cos(a) * m.radius;
      e.z = m.cz + Math.sin(a) * m.radius;
      e.mesh.position.set(e.x, e.y, e.z);
      e.mesh.rotation.y = a;
    }
    else if(m.type==='spin'){
      e.mesh.rotation.y = t * m.speed;
    }
    // 이동 델타 계산
    dp.deltaX = e.x - dp.prevX;
    dp.deltaY = e.y - dp.prevY;
    dp.deltaZ = e.z - dp.prevZ;
  }
}

// ===== Section Generators (Tower of Hell style - big, connected obstacles) =====
const TH = .5; // platform thickness

// diff: 0~1 difficulty scaling (0=easy, 1=hard)
// Returns {statics:[], dynamics:[]} where dynamics have motion info
function sc(w,diff){ return Math.max(w*0.5, w*(1-diff*0.35)); } // shrink platforms with difficulty

// 1. 지그재그 브릿지
function zigzagBridge(yBase,diff){
  const o=[],dyn=[];
  const w=sc(4.5,diff), d=sc(2.5,diff);
  o.push({x:-5,y:yBase+1.5,z:0, w,h:TH,d});
  o.push({x:-2,y:yBase+1.5,z:0, w:sc(1.2,diff),h:TH,d:5});
  o.push({x:1,y:yBase+3,z:3, w:sc(5,diff),h:TH,d});
  o.push({x:4,y:yBase+3,z:1, w:d,h:TH,d:4});
  o.push({x:5,y:yBase+4.5,z:-1, w,h:TH,d});
  o.push({x:2,y:yBase+4.5,z:-1, w:sc(1.2,diff),h:TH,d:4});
  o.push({x:-2,y:yBase+6,z:-4, w:sc(5,diff),h:TH,d});
  o.push({x:-2,y:yBase+6,z:-1.5, w:sc(1.5,diff),h:TH,d:3});
  o.push({x:-4,y:yBase+7.5,z:1, w:sc(4,diff),h:TH,d:sc(2.5,diff)});
  o.push({x:0,y:yBase+9,z:0, w:sc(4,diff),h:TH,d:sc(3,diff)});
  // 고난이도: 이동 플랫폼 추가
  if(diff>0.3) dyn.push({p:{x:2,y:yBase+5.5,z:-3,w:2.5,h:TH,d:2}, motion:{type:'slide',axis:'x',range:2.5,speed:1.5+diff}});
  return {statics:o,dynamics:dyn};
}

// 2. 나선형 계단
function spiralWalkway(yBase,diff){
  const o=[],dyn=[], n=10, R=5.5;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2.5;
    const pw=sc(Math.max(2.5,3.5-i*.1),diff), pd=sc(Math.max(2,2.8-i*.08),diff);
    o.push({x:Math.cos(a)*R,y:yBase+.8+i*(SECTION_HEIGHT-1.5)/n,z:Math.sin(a)*R, w:pw,h:TH,d:pd});
  }
  // 고난이도: 회전 플랫폼 (회오리)
  if(diff>0.4){
    const ry=yBase+5;
    dyn.push({p:{x:0,y:ry,z:R,w:2.5,h:TH,d:1.5}, motion:{type:'rotate',cx:0,cz:0,radius:R,speed:0.8+diff*0.8,startAngle:0}});
    dyn.push({p:{x:0,y:ry,z:-R,w:2.5,h:TH,d:1.5}, motion:{type:'rotate',cx:0,cz:0,radius:R,speed:0.8+diff*0.8,startAngle:Math.PI}});
  }
  return {statics:o,dynamics:dyn};
}

// 3. L자 통로 + 점프
function corridorJump(yBase,diff){
  const o=[],dyn=[];
  o.push({x:-5,y:yBase+1.5,z:0, w:sc(1.5,diff),h:TH,d:8});
  o.push({x:-2,y:yBase+3,z:4, w:sc(5,diff),h:TH,d:sc(1.5,diff)});
  o.push({x:3,y:yBase+4.5,z:4, w:sc(3,diff),h:TH,d:sc(3,diff)});
  o.push({x:5,y:yBase+5.5,z:1, w:sc(1.5,diff),h:TH,d:7});
  o.push({x:2,y:yBase+7,z:-3, w:sc(5,diff),h:TH,d:sc(1.5,diff)});
  o.push({x:-2,y:yBase+8.5,z:-3, w:sc(3,diff),h:TH,d:sc(3,diff)});
  if(diff>0.3) dyn.push({p:{x:1,y:yBase+3.8,z:0,w:2.5,h:TH,d:1.5}, motion:{type:'slide',axis:'z',range:3,speed:1.2+diff}});
  return {statics:o,dynamics:dyn};
}

// 4. 벽 타기 경로
function wallPath(yBase,diff){
  const o=[],dyn=[], R=6;
  const pts=[{a:0,dy:1.2},{a:.7,dy:2.4},{a:1.4,dy:3.6},{a:2.1,dy:4.8},{a:2.8,dy:6},{a:3.5,dy:7.2},{a:4.2,dy:8.4}];
  pts.forEach((p,i)=>{
    o.push({x:Math.cos(p.a)*R, y:yBase+p.dy, z:Math.sin(p.a)*R, w:sc(2.8,diff),h:TH,d:sc(1.8,diff)});
  });
  if(diff>0.5) dyn.push({p:{x:0,y:yBase+4.8,z:0,w:3,h:TH,d:1.5}, motion:{type:'rotate',cx:0,cz:0,radius:3,speed:1+diff,startAngle:1}});
  return {statics:o,dynamics:dyn};
}

// 5. 십자가 브릿지
function crossBridge(yBase,diff){
  const o=[],dyn=[];
  o.push({x:0,y:yBase+1.5,z:0, w:sc(10,diff),h:TH,d:sc(1.5,diff)});
  o.push({x:4,y:yBase+3,z:0, w:sc(2.5,diff),h:TH,d:sc(2.5,diff)});
  o.push({x:4,y:yBase+4.5,z:3, w:sc(2.5,diff),h:TH,d:5});
  o.push({x:0,y:yBase+6,z:5, w:sc(8,diff),h:TH,d:sc(1.5,diff)});
  o.push({x:-4,y:yBase+7.5,z:3, w:sc(2.5,diff),h:TH,d:5});
  o.push({x:-2,y:yBase+9,z:0, w:sc(4,diff),h:TH,d:sc(2.5,diff)});
  if(diff>0.2) dyn.push({p:{x:0,y:yBase+4.5,z:0,w:2,h:TH,d:2}, motion:{type:'slide',axis:'x',range:3,speed:1.5+diff*1.5}});
  return {statics:o,dynamics:dyn};
}

// 6. 나선형 점프 타워
function helixTower(yBase,diff){
  const o=[],dyn=[], n=8, R=4.5;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2.8;
    o.push({x:Math.cos(a)*R, y:yBase+1+i*(SECTION_HEIGHT-1.5)/n, z:Math.sin(a)*R,
      w:sc(2.2,diff),h:TH,d:sc(2.2,diff)});
  }
  if(diff>0.4){
    dyn.push({p:{x:0,y:yBase+4,z:0,w:2,h:TH,d:2}, motion:{type:'rotate',cx:0,cz:0,radius:R*0.6,speed:1.2+diff,startAngle:0}});
  }
  return {statics:o,dynamics:dyn};
}

// 7. 계단식 스캐폴드
function scaffold(yBase,diff){
  const o=[],dyn=[];
  o.push({x:-4,y:yBase+1,z:-2, w:sc(4,diff),h:TH,d:sc(3,diff)});
  o.push({x:-4,y:yBase+2.5,z:2, w:sc(4,diff),h:TH,d:sc(3,diff)});
  o.push({x:0,y:yBase+4,z:4, w:sc(3,diff),h:TH,d:sc(3,diff)});
  o.push({x:4,y:yBase+5.5,z:2, w:sc(4,diff),h:TH,d:sc(3,diff)});
  o.push({x:4,y:yBase+7,z:-2, w:sc(4,diff),h:TH,d:sc(3,diff)});
  o.push({x:0,y:yBase+8.5,z:-3, w:sc(3,diff),h:TH,d:sc(3,diff)});
  if(diff>0.3) dyn.push({p:{x:0,y:yBase+5.5,z:0,w:2.5,h:TH,d:2}, motion:{type:'slide',axis:'z',range:2.5,speed:1.3+diff}});
  return {statics:o,dynamics:dyn};
}

// 8. 좁은 빔 미로
function beamMaze(yBase,diff){
  const o=[],dyn=[], bw=Math.max(0.7, 1-diff*0.3);
  o.push({x:-4,y:yBase+1.5,z:0, w:bw,h:TH,d:8});
  o.push({x:-1,y:yBase+3,z:4, w:6,h:TH,d:bw});
  o.push({x:4,y:yBase+4.5,z:1, w:bw,h:TH,d:7});
  o.push({x:1,y:yBase+6,z:-3, w:7,h:TH,d:bw});
  o.push({x:-3,y:yBase+7.5,z:-1, w:bw,h:TH,d:5});
  o.push({x:0,y:yBase+9,z:1, w:4,h:TH,d:bw});
  if(diff>0.5) dyn.push({p:{x:0,y:yBase+4.5,z:-1,w:1.5,h:TH,d:1.5}, motion:{type:'rotate',cx:0,cz:0,radius:2.5,speed:1.5+diff,startAngle:0}});
  return {statics:o,dynamics:dyn};
}

// 9. 회오리 점프 (토네이도) - 중앙에서 회전하는 플랫폼들
function tornadoJump(yBase,diff){
  const o=[],dyn=[];
  o.push({x:-4,y:yBase+1,z:0, w:3,h:TH,d:3}); // 시작 착지
  // 회전하는 팔 여러 개 (회오리)
  const arms=4+Math.floor(diff*2);
  for(let i=0;i<arms;i++){
    const h=yBase+2+i*1.5;
    const spd=(0.7+diff*0.6)*(i%2===0?1:-1); // 번갈아 반대 방향
    dyn.push({p:{x:3,y:h,z:0,w:3,h:TH,d:1.8}, motion:{type:'rotate',cx:0,cz:0,radius:3,speed:spd,startAngle:i*Math.PI/arms*2}});
  }
  o.push({x:3,y:yBase+9,z:0, w:3,h:TH,d:3}); // 출구 착지
  return {statics:o,dynamics:dyn};
}

// 10. 이동 브릿지 - 좌우/전후로 움직이는 다리들
function movingBridges(yBase,diff){
  const o=[],dyn=[];
  o.push({x:-5,y:yBase+1,z:0, w:3,h:TH,d:3}); // 시작
  dyn.push({p:{x:-2,y:yBase+2.5,z:0,w:3,h:TH,d:2}, motion:{type:'slide',axis:'z',range:3,speed:1.2+diff}});
  dyn.push({p:{x:2,y:yBase+4,z:0,w:2.5,h:TH,d:2}, motion:{type:'slide',axis:'x',range:2.5,speed:1.5+diff}});
  o.push({x:5,y:yBase+5,z:0, w:2.5,h:TH,d:2.5}); // 중간 쉼터
  dyn.push({p:{x:2,y:yBase+6.5,z:2,w:2.5,h:TH,d:2}, motion:{type:'slide',axis:'z',range:3,speed:1.3+diff*0.8}});
  dyn.push({p:{x:-2,y:yBase+8,z:0,w:2.5,h:TH,d:2}, motion:{type:'slide',axis:'x',range:3,speed:1.4+diff*0.8}});
  o.push({x:0,y:yBase+9.2,z:0, w:3,h:TH,d:3}); // 출구
  return {statics:o,dynamics:dyn};
}

const SECTION_TYPES = [zigzagBridge,spiralWalkway,tornadoJump,corridorJump,wallPath,movingBridges,crossBridge,helixTower,scaffold,beamMaze];

// ===== Generate Tower =====
function generateTower(){
  // Clear
  for(const p of allPlatforms) scene.remove(p.mesh);
  allPlatforms = [];
  dynamicPlatforms = [];
  sectionColors = [];
  const toRemove = [];
  scene.traverse(c=>{if(c.isLineSegments || c.userData.tower) toRemove.push(c);});
  toRemove.forEach(c=>scene.remove(c));

  // Ground (lava zone)
  const groundGeo = new THREE.PlaneGeometry(120,120);
  const groundMat = new THREE.MeshStandardMaterial({color:0x330000,emissive:0x550000,emissiveIntensity:.6});
  const ground = new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x=-Math.PI/2; ground.position.y=-0.5;
  ground.userData.tower=true; scene.add(ground);

  // Start platform (큰 착지대)
  addPlatform({x:0,y:0,z:0,w:8,h:.6,d:8},0x555566);

  // Tower frame pillars (4 코너 기둥 - 타워 시각적 경계)
  const pillarR=8;
  for(let c=0;c<4;c++){
    const a=c*Math.PI/2+Math.PI/4;
    const geo=new THREE.CylinderGeometry(.15,.15,TOTAL_HEIGHT+5,6);
    const mat=new THREE.MeshBasicMaterial({color:0x333355,transparent:true,opacity:.15});
    const pil=new THREE.Mesh(geo,mat);
    pil.position.set(Math.cos(a)*pillarR,TOTAL_HEIGHT/2,Math.sin(a)*pillarR);
    pil.userData.tower=true; scene.add(pil);
  }

  // Section ring guides (각 구간 높이에 수평 링)
  for(let s=0;s<=NUM_SECTIONS;s++){
    const ringY=s*SECTION_HEIGHT+1;
    const ringGeo=new THREE.RingGeometry(pillarR-.3,pillarR,32);
    const ringMat=new THREE.MeshBasicMaterial({color:NEON[s%NEON.length],transparent:true,opacity:.06,side:THREE.DoubleSide});
    const ring=new THREE.Mesh(ringGeo,ringMat);
    ring.rotation.x=-Math.PI/2; ring.position.y=ringY;
    ring.userData.tower=true; scene.add(ring);
  }

  // Sections
  for(let s=0;s<NUM_SECTIONS;s++){
    const yBase = s*SECTION_HEIGHT + 1;
    const color = NEON[s % NEON.length];
    sectionColors.push(color);

    // Entry pad (큰 착지 플랫폼)
    const entryP={x:0,y:yBase,z:0,w:4.5,h:.5,d:4.5};
    addPlatform(entryP,color); addDecorEdge(entryP,color);

    // Section platforms (난이도: 섹션이 올라갈수록 어려워짐)
    const diff = s / (NUM_SECTIONS - 1); // 0 ~ 1
    const gen = SECTION_TYPES[s % SECTION_TYPES.length];
    const result = gen(yBase, diff);
    for(const p of result.statics){addPlatform(p,color);addDecorEdge(p,color);}
    for(const d of result.dynamics){addDynamicPlatform(d.p,color,d.motion);}

    // Exit pad
    const exitP={x:0,y:yBase+SECTION_HEIGHT,z:0,w:4.5,h:.5,d:4.5};
    addPlatform(exitP,color); addDecorEdge(exitP,color);
  }

  // Victory platform (대형)
  addPlatform({x:0,y:TOTAL_HEIGHT,z:0,w:7,h:.6,d:7},0xffd700);

  // Victory beacon
  const beaconGeo=new THREE.CylinderGeometry(.15,.15,6,8);
  const beaconMat=new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.5});
  const beacon=new THREE.Mesh(beaconGeo,beaconMat);
  beacon.position.set(0,TOTAL_HEIGHT+3.5,0);
  beacon.userData.tower=true; scene.add(beacon);

  // Background stars
  const starGeo=new THREE.BufferGeometry();
  const starVerts=[];
  for(let i=0;i<1000;i++){
    const r=40+Math.random()*100;
    const a=Math.random()*Math.PI*2;
    const h=Math.random()*TOTAL_HEIGHT*1.5-10;
    starVerts.push(Math.cos(a)*r,h,Math.sin(a)*r);
  }
  starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
  const starMat=new THREE.PointsMaterial({color:0xffffff,size:.4,transparent:true,opacity:.35});
  const stars=new THREE.Points(starGeo,starMat);
  stars.userData.tower=true; scene.add(stars);
}

// ===== Player Physics =====
function resetPlayer(){
  player.x=0;player.y=1;player.z=0;player.vy=0;player.prevY=1;
  player.onGround=true;player.coyoteTimer=0;player.jumpBufferTimer=0;
  highestY=1;
}

// AABB overlap test: player capsule vs platform box
// 발이 플랫폼 윗면 근처면 벽 충돌 무시 (점프 끊김 방지)
function playerOverlaps(px,py,pz,p){
  const hw=p.w/2, hd=p.d/2, hh=p.h/2, pr=PLAYER_RADIUS;
  const top=p.y+hh;
  if(py>=top-0.1) return false; // 플랫폼 위에 서있거나 위에 있으면 벽충돌 안 함
  return px+pr>p.x-hw && px-pr<p.x+hw &&
         pz+pr>p.z-hd && pz-pr<p.z+hd &&
         py<top && py+EYE_HEIGHT>p.y-hh;
}

function updatePlayer(dt){
  if(gameState!=='playing') return;

  // ── 이동 플랫폼 캐리: 서 있는 플랫폼이 움직이면 플레이어도 같이 이동 ──
  if(standingPlatform){
    for(const dp of dynamicPlatforms){
      if(dp.entry === standingPlatform){
        player.x += dp.deltaX;
        player.y += dp.deltaY;
        player.z += dp.deltaZ;
        break;
      }
    }
  }

  // Movement direction
  const fwd = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rgt = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  let mx=0,mz=0;
  if(keys['KeyW']||keys['ArrowUp']||mobileMove.y<0){mx+=fwd.x;mz+=fwd.z;}
  if(keys['KeyS']||keys['ArrowDown']||mobileMove.y>0){mx-=fwd.x;mz-=fwd.z;}
  if(keys['KeyA']||keys['ArrowLeft']||mobileMove.x<0){mx-=rgt.x;mz-=rgt.z;}
  if(keys['KeyD']||keys['ArrowRight']||mobileMove.x>0){mx+=rgt.x;mz+=rgt.z;}

  // Mobile joystick magnitude
  if(mobileMove.x!==0||mobileMove.y!==0){
    const joyMag = Math.min(1, Math.sqrt(mobileMove.x*mobileMove.x+mobileMove.y*mobileMove.y));
    const joyAngle = Math.atan2(-mobileMove.x, -mobileMove.y);
    const worldAngle = yaw + joyAngle;
    mx = -Math.sin(worldAngle)*joyMag;
    mz = -Math.cos(worldAngle)*joyMag;
  }

  const len = Math.sqrt(mx*mx+mz*mz);
  let dx=0,dz=0;
  if(len>.01){dx=(mx/len)*MOVE_SPEED*dt;dz=(mz/len)*MOVE_SPEED*dt;}

  // ── Step 1: X movement + wall collision ──
  player.x += dx;
  for(const p of allPlatforms){
    if(playerOverlaps(player.x,player.y,player.z,p)){
      if(dx>0) player.x = p.x - p.w/2 - PLAYER_RADIUS;
      else     player.x = p.x + p.w/2 + PLAYER_RADIUS;
    }
  }

  // ── Step 2: Z movement + wall collision ──
  player.z += dz;
  for(const p of allPlatforms){
    if(playerOverlaps(player.x,player.y,player.z,p)){
      if(dz>0) player.z = p.z - p.d/2 - PLAYER_RADIUS;
      else     player.z = p.z + p.d/2 + PLAYER_RADIUS;
    }
  }

  // ── Step 3: Gravity + vertical collision (sweep) ──
  const prevY = player.y;
  player.vy -= GRAVITY*dt;
  if(player.vy<-40) player.vy=-40;
  player.y += player.vy*dt;

  // Coyote time
  if(player.onGround) player.coyoteTimer = COYOTE_TIME;
  else player.coyoteTimer -= dt;

  // Jump buffer
  if(player.jumpBufferTimer>0) player.jumpBufferTimer -= dt;

  // Jump
  const wantJump = keys['Space'] || mobileJump;
  if(wantJump) player.jumpBufferTimer = JUMP_BUFFER;
  if(player.jumpBufferTimer>0 && player.coyoteTimer>0){
    player.vy = JUMP_VEL;
    player.onGround = false;
    player.coyoteTimer = 0;
    player.jumpBufferTimer = 0;
    sfxJump();
  }
  mobileJump = false;

  // Vertical collision: sweep from prevY to player.y
  let landed = false;
  let bestTop = -Infinity;
  let landedPlatform = null;
  for(const p of allPlatforms){
    const hw=p.w/2+PLAYER_RADIUS, hd=p.d/2+PLAYER_RADIUS;
    if(player.x<p.x-hw||player.x>p.x+hw) continue;
    if(player.z<p.z-hd||player.z>p.z+hd) continue;
    const top = p.y+p.h/2;
    const bot = p.y-p.h/2;
    // Landing: feet swept through platform top surface
    if(player.vy<=0 && prevY>=top-0.02 && player.y<top+0.01){
      if(top>bestTop){bestTop=top;landed=true;landedPlatform=p;}
    }
    // Head bump: head swept through platform bottom surface
    if(player.vy>0 && prevY+EYE_HEIGHT<=bot+0.02 && player.y+EYE_HEIGHT>bot-0.01){
      player.y = bot - EYE_HEIGHT - 0.01;
      player.vy = 0;
    }
  }
  if(landed){player.y=bestTop;player.vy=0;}
  player.onGround = landed;
  standingPlatform = landed ? landedPlatform : null;

  // Track highest
  if(player.y > highestY) highestY = player.y;

  // Fall death
  if(player.y < -3){
    sfxFall();
    resetPlayer();
    showDeathFlash();
  }

  // Victory check
  if(player.y >= TOTAL_HEIGHT - .5){
    gameState = 'victory';
    sfxVictory();
    showVictory();
  }

  // Update camera
  camera.position.set(player.x, player.y+EYE_HEIGHT, player.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // ── 팔 애니메이션 (걸을 때 앞뒤로 흔들기) ──
  if(armsModel){
    isMoving = (len > .01);
    if(isMoving && player.onGround) armBobTimer += dt * 12;
    else if(isMoving && !player.onGround) armBobTimer += dt * 3;
    else {
      // 서서히 0으로 복귀
      const target = Math.round(armBobTimer / (Math.PI*2)) * Math.PI*2;
      armBobTimer += (target - armBobTimer) * dt * 8;
    }

    const bobY = Math.sin(armBobTimer * 2) * .012;
    const jumpLift = player.onGround ? 0 : Math.min(.1, Math.abs(player.vy) * .008);

    armsModel.position.y = -0.32 + bobY - jumpLift;
    armsModel.position.z = -0.45;

    // 왼팔/오른팔 반대 방향 스윙 (걷기 애니메이션)
    if(leftArmGroup && rightArmGroup){
      const swingAmount = isMoving ? 0.35 : 0.02; // 걸을 때 크게, 멈추면 작게
      const leftSwing = Math.sin(armBobTimer) * swingAmount;
      const rightSwing = Math.sin(armBobTimer + Math.PI) * swingAmount; // 반대 위상

      leftArmGroup.rotation.x = leftSwing;
      rightArmGroup.rotation.x = rightSwing;

      // 점프 시 팔 올리기
      if(!player.onGround){
        leftArmGroup.rotation.x = -0.3;
        rightArmGroup.rotation.x = -0.3;
      }
    }

    // AnimationMixer 업데이트
    if(armsMixer) armsMixer.update(dt);
  }

  // Point light follows player
  pLight.position.set(player.x, player.y+3, player.z);
}

// ===== UI =====
function formatTime(t){
  const m = Math.floor(t/60);
  const s = Math.floor(t%60);
  const ms = Math.floor((t%1)*10);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${ms}`;
}

function getCurrentSection(){
  return Math.min(NUM_SECTIONS, Math.max(1, Math.ceil((player.y-1)/SECTION_HEIGHT)));
}

function updateHUD(){
  document.getElementById('timer').textContent = formatTime(timer);
  const sec = getCurrentSection();
  document.getElementById('floor-info').textContent = `${sec}구간 / ${NUM_SECTIONS}구간`;
  const pct = Math.min(100, Math.max(0, (highestY/TOTAL_HEIGHT)*100));
  document.getElementById('height-fill').style.height = pct+'%';
  if(bestTime!==null) document.getElementById('best-info').textContent = `최고: ${formatTime(bestTime)}`;
}

function showDeathFlash(){
  const ov = document.getElementById('deathOverlay');
  ov.style.display = 'block';
  ov.style.opacity = '1';
  setTimeout(()=>{ov.style.opacity='0';setTimeout(()=>ov.style.display='none',300);},200);
}

function showVictory(){
  document.getElementById('hud').style.display='none';
  document.getElementById('height-bar').style.display='none';
  document.getElementById('crosshair').style.display='none';
  document.getElementById('clickMsg').style.display='none';
  document.getElementById('victoryTime').textContent = formatTime(timer);
  if(bestTime===null||timer<bestTime){
    bestTime = timer;
    localStorage.setItem('toh-best',timer.toString());
    document.getElementById('victoryBest').textContent = '새 기록!';
  } else {
    document.getElementById('victoryBest').textContent = `최고: ${formatTime(bestTime)}`;
  }
  document.getElementById('victoryScreen').classList.remove('hidden');
  if(document.pointerLockElement) document.exitPointerLock();
}

function startGame(){
  ensureAudio();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('victoryScreen').classList.add('hidden');
  document.getElementById('hud').style.display='block';
  document.getElementById('height-bar').style.display='block';
  document.getElementById('crosshair').style.display='block';
  if(!isMobile) document.getElementById('clickMsg').style.display='block';
  generateTower();
  resetPlayer();
  timer = 0;
  attempts++;
  gameState = 'playing';
  yaw = 0; pitch = 0;
  if(isMobile){
    document.getElementById('mobileControls').style.display='block';
    document.getElementById('clickMsg').style.display='none';
  } else {
    canvas.requestPointerLock();
  }
}

// ===== Input =====
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space') e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);

// Pointer lock
canvas.addEventListener('click',()=>{
  if(gameState==='playing'&&!isMobile){
    canvas.requestPointerLock();
    document.getElementById('clickMsg').style.display='none';
  }
});
document.addEventListener('pointerlockchange',()=>{
  if(!document.pointerLockElement && gameState==='playing' && !isMobile){
    document.getElementById('clickMsg').style.display='block';
  }
});
document.addEventListener('mousemove',e=>{
  if(document.pointerLockElement===canvas && gameState==='playing'){
    yaw -= e.movementX*.002;
    pitch -= e.movementY*.002;
    pitch = Math.max(-Math.PI/2+.05, Math.min(Math.PI/2-.05, pitch));
  }
});

// Buttons
document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('retryBtn2').addEventListener('click',startGame);
// Touch start on buttons
document.getElementById('playBtn').addEventListener('touchend',e=>{e.preventDefault();startGame();});
document.getElementById('retryBtn2').addEventListener('touchend',e=>{e.preventDefault();startGame();});

// ===== Mobile Controls =====
let mobileMove = {x:0,y:0};
let mobileJump = false;
let joyTouchId = null, lookTouchId = null;
const joyEl = document.getElementById('m-joy');
const joyKnob = document.getElementById('m-joy-knob');
const lookEl = document.getElementById('m-look');
const jumpEl = document.getElementById('m-jump');

if(isMobile){
  // Joystick
  joyEl.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    joyTouchId = t.identifier;
  },{passive:false});
  joyEl.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===joyTouchId){
        const rect = joyEl.getBoundingClientRect();
        const cx = rect.left+rect.width/2;
        const cy = rect.top+rect.height/2;
        let dx = (t.clientX-cx)/(rect.width/2);
        let dy = (t.clientY-cy)/(rect.height/2);
        const m = Math.sqrt(dx*dx+dy*dy);
        if(m>1){dx/=m;dy/=m;}
        mobileMove.x = dx;
        mobileMove.y = dy;
        joyKnob.style.transform = `translate(calc(-50% + ${dx*35}px), calc(-50% + ${dy*35}px))`;
      }
    }
  },{passive:false});
  const resetJoy = e=>{
    for(const t of e.changedTouches){
      if(t.identifier===joyTouchId){
        joyTouchId=null;
        mobileMove.x=0;mobileMove.y=0;
        joyKnob.style.transform='translate(-50%,-50%)';
      }
    }
  };
  joyEl.addEventListener('touchend',resetJoy);
  joyEl.addEventListener('touchcancel',resetJoy);

  // Look
  let lastLookX=0,lastLookY=0;
  lookEl.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    lookTouchId=t.identifier;
    lastLookX=t.clientX;lastLookY=t.clientY;
  },{passive:false});
  lookEl.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===lookTouchId){
        const dx=t.clientX-lastLookX;
        const dy=t.clientY-lastLookY;
        yaw -= dx*.006;
        pitch -= dy*.005;
        pitch = Math.max(-Math.PI/2+.05,Math.min(Math.PI/2-.05,pitch));
        lastLookX=t.clientX;lastLookY=t.clientY;
      }
    }
  },{passive:false});
  const resetLook=e=>{for(const t of e.changedTouches)if(t.identifier===lookTouchId)lookTouchId=null;};
  lookEl.addEventListener('touchend',resetLook);
  lookEl.addEventListener('touchcancel',resetLook);

  // Jump (연타 가능하게)
  jumpEl.addEventListener('touchstart',e=>{e.preventDefault();mobileJump=true;},{passive:false});
  jumpEl.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});
}

// ===== Resize =====
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ===== Game Loop =====
let lastTime = 0;
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  const dt = Math.min((now-lastTime)/1000, .05);
  lastTime = now;

  if(gameState==='playing'){
    timer += dt;
    updateDynamicPlatforms(now);
    updatePlayer(dt);
    updateHUD();
  }

  // Animate beacon
  scene.traverse(c=>{
    if(c.userData.tower && c.geometry && c.geometry.type==='CylinderGeometry'){
      c.rotation.y += dt;
      c.material.opacity = .3+Math.sin(now*.003)*.2;
    }
  });

  renderer.render(scene,camera);
}
requestAnimationFrame(gameLoop);
</script>
