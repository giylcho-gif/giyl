<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 방탈출 게임</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a12; font-family:'Segoe UI',sans-serif; overflow:hidden; height:100vh; display:flex; justify-content:center; align-items:center; }

/* ── 메인 메뉴 ── */
#menu-screen {
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: linear-gradient(135deg, #050510, #15102e, #0e0e1e);
  z-index:100;
}
#menu-screen h1 {
  font-size:52px; color:#fff; margin-bottom:10px; text-shadow:0 0 30px rgba(255,200,50,0.5);
  animation: titleGlow 2s ease-in-out infinite alternate;
}
@keyframes titleGlow {
  from { text-shadow:0 0 20px rgba(255,200,50,0.3); }
  to { text-shadow:0 0 40px rgba(255,200,50,0.8), 0 0 80px rgba(255,150,50,0.3); }
}
#menu-screen .subtitle { color:#aaa; font-size:16px; margin-bottom:40px; }
.level-cards { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; max-width:800px; }
.level-card {
  width:220px; padding:25px 20px; border-radius:16px; cursor:pointer;
  transition: all 0.3s ease; position:relative; overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
}
.level-card:hover { transform:translateY(-8px); border-color:rgba(255,255,255,0.3); }
.level-card .level-num { font-size:14px; font-weight:bold; letter-spacing:2px; margin-bottom:8px; }
.level-card .level-title { font-size:20px; font-weight:bold; color:#fff; margin-bottom:8px; }
.level-card .level-desc { font-size:13px; color:rgba(255,255,255,0.7); line-height:1.5; }
.level-card .difficulty { margin-top:12px; display:flex; gap:4px; }
.level-card .difficulty .star { width:14px; height:14px; }

.card-1 { background: linear-gradient(135deg, #2d6a4f, #40916c); }
.card-1:hover { box-shadow: 0 12px 40px rgba(64,145,108,0.4); }
.card-2 { background: linear-gradient(135deg, #e76f51, #f4a261); }
.card-2:hover { box-shadow: 0 12px 40px rgba(231,111,81,0.4); }
.card-3 { background: linear-gradient(135deg, #6a040f, #9d0208); }
.card-3:hover { box-shadow: 0 12px 40px rgba(157,2,8,0.4); }

.locked { opacity:0.5; pointer-events:none; }
.locked::after {
  content:'🔒'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:40px; filter:drop-shadow(0 0 10px rgba(0,0,0,0.5));
}

/* ── 게임 화면 ── */
#game-screen {
  display:none; width:100vw; height:100vh; position:relative;
  background:#050508; overflow:hidden;
}
#game-canvas {
  display:block; margin:auto; cursor:pointer;
  image-rendering:pixelated;
}

/* ── HUD ── */
#hud {
  position:absolute; top:0; left:0; right:0; padding:15px 20px;
  display:flex; justify-content:space-between; align-items:center;
  background:linear-gradient(180deg, rgba(0,0,0,0.7), transparent);
  pointer-events:none; z-index:10;
}
#hud > * { pointer-events:auto; }
#hud .level-info { color:#fff; font-size:16px; font-weight:bold; }
#hud .timer { color:#ffdd57; font-size:22px; font-weight:bold; font-family:monospace; }
#hud .btn-back {
  background:rgba(255,255,255,0.15); color:#fff; border:none; padding:8px 16px;
  border-radius:8px; cursor:pointer; font-size:14px; backdrop-filter:blur(5px);
}
#hud .btn-back:hover { background:rgba(255,255,255,0.3); }

/* ── 인벤토리 ── */
#inventory {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; z-index:10;
}
.inv-slot {
  width:60px; height:60px; border:2px solid rgba(255,255,255,0.2); border-radius:10px;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(5px);
  display:flex; align-items:center; justify-content:center; font-size:28px;
  cursor:pointer; transition:all 0.2s;
}
.inv-slot:hover { border-color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.1); }
.inv-slot.selected { border-color:#ffdd57; box-shadow:0 0 15px rgba(255,221,87,0.4); }

/* ── 힌트 버튼 ── */
#hint-btn {
  position:absolute; bottom:20px; right:20px; z-index:10;
  background:linear-gradient(135deg, #f4a261, #e76f51); color:#fff; border:none;
  padding:10px 20px; border-radius:25px; cursor:pointer; font-size:14px; font-weight:bold;
  transition:all 0.2s;
}
#hint-btn:hover { transform:scale(1.05); box-shadow:0 5px 20px rgba(231,111,81,0.4); }
#hint-count { margin-left:5px; }

/* ── 메시지 박스 ── */
#message-box {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.9); color:#fff; padding:30px 40px; border-radius:16px;
  text-align:center; z-index:50; display:none; min-width:300px;
  border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px);
}
#message-box h2 { margin-bottom:15px; font-size:24px; }
#message-box p { color:#ccc; margin-bottom:20px; line-height:1.6; }
#message-box button {
  background:linear-gradient(135deg, #40916c, #2d6a4f); color:#fff; border:none;
  padding:10px 30px; border-radius:10px; cursor:pointer; font-size:16px; font-weight:bold;
  transition:all 0.2s;
}
#message-box button:hover { transform:scale(1.05); }

/* ── 비밀번호 입력 ── */
#password-modal {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(10,10,30,0.95); padding:30px; border-radius:16px;
  text-align:center; z-index:50; display:none;
  border:1px solid rgba(255,255,255,0.15); backdrop-filter:blur(10px);
}
#password-modal h3 { color:#fff; margin-bottom:15px; }
#password-modal input {
  background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2);
  color:#fff; padding:12px 20px; border-radius:10px; font-size:24px;
  text-align:center; letter-spacing:8px; width:220px; outline:none;
}
#password-modal input:focus { border-color:#ffdd57; }
#password-modal .modal-btns { margin-top:15px; display:flex; gap:10px; justify-content:center; }
#password-modal button {
  padding:8px 20px; border:none; border-radius:8px; cursor:pointer; font-size:14px;
}
#password-modal .btn-ok { background:#40916c; color:#fff; }
#password-modal .btn-cancel { background:rgba(255,255,255,0.15); color:#fff; }

/* ── 클리어 화면 ── */
#clear-screen {
  position:absolute; inset:0; display:none; flex-direction:column;
  align-items:center; justify-content:center; z-index:80;
  background:rgba(0,0,0,0.9); backdrop-filter:blur(10px);
}
#clear-screen h1 { font-size:48px; color:#ffdd57; margin-bottom:10px; }
#clear-screen .clear-time { font-size:20px; color:#aaa; margin-bottom:30px; }
#clear-screen .clear-btns { display:flex; gap:15px; }
#clear-screen button {
  padding:12px 30px; border:none; border-radius:10px; cursor:pointer;
  font-size:16px; font-weight:bold; transition:all 0.2s;
}
#clear-screen button:hover { transform:scale(1.05); }
.btn-next { background:linear-gradient(135deg, #40916c, #2d6a4f); color:#fff; }
.btn-menu { background:rgba(255,255,255,0.15); color:#fff; }

/* ── 반응형 ── */
@media (max-width:700px) {
  .level-card { width:90%; max-width:300px; }
  #menu-screen h1 { font-size:36px; }
}
</style>
</head>
<body>

<!-- 메인 메뉴 -->
<div id="menu-screen">
  <h1>🔐 방탈출</h1>
  <div class="subtitle">미스터리한 방에서 탈출하세요!</div>
  <div class="level-cards">
    <div class="level-card card-2" onclick="startLevel(1)">
      <div class="level-num">LEVEL 1</div>
      <div class="level-title">비밀 연구소</div>
      <div class="level-desc">수상한 연구소... 실험 기록 속 비밀번호를 찾아라!</div>
      <div class="difficulty">⭐⭐</div>
    </div>
    <div class="level-card card-3" onclick="startLevel(2)" id="card-2">
      <div class="level-num">LEVEL 2</div>
      <div class="level-title">유령의 저택</div>
      <div class="level-desc">으스스한 저택, 시간 안에 저주를 풀어야 한다...</div>
      <div class="difficulty">⭐⭐⭐</div>
    </div>
  </div>
</div>

<!-- 게임 화면 -->
<div id="game-screen">
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <button class="btn-back" onclick="goMenu()">◀ 메뉴</button>
    <span class="level-info" id="level-info">LEVEL 1</span>
    <span class="timer" id="timer">05:00</span>
  </div>
  <div id="inventory"></div>
  <button id="hint-btn" onclick="useHint()">💡 힌트 <span id="hint-count">(3)</span></button>
  <div id="message-box"><h2 id="msg-title"></h2><p id="msg-text"></p><button onclick="closeMessage()">확인</button></div>
  <div id="password-modal">
    <h3 id="pw-title">비밀번호 입력</h3>
    <input id="pw-input" maxlength="6" placeholder="••••">
    <div class="modal-btns">
      <button class="btn-ok" onclick="submitPassword()">확인</button>
      <button class="btn-cancel" onclick="closePassword()">취소</button>
    </div>
  </div>
  <div id="clear-screen">
    <h1>🎉 탈출 성공!</h1>
    <div class="clear-time" id="clear-time">클리어 시간: 02:35</div>
    <div class="clear-btns">
      <button class="btn-next" id="btn-next" onclick="nextLevel()">다음 레벨 ▶</button>
      <button class="btn-menu" onclick="goMenu()">메뉴로</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  방탈출 게임 엔진
// ══════════════════════════════════════════════════

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 600;
canvas.width = W; canvas.height = H;

// ── 게임 상태 ──
let currentLevel = 0;
let inventory = [];
let selectedItem = -1;
let timer = 0;
let timerInterval = null;
let hintsLeft = 3;
let gameActive = false;
let solvedPuzzles = {};
let clickables = [];
let unlockedLevels = [true, false];
let hintIndex = 0;

// localStorage에서 진행 로드
try {
  const saved = JSON.parse(localStorage.getItem('escape_progress'));
  if (saved && saved.unlocked && saved.unlocked.length === 2) unlockedLevels = saved.unlocked;
} catch(e) {}

function saveProgress() {
  localStorage.setItem('escape_progress', JSON.stringify({ unlocked: unlockedLevels }));
}

function updateLevelCards() {
  document.getElementById('card-2').classList.toggle('locked', !unlockedLevels[1]);
}
updateLevelCards();

// ── 유틸 ──
let messageOpen = false;
function showMessage(title, text) {
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-text').innerHTML = text.replace(/\n/g, '<br>');
  document.getElementById('message-box').style.display = 'block';
  messageOpen = true;
}
function closeMessage() {
  document.getElementById('message-box').style.display = 'none';
  setTimeout(() => { messageOpen = false; }, 100);
}

function showPassword(title, callback) {
  document.getElementById('pw-title').textContent = title;
  document.getElementById('pw-input').value = '';
  document.getElementById('password-modal').style.display = 'block';
  document.getElementById('pw-input').focus();
  window._pwCallback = callback;
}
function submitPassword() {
  const val = document.getElementById('pw-input').value;
  document.getElementById('password-modal').style.display = 'none';
  if (window._pwCallback) window._pwCallback(val);
}
function closePassword() { document.getElementById('password-modal').style.display = 'none'; }

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitPassword();
  if (e.key === 'Escape') closePassword();
});

// ── 타이머 ──
function startTimer(seconds) {
  timer = seconds;
  updateTimerDisplay();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameActive) return;
    timer--;
    updateTimerDisplay();
    if (timer <= 0) {
      clearInterval(timerInterval);
      gameActive = false;
      showMessage('⏰ 시간 초과!', '시간이 다 됐습니다... 다시 도전하세요!');
      setTimeout(goMenu, 3000);
    }
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timer / 60);
  const s = timer % 60;
  document.getElementById('timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timer').style.color = timer <= 30 ? '#ff4444' : '#ffdd57';
}

// ── 인벤토리 ──
function updateInventory() {
  const div = document.getElementById('inventory');
  div.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const slot = document.createElement('div');
    slot.className = 'inv-slot' + (i === selectedItem ? ' selected' : '');
    slot.textContent = inventory[i] ? inventory[i].icon : '';
    slot.title = inventory[i] ? inventory[i].name : '';
    slot.onclick = () => { selectedItem = (selectedItem === i) ? -1 : i; updateInventory(); };
    div.appendChild(slot);
  }
}

function addItem(item, silent) {
  if (inventory.find(it => it && it.id === item.id)) return false;
  const idx = inventory.findIndex(it => !it);
  if (idx === -1) { showMessage('가방이 꽉 찼어요!','아이템을 사용해서 비워주세요.'); return false; }
  inventory[idx] = item;
  updateInventory();
  if (!silent) showMessage('아이템 획득!', `${item.icon} ${item.name}을(를) 얻었습니다!`);
  return true;
}

function removeItem(id) {
  const idx = inventory.findIndex(it => it && it.id === id);
  if (idx >= 0) { inventory[idx] = null; if (selectedItem === idx) selectedItem = -1; updateInventory(); }
}

function hasItem(id) { return inventory.some(it => it && it.id === id); }
function getSelectedItem() { return selectedItem >= 0 ? inventory[selectedItem] : null; }

// ── 힌트 ──
function useHint() {
  if (hintsLeft <= 0) { showMessage('힌트 없음', '힌트를 모두 사용했습니다!'); return; }
  const hints = levels[currentLevel].hints || [];
  if (hintIndex >= hints.length) { showMessage('힌트', '더 이상 힌트가 없습니다!'); return; }
  hintsLeft--;
  document.getElementById('hint-count').textContent = `(${hintsLeft})`;
  showMessage('💡 힌트', hints[hintIndex]);
  hintIndex++;
}

// ── 레벨 클리어 ──
function levelClear() {
  gameActive = false;
  clearInterval(timerInterval);
  const elapsed = levels[currentLevel].time - timer;
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('clear-time').textContent = `클리어 시간: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  if (currentLevel + 1 < 2) {
    unlockedLevels[currentLevel + 1] = true;
    saveProgress();
    updateLevelCards();
    document.getElementById('btn-next').style.display = '';
  } else {
    document.getElementById('btn-next').style.display = 'none';
  }
  document.getElementById('clear-screen').style.display = 'flex';
}

function nextLevel() {
  document.getElementById('clear-screen').style.display = 'none';
  if (currentLevel + 1 < 2) startLevel(currentLevel + 2);
  else goMenu();
}

// ── 메뉴 전환 ──
function goMenu() {
  gameActive = false;
  clearInterval(timerInterval);
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('clear-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  updateLevelCards();
}

function startLevel(num) {
  if (!unlockedLevels[num - 1]) return;
  currentLevel = num - 1;
  inventory = [];
  selectedItem = -1;
  solvedPuzzles = {};
  hintsLeft = 3;
  hintIndex = 0;
  clickables = [];
  document.getElementById('hint-count').textContent = '(3)';
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('clear-screen').style.display = 'none';
  document.getElementById('message-box').style.display = 'none';
  document.getElementById('password-modal').style.display = 'none';
  document.getElementById('level-info').textContent = `LEVEL ${num} - ${levels[currentLevel].name}`;
  updateInventory();

  levels[currentLevel].init();
  startTimer(levels[currentLevel].time);
  gameActive = true;
  drawRoom();
}

// ══════════════════════════════════════════════════
//  레벨 정의
// ══════════════════════════════════════════════════

const levels = [
  // ─── LEVEL 1: 비밀 연구소 ───
  {
    name: '비밀 연구소',
    time: 420,
    hints: [
      '컴퓨터 화면의 에러 코드를 잘 살펴보세요.',
      '시약 병의 색깔 순서가 중요합니다: 빨-파-초',
      '최종 비밀번호는 에러코드 + 시약순서: 7392'
    ],
    init() {
      solvedPuzzles = { computer:false, cabinet:false, microscope:false, chemicals:false, exitDoor:false, fusebox:false };
    },
    draw() {
      const c = ctx;
      // 바닥 - 타일
      c.fillStyle = '#b0bec5';
      c.fillRect(0, 370, W, 230);
      for (let x = 0; x < W; x += 60) {
        for (let y = 370; y < 600; y += 60) {
          c.strokeStyle = 'rgba(0,0,0,0.1)';
          c.strokeRect(x, y, 60, 60);
        }
      }

      // 벽
      const wg = c.createLinearGradient(0, 0, 0, 370);
      wg.addColorStop(0, '#eceff1');
      wg.addColorStop(1, '#cfd8dc');
      c.fillStyle = wg;
      c.fillRect(0, 0, W, 370);

      // ── 컴퓨터 책상 (왼쪽) ──
      c.fillStyle = '#78909c';
      c.fillRect(40, 250, 200, 120);
      c.fillStyle = '#546e7a';
      c.fillRect(110, 370, 60, 70);
      // 모니터
      c.fillStyle = '#263238';
      c.fillRect(70, 130, 140, 110);
      c.fillStyle = solvedPuzzles.computer ? '#1b5e20' : '#0d47a1';
      c.fillRect(78, 138, 124, 94);
      // 화면 내용
      c.fillStyle = '#76ff03';
      c.font = '11px monospace';
      c.textAlign = 'left';
      if (!solvedPuzzles.computer) {
        c.fillText('> SYSTEM ERROR', 84, 158);
        c.fillText('> CODE: E-739', 84, 175);
        c.fillText('> ACCESS DENIED', 84, 192);
        c.fillText('> HINT: ****', 84, 209);
        c.fillText('> _', 84, 226);
      } else {
        c.fillText('> ACCESS GRANTED', 84, 158);
        c.fillText('> DOOR UNLOCKED', 84, 175);
        c.fillText('> EVACUATE NOW', 84, 192);
      }
      // 모니터 받침
      c.fillStyle = '#263238';
      c.fillRect(120, 240, 40, 15);
      c.fillRect(100, 252, 80, 6);
      // 키보드
      c.fillStyle = '#37474f';
      c.fillRect(80, 265, 120, 30);

      // ── 약품 선반 (중앙 위) ──
      c.fillStyle = '#90a4ae';
      c.fillRect(320, 60, 260, 200);
      c.strokeStyle = '#607d8b';
      c.lineWidth = 2;
      c.strokeRect(320, 60, 260, 200);
      // 선반 판
      c.fillStyle = '#78909c';
      c.fillRect(325, 130, 250, 5);
      c.fillRect(325, 195, 250, 5);

      // 시약 병들
      const bottles = [
        {x:345, color:'#e53935', label:'R'},
        {x:390, color:'#1e88e5', label:'B'},
        {x:435, color:'#43a047', label:'G'},
        {x:480, color:'#fdd835', label:'Y'},
        {x:525, color:'#8e24aa', label:'P'}
      ];
      bottles.forEach(b => {
        // 병 몸체
        c.fillStyle = b.color;
        roundRect(c, b.x, 90, 25, 35, 4);
        c.fill();
        c.fillStyle = 'rgba(255,255,255,0.3)';
        c.fillRect(b.x+3, 95, 5, 20);
        // 뚜껑
        c.fillStyle = '#424242';
        c.fillRect(b.x+5, 85, 15, 8);
        // 라벨
        c.fillStyle = '#fff';
        c.font = 'bold 10px sans-serif';
        c.textAlign = 'center';
        c.fillText(b.label, b.x+12, 118);
      });

      // 두 번째 줄 - 비커 & 장비
      c.fillStyle = 'rgba(200,230,255,0.4)';
      c.beginPath(); c.moveTo(350, 200); c.lineTo(340, 155); c.lineTo(380, 155); c.lineTo(370, 200); c.closePath(); c.fill();
      c.strokeStyle = 'rgba(100,180,255,0.6)';
      c.stroke();

      // ── 현미경 (오른쪽 테이블 위) ──
      c.fillStyle = '#546e7a';
      c.fillRect(650, 270, 200, 100);
      c.fillStyle = '#455a64';
      c.fillRect(710, 370, 80, 60);
      // 현미경
      c.fillStyle = '#212121';
      c.fillRect(720, 210, 10, 60);
      c.fillRect(700, 195, 50, 20);
      c.fillRect(710, 180, 30, 20);

            drawRoom();
          } else {
            showMessage('🔥 벽난로', '불이 타오르고 있다. 안에 무언가 있는 것 같은데 불이 너무 뜨겁다.\n물이 필요하다.');
          }
        } else {
          showMessage('벽난로', '꺼진 벽난로. 마지막 숫자는 0.');
        }
      }
      else if (id === 'piano') {
        if (!solvedPuzzles.piano) {
          solvedPuzzles.piano = true;
          showMessage('🎹 피아노', '피아노를 치자 특정 건반이 빛났다.\n도(1)-미(3)-솔(5)-도(1)...\n\n건반 위에 적힌 숫자: "5"\n두 번째 숫자를 찾았다!');
          addItem({id:'num_5', icon:'5️⃣', name:'숫자 5'}, true);
        } else {
          showMessage('🎹 피아노', '도-미-솔-도... 두 번째 숫자는 5.');
        }
      }
      else if (id === 'mirror') {
        if (!solvedPuzzles.mirror) {
          solvedPuzzles.mirror = true;
          showMessage('🪞 마법 거울', '거울에 비친 글자: "A N U L"\n거꾸로 읽으면 "L U N A" (달)!\n\n거울 테두리에 숫자가 나타났다: "8"\n세 번째 숫자를 찾았다!');
          addItem({id:'num_8', icon:'8️⃣', name:'숫자 8'}, true);
          drawRoom();
        } else {
          showMessage('🪞 거울', 'LUNA... 달. 세 번째 숫자는 8.');
        }
      }
      else if (id === 'portrait') {
        if (!solvedPuzzles.portrait) {
          solvedPuzzles.portrait = true;
          showMessage('🖼️ 초상화', '여인의 초상화... 눈이 빨갛게 빛난다.\n"불을 꺼라..." 속삭이는 소리가 들리는 것 같다.');
        } else {
          showMessage('🖼️ 초상화', '으스스한 여인의 초상화. 눈이 따라오는 것 같다...');
        }
      }
      else if (id === 'bucket') {
        if (!solvedPuzzles.bucket_taken) {
          solvedPuzzles.bucket_taken = true;
          showMessage('🪣 물 양동이', '벽난로 옆에 놓인 물 양동이를 집었다!\n벽난로의 불을 끄는 데 쓸 수 있을 것 같다.');
          addItem({id:'water_bucket', icon:'🪣', name:'물 양동이'}, true);
          drawRoom();
        }
      }
      else if (id === 'candle') {
        if (!solvedPuzzles.candle) {
          solvedPuzzles.candle = true;
          showMessage('🕯️ 촛대', '촛불이 흔들리더니 벽에 그림자 글씨가 나타났다:\n"순서를 기억하라: 시계-피아노-거울-불꽃"');
        } else {
          showMessage('🕯️ 촛대', '"시계-피아노-거울-불꽃" 순서가 중요하다.');
        }
      }
      else if (id === 'spellbook') {
        if (!solvedPuzzles.spellbook) {
          solvedPuzzles.spellbook = true;
          showMessage('📕 마법서', '"해방의 주문"\n\n네 개의 봉인 숫자를 모아\n시계의 수, 피아노의 수, 거울의 수, 불꽃의 수\n순서대로 제단에 바쳐라.\n\n그리하면 저주는 풀리리라...');
        } else {
          showMessage('📕 마법서', '네 숫자를 순서대로 제단에 바쳐라.\n시계 → 피아노 → 거울 → 불꽃');
        }
      }
      else if (id === 'altar') {
        showPassword('봉인 해제 주문 (4자리)', (val) => {
          if (val === '3580') {
            solvedPuzzles.altar = true;
            solvedPuzzles.gate = true;
            showMessage('✨ 주문 성공!', '제단이 보라빛으로 빛나며 대문의 봉인이 풀렸다!\n저주가 해제되었다!');
            drawRoom();
          } else {
            showMessage('❌ 주문 실패', '제단이 미동도 하지 않는다.\n네 개의 봉인 숫자를 올바른 순서로 입력하세요.');
          }
        });
      }
      else if (id === 'gate') {
        if (solvedPuzzles.gate) {
          levelClear();
        } else {
          showMessage('🚪 대문', '강력한 마법으로 봉인되어 있다.\n제단에서 봉인 해제 주문을 완성해야 한다.');
        }
      }
    }
  }
];

// ── 그리기 ──
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function drawRoom() {
  ctx.clearRect(0, 0, W, H);
  levels[currentLevel].draw();
}

// ── 클릭/호버 ──
let hoveredItem = null;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width;
  const sy = H / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top) * sy;

  hoveredItem = null;
  for (const cl of clickables) {
    if (mx >= cl.x && mx <= cl.x + cl.w && my >= cl.y && my <= cl.y + cl.h) {
      hoveredItem = cl;
      break;
    }
  }
  canvas.style.cursor = hoveredItem ? 'pointer' : 'default';

  // 호버 표시 다시 그리기
  drawRoom();
  if (hoveredItem && gameActive) {
    ctx.strokeStyle = 'rgba(255,221,87,0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    ctx.strokeRect(hoveredItem.x, hoveredItem.y, hoveredItem.w, hoveredItem.h);
    ctx.setLineDash([]);

    // 라벨
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    const tx = hoveredItem.x + hoveredItem.w/2;
    const ty = hoveredItem.y - 10;
    const tw = ctx.measureText(hoveredItem.label).width + 16;
    roundRect(ctx, tx - tw/2, ty - 14, tw, 20, 5);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(hoveredItem.label, tx, ty);
  }
});

canvas.addEventListener('click', (e) => {
  if (!gameActive) return;
  if (messageOpen) return;
  if (document.getElementById('password-modal').style.display === 'block') return;
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width;
  const sy = H / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top) * sy;

  for (const cl of clickables) {
    if (mx >= cl.x && mx <= cl.x + cl.w && my >= cl.y && my <= cl.y + cl.h) {
      levels[currentLevel].click(cl.id);
      drawRoom();
      return;
    }
  }
});

// ── 반응형 캔버스 크기 ──
function resizeCanvas() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const scale = Math.min(maxW / W, maxH / H, 1);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── 레벨3 벽난로 애니메이션 ──
function animLoop() {
  if (gameActive && currentLevel === 1) drawRoom();
  requestAnimationFrame(animLoop);
}
animLoop();

</script>
