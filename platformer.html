<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=960,H=640;
canvas.width=W;canvas.height=H;

// ===== GAME STATE =====
const TILE=32;
const GRAVITY=0.6;
const JUMP_FORCE=-12;
const MOVE_SPEED=4;
const MAX_FALL=12;
const COYOTE_TIME=6;
const JUMP_BUFFER=8;

let keys={};
let gameState='title'; // title, playing, gameover, clear
let currentLevel=0;
let deaths=0;
let totalCoins=0;
let frameCount=0;
let screenShake=0;
let particles=[];
let floatingTexts=[];

// ===== PLAYER =====
let player={
  x:0,y:0,vx:0,vy:0,w:20,h:28,
  onGround:false,coyoteTimer:0,jumpBufferTimer:0,
  facing:1,animFrame:0,animTimer:0,
  dead:false,deathTimer:0,
  trail:[]
};

// ===== CAMERA =====
let cam={x:0,y:0,targetX:0,targetY:0};

// ===== LEVEL DATA =====
// Legend: 1=solid, 2=spike, 3=coin, 4=moving platform, 5=spring, 6=goal, 7=breakable, 8=ice
const levels=[

// ===== LEVEL OBJECTS =====
let tiles=[];
let coins=[];
let springs=[];
let spikes=[];
let breakables=[];
let goal=null;

function loadLevel(idx){
  tiles=[];coins=[];springs=[];spikes=[];breakables=[];goal=null;
  const lv=levels[idx];
  const map=lv.map;
  for(let r=0;r<map.length;r++){
    for(let c=0;c<map[r].length;c++){
      const ch=map[r][c];
      const x=c*TILE,y=r*TILE;
      if(ch==='1') tiles.push({x,y,w:TILE,h:TILE,type:'solid'});
      else if(ch==='8') tiles.push({x,y,w:TILE,h:TILE,type:'ice'});
      else if(ch==='2') spikes.push({x:x+4,y:y+TILE-12,w:TILE-8,h:12});
      else if(ch==='3') coins.push({x:x+TILE/2,y:y+TILE/2,collected:false,bobOffset:Math.random()*Math.PI*2});
      else if(ch==='5') springs.push({x,y:y+10,w:TILE,h:TILE-10,anim:0});
      else if(ch==='6') goal={x,y,w:TILE,h:TILE};
      else if(ch==='7') breakables.push({x,y,w:TILE,h:TILE,hp:2,shakeTimer:0});
    }
  }
  // spawn player
  player.x=lv.spawn[0]*TILE;
  player.y=lv.spawn[1]*TILE;
  player.vx=0;player.vy=0;
  player.dead=false;player.deathTimer=0;
  player.onGround=false;player.coyoteTimer=0;player.jumpBufferTimer=0;
  player.trail=[];
  cam.x=player.x-W/2;cam.y=player.y-H/2;
  cam.targetX=cam.x;cam.targetY=cam.y;
  particles=[];floatingTexts=[];
}

// ===== COLLISION =====
function rectsOverlap(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function getTileAt(px,py){
  for(const t of tiles){
    if(px>=t.x&&px<t.x+t.w&&py>=t.y&&py<t.y+t.h) return t;
  }
  for(const b of breakables){
    if(b.hp>0&&px>=b.x&&px<b.x+b.w&&py>=b.y&&py<b.y+b.h) return b;
  }
  return null;
}

// ===== PARTICLES =====
function spawnParticles(x,y,color,count,spread){
  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*spread,
      vy:(Math.random()-0.5)*spread-2,
      life:30+Math.random()*20,
      maxLife:50,
      color,
      size:2+Math.random()*3
    });
  }
}

function spawnFloatingText(x,y,text,color){
  floatingTexts.push({x,y,text,color,life:40,vy:-2});
}

// ===== PLAYER UPDATE =====
function updatePlayer(){
  if(player.dead){
    player.deathTimer++;
    if(player.deathTimer>60){
      currentLevel=0;
      totalCoins=0;
      loadLevel(0);
    }
    return;
  }

  const onIce=isOnIce();
  const accel=onIce?0.3:1;
  const friction=onIce?0.97:0.8;

  // Horizontal movement
  let moveX=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) moveX=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) moveX=1;

  if(moveX!==0){
    player.vx+=moveX*MOVE_SPEED*accel;
    player.facing=moveX;
  }
  player.vx*=friction;
  if(Math.abs(player.vx)<0.1) player.vx=0;
  player.vx=Math.max(-MOVE_SPEED*1.5,Math.min(MOVE_SPEED*1.5,player.vx));

  // Gravity
  player.vy+=GRAVITY;
  if(player.vy>MAX_FALL) player.vy=MAX_FALL;

  // Coyote time
  if(player.onGround) player.coyoteTimer=COYOTE_TIME;
  else player.coyoteTimer--;

  // Jump buffer
  if(keys['ArrowUp']||keys['w']||keys['W']||keys[' ']){
    if(!player._jumpHeld) player.jumpBufferTimer=JUMP_BUFFER;
    player._jumpHeld=true;
  } else {
    player._jumpHeld=false;
  }
  player.jumpBufferTimer--;

  // Jump
  if(player.jumpBufferTimer>0&&player.coyoteTimer>0){
    player.vy=JUMP_FORCE;
    player.coyoteTimer=0;
    player.jumpBufferTimer=0;
    spawnParticles(player.x+player.w/2,player.y+player.h,'#fff',6,3);
    playJumpSound();
  }

  // Variable jump height
  if(!(keys['ArrowUp']||keys['w']||keys['W']||keys[' '])&&player.vy<-3){
    player.vy*=0.5;
  }

  // Move X
  player.x+=player.vx;
  resolveCollisionX();

  // Move Y
  player.y+=player.vy;
  player.onGround=false;
  resolveCollisionY();

  // Trail
  if(Math.abs(player.vx)>1||Math.abs(player.vy)>1){
    player.trail.push({x:player.x+player.w/2,y:player.y+player.h/2,life:10});
  }
  player.trail=player.trail.filter(t=>{t.life--;return t.life>0;});

  // Animation
  player.animTimer++;
  if(player.animTimer>6){player.animTimer=0;player.animFrame=(player.animFrame+1)%4;}

  // Coins
  const pb={x:player.x,y:player.y,w:player.w,h:player.h};
  for(const c of coins){
    if(!c.collected&&Math.abs(player.x+player.w/2-c.x)<16&&Math.abs(player.y+player.h/2-c.y)<16){
      c.collected=true;
      totalCoins++;
      spawnParticles(c.x,c.y,'#ffd700',8,4);
      spawnFloatingText(c.x,c.y-10,'+1','#ffd700');
      playCoinSound();
    }
  }

  // Springs
  for(const s of springs){
    if(rectsOverlap(pb,s)&&player.vy>0){
      player.vy=JUMP_FORCE*1.5;
      s.anim=10;
      spawnParticles(s.x+s.w/2,s.y,'#00ff88',8,5);
      playSpringSound();
    }
  }

  // Breakables (stomp from above)
  for(const b of breakables){
    if(b.hp>0&&rectsOverlap(pb,{x:b.x,y:b.y,w:b.w,h:b.h})&&player.vy>0&&player.y+player.h-player.vy<=b.y+4){
      b.hp--;
      b.shakeTimer=8;
      player.vy=-6;
      if(b.hp<=0){
        spawnParticles(b.x+b.w/2,b.y+b.h/2,'#a0522d',12,6);
        playBreakSound();
      } else {
        playHitSound();
      }
    }
  }

  // Spikes
  for(const s of spikes){
    if(rectsOverlap(pb,s)){
      killPlayer();
      return;
    }
  }

  // Fall off map
  if(player.y>levels[currentLevel].map.length*TILE+100){
    killPlayer();
    return;
  }

  // Goal
  if(goal&&rectsOverlap(pb,goal)){
    currentLevel++;
    if(currentLevel>=levels.length){
      gameState='clear';
      playClearSound();
    } else {
      loadLevel(currentLevel);
      spawnParticles(player.x+player.w/2,player.y+player.h/2,'#fff',20,8);
      playGoalSound();
    }
  }

  // Camera
  cam.targetX=player.x-W/2+player.w/2;
  cam.targetY=player.y-H/2+player.h/2;
  cam.x+=(cam.targetX-cam.x)*0.1;
  cam.y+=(cam.targetY-cam.y)*0.1;
}

function isOnIce(){
  const below=getTileAt(player.x+player.w/2,player.y+player.h+2);
  return below&&below.type==='ice';
}

function resolveCollisionX(){
  const allSolids=[...tiles,...breakables.filter(b=>b.hp>0)];
  for(const t of allSolids){
    if(rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h},t)){
      if(player.vx>0) player.x=t.x-player.w;
      else if(player.vx<0) player.x=t.x+t.w;
      player.vx=0;
    }
  }
}

function resolveCollisionY(){
  const allSolids=[...tiles,...breakables.filter(b=>b.hp>0)];
  for(const t of allSolids){
    if(rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h},t)){
      if(player.vy>0){
        player.y=t.y-player.h;
        player.onGround=true;
      } else if(player.vy<0){
        player.y=t.y+t.h;
      }
      player.vy=0;
    }
  }
}

function killPlayer(){
  if(player.dead) return;
  player.dead=true;
  player.deathTimer=0;
  deaths++;
  screenShake=15;
  spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff4444',20,8);
  playDeathSound();
}

// ===== AUDIO (Web Audio API) =====
let audioCtx=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq,dur,type,vol){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.value=vol||0.1;
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+dur);
  }catch(e){}
}

function playJumpSound(){playTone(400,0.1,'square',0.08);playTone(600,0.1,'square',0.06);}
function playCoinSound(){playTone(880,0.1,'sine',0.1);setTimeout(()=>playTone(1100,0.15,'sine',0.08),80);}
function playSpringSound(){playTone(300,0.15,'sawtooth',0.08);playTone(600,0.2,'sine',0.06);}
function playDeathSound(){playTone(200,0.3,'sawtooth',0.1);playTone(100,0.4,'square',0.08);}
function playBreakSound(){playTone(150,0.2,'sawtooth',0.1);playTone(100,0.15,'square',0.08);}
function playHitSound(){playTone(300,0.1,'square',0.08);}
function playGoalSound(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.1),i*100));}
function playClearSound(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'sine',0.12),i*150));}

// ===== DRAWING =====
function drawBackground(){
  const lv=levels[currentLevel]||levels[0];
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,lv.bgGrad[0]);
  grad.addColorStop(1,lv.bgGrad[1]);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Parallax stars/clouds
  ctx.globalAlpha=0.3;
  for(let i=0;i<30;i++){
    const sx=((i*137+frameCount*0.2)%1200)-100-cam.x*0.1;
    const sy=((i*97)%400)+20;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(sx,sy,1+i%3,0,Math.PI*2);
    ctx.fill();
  }
  // Background clouds
  ctx.fillStyle='rgba(255,255,255,0.15)';
  for(let i=0;i<5;i++){
    const cx=((i*300+frameCount*0.3)%1400)-200-cam.x*0.05;
    const cy=60+i*70;
    drawCloud(cx,cy,40+i*10);
  }
  ctx.globalAlpha=1;
}

function drawCloud(x,y,r){
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.arc(x+r*0.8,y-r*0.2,r*0.7,0,Math.PI*2);
  ctx.arc(x-r*0.6,y-r*0.1,r*0.6,0,Math.PI*2);
  ctx.arc(x+r*0.3,y-r*0.5,r*0.5,0,Math.PI*2);
  ctx.fill();
}

function drawTiles(){
  const ox=-cam.x,oy=-cam.y;
  // Solid tiles
  for(const t of tiles){
    const sx=t.x+ox,sy=t.y+oy;
    if(sx>-TILE&&sx<W+TILE&&sy>-TILE&&sy<H+TILE){
      if(t.type==='ice'){
        ctx.fillStyle='#a8d8ea';
        ctx.fillRect(sx,sy,TILE,TILE);
        ctx.fillStyle='rgba(255,255,255,0.4)';
        ctx.fillRect(sx+2,sy+2,TILE-4,TILE/3);
        ctx.strokeStyle='#7bc8e0';
        ctx.strokeRect(sx,sy,TILE,TILE);
      } else {
        // Grass-topped ground
        const lv=levels[currentLevel];
        const isTop=!getTileAt(t.x,t.y-TILE);
        ctx.fillStyle=isTop?'#5b8c3e':'#8b6914';
        ctx.fillRect(sx,sy,TILE,TILE);
        if(isTop){
          ctx.fillStyle='#4a7a2e';
          ctx.fillRect(sx,sy+TILE-8,TILE,8);
          // Grass tufts
          ctx.fillStyle='#6ba34a';
          for(let g=0;g<3;g++){
            const gx=sx+4+g*10;
            ctx.fillRect(gx,sy-2,3,4);
          }
        } else {
          // Dirt pattern
          ctx.fillStyle='#7a5a10';
          ctx.fillRect(sx+4,sy+4,4,4);
          ctx.fillRect(sx+20,sy+12,4,4);
          ctx.fillRect(sx+12,sy+24,4,4);
        }
        ctx.strokeStyle='rgba(0,0,0,0.15)';
        ctx.strokeRect(sx,sy,TILE,TILE);
      }
    }
  }

  // Breakable blocks
  for(const b of breakables){
    if(b.hp<=0) continue;
    const sx=b.x-cam.x+(b.shakeTimer>0?(Math.random()-0.5)*4:0);
    const sy=b.y-cam.y;
    b.shakeTimer=Math.max(0,b.shakeTimer-1);
    ctx.fillStyle=b.hp>1?'#c8834a':'#a06030';
    ctx.fillRect(sx,sy,TILE,TILE);
    // Crack lines
    if(b.hp<=1){
      ctx.strokeStyle='rgba(0,0,0,0.4)';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(sx+TILE/2,sy);ctx.lineTo(sx+TILE/3,sy+TILE/2);
      ctx.lineTo(sx+TILE*0.6,sy+TILE);
      ctx.stroke();
      ctx.lineWidth=1;
    }
    ctx.strokeStyle='rgba(0,0,0,0.2)';
    ctx.strokeRect(sx,sy,TILE,TILE);
    // Cross pattern
    ctx.strokeStyle='rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.moveTo(sx,sy+TILE/2);ctx.lineTo(sx+TILE,sy+TILE/2);
    ctx.moveTo(sx+TILE/2,sy);ctx.lineTo(sx+TILE/2,sy+TILE);
    ctx.stroke();
  }
}

function drawSpikes(){
  const ox=-cam.x,oy=-cam.y;
  for(const s of spikes){
    const sx=s.x+ox,sy=s.y+oy;
    ctx.fillStyle='#cc3333';
    for(let i=0;i<3;i++){
      const bx=sx+i*(s.w/3);
      ctx.beginPath();
      ctx.moveTo(bx,sy+s.h);
      ctx.lineTo(bx+s.w/6,sy);
      ctx.lineTo(bx+s.w/3,sy+s.h);
      ctx.fill();
    }
    // Shine
    ctx.fillStyle='rgba(255,100,100,0.5)';
    for(let i=0;i<3;i++){
      const bx=sx+i*(s.w/3)+s.w/6-1;
      ctx.fillRect(bx,sy+2,2,4);
    }
  }
}

function drawCoins(){
  const ox=-cam.x,oy=-cam.y;
  for(const c of coins){
    if(c.collected) continue;
    const bob=Math.sin(frameCount*0.05+c.bobOffset)*3;
    const sx=c.x+ox,sy=c.y+oy+bob;
    // Glow
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(sx,sy,10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Coin
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.arc(sx,sy,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffec80';
    ctx.beginPath();ctx.arc(sx-2,sy-2,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#daa520';
    ctx.beginPath();ctx.arc(sx,sy,7,0,Math.PI*2);ctx.stroke();
  }
}

function drawSprings(){
  const ox=-cam.x,oy=-cam.y;
  for(const s of springs){
    s.anim=Math.max(0,s.anim-0.5);
    const sx=s.x+ox,sy=s.y+oy+s.anim;
    // Base
    ctx.fillStyle='#666';
    ctx.fillRect(sx+4,sy+s.h-8,TILE-8,8);
    // Spring coil
    ctx.strokeStyle='#00dd66';
    ctx.lineWidth=3;
    const coilH=s.h-8-s.anim;
    for(let i=0;i<4;i++){
      const cy=sy+i*(coilH/4);
      ctx.beginPath();
      ctx.moveTo(sx+6,cy);
      ctx.lineTo(sx+TILE-6,cy+coilH/8);
      ctx.stroke();
    }
    ctx.lineWidth=1;
    // Top plate
    ctx.fillStyle='#00ff88';
    ctx.fillRect(sx+2,sy-2,TILE-4,6);
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillRect(sx+4,sy-1,TILE-8,2);
  }
}

function drawGoal(){
  if(!goal) return;
  const ox=-cam.x,oy=-cam.y;
  const sx=goal.x+ox,sy=goal.y+oy;
  const pulse=Math.sin(frameCount*0.08)*0.3+0.7;

  // Glow
  ctx.globalAlpha=0.2*pulse;
  ctx.fillStyle='#ffff00';
  ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2,30,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // Star shape
  ctx.fillStyle=`hsl(${frameCount*2%360},80%,60%)`;
  ctx.save();
  ctx.translate(sx+TILE/2,sy+TILE/2);
  ctx.rotate(frameCount*0.02);
  drawStar(0,0,6,14,5);
  ctx.restore();

  // Inner glow
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2,4,0,Math.PI*2);ctx.fill();
}

function drawStar(cx,cy,inner,outer,points){
  ctx.beginPath();
  for(let i=0;i<points*2;i++){
    const r=i%2===0?outer:inner;
    const a=(i*Math.PI/points)-Math.PI/2;
    const x=cx+Math.cos(a)*r;
    const y=cy+Math.sin(a)*r;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fill();
}

function drawPlayer(){
  if(player.dead){
    // Death animation - fragments
    ctx.globalAlpha=1-player.deathTimer/60;
    const sx=player.x-cam.x,sy=player.y-cam.y;
    for(let i=0;i<4;i++){
      const angle=i*Math.PI/2+player.deathTimer*0.1;
      const dist=player.deathTimer*2;
      ctx.fillStyle='#5599ff';
      ctx.fillRect(sx+Math.cos(angle)*dist,sy+Math.sin(angle)*dist,8,8);
    }
    ctx.globalAlpha=1;
    return;
  }

  const sx=player.x-cam.x,sy=player.y-cam.y;

  // Trail
  for(const t of player.trail){
    ctx.globalAlpha=t.life/10*0.3;
    ctx.fillStyle='#88bbff';
    ctx.beginPath();
    ctx.arc(t.x-cam.x,t.y-cam.y,3,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.save();
  ctx.translate(sx+player.w/2,sy+player.h/2);
  if(player.facing<0) ctx.scale(-1,1);

  // Body
  const squash=player.onGround&&Math.abs(player.vy)<1?1:
    (player.vy<0?0.9:1.1);
  ctx.scale(1/squash,squash);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.fillRect(-player.w/2-1,player.h/2-3,player.w+2,4);

  // Body fill
  const bodyGrad=ctx.createLinearGradient(-player.w/2,0,player.w/2,0);
  bodyGrad.addColorStop(0,'#3377dd');
  bodyGrad.addColorStop(1,'#5599ff');
  ctx.fillStyle=bodyGrad;
  roundRect(ctx,-player.w/2,-player.h/2,player.w,player.h,4);
  ctx.fill();

  // Face
  // Eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(2,-6,6,6);
  ctx.fillStyle='#222';
  const blink=frameCount%120<3;
  if(!blink){
    ctx.fillRect(4,-5,3,4);
  } else {
    ctx.fillRect(2,-3,6,1);
  }

  // Running legs animation
  if(Math.abs(player.vx)>0.5&&player.onGround){
    const legAnim=Math.sin(frameCount*0.3)*4;
    ctx.fillStyle='#2255aa';
    ctx.fillRect(-4,player.h/2-2,5,2+legAnim);
    ctx.fillRect(2,player.h/2-2,5,2-legAnim);
  }

  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-cam.x-p.size/2,p.y-cam.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
}

function updateParticles(){
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.1;
    p.life--;
  }
  particles=particles.filter(p=>p.life>0);
}

function drawFloatingTexts(){
  for(const ft of floatingTexts){
    ctx.globalAlpha=ft.life/40;
    ctx.fillStyle=ft.color;
    ctx.font='bold 16px monospace';
    ctx.textAlign='center';
    ctx.fillText(ft.text,ft.x-cam.x,ft.y-cam.y);
    ft.y+=ft.vy;
    ft.life--;
  }
  ctx.globalAlpha=1;
  floatingTexts=floatingTexts.filter(ft=>ft.life>0);
}

function drawHUD(){
  // Top bar
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,40);

  ctx.fillStyle='#fff';
  ctx.font='bold 16px monospace';
  ctx.textAlign='left';
  ctx.fillText(`STAGE ${currentLevel+1}: ${levels[currentLevel].name}`,16,26);

  ctx.textAlign='center';
  ctx.fillStyle='#ffd700';
  ctx.fillText(`COIN: ${totalCoins}`,W/2,26);

  ctx.textAlign='right';
  ctx.fillStyle='#ff6666';
  ctx.fillText(`MISS: ${deaths}`,W-16,26);

  // Controls hint (first level)
  if(currentLevel===0&&frameCount<300){
    ctx.globalAlpha=1-frameCount/300;
    ctx.textAlign='center';
    ctx.fillStyle='#fff';
    ctx.font='14px monospace';
    ctx.fillText('Arrow/WASD: Move  |  Space/Up/W: Jump',W/2,H-20);
    ctx.globalAlpha=1;
  }
}

// ===== SCREEN SHAKE =====
function applyScreenShake(){
  if(screenShake>0){
    ctx.save();
    ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
    screenShake*=0.85;
    if(screenShake<0.5) screenShake=0;
  }
}
function endScreenShake(){
  if(screenShake>0||true) ctx.restore();
}

// ===== TITLE SCREEN =====
function drawTitle(){
  // Background
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a0a3e');
  grad.addColorStop(1,'#0a2a5e');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Animated stars
  for(let i=0;i<60;i++){
    const sx=(i*137+frameCount*0.5)%W;
    const sy=(i*97+Math.sin(frameCount*0.01+i)*20)%H;
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(frameCount*0.05+i)*0.3})`;
    ctx.beginPath();ctx.arc(sx,sy,1+i%2,0,Math.PI*2);ctx.fill();
  }

  // Title
  ctx.save();
  ctx.translate(W/2,H*0.3);
  const titleScale=1+Math.sin(frameCount*0.03)*0.03;
  ctx.scale(titleScale,titleScale);

  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.font='bold 52px monospace';
  ctx.textAlign='center';
  ctx.fillText('PLATFORMER',3,3);

  const hue=frameCount%360;
  ctx.fillStyle=`hsl(${hue},70%,65%)`;
  ctx.fillText('PLATFORMER',0,0);
  ctx.restore();

  // Subtitle
  ctx.fillStyle='#aac';
  ctx.font='18px monospace';
  ctx.textAlign='center';
  ctx.fillText(`${levels.length} STAGES`,W/2,H*0.42);

  // Animated character preview
  ctx.save();
  ctx.translate(W/2,H*0.6);
  const bob=Math.sin(frameCount*0.05)*5;
  ctx.translate(0,bob);
  ctx.fillStyle='#5599ff';
  roundRect(ctx,-12,-16,24,32,4);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(4,-10,7,7);
  ctx.fillStyle='#222';ctx.fillRect(6,-9,4,5);
  ctx.restore();

  // Prompt
  ctx.globalAlpha=0.5+Math.sin(frameCount*0.06)*0.5;
  ctx.fillStyle='#fff';
  ctx.font='20px monospace';
  ctx.fillText('PRESS ENTER OR SPACE',W/2,H*0.82);
  ctx.globalAlpha=1;

  // Footer
  ctx.fillStyle='#556';
  ctx.font='12px monospace';
  ctx.fillText('Arrow/WASD: Move | Space/Up/W: Jump',W/2,H-30);
}

// ===== GAME OVER =====
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#ff4444';
  ctx.font='bold 48px monospace';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H*0.4);

  ctx.fillStyle='#fff';
  ctx.font='20px monospace';
  ctx.fillText(`Deaths: ${deaths} | Coins: ${totalCoins}`,W/2,H*0.55);

  ctx.globalAlpha=0.5+Math.sin(frameCount*0.06)*0.5;
  ctx.fillText('PRESS ENTER TO RETRY',W/2,H*0.7);
  ctx.globalAlpha=1;
}

// ===== CLEAR SCREEN =====
function drawClear(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a1a3e');
  grad.addColorStop(1,'#1a3a6e');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Celebration particles
  if(frameCount%4===0){
    const hue=Math.random()*360;
    spawnParticles(Math.random()*W,Math.random()*H*0.5,
      `hsl(${hue},80%,60%)`,3,4);
  }
  drawParticles();
  updateParticles();

  ctx.fillStyle='#ffd700';
  ctx.font='bold 52px monospace';
  ctx.textAlign='center';
  ctx.fillText('CLEAR!',W/2,H*0.3);

  ctx.fillStyle='#fff';
  ctx.font='22px monospace';
  ctx.fillText('ALL STAGES COMPLETE',W/2,H*0.45);

  ctx.font='18px monospace';
  ctx.fillStyle='#aaf';
  ctx.fillText(`Total Coins: ${totalCoins}`,W/2,H*0.58);
  ctx.fillText(`Total Deaths: ${deaths}`,W/2,H*0.65);

  // Rating
  let rating='S';
  if(deaths>3) rating='A';
  if(deaths>8) rating='B';
  if(deaths>15) rating='C';
  ctx.font='bold 40px monospace';
  ctx.fillStyle=rating==='S'?'#ffd700':rating==='A'?'#5599ff':rating==='B'?'#66cc66':'#aaa';
  ctx.fillText(`RANK: ${rating}`,W/2,H*0.78);

  ctx.globalAlpha=0.5+Math.sin(frameCount*0.06)*0.5;
  ctx.fillStyle='#fff';
  ctx.font='16px monospace';
  ctx.fillText('PRESS ENTER TO PLAY AGAIN',W/2,H*0.9);
  ctx.globalAlpha=1;
}

// ===== MAIN LOOP =====
function update(){
  frameCount++;
  if(gameState==='playing'){
    updatePlayer();
    updateParticles();
    // Update spring anim
    for(const s of springs) s.anim=Math.max(0,s.anim-0.5);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  if(gameState==='title'){
    drawTitle();
    return;
  }
  if(gameState==='clear'){
    drawClear();
    return;
  }

  applyScreenShake();
  drawBackground();
  drawTiles();
  drawSpikes();
  drawCoins();
  drawSprings();
  drawGoal();
  drawPlayer();
  drawParticles();
  drawFloatingTexts();
  endScreenShake();
  drawHUD();
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== INPUT =====
document.addEventListener('keydown',e=>{
  keys[e.key]=true;

  if(gameState==='title'&&(e.key==='Enter'||e.key===' ')){
    gameState='playing';
    currentLevel=0;deaths=0;totalCoins=0;
    loadLevel(0);
    // init audio context on user interaction
    getAudio();
  }
  if(gameState==='clear'&&e.key==='Enter'){
    gameState='title';
    frameCount=0;
  }

  if(e.key==='r'||e.key==='R'){
    if(gameState==='playing'){
      loadLevel(currentLevel);
    }
  }

  // Prevent scrolling
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)){
    e.preventDefault();
  }
});

document.addEventListener('keyup',e=>{
  keys[e.key]=false;
});

// Prevent losing focus issues
window.addEventListener('blur',()=>{keys={};});

// ===== START =====
gameLoop();
</script>
</body>
</html>
