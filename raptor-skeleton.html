<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Velociraptor Skeleton Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; overscroll-behavior: none; }
canvas { display: block; touch-action: none; }
#info {
  position: absolute; top: 20px; left: 20px; color: #e0e0ff;
  background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 12px;
  backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
}
#info h2 { font-size: 18px; margin-bottom: 6px; color: #88ccff; }
#info p { font-size: 13px; opacity: 0.8; line-height: 1.5; }
#boneName {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  color: #fff; background: rgba(80,120,255,0.7); padding: 8px 20px;
  border-radius: 20px; font-size: 15px; font-weight: bold;
  backdrop-filter: blur(8px); display: none; pointer-events: none;
}
</style>
</head>
<body>
<div id="info">
  <h2>Velociraptor Skeleton</h2>
  <p>드래그: 회전 | 핀치/스크롤: 줌<br>본 위에 터치하면 이름 표시<br>by Quaternius (CC0)</p>
</div>
<div id="boneName"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const bonesData = [
  { name:"root", head:[0,0,-0.03], tail:[0,-0.1,-0.03], parent:null },
  { name:"Body", head:[0.31,-44.39,-10.46], tail:[0.31,-44.53,-10.46], parent:"root" },
  { name:"FrontLeg.R", head:[-1.73,-31.36,-21.15], tail:[-1.78,-31.36,-21.15], parent:"Body" },
  { name:"FrontUpLeg.R", head:[-6.5,-31.36,-21.15], tail:[-6.51,-31.3,-21.17], parent:"FrontLeg.R" },
  { name:"FrontLowLeg.R", head:[-6.85,-25.81,-23.3], tail:[-6.84,-25.78,-23.37], parent:"FrontUpLeg.R" },
  { name:"FrontFoot.R", head:[-5.48,-22.99,-30.65], tail:[-5.48,-22.91,-30.63], parent:"FrontLowLeg.R" },
  { name:"BackLeg.R", head:[-2.31,-30.26,-1.25], tail:[-2.39,-30.26,-1.25], parent:"Body" },
  { name:"BackUpLeg.R", head:[-11.12,-30.26,-1.25], tail:[-11.11,-30.06,-1.19], parent:"BackLeg.R" },
  { name:"BackLowLeg.R", head:[-9.61,-10.9,4.36], tail:[-9.61,-10.7,4.32], parent:"BackUpLeg.R" },
  { name:"FrontLeg.L", head:[1.73,-31.36,-21.15], tail:[1.78,-31.36,-21.15], parent:"Body" },
  { name:"FrontUpLeg.L", head:[6.5,-31.36,-21.15], tail:[6.51,-31.3,-21.17], parent:"FrontLeg.L" },
  { name:"FrontLowLeg.L", head:[6.85,-25.81,-23.3], tail:[6.84,-25.78,-23.37], parent:"FrontUpLeg.L" },
  { name:"FrontFoot.L", head:[5.48,-22.99,-30.65], tail:[5.48,-22.91,-30.63], parent:"FrontLowLeg.L" },
  { name:"BackLeg.L", head:[2.31,-30.26,-1.25], tail:[2.39,-30.26,-1.25], parent:"Body" },
  { name:"BackUpLeg.L", head:[11.12,-30.26,-1.25], tail:[11.11,-30.06,-1.19], parent:"BackLeg.L" },
  { name:"BackLowLeg.L", head:[9.61,-10.9,4.36], tail:[9.61,-10.7,4.32], parent:"BackUpLeg.L" },
  { name:"Back", head:[-0.01,-32.35,-2.15], tail:[-0.01,-32.37,-2.07], parent:"Body" },
  { name:"Tail1", head:[-0.01,-33.83,6.57], tail:[-0.01,-33.87,6.69], parent:"Back" },
  { name:"Tail2", head:[-0.01,-37.72,19.34], tail:[-0.01,-37.75,19.52], parent:"Tail1" },
  { name:"Tail3", head:[-0.01,-40.62,38.05], tail:[-0.01,-40.64,38.21], parent:"Tail2" },
  { name:"Tail4", head:[-0.01,-42.18,54.09], tail:[-0.01,-42.19,54.24], parent:"Tail3" },
  { name:"Tail5", head:[-0.01,-42.45,68.84], tail:[-0.01,-42.43,68.98], parent:"Tail4" },
  { name:"Hips", head:[-0.01,-31.8,-4.69], tail:[-0.01,-31.81,-4.76], parent:"Body" },
  { name:"Torso", head:[-0.01,-32.36,-11.58], tail:[-0.02,-32.44,-11.73], parent:"Hips" },
  { name:"Shoulders", head:[-0.43,-39.47,-26.59], tail:[-0.42,-39.52,-26.63], parent:"Torso" },
  { name:"Neck", head:[-0.01,-44.84,-31.34], tail:[-0.01,-44.9,-31.39], parent:"Shoulders" },
  { name:"Head", head:[-0.01,-50.63,-36.46], tail:[-0.01,-50.62,-36.54], parent:"Neck" },
  { name:"BackFoot.R", head:[-9.66,-0.86,2.72], tail:[-9.66,-0.86,2.62], parent:"root" },
  { name:"BackFoot.L", head:[9.66,-0.86,2.72], tail:[9.66,-0.86,2.62], parent:"root" }
];

// Build name->bone map
const boneMap = {};
bonesData.forEach(b => boneMap[b.name] = b);

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.003);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(60, -30, -30);
camera.lookAt(0, -30, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, -30, 10);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Lights
scene.add(new THREE.AmbientLight(0x4466aa, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(30, -50, -40);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0x6688ff, 0.5);
rimLight.position.set(-30, 20, 30);
scene.add(rimLight);

// Grid
const gridHelper = new THREE.GridHelper(200, 40, 0x333355, 0x222244);
gridHelper.rotation.x = Math.PI / 2;
scene.add(gridHelper);

// Store spheres and lines for raycasting
const jointSpheres = [];
const boneLines = [];
const jointGroup = new THREE.Group();
const lineGroup = new THREE.Group();
scene.add(jointGroup);
scene.add(lineGroup);

// Color palette by bone region
function getBoneColor(name) {
  if (name === 'Head') return 0xff6688;
  if (name === 'Neck') return 0xff8866;
  if (name.includes('Shoulder')) return 0xffaa44;
  if (name.includes('Torso') || name === 'Body' || name === 'Hips') return 0x44ccff;
  if (name.includes('Tail')) return 0x66ff88;
  if (name.includes('Back') && name.includes('Leg')) return 0xaa88ff;
  if (name.includes('Back') && name.includes('Foot')) return 0xcc66ff;
  if (name.includes('Front') && name.includes('Leg')) return 0xffcc44;
  if (name.includes('Front') && name.includes('Foot')) return 0xff8844;
  if (name === 'Back') return 0x88ddaa;
  if (name === 'root') return 0xffffff;
  return 0x88aaff;
}

// Create joints (spheres) at bone heads
bonesData.forEach(bone => {
  const color = getBoneColor(bone.name);
  const size = bone.name === 'root' ? 1.8 :
               bone.name === 'Head' ? 2.2 :
               bone.name === 'Body' ? 2.0 :
               bone.name.includes('Foot') ? 1.4 : 1.5;

  const geo = new THREE.SphereGeometry(size, 16, 16);
  const mat = new THREE.MeshPhongMaterial({
    color,
    emissive: new THREE.Color(color).multiplyScalar(0.3),
    shininess: 80,
    transparent: true,
    opacity: 0.9
  });
  const sphere = new THREE.Mesh(geo, mat);
  // Blender: x=x, y(blender)=z(three), z(blender)=-y(three)
  sphere.position.set(bone.head[0], -bone.head[2], bone.head[1]);
  sphere.userData = { boneName: bone.name, baseColor: color };
  jointGroup.add(sphere);
  jointSpheres.push(sphere);
});

// Create bone connections (lines from parent head to child head)
bonesData.forEach(bone => {
  if (!bone.parent) return;
  const parent = boneMap[bone.parent];
  if (!parent) return;

  const color = getBoneColor(bone.name);
  const from = new THREE.Vector3(parent.head[0], -parent.head[2], parent.head[1]);
  const to = new THREE.Vector3(bone.head[0], -bone.head[2], bone.head[1]);

  // Cylinder between joints
  const dir = new THREE.Vector3().subVectors(to, from);
  const len = dir.length();
  if (len < 0.01) return;

  const cylGeo = new THREE.CylinderGeometry(0.5, 0.5, len, 8);
  const cylMat = new THREE.MeshPhongMaterial({
    color,
    emissive: new THREE.Color(color).multiplyScalar(0.15),
    shininess: 40,
    transparent: true,
    opacity: 0.7
  });
  const cyl = new THREE.Mesh(cylGeo, cylMat);

  const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
  cyl.position.copy(mid);

  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
  cyl.quaternion.copy(quat);

  cyl.userData = { boneName: bone.name };
  lineGroup.add(cyl);
  boneLines.push(cyl);
});

// Glow ring at each joint
bonesData.forEach(bone => {
  const color = getBoneColor(bone.name);
  const ringGeo = new THREE.RingGeometry(1.8, 2.5, 24);
  const ringMat = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity: 0.25,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(bone.head[0], -bone.head[2], bone.head[1]);
  ring.lookAt(camera.position);
  ring.userData = { isRing: true };
  jointGroup.add(ring);
});

// Raycaster for hover
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const boneNameEl = document.getElementById('boneName');
let hoveredSphere = null;

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

// Floating particles
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const pVelocities = [];
for (let i = 0; i < particleCount; i++) {
  positions[i*3]   = (Math.random()-0.5) * 150;
  positions[i*3+1] = (Math.random()-0.5) * 100;
  positions[i*3+2] = (Math.random()-0.5) * 150;
  pVelocities.push((Math.random()-0.5)*0.05, (Math.random()-0.5)*0.05, (Math.random()-0.5)*0.05);
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x6688cc, size: 0.4, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Animation
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  controls.update();

  // Pulse joints
  jointSpheres.forEach((s, i) => {
    const scale = 1 + Math.sin(time * 2 + i * 0.5) * 0.1;
    s.scale.setScalar(scale);
  });

  // Rotate rings to face camera
  jointGroup.children.forEach(c => {
    if (c.userData.isRing) c.lookAt(camera.position);
  });

  // Move particles
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i*3]   += pVelocities[i*3];
    pos[i*3+1] += pVelocities[i*3+1];
    pos[i*3+2] += pVelocities[i*3+2];
    if (Math.abs(pos[i*3]) > 80) pVelocities[i*3] *= -1;
    if (Math.abs(pos[i*3+1]) > 60) pVelocities[i*3+1] *= -1;
    if (Math.abs(pos[i*3+2]) > 80) pVelocities[i*3+2] *= -1;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Raycast hover
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(jointSpheres);

  if (hoveredSphere) {
    hoveredSphere.material.emissive.setHex(new THREE.Color(hoveredSphere.userData.baseColor).multiplyScalar(0.3).getHex());
    hoveredSphere.scale.setScalar(1);
    hoveredSphere = null;
  }

  if (hits.length > 0) {
    hoveredSphere = hits[0].object;
    hoveredSphere.material.emissive.setHex(0xffffff);
    hoveredSphere.scale.setScalar(1.5);
    boneNameEl.textContent = hoveredSphere.userData.boneName;
    boneNameEl.style.display = 'block';
  } else {
    boneNameEl.style.display = 'none';
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
