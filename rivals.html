<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>라이벌 FPS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0a0a1a;
    display:flex; justify-content:center; align-items:center;
    height:100vh; overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    touch-action:none;overscroll-behavior:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
canvas {
    border-radius:8px;
    box-shadow:0 0 60px rgba(255,50,50,.3);
    max-width:100vw;
    max-height:100vh;
}
@media(min-width:1025px){#fpsControls{display:none!important}}
@media(max-width:768px){
  body{flex-direction:column;justify-content:flex-start;align-items:center}
  canvas{max-height:52vh!important;max-width:100vw!important;border-radius:0!important;box-shadow:none!important}
}
/* ===== 모바일 FPS HUD ===== */
#fpsControls{display:none;position:fixed;bottom:0;left:0;right:0;height:48vh;z-index:1000;touch-action:none;pointer-events:none}

/* ── 이동 조이스틱 - 좌측 상단(높이 올림) ── */
.fps-joy{position:absolute;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none}
.fps-joy-knob{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.15);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#fps-joy-left{left:14px;top:4px}
#fps-joy-left .fps-joy-knob{background:rgba(100,180,255,0.25);border-color:rgba(100,180,255,0.2)}

/* ── 시점 조이스틱 - 우측 상단(높이 올림) ── */
#fps-joy-right{right:14px;top:4px}

/* ── ★ 사격 버튼 - 가운데 크게 ── */
#fps-shoot{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);width:88px;height:88px;border-radius:50%;background:radial-gradient(circle,rgba(255,60,60,0.65),rgba(200,20,20,0.45));border:3px solid rgba(255,100,100,0.5);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;box-shadow:0 0 24px rgba(255,40,40,0.25)}
#fps-shoot:active{background:radial-gradient(circle,rgba(255,80,80,0.95),rgba(255,30,30,0.8));transform:translate(-50%,-50%) scale(0.9);box-shadow:0 0 36px rgba(255,40,40,0.5)}

/* ── 점프 - 사격 왼쪽 위, 겹치지 않게 ── */
#fps-jump{position:absolute;left:50%;top:45%;transform:translate(calc(-50% - 72px),calc(-50% - 20px));width:46px;height:46px;border-radius:50%;background:rgba(80,140,255,0.25);border:1.5px solid rgba(80,140,255,0.2);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6);font-size:15px}
#fps-jump:active{background:rgba(80,140,255,0.65);color:#fff}

/* ── Save & Quit - 사격 아래 ── */
#fps-savequit{position:absolute;left:50%;transform:translateX(-50%);top:calc(45% + 56px);height:28px;padding:0 14px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);font-size:9px;font-weight:700;letter-spacing:0.5px}
#fps-savequit:active{background:rgba(255,80,80,0.4);color:#fff;border-color:rgba(255,80,80,0.4)}

/* ── 보조 버튼 - 맨 아래 한 줄 ── */
.fps-sub{pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:9px;font-weight:700;position:absolute;border-radius:8px;width:52px;height:26px;bottom:6px}
.fps-sub:active{color:#fff}
#fps-reload{left:8px;background:rgba(255,200,50,0.1);border:1px solid rgba(255,200,50,0.1)}
#fps-reload:active{background:rgba(255,200,50,0.5)}
#fps-dash{left:66px;background:rgba(255,150,50,0.1);border:1px solid rgba(255,150,50,0.1)}
#fps-dash:active{background:rgba(255,150,50,0.5)}
#fps-slide{left:124px;background:rgba(100,200,255,0.1);border:1px solid rgba(100,200,255,0.1)}
#fps-slide:active{background:rgba(100,200,255,0.5)}
#fps-grenade{right:64px;background:rgba(80,200,80,0.1);border:1px solid rgba(80,200,80,0.1)}
#fps-grenade:active{background:rgba(80,200,80,0.5)}
#fps-ads{right:8px;background:rgba(180,100,255,0.1);border:1px solid rgba(180,100,255,0.1)}
#fps-ads:active,#fps-ads.on{background:rgba(180,100,255,0.5);color:#fff}

/* ── 무기 전환 바 ── */
.fps-weapon-bar{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);display:flex;gap:3px;pointer-events:auto;touch-action:none}
.fps-wslot{width:36px;height:24px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:12px}
.fps-wslot.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.4);color:#fff}
#crosshair {
    position:fixed; pointer-events:none; z-index:999;
    width:30px; height:30px;
    display:none;
}
</style>
</head>
<body>
<div id="canvasContainer" style="position:relative;display:inline-flex;">
<canvas id="mapCanvas" style="position:absolute;top:0;left:0;border-radius:8px;"></canvas>
<canvas id="c" style="position:relative;"></canvas>
<canvas id="weaponCanvas" style="position:absolute;top:0;left:0;pointer-events:none;border-radius:8px;"></canvas>
</div>
<div id="fpsControls">
  <!-- 이동 조이스틱 (좌) -->
  <div class="fps-joy" id="fps-joy-left"><div class="fps-joy-knob"></div></div>
  <!-- 시점 조이스틱 (우) -->
  <div class="fps-joy" id="fps-joy-right"><div class="fps-joy-knob"></div></div>
  <!-- 무기바 -->
  <div class="fps-weapon-bar" id="fpsWeaponBar">
    <div class="fps-wslot active" data-slot="0">🔫</div>
    <div class="fps-wslot" data-slot="1">🔫</div>
    <div class="fps-wslot" data-slot="2">🗡️</div>
    <div class="fps-wslot" data-slot="3">💣</div>
  </div>
  <!-- 핵심 버튼 -->
  <div id="fps-shoot">🎯</div>
  <div id="fps-jump">⬆</div>
  <div id="fps-savequit">💾 SAVE & QUIT</div>
  <!-- 보조 버튼 -->
  <div class="fps-sub" id="fps-reload">장전</div>
  <div class="fps-sub" id="fps-dash">대시</div>
  <div class="fps-sub" id="fps-slide">슬라</div>
  <div class="fps-sub" id="fps-grenade">수류</div>
  <div class="fps-sub" id="fps-ads">조준</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 960, H = 640;
canvas.width = W; canvas.height = H;

// ====== THREE.JS 3D 무기 시스템 ======
const weaponCanvas = document.getElementById('weaponCanvas');
weaponCanvas.width = W; weaponCanvas.height = H;
weaponCanvas.style.width = canvas.style.width;
weaponCanvas.style.height = canvas.style.height;

const weaponRenderer = new THREE.WebGLRenderer({ canvas: weaponCanvas, alpha: true, antialias: true });
weaponRenderer.setSize(W, H);
weaponRenderer.setClearColor(0x000000, 0);
weaponRenderer.localClippingEnabled = true; // 소매 클리핑용
weaponRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const weaponScene = new THREE.Scene();
const weaponCamera = new THREE.PerspectiveCamera(70, W / H, 0.01, 10);
weaponCamera.position.set(0, 0, 0);

// 3점 조명 (sRGBEncoding + GLB 팔 텍스처 밝기 맞춤)
const wpnKeyLight = new THREE.DirectionalLight(0xffffff, 1.8);
wpnKeyLight.position.set(-1, 2, 1);
weaponScene.add(wpnKeyLight);
const wpnFillLight = new THREE.DirectionalLight(0xaabbdd, 0.8);
wpnFillLight.position.set(1, 0, 0.5);
weaponScene.add(wpnFillLight);
const wpnRimLight = new THREE.DirectionalLight(0xffffff, 0.5);
wpnRimLight.position.set(0, 1, -1);
weaponScene.add(wpnRimLight);
const wpnAmbient = new THREE.AmbientLight(0x606070, 1.2);
weaponScene.add(wpnAmbient);

// 머즐 플래시 라이트
const muzzleFlashLight = new THREE.PointLight(0xffaa44, 0, 2);
weaponScene.add(muzzleFlashLight);

// 무기 모델 저장소
const weaponModels3D = [];
let currentWeapon3D = null;

// ====== THREE.JS 3D 맵 시스템 ======
const mapCanvas = document.getElementById('mapCanvas');
mapCanvas.width = W; mapCanvas.height = H;

const mapRenderer = new THREE.WebGLRenderer({ canvas: mapCanvas, antialias: true });
mapRenderer.setSize(W, H);
mapRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
mapRenderer.shadowMap.enabled = false;
mapRenderer.toneMapping = THREE.ACESFilmicToneMapping;
mapRenderer.toneMappingExposure = 1.0;
mapRenderer.outputEncoding = THREE.sRGBEncoding;

const mapScene = new THREE.Scene();
mapScene.background = new THREE.Color(0x87CEEB); // 밝은 하늘색
mapScene.fog = new THREE.Fog(0x87CEEB, 600, 2000); // 밝은 안개

const mapCamera = new THREE.PerspectiveCamera(75, W / H, 0.5, 2000);

// 맵 조명 (sRGBEncoding 기준)
const mapDirLight = new THREE.DirectionalLight(0xffffff, 1.2);
mapDirLight.position.set(100, 200, 100);
mapScene.add(mapDirLight);
const mapDirLight2 = new THREE.DirectionalLight(0xffeedd, 0.6);
mapDirLight2.position.set(-100, 150, -50);
mapScene.add(mapDirLight2);
const mapAmbient = new THREE.AmbientLight(0xffffff, 0.6);
mapScene.add(mapAmbient);
const mapHemi = new THREE.HemisphereLight(0x87CEEB, 0xB97A20, 0.4);
mapScene.add(mapHemi);

// ====== 3D 적 모델 시스템 (sand_soldier GLB) ======
let enemyModelTemplate = null;
const enemy3DModels = [];
const MAX_ENEMY_3D = 8;
const SOLDIER_H = 10; // 플레이어 높이와 동일
let enemyModelScale = 1;

// GLB 로드 후 인스턴스 생성 (separate parse 방식 - r128 clone 버그 회피)
fetch('models/sand_soldier.glb').then(r => r.arrayBuffer()).then(buffer => {
    const loader = new THREE.GLTFLoader();
    // 먼저 템플릿 파싱으로 크기 측정
    loader.parse(buffer.slice(0), '', (gltf) => {
        enemyModelTemplate = gltf.scene;
        const box = new THREE.Box3().setFromObject(enemyModelTemplate);
        const h = box.getSize(new THREE.Vector3()).y;
        if (h <= 0) { console.error('[3D적] 모델 높이 0'); return; }
        enemyModelScale = SOLDIER_H / h;
        console.log(`[3D적] 템플릿 로드 - 원본높이:${h.toFixed(1)} 스케일:${enemyModelScale.toFixed(6)}`);

        // 각 인스턴스를 별도 parse (SkinnedMesh clone 버그 회피)
        let loaded = 0;
        for (let i = 0; i < MAX_ENEMY_3D; i++) {
            loader.parse(buffer.slice(0), '', (g) => {
                const model = g.scene;
                model.scale.set(enemyModelScale, enemyModelScale, enemyModelScale);
                model.visible = false;
                model.traverse(child => {
                    if (child.isMesh) {
                        child.frustumCulled = false;
                        child.castShadow = false;
                        child.receiveShadow = false;
                        if (child.material) child.material.needsUpdate = true;
                    }
                });
                mapScene.add(model);
                enemy3DModels[i] = { model, active: false };
                if (++loaded === MAX_ENEMY_3D)
                    console.log(`[3D적] 군인 풀 완료 - ${MAX_ENEMY_3D}개`);
            });
        }
    });
}).catch(e => console.error('[3D적] GLB 로드 실패:', e));

// 적 3D 모델 동기화 (매 프레임)
function syncEnemy3D() {
    if (!enemyModelTemplate || enemy3DModels.length < MAX_ENEMY_3D) return;
    const aliveEnemies = enemies.filter(e => e.hp > 0);
    for (let i = 0; i < MAX_ENEMY_3D; i++) {
        const slot = enemy3DModels[i];
        if (!slot) continue;
        if (i < aliveEnemies.length) {
            const e = aliveEnemies[i];
            slot.model.visible = true;
            slot.active = true;
            const floorH = getFloorHeight(e.x, e.z);
            const ey = (floorH !== -Infinity) ? floorH : e.y;
            slot.model.position.set(e.x, ey, e.z);
            slot.model.rotation.y = Math.PI - e.yaw;
        } else {
            slot.model.visible = false;
            slot.active = false;
        }
    }
}

// GLB 맵 모델 로드
let mapModel = null;
const mapLoader = new THREE.GLTFLoader();
mapLoader.load('models/de_dust2_-_cs_map.glb', (gltf) => {
    mapModel = gltf.scene;
    // 맵 스케일 조정 (GLB 맵을 게임 좌표계에 맞추기)
    mapModel.scale.set(1, 1, 1);
    mapModel.position.set(0, 0, 0);
    mapScene.add(mapModel);

    // 바운딩 박스로 맵 크기 파악
    const box = new THREE.Box3().setFromObject(mapModel);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    console.log(`[3D맵] 로드 완료 - 크기: ${size.x.toFixed(1)} x ${size.y.toFixed(1)} x ${size.z.toFixed(1)}`);

    // 맵의 작은 축 기준으로 MAP_SIZE에 맞춤 (플레이어가 밖으로 못 나감)
    const minDim = Math.min(size.x, size.z);
    if (minDim > 0) {
        const targetSize = MAP_SIZE * 2; // 전체 맵 크기
        const sc = targetSize / minDim;
        mapModel.scale.set(sc, sc, sc);
        mapModel.position.set(-center.x * sc, -box.min.y * sc, -center.z * sc);
        console.log(`[3D맵] 스케일: ${sc.toFixed(3)}, 맵크기: ${(size.x*sc).toFixed(0)}x${(size.z*sc).toFixed(0)}`);
    }
    // 충돌용 메쉬 목록 수집
    mapCollisionMeshes = [];
    mapModel.traverse((child) => {
        if (child.isMesh) {
            mapCollisionMeshes.push(child);
        }
    });
    console.log(`[3D맵] 충돌 메쉬: ${mapCollisionMeshes.length}개`);
}, undefined, (err) => console.error('[3D맵] 로드 실패:', err));

// 3D 맵 충돌 시스템
let mapCollisionMeshes = [];
const _floorRaycaster = new THREE.Raycaster();
const _wallRaycaster = new THREE.Raycaster();
const _downDir = new THREE.Vector3(0, -1, 0);

// 바닥 높이 감지 (레이캐스트)
function getFloorHeight(x, z) {
    if (mapCollisionMeshes.length === 0) return 0;
    _floorRaycaster.set(new THREE.Vector3(x, 300, z), _downDir);
    _floorRaycaster.far = 400;
    const hits = _floorRaycaster.intersectObjects(mapCollisionMeshes, false);
    if (hits.length > 0) return hits[0].point.y;
    return -Infinity; // 바닥 없음 = 낭떠러지
}

// 벽 충돌 감지 (수평 레이캐스트)
function checkWall3D(x, y, z, dirX, dirZ, dist) {
    if (mapCollisionMeshes.length === 0) return false;
    const dir = new THREE.Vector3(dirX, 0, dirZ).normalize();
    // 허리 높이에서 체크
    _wallRaycaster.set(new THREE.Vector3(x, y + 5, z), dir);
    _wallRaycaster.far = dist;
    const hits = _wallRaycaster.intersectObjects(mapCollisionMeshes, false);
    return hits.length > 0;
}


// 3D 맵 카메라 동기화 (매 프레임)
function syncMapCamera() {
    const camH = player.sliding ? 4 : 10;
    mapCamera.position.set(player.x, player.y + camH, player.z);

    // yaw/pitch를 Three.js 회전으로 변환
    // 게임 yaw: 시계방향 회전 (yaw=0 → +Z), Three.js: 반시계방향 (-Z 기본)
    // → -yaw로 방향 반전 + PI로 Z축 플립
    // 게임: pitch 양수 = 위를 봄, Three.js: X양수 = 아래를 봄 → 부호 반전
    const euler = new THREE.Euler(-pitch, Math.PI - yaw, 0, 'YXZ');
    mapCamera.quaternion.setFromEuler(euler);

    // FOV 동기화 (스코프 줌)
    const gameFov = player.scope ? (player.weapon === 2 ? 800 : 550) : 400;
    // 게임 FOV를 Three.js FOV로 변환: atan(H/2 / fov) * 2
    const threeFov = 2 * Math.atan((H / 2) / gameFov) * (180 / Math.PI);
    mapCamera.fov = threeFov;
    mapCamera.updateProjectionMatrix();
}

function renderMap3D() {
    if (gameState !== 'playing' && gameState !== 'dead' && gameState !== 'scoreboard') {
        return;
    }
    syncMapCamera();
    mapRenderer.render(mapScene, mapCamera);
}

// 오버레이 캔버스 크기 동기화
const syncCanvases = () => {
    const r = canvas.getBoundingClientRect();
    weaponCanvas.style.width = r.width + 'px';
    weaponCanvas.style.height = r.height + 'px';
    mapCanvas.style.width = r.width + 'px';
    mapCanvas.style.height = r.height + 'px';
};
window.addEventListener('resize', syncCanvases);
setTimeout(syncCanvases, 100);

// ====== SOUND SYSTEM (미리 캐시된 버퍼 방식) ======
let audioCtx = null;
const soundBuffers = {};
let soundReady = false;

function initAudio() {
    if(audioCtx) { if(audioCtx.state === 'suspended') audioCtx.resume(); return; }
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        // 모든 사운드를 미리 버퍼로 생성
        const sr = audioCtx.sampleRate;
        const make = (len, fn) => {
            const buf = audioCtx.createBuffer(1, Math.floor(sr * len), sr);
            const d = buf.getChannelData(0);
            for(let i = 0; i < d.length; i++) fn(d, i, d.length, sr);
            return buf;
        };
        // 돌격소총
        soundBuffers.rifle = make(0.12, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 3);
            d[i] = e * (Math.random()*0.6-0.3 + 0.4*Math.sin(150*2*Math.PI*t*Math.pow(1-i/n,2)));
        });
        // 샷건
        soundBuffers.shotgun = make(0.18, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 2);
            d[i] = e * (Math.random()*1.2-0.6 + 0.3*Math.sin(60*2*Math.PI*t));
        });
        // 스나이퍼
        soundBuffers.sniper = make(0.35, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 1.5);
            const crack = i < n*0.1 ? (Math.random()*2-1)*Math.pow(1-i/(n*0.1),2) : 0;
            d[i] = e * (0.5*Math.sin(180*2*Math.PI*t*Math.pow(1-i/n,1.5)) + crack*0.8)
                 + (i > n*0.4 ? 0.1*Math.sin(60*2*Math.PI*t)*Math.pow(1-i/n,3) : 0);
        });
        // 권총
        soundBuffers.pistol = make(0.08, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 4);
            d[i] = e * (Math.random()*0.5-0.25 + 0.3*Math.sin(280*2*Math.PI*i/sr));
        });
        // 로켓
        soundBuffers.rocket = make(0.3, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 1.5);
            const f = 60 + 140*(i/n);
            d[i] = e * (0.4*Math.sin(f*2*Math.PI*t) + (Math.random()*0.4-0.2)*e);
        });
        // 낫
        soundBuffers.melee = make(0.12, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 2);
            d[i] = e * 0.3 * Math.sin((400-250*i/n)*2*Math.PI*t);
        });
        // 수류탄
        soundBuffers.grenade = make(0.1, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 3);
            d[i] = e * 0.3 * Math.sin(200*2*Math.PI*i/sr);
        });
        // 폭발
        soundBuffers.explosion = make(0.4, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 1.5);
            d[i] = e * (Math.random()*1.4-0.7 + 0.3*Math.sin(40*2*Math.PI*t));
        });
        // 히트
        soundBuffers.hit = make(0.06, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 4);
            d[i] = e * 0.4 * Math.sin(800*2*Math.PI*i/sr * Math.pow(1-i/n, 2));
        });
        // 헤드샷
        soundBuffers.headshot = make(0.2, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 2);
            d[i] = e * 0.4 * Math.sin(1200*2*Math.PI*i/sr * Math.pow(1-i/n*0.3, 1));
        });
        // 킬
        soundBuffers.kill = make(0.3, (d,i,n,sr) => {
            const t = i/sr;
            const notes = [523, 659, 784];
            const noteIdx = Math.min(2, Math.floor(t/0.1));
            const noteT = t - noteIdx*0.1;
            const e = noteT < 0.1 ? Math.pow(1-noteT/0.1, 2) : 0;
            d[i] = e * 0.3 * Math.sin(notes[noteIdx]*2*Math.PI*t);
        });
        // 리로드
        soundBuffers.reload = make(0.15, (d,i,n,sr) => {
            const t = i/sr;
            if(t < 0.03) d[i] = 0.3*Math.sin(600*2*Math.PI*t)*Math.pow(1-t/0.03, 3);
            else if(t > 0.08 && t < 0.12) d[i] = 0.3*Math.sin(400*2*Math.PI*t)*Math.pow(1-(t-0.08)/0.04, 3);
            else d[i] = 0;
        });
        // 대시
        soundBuffers.dash = make(0.1, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 2);
            d[i] = e * 0.25 * Math.sin((200+300*i/n)*2*Math.PI*i/sr);
        });
        // 데미지
        soundBuffers.damage = make(0.06, (d,i,n,sr) => {
            d[i] = (Math.random()*0.8-0.4) * Math.pow(1-i/n, 4);
        });
        soundReady = true;
    } catch(e) { console.log('Audio init failed:', e); }
}

let lastSoundTime = {};
function playSound(type, volume) {
    if(!soundReady || !audioCtx || !soundBuffers[type]) return;
    try {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        // 같은 소리 50ms 내 중복 방지
        const now = performance.now();
        if(lastSoundTime[type] && now - lastSoundTime[type] < 50) return;
        lastSoundTime[type] = now;

        const src = audioCtx.createBufferSource();
        src.buffer = soundBuffers[type];
        const g = audioCtx.createGain();
        g.gain.value = volume || 0.3;
        src.connect(g);
        g.connect(audioCtx.destination);
        src.start(0);
    } catch(e) {}
}

                data.totalDeaths = Math.max(data.totalDeaths || 0, 38);
                data.unlockedSkins = ALL_SKIN_IDS.slice();
                data.migrated_v2 = true;
                try { localStorage.setItem(PROGRESSION_KEY, JSON.stringify(data)); } catch(e) {}
            }
            return {

                totalKills: data.totalKills || 0,
                totalDeaths: data.totalDeaths || 0,
                totalGames: data.totalGames || 0,

                seenSkinReward: data.seenSkinReward || 0,
                migrated_v2: data.migrated_v2 || false
            };
        }
    } catch(e) {}

    try { localStorage.setItem(PROGRESSION_KEY, JSON.stringify(progression)); } catch(e) {}
}

function xpForLevel(lv) { return 80 + (lv - 1) * 30; }

function addXP(amount) {
    progression.xp += amount;
    let leveledUp = false;
    while (progression.xp >= xpForLevel(progression.level)) {
        progression.xp -= xpForLevel(progression.level);
        progression.level++;
        leveledUp = true;
        // 10레벨마다 스킨 보상
        if (progression.level % 10 === 0) {
            const skinIdx = Math.floor(progression.level / 10);
            if (skinIdx < GUN_SKINS.length && !progression.unlockedSkins.includes(GUN_SKINS[skinIdx].id)) {
                progression.unlockedSkins.push(GUN_SKINS[skinIdx].id);
            }
        }
    }
    saveProgression();
    if (leveledUp) {
        levelUpAnim = 120; // 2초 애니메이션
        playSound('kill', 0.5);
    }
    return leveledUp;
}

const SERVER_URL = 'wss://rivals-server-2.onrender.com';

function connectToServer(callback) {
    if(ws && ws.readyState <= 1) { if(callback) callback(); return; }
    netMessage = '서버 연결 중...';
    netMessageTimer = 999;
    ws = new WebSocket(SERVER_URL);
    networkState = 'connecting';

    ws.onopen = () => {
        networkState = 'lobby';
        netMessage = '서버 연결 완료!';
        netMessageTimer = 120;
        if(callback) callback();
    };
    ws.onclose = () => {
        networkState = 'disconnected';
        if(isOnline && gameState === 'playing') {
            netMessage = '연결이 끊겼습니다';
            netMessageTimer = 300;
            isOnline = false;
            // Fill remote player slot with bot
            if(remotePlayer) { remotePlayer = null; }
        }
    };
    ws.onerror = () => {
        netMessage = '서버 연결 실패!';
        netMessageTimer = 300;
        networkState = 'disconnected';
    };
    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleNetworkMessage(msg);
    };
}

function sendMsg(obj) {
    if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function initRemotePlayer(cls) {
    remotePlayer = {
        x:0, z:0, y:0, yaw:0, pitch:0,
        hp:100, maxHp:100, armor:0,
        kills:0, deaths:0,
        selectedClass: cls || 0,
        weapon:0, name:'상대방',
        color:'#ffaa00', muzzleFlash:0,
        spawnProtection:0,
        prevX:0, prevZ:0, prevY:0,
        targetX:0, targetZ:0, targetY:0,
        interpT:1, alive:true
    };
}

function handleNetworkMessage(msg) {
    switch(msg.type) {
        case 'room_created':
            roomCode = msg.code;
            myPlayerId = msg.playerId;
            mapSeed = msg.mapSeed;
            isHost = true;
            gameState = 'waiting';
            netMessage = '';
            break;
        case 'room_joined':
            roomCode = msg.code;
            myPlayerId = msg.playerId;
            mapSeed = msg.mapSeed;
            isHost = false;
            gameState = 'classSelect';
            netMessage = '방에 참가했습니다! 클래스를 선택하세요.';
            netMessageTimer = 180;
            break;
        case 'player_joined':
            netMessage = '상대방이 입장했습니다!';
            netMessageTimer = 120;
            // Both players present, go to class select
            gameState = 'classSelect';
            break;
        case 'opponent_class':
            if(!remotePlayer) initRemotePlayer(msg.selectedClass);
            remotePlayer.selectedClass = msg.selectedClass;
            remotePlayer.weapon = classes[msg.selectedClass].weapon;
            remotePlayer.maxHp = classes[msg.selectedClass].hp;
            remotePlayer.color = classes[msg.selectedClass].color;
            break;
        case 'start_game': {
            isOnline = true;
            if(!remotePlayer) initRemotePlayer(0);
            generateMap();
            enemies.length = 0;
            // 온라인 모드에서는 AI 봇 없음 (1v1)
            gameState = 'playing';
            if(!isMobile) { try { canvas.requestPointerLock(); } catch(e) {} }
            break;
        }
        case 'player_state':
            if(!remotePlayer) initRemotePlayer(msg.selectedClass || 0);
            remotePlayer.prevX = remotePlayer.x;
            remotePlayer.prevZ = remotePlayer.z;
            remotePlayer.prevY = remotePlayer.y;
            remotePlayer.targetX = msg.x;
            remotePlayer.targetZ = msg.z;
            remotePlayer.targetY = msg.y;
            remotePlayer.interpT = 0;
            remotePlayer.yaw = msg.yaw;
            remotePlayer.hp = msg.hp;
            remotePlayer.armor = msg.armor;
            remotePlayer.weapon = msg.weapon;
            remotePlayer.selectedClass = msg.selectedClass;
            remotePlayer.kills = msg.kills;
            remotePlayer.deaths = msg.deaths;
            remotePlayer.muzzleFlash = msg.muzzleFlash;
            remotePlayer.spawnProtection = msg.spawnProtection;
            remotePlayer.color = classes[msg.selectedClass] ? classes[msg.selectedClass].color : '#ffaa00';
            remotePlayer.maxHp = classes[msg.selectedClass] ? classes[msg.selectedClass].hp : 100;
            remotePlayer.alive = msg.hp > 0;
            break;
        case 'shoot':
            // Show remote player's muzzle flash and tracer
            if(remotePlayer) {
                remotePlayer.muzzleFlash = 4;
                if(msg.tx !== undefined) {
                    bullets.push({ x:msg.x, y:msg.y, z:msg.z, tx:msg.tx, ty:msg.ty, tz:msg.tz, life:3, tracer:true, color:weapons[msg.weapon]?.color || '#ff0' });
                }
            }
            break;
        case 'hit':
            // Remote player hit us
            if(player.spawnProtection <= 0 && player.hp > 0) {
                let dmg = msg.damage;
                if(dmg < 999 && player.armor > 0) {
                    const armorDmg = Math.min(player.armor, dmg*0.6);
                    player.armor -= armorDmg;
                    dmg *= 0.4;
                }
                player.hp -= dmg;
                player.damageFlash = 15;
                playSound('damage', 0.3);
                addDamageNumber(player.x, player.y+16, player.z, Math.round(dmg), msg.headshot);
                if(player.hp <= 0) {
                    player.deaths++;
                    progression.totalDeaths++;
                    onSessionDeath();
                    gameState = 'dead';
                    player.respawnTimer = 180;
                    sendMsg({ type: 'kill', victimName: '나', weapon: msg.weaponName || '무기' });
                }
            }
            break;
        case 'kill':
            // 상대방이 죽었음 = 내가 킬함 → 내 킬 카운트 증가
            player.kills++;
            onSessionKill();
            const killNow = Date.now();
            if(killNow - player.lastKillTime < 3000) player.killStreak++;
            else player.killStreak = 1;
            player.lastKillTime = killNow;
            if(msg.victimName) {
                addKillFeed('나', msg.victimName, msg.weapon);
            }
            break;
        case 'bot_states':
            if(!isHost && msg.bots) {
                // Sync bot data from host
                while(enemies.length < msg.bots.length) {
                    enemies.push({ x:0,z:0,y:0,vx:0,vz:0,vy:0,hp:100,maxHp:100,armor:0,
                        class:0,weapon:0,name:'Bot',color:'#f44',shootCooldown:0,muzzleFlash:0,
                        accuracy:0.3,reactionTime:60,state:'patrol',stateTimer:0,target:null,
                        targetX:0,targetZ:0,strafeDir:1,strafeTimer:0,kills:0,deaths:0,
                        spawnProtection:0,yaw:0,speed:2,onGround:true });
                }
                while(enemies.length > msg.bots.length) enemies.pop();
                msg.bots.forEach((b, i) => {
                    if(!enemies[i]) return;
                    enemies[i].x = b.x; enemies[i].z = b.z; enemies[i].y = b.y;
                    enemies[i].yaw = b.yaw; enemies[i].hp = b.hp; enemies[i].armor = b.armor;
                    enemies[i].class = b.cls; enemies[i].weapon = b.weapon;
                    enemies[i].name = b.name; enemies[i].color = b.color;
                    enemies[i].muzzleFlash = b.muzzleFlash;
                    enemies[i].kills = b.kills; enemies[i].deaths = b.deaths;
                    enemies[i].spawnProtection = b.spawnProtection;
                    enemies[i].maxHp = classes[b.cls] ? classes[b.cls].hp : 100;
                });
            }
            break;
        case 'bot_hit':
            // Guest hit a bot, host applies damage
            if(isHost && msg.botIdx !== undefined && enemies[msg.botIdx]) {
                const e = enemies[msg.botIdx];
                if(e.hp <= 0 || e.spawnProtection > 0) break;
                let dmg = msg.damage;
                if(dmg < 999 && e.armor > 0) {
                    const armorDmg = Math.min(e.armor, dmg*0.6);
                    e.armor -= armorDmg;
                    dmg *= 0.4;
                }
                e.hp -= dmg;
                addDamageNumber(e.x, e.y+16, e.z, Math.round(dmg), msg.headshot);
                for(let i=0;i<5;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, e.color, 15);
                if(e.hp <= 0) {
                    // Attribute kill to remote player
                    if(remotePlayer) remotePlayer.kills++;
                    e.deaths++;
                    addKillFeed(remotePlayer ? remotePlayer.name : '상대방', e.name, msg.weaponName || '무기');
                    for(let i=0;i<20;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, e.color, 30, 3);
                    setTimeout(() => {
                        const sp = spawnPoints[Math.floor(seededRandom()*spawnPoints.length)];
                        e.x = sp.x+(Math.random()-0.5)*30; e.z = sp.z+(Math.random()-0.5)*30;
                        e.hp = e.maxHp; e.armor = classes[e.class].armor;
                        e.state = 'patrol'; e.spawnProtection = 120;
                    }, 3000);
                }
            }
            break;
        case 'player_left':
            netMessage = '상대방이 나갔습니다';
            netMessageTimer = 300;
            remotePlayer = null;
            // 로비로 돌아가기
            gameState = 'lobby';
            isOnline = false;
            lobbyMode = '';
            break;
        case 'error':
            if(msg.message === 'room_not_found') netMessage = '방을 찾을 수 없습니다';
            else if(msg.message === 'room_full') netMessage = '방이 꽉 찼습니다';
            else netMessage = '오류: ' + msg.message;
            netMessageTimer = 180;
            break;
    }
}

// Seeded random for deterministic map
let mapSeed = 12345;
function seededRandom() {
    mapSeed = (mapSeed * 16807) % 2147483647;
    return (mapSeed - 1) / 2147483646;
}

// ====== 세션 통계 + Save & Quit ======
let sessionKills = 0;
let sessionDeaths = 0;
let sessionStartTime = null;

function startSessionTimer() {
  if (!sessionStartTime) sessionStartTime = Date.now();
}

function onSessionKill() { sessionKills++; }
function onSessionDeath() { sessionDeaths++; }

function getSessionMinutes() {
  if (!sessionStartTime) return 0;
  return Math.round((Date.now() - sessionStartTime) / 60000);
}

async function saveAndQuit() {
  progression.totalGames++;
  saveProgression();
  // 킬/데스/플레이시간을 parent에 한번에 보고 (완료까지 대기)
  const dk = sessionKills, dd = sessionDeaths, dt = getSessionMinutes();
  console.log(`[SaveQuit] 킬:${dk} 데스:${dd} 시간:${dt}분`);
  if (dk > 0 || dd > 0 || dt > 0) {
    try {
      if (parent && parent.giylReportRivals) {
        await parent.giylReportRivals(dk, dd, dt);
        console.log('[SaveQuit] 저장 완료!');
      } else {
        console.warn('[SaveQuit] parent.giylReportRivals 없음');
      }
    } catch(e) { console.error('[SaveQuit] 저장 실패:', e); }
  }
  sessionKills = 0; sessionDeaths = 0; sessionStartTime = null;
  // 홈으로 돌아가기
  try {
    if (parent && parent.goHome) parent.goHome();
  } catch(e) {
    gameState = 'title';
  }
}

// ====== ENEMIES (BOTS) ======
const enemies = [];
const MAX_ENEMIES = 8;
const botNames = ['Shadow','Ghost','Viper','Phoenix','Storm','Blade','Raven','Wolf','Hawk','Fox','Bear','Cobra'];

function spawnEnemy() {
    if(enemies.length >= MAX_ENEMIES) return;
    const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
    const cls = Math.floor(Math.random()*classes.length);
    // 벽과 겹치지 않는 스폰 위치 찾기
    let sx = sp.x + (Math.random()-0.5)*30;
    let sz = sp.z + (Math.random()-0.5)*30;
    for(let tries=0; tries<10; tries++){
        if(!checkWallCollision(sx, sz, 8, 0)) break;
        sx = sp.x + (Math.random()-0.5)*40;
        sz = sp.z + (Math.random()-0.5)*40;
    }
    // 3D 맵 바닥 높이 반영
    const spawnFloorY = getFloorHeight(sx, sz);
    const sy = (spawnFloorY !== -Infinity) ? spawnFloorY : 0;
    enemies.push({
        x: sx,
        z: sz,
        y: sy,
        vx: 0, vz: 0, vy: 0,
        hp: classes[cls].hp,
        maxHp: classes[cls].hp,
        armor: classes[cls].armor,
        class: cls,
        weapon: classes[cls].weapon,
        yaw: Math.random()*Math.PI*2,
        shootCooldown: 0,
        name: botNames[Math.floor(Math.random()*botNames.length)],
        state: 'patrol', // patrol, chase, attack, flee
        targetX: 0, targetZ: 0,
        stateTimer: 0,
        kills: 0, deaths: 0,
        speed: classes[cls].speed * 0.6,
        onGround: true,
        color: classes[cls].color,
        muzzleFlash: 0,
        strafeDir: Math.random() > 0.5 ? 1 : -1,
        strafeTimer: 0,
        accuracy: 0.2 + Math.random()*0.25,
        reactionTime: 40 + Math.random()*80,
        target: null, // 타겟 (플레이어 또는 다른 봇)
        spawnProtection: 120 // 봇도 2초 무적
    });
}

// ====== PROJECTILES & EFFECTS ======
const bullets = [];
const explosions = [];
const particles = [];
const damageNumbers = [];
let killFeed = [];

function addParticle(x, y, z, vx, vy, vz, color, life, size) {
    particles.push({x,y,z,vx,vy,vz,color,life,maxLife:life,size:size||2});
}

function addExplosion(x, y, z, radius) {
    playSound('explosion', 0.5);
    explosions.push({x,y,z,radius,time:0,maxTime:30});
    for(let i=0;i<30;i++){
        const a=Math.random()*Math.PI*2, p=Math.random()*Math.PI;
        const s=3+Math.random()*5;
        addParticle(x,y,z, Math.cos(a)*Math.sin(p)*s, Math.cos(p)*s+2, Math.sin(a)*Math.sin(p)*s,
            ['#ff4400','#ff8800','#ffcc00','#ff2200'][Math.floor(Math.random()*4)], 20+Math.random()*20, 3+Math.random()*3);
    }
}

function addKillFeed(killer, victim, weapon) {
    killFeed.unshift({killer, victim, weapon, time:180});
    if(killFeed.length > 5) killFeed.pop();
}

function addDamageNumber(x, y, z, dmg, crit) {
    damageNumbers.push({x,y,z,dmg,time:0,crit,vy:2});
}

// ====== INPUT ======
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;

    // Lobby room code input
    if(gameState === 'lobby' && lobbyMode === 'join') {
        if(e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key) && roomCodeInput.length < 4) {
            roomCodeInput += e.key.toUpperCase();
        }
        if(e.code === 'Backspace') roomCodeInput = roomCodeInput.slice(0, -1);
        if(e.code === 'Enter' && roomCodeInput.length === 4) {
            sendMsg({ type: 'join_room', code: roomCodeInput });
        }
        if(e.code === 'Escape') { lobbyMode = ''; roomCodeInput = ''; }
        return;
    }
    if((gameState === 'lobby' || gameState === 'waiting') && e.code === 'Escape') {
        gameState = 'title'; isOnline = false; lobbyMode = ''; myClassSelected = false;
        if(ws) { ws.close(); ws = null; }
        return;
    }
    if(gameState === 'skinSelect' && e.code === 'Escape') {
        gameState = 'title';
        return;
    }

    if(gameState === 'classSelect') {
        if(e.code === 'Digit1') selectClass(0);
        if(e.code === 'Digit2') selectClass(1);
        if(e.code === 'Digit3') selectClass(2);
    }
    if(gameState === 'secondarySelect') {
        if(e.code === 'Digit1') selectSecondary(3); // Uzi
        if(e.code === 'Digit2') selectSecondary(4); // 리볼버
        if(e.code === 'Escape') { gameState = 'classSelect'; return; }
    }
    // 스킨 보상 팝업 닫기
    if(pendingSkinReward) { pendingSkinReward = null; return; }
    if(gameState === 'dead' && e.code === 'Space' && player.respawnTimer <= 0) respawn();
    if(gameState === 'scoreboard' && e.code === 'Tab') { e.preventDefault(); gameState = 'playing'; return; }
    if(gameState === 'playing') {
        if(e.code === 'KeyR' && player.reloadTime <= 0 && !weapons[player.weapon].melee) reload();
        if(e.code === 'Tab') { e.preventDefault(); gameState = 'scoreboard'; return; }
        // 무기 전환 1~2 (주무기, 보조무기)
        if(e.code === 'Digit1' && player.weaponSlots[0] !== undefined) { player.currentSlot = 0; player.weapon = player.weaponSlots[0]; player.scope = false; player.reloadTime = 0; }
        if(e.code === 'Digit2' && player.weaponSlots[1] !== undefined) { player.currentSlot = 1; player.weapon = player.weaponSlots[1]; player.scope = false; player.reloadTime = 0; }
        // F키 빠른 근접공격 (낫)
        if(e.code === 'KeyF' && player.meleeCooldown <= 0 && !player.meleeActive) {
            player.meleeActive = true;
            player.meleeTime = 12;
            player.meleeCooldown = 20;
            meleeAttack();
        }
        if(e.code === 'ShiftLeft' && player.dashCooldown <= 0 && player.selectedClass === 0) startDash();
        if((e.code === 'ControlLeft' || e.code === 'KeyC') && !player.sliding && player.slideCooldown <= 0 && player.onGround) { e.preventDefault(); startSlide(); }
        if(e.code === 'KeyQ') useAbility();
    }
});
document.addEventListener('keyup', e => {
    keys[e.code] = false;
    if(e.code === 'Tab') e.preventDefault();
});

let shooting = false;
let canvasMouseX = 0, canvasMouseY = 0;

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    canvasMouseX = (e.clientX - rect.left) * (W / rect.width);
    canvasMouseY = (e.clientY - rect.top) * (H / rect.height);
});

function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) * (W / rect.width),
        y: (e.clientY - rect.top) * (H / rect.height)
    };
}

function handleMouseDown(e) {
    initAudio(); // 클릭 시 오디오 활성화
    const coords = getCanvasCoords(e);
    canvasMouseX = coords.x;
    canvasMouseY = coords.y;

    if(gameState === 'playing') {
        if(e.button === 0) shooting = true; // 왼클릭만 사격
        if(!mouseLocked) {
            // Save & Quit 버튼 체크
            const sqX = W - 130, sqY = H - 30;
            if(coords.x >= sqX && coords.x <= sqX+115 && coords.y >= sqY && coords.y <= sqY+26) {
                saveAndQuit();
                return;
            }
            if(!isMobile) { try { canvas.requestPointerLock(); } catch(e) {} }
        }
    } else if(gameState === 'title') {
        const btnW = 200, btnH = 50;
        const soloX = W/2 - btnW - 20, soloY = H/2 - 10;
        const onX = W/2 + 20, onY = H/2 - 10;
        const skinBtnW = 200, skinBtnH = 44;
        const skinX = W/2 - skinBtnW/2, skinY = H/2 + 55;
        if(coords.x >= soloX && coords.x <= soloX+btnW && coords.y >= soloY && coords.y <= soloY+btnH) {
            isOnline = false; gameState = 'classSelect';
        } else if(coords.x >= onX && coords.x <= onX+btnW && coords.y >= onY && coords.y <= onY+btnH) {
            gameState = 'lobby'; lobbyMode = '';
            connectToServer();
        } else if(coords.x >= skinX && coords.x <= skinX+skinBtnW && coords.y >= skinY && coords.y <= skinY+skinBtnH) {
            gameState = 'skinSelect'; skinSelectWeapon = 0;
        }
    } else if(gameState === 'skinSelect') {
        // 무기 탭 클릭
        const tabW = 110, tabH = 32;
        for (let i = 0; i < 7; i++) {
            const tx = 30 + i * (tabW + 6), ty = 60;
            if (coords.x >= tx && coords.x <= tx+tabW && coords.y >= ty && coords.y <= ty+tabH) {
                skinSelectWeapon = i;
                break;
            }
        }
        // 스킨 카드 클릭
        const cardW = 160, cardH = 200, cardGap = 15, cardsPerRow = 5;
        const csX = (W - (cardW * cardsPerRow + cardGap * (cardsPerRow-1))) / 2;
        const csY = 135;
        GUN_SKINS.forEach((skin, i) => {
            const row = Math.floor(i / cardsPerRow);
            const col = i % cardsPerRow;
            const cx = csX + col * (cardW + cardGap);
            const cy = csY + row * (cardH + cardGap);
            if (coords.x >= cx && coords.x <= cx+cardW && coords.y >= cy && coords.y <= cy+cardH) {
                if (progression.unlockedSkins.includes(skin.id)) {
                    // 모든 무기에 스킨 적용
                    for(let w = 0; w < 7; w++) {
                        progression.equippedSkins[w] = skin.id;
                    }
                    saveProgression();
                }
            }
        });
    } else if(gameState === 'lobby') {
        const btnW = 260, btnH = 60;
        const crX = W/2 - btnW/2, crY = 160, jrY = 260;
        if(coords.x >= crX && coords.x <= crX+btnW && coords.y >= crY && coords.y <= crY+btnH) {
            connectToServer(() => { sendMsg({ type: 'create_room' }); });
        } else if(coords.x >= crX && coords.x <= crX+btnW && coords.y >= jrY && coords.y <= jrY+btnH) {
            lobbyMode = 'join'; roomCodeInput = '';
        }
    } else if(gameState === 'classSelect') {
        for(let i = 0; i < 4; i++) {
            const cx = 60 + i * 220, cy = 140, cw = 200, ch = 380;
            if(coords.x >= cx && coords.x <= cx+cw && coords.y >= cy && coords.y <= cy+ch) {
                selectClass(i);
                break;
            }
        }
    } else if(gameState === 'secondarySelect') {
        for(let i = 0; i < 2; i++) {
            const cw = 240, ch = 380;
            const cx = W/2 - (2 * cw + 40) / 2 + i * (cw + 40);
            const cy = 140;
            if(coords.x >= cx && coords.x <= cx+cw && coords.y >= cy && coords.y <= cy+ch) {
                selectSecondary(secondaryWeapons[i].weaponIdx);
                break;
            }
        }
    } else if(gameState === 'dead') {
        // Save & Quit 버튼 체크
        const dqW = 180, dqH = 40;
        const dqX = W/2 - dqW/2, dqY = H/2 + 90;
        if(coords.x >= dqX && coords.x <= dqX+dqW && coords.y >= dqY && coords.y <= dqY+dqH) {
            saveAndQuit();
            return;
        }
        if(player.respawnTimer <= 0) respawn();
    }
}
canvas.addEventListener('mousedown', handleMouseDown);
document.addEventListener('mousedown', e => {
    if(mouseLocked && gameState === 'playing') {
        if(e.button === 2) {
            // 우클릭: 낫이면 대시, 그 외 모든 무기 조준(ADS)
            e.preventDefault();
            if(player.weapon === 5 && player.scytheDashCooldown <= 0) {
                startScytheDash();
            } else if(player.weapon !== 5 && player.weapon !== 6) {
                player.scope = !player.scope;
            }
            return;
        }
        shooting = true;
    }
});
document.addEventListener('mouseup', e => { if(e.button === 0) shooting = false; });
document.addEventListener('contextmenu', e => e.preventDefault());
