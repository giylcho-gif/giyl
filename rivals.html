    const rect = canvas.getBoundingClientRect();
    const coords = {
        x: (touch.clientX - rect.left) * (W / rect.width),
        y: (touch.clientY - rect.top) * (H / rect.height)
    };
    canvasMouseX = coords.x;
    canvasMouseY = coords.y;

    if(gameState === 'title') {
        gameState = 'classSelect';
    } else if(gameState === 'classSelect') {
        for(let i = 0; i < 4; i++) {
            const cx = 60 + i * 220, cy = 140, cw = 200, ch = 380;
            if(coords.x >= cx && coords.x <= cx+cw && coords.y >= cy && coords.y <= cy+ch) {
                selectClass(i);
                break;
            }
        }
    } else if(gameState === 'secondarySelect') {
        for(let i = 0; i < 2; i++) {
            const cw = 240, ch = 380;
            const cx = W/2 - (2 * cw + 40) / 2 + i * (cw + 40);
            const cy = 140;
            if(coords.x >= cx && coords.x <= cx+cw && coords.y >= cy && coords.y <= cy+ch) {
                selectSecondary(secondaryWeapons[i].weaponIdx);
                break;
            }
        }
    } else if(gameState === 'playing') {
        // 모바일은 전용 사격 버튼 사용, 캔버스 터치로는 사격하지 않음
        if(!isMobile) shooting = true;
    } else if(gameState === 'dead' && player.respawnTimer <= 0) {
        respawn();
    }
}, {passive:false});
canvas.addEventListener('touchend', () => { if(!isMobile) shooting = false; });

// contextmenu는 document 레벨에서 차단, 우클릭은 mousedown에서 처리

// Fallback: document-level click for environments where canvas events don't fire
document.addEventListener('click', e => {
    if(gameState === 'title') {
        gameState = 'classSelect';
    }
});

document.addEventListener('pointerlockchange', () => {
    mouseLocked = document.pointerLockElement === canvas;
    document.body.style.cursor = mouseLocked ? 'none' : 'default';
});

document.addEventListener('mousemove', e => {
    if(gameState === 'playing') {
        if(mouseLocked) {
            yaw += e.movementX * SENSITIVITY;
            pitch -= e.movementY * SENSITIVITY;
        } else {
            // Fallback: 포인터 락 없이도 마우스로 조준 가능
            yaw += e.movementX * SENSITIVITY;
            pitch -= e.movementY * SENSITIVITY;
        }
        pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
    }
});

// ====== GAME FUNCTIONS ======
function selectClass(idx) {
    initAudio(); // 사용자 클릭으로 오디오 활성화
    player.selectedClass = idx;
    const cls = classes[idx];
    player.maxHp = cls.hp;
    player.hp = cls.hp;
    player.armor = cls.armor;
    player.speed = cls.speed;
    player._pendingPrimary = cls.weapon;
    gameState = 'secondarySelect';
}

function selectSecondary(wpnIdx) {
    startSessionTimer();
    const secAmmo = secondaryWeapons.find(s => s.weaponIdx === wpnIdx)?.ammo || 10;
    player.weaponSlots = [player._pendingPrimary, wpnIdx]; // [주무기, 보조무기]
    player.currentSlot = 0;
    player.weapon = player.weaponSlots[0];
    player.selectedSecondary = wpnIdx;
    // 탄약: [주무기, 보조무기, 수류탄]
    const primaryAmmo = player._pendingPrimary === 2 ? 5 : 30;
    player.ammo = [primaryAmmo, secAmmo, 3];
    player.maxAmmo = [player._pendingPrimary === 2 ? 5 : 30, secAmmo, 3];

    if(isOnline || networkState === 'lobby' || networkState === 'waiting' || ws) {
        myClassSelected = true;
        sendMsg({ type: 'class_selected', selectedClass: player.selectedClass });
        netMessage = '상대방을 기다리는 중...';
        netMessageTimer = 999;
        gameState = 'waiting';
    } else {
        respawn();
        gameState = 'playing';
        if(!isMobile) { try { canvas.requestPointerLock(); } catch(e) {} }
    }
}

function findSafeSpawn() {
    // 적에게서 가장 먼 스폰 포인트를 찾기
    let bestSpawn = spawnPoints[0];
    let bestMinDist = 0;
    for(const sp of spawnPoints) {
        let minDist = Infinity;
        for(const e of enemies) {
            if(e.hp <= 0) continue;
            const dx = sp.x - e.x, dz = sp.z - e.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist < minDist) minDist = dist;
        }
        if(minDist > bestMinDist) {
            bestMinDist = minDist;
            bestSpawn = sp;
        }
    }
    return bestSpawn;
}

function meleeAttack() {
    // 빠른 근접공격 - 낫 스윙
    player.spawnProtection = 0;
    const meleeRange = 35;
    const meleeDamage = 65;
    const dirX = -Math.sin(yaw);
    const dirZ = Math.cos(yaw);

    // AI 봇 히트 (솔로)
    if(!isOnline) {
        for(const e of enemies) {
            if(e.hp <= 0 || e.spawnProtection > 0) continue;
            const dx = e.x - player.x, dz = e.z - player.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist > meleeRange) continue;
            // 전방 120도 범위
            const dot = (dx*dirX + dz*dirZ) / (dist || 1);
            if(dot < 0.3) continue;
            e.hp -= meleeDamage;
            addDamageNumber(e.x, e.y+16, e.z, meleeDamage, false);
            for(let i=0;i<8;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4, '#cc44ff', 15);
            if(e.hp <= 0) onEnemyKilled(e, false);
        }
    }

    // 원격 플레이어 히트 (온라인)
    if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
        const rdx = remotePlayer.x - player.x, rdz = remotePlayer.z - player.z;
        const rdist = Math.sqrt(rdx*rdx + rdz*rdz);
        if(rdist <= meleeRange) {
            const dot = (rdx*dirX + rdz*dirZ) / (rdist || 1);
            if(dot > 0.3) {
                sendMsg({ type: 'hit', damage: meleeDamage, headshot: false, weaponName: '낫' });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, meleeDamage, false);
                for(let i=0;i<8;i++) addParticle(remotePlayer.x, remotePlayer.y+8, remotePlayer.z, (Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4, '#cc44ff', 15);
            }
        }
    }

    // 네트워크 전송
    if(isOnline) sendMsg({ type:'shoot', x:player.x, y:player.y+8, z:player.z, tx:player.x+dirX*30, ty:player.y+8, tz:player.z+dirZ*30, weapon:5 });
}

function respawn() {
    const sp = findSafeSpawn();
    player.x = sp.x + (Math.random()-0.5)*20;
    player.z = sp.z + (Math.random()-0.5)*20;
    // 3D 맵 바닥 높이에 맞춰 스폰
    const spawnFloor = getFloorHeight(player.x, player.z);
    player.y = (spawnFloor !== -Infinity) ? spawnFloor : 0;
    player.hp = player.maxHp;
    player.armor = classes[player.selectedClass].armor;
    player.currentSlot = 0;
    player.weapon = player.weaponSlots[0];
    // 탄약 리셋: 주무기, 보조무기, 수류탄
    const secWpn = player.weaponSlots[1];
    const secAmmo = secWpn !== undefined ? (secondaryWeapons.find(s => s.weaponIdx === secWpn)?.ammo || 10) : 30;
    const priAmmo = player.weaponSlots[0] === 2 ? 5 : 30;
    player.ammo = [priAmmo, secAmmo, 3];
    player.maxAmmo = [priAmmo, secAmmo, 3];
    player.reloadTime = 0;
    player.shootCooldown = 0;
    player.killStreak = 0;
    player.scope = false;
    player.adsAmount = 0;
    player.shootAnim = 0;
    player.meleeActive = false;
    player.meleeTime = 0;
    player.meleeCooldown = 0;
    player.scytheDashing = false;
    player.scytheDashTime = 0;
    player.scytheDashCooldown = 0;
    player.spawnProtection = 180; // 3초 무적
    gameState = 'playing';
    if(isOnline) sendMsg({ type:'respawn', x:player.x, z:player.z });
}

function reload() {
    if(weapons[player.weapon].melee) return; // 낫은 리로드 없음
    if(player.reloadTime <= 0 && player.ammo[player.currentSlot] < player.maxAmmo[player.currentSlot]) {
        player.reloadTime = weapons[player.weapon].reloadSpeed;
        playSound('reload', 0.3);
    }
}

function startDash() {
    playSound('dash', 0.3);
    player.dashing = true;
    player.dashTime = 10;
    player.dashCooldown = classes[0].abilityCooldown;
    const dx = -Math.sin(yaw), dz = Math.cos(yaw);
    player.dashDir = {x:dx, z:dz};
}

function startSlide() {
    player.sliding = true;
    player.slideTime = 30; // 0.5초
    player.slideCooldown = 120; // 2초 쿨다운
    player.slideSpeed = player.speed * 2.5;
    const dx = -Math.sin(yaw), dz = Math.cos(yaw);
    player.slideDir = {x:dx, z:dz};
    playSound('dash', 0.2);
    // 슬라이딩 파티클
    for(let i = 0; i < 5; i++) {
        addParticle(player.x, player.y+1, player.z,
            (Math.random()-0.5)*2, Math.random()*0.5, (Math.random()-0.5)*2,
            '#aaaaaa', 8+Math.random()*5, 1.5);
    }
}

function startScytheDash() {
    playSound('dash', 0.35);
    player.scytheDashing = true;
    player.scytheDashTime = 12;
    player.scytheDashCooldown = 120; // 2초 쿨다운
    const dx = -Math.sin(yaw), dz = Math.cos(yaw);
    player.scytheDashDir = {x:dx, z:dz};
    player.vy = 7; // 높이 올라감 (점프보다 2배)
    player.onGround = false;
    player.spawnProtection = 0;
    // 대시 이펙트
    for(let i = 0; i < 8; i++) {
        addParticle(player.x, player.y+8, player.z,
            (Math.random()-0.5)*3, Math.random()*2, (Math.random()-0.5)*3,
            '#cc44ff', 15+Math.random()*10, 2+Math.random()*2);
    }
}

function useAbility() {
    // Class-specific abilities placeholder
    if(player.dashCooldown > 0) return;
    player.dashCooldown = classes[player.selectedClass].abilityCooldown;
}

// ====== COLLISION ======
function checkWallCollision(x, z, radius, entityY) {
    for(const w of walls) {
        // 엔티티가 벽 위에 있으면 충돌 무시
        if(entityY !== undefined && w.h && entityY >= w.h) continue;
        const cx = Math.max(w.x, Math.min(w.x + w.w, x));
        const cz = Math.max(w.z, Math.min(w.z + w.d, z));
        const dx = x - cx, dz = z - cz;
        if(dx*dx + dz*dz < radius*radius) return w;
    }
    return null;
}

function moveWithCollision(entity, dx, dz, radius) {
    const ey = entity.y !== undefined ? entity.y : 0;

    // 3D 맵 벽 충돌 체크
    if (mapCollisionMeshes.length > 0) {
        const newX = entity.x + dx;
        const newZ = entity.z + dz;
        // X 방향 이동 체크
        if (dx !== 0 && !checkWall3D(entity.x, ey, entity.z, dx > 0 ? 1 : -1, 0, Math.abs(dx) + radius)) {
            entity.x = newX;
        }
        // Z 방향 이동 체크
        if (dz !== 0 && !checkWall3D(entity.x, ey, entity.z, 0, dz > 0 ? 1 : -1, Math.abs(dz) + radius)) {
            entity.z = newZ;
        }
    } else {
        // 폴백: 기존 2D 벽 충돌
        const newX = entity.x + dx;
        const newZ = entity.z + dz;
        if(!checkWallCollision(newX, entity.z, radius, ey)) entity.x = newX;
        if(!checkWallCollision(entity.x, newZ, radius, ey)) entity.z = newZ;
    }

    entity.x = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, entity.x));
    entity.z = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, entity.z));
}

function raycast(ox, oz, dx, dz, maxDist) {
    let t = 0;
    const step = 2;
    while(t < maxDist) {
        const x = ox + dx*t;
        const z = oz + dz*t;
        if(checkWallCollision(x, z, 1)) return {hit:true, dist:t, x, z};
        t += step;
    }
    return {hit:false, dist:maxDist};
}

// ====== SHOOTING ======
function playerShoot() {
    if(player.shootCooldown > 0 || player.reloadTime > 0) return;
    const w = weapons[player.weapon];

    // 낫 (3번 슬롯 클릭) = 근접공격
    if(w.melee) {
        if(player.meleeCooldown <= 0) {
            player.meleeActive = true;
            player.meleeTime = 12;
            player.meleeCooldown = 20;
            player.shootCooldown = w.fireRate;
            meleeAttack();
        }
        return;
    }

    if(player.ammo[player.currentSlot] <= 0) {
        if(!w.melee) reload();
        return;
    }
    // 사격하면 스폰 보호 해제
    player.spawnProtection = 0;

    const isGrenade = w.grenade;
    player.shootCooldown = w.fireRate;
    player.ammo[player.currentSlot]--;
    player.muzzleFlash = isGrenade ? 0 : 4;
    player.shootAnim = 1;
    playSound(w.sound, 0.35);

    const pellets = w.pellets || 1;
    for(let p = 0; p < pellets; p++) {
        const spreadX = (Math.random()-0.5) * w.spread * (player.scope ? 0.3 : 1);
        const spreadY = (Math.random()-0.5) * w.spread * (player.scope ? 0.3 : 1);
        const dirX = -Math.sin(yaw + spreadX) * Math.cos(pitch + spreadY);
        const dirZ = Math.cos(yaw + spreadX) * Math.cos(pitch + spreadY);
        const dirY = Math.sin(pitch + spreadY);

        if(w.explosive) {
            const speed = isGrenade ? 4 : 6;
            const gLife = isGrenade ? 90 : 120;
            const gvy = isGrenade ? dirY*speed + 2.5 : dirY*speed; // 수류탄은 포물선
            bullets.push({
                x:player.x, y:player.y+8, z:player.z,
                vx:dirX*speed, vy:gvy, vz:dirZ*speed,
                damage:w.damage, owner:'player', life:gLife,
                explosive:true, color:w.color, grenade:isGrenade
            });
        } else {
            // Hitscan - 화면 투영 기반 히트 판정
            let hitDist = w.range;
            let hitEnemy = null;

            for(const e of enemies) {
                if(e.hp <= 0 || e.spawnProtection > 0) continue;
                const dx3 = e.x - player.x, dz3 = e.z - player.z;
                const dist2d = Math.sqrt(dx3*dx3 + dz3*dz3);
                if(dist2d > w.range || dist2d < 1) continue;

                // 적이 화면 중앙(조준점) 근처에 있는지 투영으로 판정
                const p1 = project(e.x, e.y, e.z);         // 적 발 위치
                const p2 = project(e.x, e.y + 16, e.z);    // 적 머리 위치
                if(!p1 && !p2) continue;

                // 화면 중앙과의 거리 계산
                const screenCX = W/2, screenCY = H/2;
                let hitSize = 60; // 화면상 히트박스 크기(픽셀)
                if(p1 && p1.scale) hitSize = Math.max(40, 80 * p1.scale);

                let screenDist = Infinity;
                if(p1 && p2) {
                    // 적의 세로 범위 안에 있는지도 확인
                    const topY = Math.min(p1.y, p2.y) - hitSize/2;
                    const botY = Math.max(p1.y, p2.y) + hitSize/2;
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const dsx = screenCX - midX;
                    const dsy = screenCY - midY;
                    screenDist = Math.sqrt(dsx*dsx + dsy*dsy);
                } else {
                    const pp = p1 || p2;
                    const dsx = screenCX - pp.x;
                    const dsy = screenCY - pp.y;
                    screenDist = Math.sqrt(dsx*dsx + dsy*dsy);
                }

                if(screenDist < hitSize && dist2d < hitDist) {
                    // 벽 체크
                    const wc = raycast(player.x, player.z, dx3/dist2d, dz3/dist2d, dist2d);
                    if(!wc.hit) {
                        hitDist = dist2d;
                        hitEnemy = e;
                    }
                }
            }

            // 원격 플레이어 피격 판정 (3D 레이캐스트 기반)
            let hitRemote = false;
            if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
                const rdx = remotePlayer.x - player.x;
                const rdz = remotePlayer.z - player.z;
                const rdy = (remotePlayer.y + 8) - (player.y + 8);
                const rdist = Math.sqrt(rdx*rdx + rdz*rdz + rdy*rdy);
                if(rdist <= w.range && rdist >= 1) {
                    // 레이와 원격 플레이어 사이의 최소 거리 계산
                    const rayLen = w.range;
                    const rx = dirX * rayLen, rz = dirZ * rayLen, ry = dirY * rayLen;
                    // 레이 위의 가장 가까운 점 계산
                    const t = Math.max(0, Math.min(1, (rdx*rx + rdz*rz + rdy*ry) / (rayLen*rayLen)));
                    const closestX = player.x + rx * t;
                    const closestZ = player.z + rz * t;
                    const closestY = (player.y + 8) + ry * t;
                    const dx2 = closestX - remotePlayer.x;
                    const dz2 = closestZ - remotePlayer.z;
                    const dy2 = closestY - (remotePlayer.y + 8);
                    const minDist = Math.sqrt(dx2*dx2 + dz2*dz2 + dy2*dy2);
                    // 히트박스 반경: 몸통 8, 높이 고려
                    const hitRadius = 10;
                    if(minDist < hitRadius) {
                        const dist2d = Math.sqrt(rdx*rdx + rdz*rdz);
                        const rwc = raycast(player.x, player.z, rdx/(dist2d||1), rdz/(dist2d||1), dist2d);
                        if(!rwc.hit) {
                            hitRemote = true;
                            hitDist = rdist;
                        }
                    }
                }
            }

            // 벽 임팩트 (적 안 맞았을 때)
            if(!hitEnemy && !hitRemote) {
                const wallHit = raycast(player.x, player.z, dirX, dirZ, w.range);
                if(wallHit.hit) {
                    for(let i=0;i<3;i++) addParticle(wallHit.x, 8, wallHit.z, (Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2, '#aaa', 15);
                    hitDist = wallHit.dist;
                }
            }

            if(hitRemote) {
                // 헤드샷 판정: 레이가 머리 높이(y+12~y+16)에 맞았는지
                const rHitY = (player.y+8) + dirY * hitDist;
                const headY = remotePlayer.y + 12;
                const headshot = rHitY >= headY;
                // 스나이퍼 헤드샷 = 무조건 원킬 (999 데미지)
                let dmg;
                if(headshot && player.weapon === 2) {
                    dmg = 999;
                } else {
                    dmg = w.damage * (headshot ? 2.5 : 1);
                    if(w.pellets) dmg = w.damage;
                }
                sendMsg({ type: 'hit', damage: dmg, headshot, weaponName: w.name });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, Math.round(dmg), headshot);
                playSound(headshot ? 'headshot' : 'hit', 0.4);
                for(let i=0;i<5;i++) addParticle(remotePlayer.x, remotePlayer.y+8, remotePlayer.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, remotePlayer.color, 15);
            } else if(hitEnemy) {
                // 헤드샷 판정: 조준점이 적 머리 높이 근처인지
                const eHitY = (player.y+8) + dirY * hitDist;
                const eHeadY = hitEnemy.y + 12;
                const headshot = eHitY >= eHeadY;
                // 스나이퍼 헤드샷 = 무조건 원킬
                let dmg;
                if(headshot && player.weapon === 2) {
                    dmg = 999;
                } else {
                    dmg = w.damage * (headshot ? 2.5 : 1);
                    if(w.pellets) dmg = w.damage;
                }

                if(isOnline && !isHost) {
                    // Guest: send bot_hit to host
                    const botIdx = enemies.indexOf(hitEnemy);
                    sendMsg({ type: 'bot_hit', botIdx, damage: dmg, headshot, weaponName: w.name });
                    addDamageNumber(hitEnemy.x, hitEnemy.y+16, hitEnemy.z, Math.round(dmg), headshot);
                    playSound(headshot ? 'headshot' : 'hit', 0.4);
                    for(let i=0;i<5;i++) addParticle(hitEnemy.x, hitEnemy.y+8, hitEnemy.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, hitEnemy.color, 15);
                } else {
                    // Solo or Host: apply damage locally
                    if(dmg < 999 && hitEnemy.armor > 0) {
                        const armorDmg = Math.min(hitEnemy.armor, dmg*0.6);
                        hitEnemy.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    hitEnemy.hp -= dmg;
                    addDamageNumber(hitEnemy.x, hitEnemy.y+16, hitEnemy.z, Math.round(dmg), headshot);
                    playSound(headshot ? 'headshot' : 'hit', 0.4);
                    for(let i=0;i<5;i++) addParticle(hitEnemy.x, hitEnemy.y+8, hitEnemy.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, hitEnemy.color, 15);
                    if(hitEnemy.hp <= 0) onEnemyKilled(hitEnemy, headshot);
                    hitEnemy.state = 'chase';
                    hitEnemy.stateTimer = 120;
                }
            }

            // Tracer
            const hitTarget = hitRemote ? remotePlayer : hitEnemy;
            const tracerTx = hitTarget ? hitTarget.x : player.x+dirX*hitDist;
            const tracerTy = hitTarget ? hitTarget.y+8 : player.y+8+dirY*hitDist;
            const tracerTz = hitTarget ? hitTarget.z : player.z+dirZ*hitDist;
            bullets.push({
                x:player.x, y:player.y+8, z:player.z,
                tx:tracerTx, ty:tracerTy, tz:tracerTz,
                life:3, tracer:true, color:w.color
            });

            // Send shoot event for tracer
            if(isOnline) {
                sendMsg({ type:'shoot', x:player.x, y:player.y+8, z:player.z, tx:tracerTx, ty:tracerTy, tz:tracerTz, weapon:player.weapon });
            }
        }
    }
}

function onEnemyKilled(enemy, headshot) {
    player.kills++;
    onSessionKill();
    enemy.deaths++;
    progression.totalKills++;
    const now = Date.now();
    if(now - player.lastKillTime < 3000) player.killStreak++;
    else player.killStreak = 1;
    player.lastKillTime = now;

    // XP 획득: 킬 15xp, 헤드샷 보너스 +10, 연킬 보너스
    let xpGain = 15;
    if (headshot) xpGain += 10;
    if (player.killStreak >= 3) xpGain += 5 * Math.min(player.killStreak, 6);
    xpGainAnim.push({ amount: xpGain, time: 60 });
    addXP(xpGain);

    addKillFeed('나', enemy.name, weapons[player.weapon].name + (headshot?' 🎯':''));
    playSound('kill', 0.4);

    // Death particles
    for(let i=0;i<20;i++) addParticle(enemy.x, enemy.y+8, enemy.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, enemy.color, 30, 3);

    // Respawn enemy after delay
    setTimeout(() => {
        const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
        enemy.x = sp.x + (Math.random()-0.5)*30;
        enemy.z = sp.z + (Math.random()-0.5)*30;
        enemy.hp = enemy.maxHp;
        enemy.armor = classes[enemy.class].armor;
        enemy.state = 'patrol';
        enemy.spawnProtection = 120;
    }, 3000);
}

// ====== BOT AI ======
function findBotTarget(bot) {
    // 가장 가까운 보이는 타겟 찾기 (플레이어 또는 다른 봇)
    let bestTarget = null;
    let bestDist = Infinity;

    // 플레이어 체크
    if(gameState === 'playing' && player.hp > 0 && player.spawnProtection <= 0) {
        const dx = player.x - bot.x, dz = player.z - bot.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < 250) {
            const wallCheck = raycast(bot.x, bot.z, dx/dist, dz/dist, dist);
            if(!wallCheck.hit) {
                bestTarget = { type:'player', x:player.x, z:player.z, dist };
                bestDist = dist;
            }
        }
    }

    // 원격 플레이어 체크
    if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
        const rdx = remotePlayer.x - bot.x, rdz = remotePlayer.z - bot.z;
        const rdist = Math.sqrt(rdx*rdx + rdz*rdz);
        if(rdist < bestDist && rdist < 250) {
            const wc = raycast(bot.x, bot.z, rdx/rdist, rdz/rdist, rdist);
            if(!wc.hit) {
                bestTarget = { type:'remote', x:remotePlayer.x, z:remotePlayer.z, dist:rdist };
                bestDist = rdist;
            }
        }
    }

    // 다른 봇 체크
    for(const other of enemies) {
        if(other === bot || other.hp <= 0 || other.spawnProtection > 0) continue;
        const dx = other.x - bot.x, dz = other.z - bot.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < bestDist && dist < 200) {
            const wallCheck = raycast(bot.x, bot.z, dx/dist, dz/dist, dist);
            if(!wallCheck.hit) {
                bestTarget = { type:'bot', ref:other, x:other.x, z:other.z, dist };
                bestDist = dist;
            }
        }
    }
    return bestTarget;
}

function updateBot(bot) {
    if(bot.hp <= 0) return;

    bot.shootCooldown = Math.max(0, bot.shootCooldown-1);
    bot.stateTimer = Math.max(0, bot.stateTimer-1);
    bot.strafeTimer--;
    bot.muzzleFlash = Math.max(0, bot.muzzleFlash-1);
    if(bot.spawnProtection > 0) bot.spawnProtection--;

    // 타겟 찾기
    const target = findBotTarget(bot);
    let tx = 0, tz = 0, distToTarget = 999, angleToTarget = 0, canSeeTarget = false;

    if(target) {
        tx = target.x - bot.x;
        tz = target.z - bot.z;
        distToTarget = target.dist;
        angleToTarget = Math.atan2(tx, tz);
        canSeeTarget = true;
    }

    // State machine
    if(bot.stateTimer <= 0) {
        if(canSeeTarget && distToTarget < 200) {
            bot.state = distToTarget < 40 ? 'flee' : 'attack';
            bot.stateTimer = 60 + Math.random()*60;
        } else if(canSeeTarget) {
            bot.state = 'chase';
            bot.stateTimer = 90;
        } else {
            bot.state = 'patrol';
            bot.targetX = (Math.random()-0.5)*MAP_SIZE*1.6;
            bot.targetZ = (Math.random()-0.5)*MAP_SIZE*1.6;
            bot.stateTimer = 120 + Math.random()*120;
        }
    }

    let moveX = 0, moveZ = 0;

    switch(bot.state) {
        case 'patrol': {
            const tdx = bot.targetX - bot.x, tdz = bot.targetZ - bot.z;
            const td = Math.sqrt(tdx*tdx + tdz*tdz);
            if(td > 5) { moveX = tdx/td; moveZ = tdz/td; }
            else bot.stateTimer = 0;
            bot.yaw = Math.atan2(tdx, tdz);
            break;
        }
        case 'chase': {
            if(canSeeTarget) {
                moveX = tx/distToTarget;
                moveZ = tz/distToTarget;
                bot.yaw += (angleToTarget - bot.yaw) * 0.08;
                if(distToTarget < weapons[bot.weapon].range) {
                    bot.state = 'attack';
                    bot.stateTimer = 60;
                }
            } else { bot.stateTimer = 0; }
            break;
        }
        case 'attack': {
            if(canSeeTarget) {
                bot.yaw += (angleToTarget - bot.yaw) * 0.1;
                if(bot.strafeTimer <= 0) {
                    bot.strafeDir *= -1;
                    bot.strafeTimer = 30 + Math.random()*40;
                }
                const strafeAngle = bot.yaw + Math.PI/2;
                moveX = Math.sin(strafeAngle) * bot.strafeDir * 0.5;
                moveZ = Math.cos(strafeAngle) * bot.strafeDir * 0.5;

                if(bot.shootCooldown <= 0 && distToTarget < weapons[bot.weapon].range) {
                    botShoot(bot, target);
                }
            } else { bot.state = 'patrol'; bot.stateTimer = 0; }
            break;
        }
        case 'flee': {
            if(canSeeTarget) {
                moveX = -tx/distToTarget;
                moveZ = -tz/distToTarget;
                bot.yaw = angleToTarget;
                if(bot.shootCooldown <= 0) botShoot(bot, target);
                if(distToTarget > 80) { bot.state = 'attack'; bot.stateTimer = 60; }
            } else { bot.stateTimer = 0; }
            break;
        }
    }

    const prevX = bot.x, prevZ = bot.z;
    moveWithCollision(bot, moveX * bot.speed * 0.5, moveZ * bot.speed * 0.5, 5);

    // Stuck detection: 이동 못하면 새 목표로 전환
    const movedDist = Math.abs(bot.x - prevX) + Math.abs(bot.z - prevZ);
    if(!bot.stuckCounter) bot.stuckCounter = 0;
    if(movedDist < 0.1) bot.stuckCounter++;
    else bot.stuckCounter = 0;
    if(bot.stuckCounter > 30) {
        bot.state = 'patrol';
        bot.targetX = (Math.random()-0.5) * MAP_SIZE * 1.2;
        bot.targetZ = (Math.random()-0.5) * MAP_SIZE * 1.2;
        bot.stateTimer = 60;
        bot.stuckCounter = 0;
    }

    // 봇 바닥 높이 추적 (3D 맵)
    const botFloor = getFloorHeight(bot.x, bot.z);
    if (botFloor !== -Infinity) {
        bot.y = botFloor;
    }

    // Bot vs bot collision (물리)
    for(const other of enemies) {
        if(other === bot || other.hp <= 0) continue;
        const bx = bot.x - other.x, bz = bot.z - other.z;
        const bd = Math.sqrt(bx*bx + bz*bz);
        if(bd < 10) {
            bot.x += (bx/bd)*2;
            bot.z += (bz/bd)*2;
        }
    }
}

function botShoot(bot, target) {
    const w = weapons[bot.weapon];
    bot.shootCooldown = w.fireRate + 20; // 더 긴 쿨다운
    bot.muzzleFlash = 4;

    const dist = target.dist;
    const spread = w.spread * (1/bot.accuracy) * (dist > 100 ? 2.0 : 1.3);
    const dx = target.x - bot.x + (Math.random()-0.5)*spread*dist;
    const dz = target.z - bot.z + (Math.random()-0.5)*spread*dist;
    const d = Math.sqrt(dx*dx + dz*dz);

    const wallHit = raycast(bot.x, bot.z, dx/d, dz/d, dist);
    if(wallHit.hit && wallHit.dist < dist) return;

    if(w.explosive) {
        bullets.push({
            x:bot.x, y:8, z:bot.z,
            vx:(dx/d)*5, vy:0.5, vz:(dz/d)*5,
            damage:w.damage*0.4, owner:'bot', ownerRef:bot, life:80,
            explosive:true, color:w.color
        });
    } else {
        const hitChance = bot.accuracy * (dist < 50 ? 0.7 : dist < 100 ? 0.4 : 0.15);

        if(target.type === 'player') {
            // 플레이어에게 사격
            if(Math.random() < hitChance && gameState === 'playing' && player.spawnProtection <= 0) {
                const pellets = w.pellets || 1;
                let totalDmg = 0;
                for(let p=0;p<pellets;p++) {
                    let dmg = w.damage * (0.5 + Math.random()*0.3);
                    if(player.armor > 0) {
                        const armorDmg = Math.min(player.armor, dmg*0.6);
                        player.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    totalDmg += dmg;
                }
                player.hp -= totalDmg;
                player.damageFlash = 15;
                addDamageNumber(player.x, player.y+16, player.z, Math.round(totalDmg), false);

                if(player.hp <= 0) {
                    player.deaths++;
                    progression.totalDeaths++;
                    onSessionDeath();
                    bot.kills++;
                    player.killStreak = 0;
                    addKillFeed(bot.name, '나', weapons[bot.weapon].name);
                    gameState = 'dead';
                    player.respawnTimer = 180;
                }
            }
        } else if(target.type === 'remote') {
            // 원격 플레이어에게 사격 (호스트가 계산하고 전송)
            if(Math.random() < hitChance && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
                let dmg = w.damage * (0.5 + Math.random()*0.3);
                sendMsg({ type:'hit', damage:dmg, headshot:false, weaponName:bot.name+'의 '+w.name });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, Math.round(dmg), false);
            }
        } else if(target.type === 'bot') {
            // 다른 봇에게 사격
            const victim = target.ref;
            if(Math.random() < hitChance && victim.hp > 0 && victim.spawnProtection <= 0) {
                const pellets = w.pellets || 1;
                let totalDmg = 0;
                for(let p=0;p<pellets;p++) {
                    let dmg = w.damage * (0.5 + Math.random()*0.3);
                    if(victim.armor > 0) {
                        const armorDmg = Math.min(victim.armor, dmg*0.6);
                        victim.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    totalDmg += dmg;
                }
                victim.hp -= totalDmg;
                addDamageNumber(victim.x, victim.y+16, victim.z, Math.round(totalDmg), false);

                // 맞은 봇이 반격
                victim.state = 'chase';
                victim.stateTimer = 120;

                if(victim.hp <= 0) {
                    bot.kills++;
                    victim.deaths++;
                    addKillFeed(bot.name, victim.name, weapons[bot.weapon].name);
                    // 봇 리스폰
                    for(let i=0;i<15;i++) addParticle(victim.x, victim.y+8, victim.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, victim.color, 30, 3);
                    setTimeout(() => {
                        const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
                        victim.x = sp.x + (Math.random()-0.5)*30;
                        victim.z = sp.z + (Math.random()-0.5)*30;
                        victim.hp = victim.maxHp;
                        victim.armor = classes[victim.class].armor;
                        victim.state = 'patrol';
                        victim.spawnProtection = 120;
                    }, 3000);
                }
            }
        }
    }

    // Tracer
    bullets.push({
        x:bot.x, y:8, z:bot.z,
        tx:target.x, ty:8, tz:target.z,
        life:3, tracer:true, color:w.color
    });
}

// ====== 3D PROJECTION ======
function project(wx, wy, wz) {
    const dx = wx - player.x;
    const camH = player.sliding ? 4 : 10; // 슬라이딩 시 카메라 낮아짐
    const dy = wy - (player.y + camH);
    const dz = wz - player.z;

    const cosY = Math.cos(-yaw), sinY = Math.sin(-yaw);
    const rx = dx * cosY - dz * sinY;
    const rz = dx * sinY + dz * cosY;

    const cosP = Math.cos(-pitch), sinP = Math.sin(-pitch);
    const ry = dy * cosP - rz * sinP;
    const rz2 = dy * sinP + rz * cosP;

    if(rz2 < 1) return null;

    const fov = player.scope ? (player.weapon === 2 ? 800 : 550) : 400;
    const sx = W/2 + (rx / rz2) * fov;
    const sy = H/2 - (ry / rz2) * fov;
    const scale = fov / rz2;

    return {x:sx, y:sy, z:rz2, scale};
}

// ====== RENDER ======
// 눈송이 파티클
const snowflakes = [];
for(let i = 0; i < 60; i++) {
    snowflakes.push({x: Math.random()*2000-1000, y: Math.random()*800, s: 1+Math.random()*2, sp: 0.3+Math.random()*0.7, d: Math.random()*0.5-0.25});
}

function drawGround() {
    // 3D 맵이 배경을 담당하므로 2D 캔버스는 투명하게 유지
    // 눈 내리는 이펙트만 유지
    ctx.fillStyle = 'rgba(230,235,240,0.6)';
    for(const sf of snowflakes) {
        sf.y += sf.sp;
        sf.x += sf.d;
        if(sf.y > H) { sf.y = -5; sf.x = Math.random()*W; }
        if(sf.x > W) sf.x = 0;
        if(sf.x < 0) sf.x = W;
        ctx.beginPath();
        ctx.arc(sf.x, sf.y, sf.s, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawWall(wall) {
    const corners3D = [
        [wall.x, 0, wall.z],
        [wall.x+wall.w, 0, wall.z],
        [wall.x+wall.w, 0, wall.z+wall.d],
        [wall.x, 0, wall.z+wall.d],
        [wall.x, wall.h, wall.z],
        [wall.x+wall.w, wall.h, wall.z],
        [wall.x+wall.w, wall.h, wall.z+wall.d],
        [wall.x, wall.h, wall.z+wall.d]
    ];

    const projected = corners3D.map(c => project(c[0], c[1], c[2]));
    if(projected.every(p => !p)) return;

    const faces = [
        [0,1,5,4], [1,2,6,5], [2,3,7,6], [3,0,4,7], [4,5,6,7]
    ];

    const bc = wall.color || '#555';
    const t = wall.t || '';
    const shades = [bc, shadeColor(bc,-15), shadeColor(bc,-30), shadeColor(bc,-15), shadeColor(bc,20)];

    const faceData = faces.map((f, i) => {
        const avgZ = f.reduce((s,idx) => s + (projected[idx]?projected[idx].z:999), 0) / 4;
        return {indices:f, shade:shades[i], avgZ, fi:i};
    }).sort((a,b) => b.avgZ - a.avgZ);

    for(const face of faceData) {
        const pts = face.indices.map(i => projected[i]).filter(p => p);
        if(pts.length < 3) continue;

        ctx.fillStyle = face.shade;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for(let k=1;k<pts.length;k++) ctx.lineTo(pts[k].x, pts[k].y);
        ctx.closePath();
        ctx.fill();

        // 타입별 디테일
        if(face.fi === 4) {
            // 윗면: 눈 덮인 지붕이면 하얀 오버레이
            if(t === 'roof') {
                ctx.fillStyle = 'rgba(210,220,230,0.4)';
                ctx.fill();
            }
        } else if(face.fi < 4) {
            const fW = Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
            const fH = Math.hypot(pts[0].x-pts[pts.length-1].x, pts[0].y-pts[pts.length-1].y);
            if(t === 'concrete') {
                // 콘크리트 줄무늬
                ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
                const steps = Math.min(4, Math.floor(fH/12));
                for(let s=1;s<=steps;s++){
                    const r = s/(steps+1);
                    const x1 = pts[0].x+(pts[pts.length-1].x-pts[0].x)*r;
                    const y1 = pts[0].y+(pts[pts.length-1].y-pts[0].y)*r;
                    const x2 = pts[1].x+(pts[2] ? pts[2].x-pts[1].x : 0)*r;
                    const y2 = pts[1].y+(pts[2] ? pts[2].y-pts[1].y : 0)*r;
                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                }
            } else if(t === 'metal') {
                // 금속판 접합 라인
                ctx.strokeStyle = 'rgba(150,160,170,0.12)'; ctx.lineWidth = 1;
                const steps = Math.min(3, Math.floor(fW/20));
                for(let s=1;s<=steps;s++){
                    const r = s/(steps+1);
                    const x1 = pts[0].x+(pts[1].x-pts[0].x)*r;
                    const y1 = pts[0].y+(pts[1].y-pts[0].y)*r;
                    const x2 = pts[pts.length-1].x+(pts[2]?pts[2].x-pts[pts.length-1].x:0)*r;
                    const y2 = pts[pts.length-1].y+(pts[2]?pts[2].y-pts[pts.length-1].y:0)*r;
                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                }
            } else if(t === 'wood') {
                // 나무 결 (수평선)
                ctx.strokeStyle = 'rgba(90,60,30,0.08)'; ctx.lineWidth = 1;
                for(let s=1;s<=3;s++){
                    const r = s/4;
                    const x1 = pts[0].x+(pts[pts.length-1].x-pts[0].x)*r;
                    const y1 = pts[0].y+(pts[pts.length-1].y-pts[0].y)*r;
                    const x2 = pts[1].x+(pts[2]?pts[2].x-pts[1].x:0)*r;
                    const y2 = pts[1].y+(pts[2]?pts[2].y-pts[1].y:0)*r;
                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                }
            } else if(t === 'sandbag') {
                // 모래주머니 패턴 (둥근 범프)
                ctx.fillStyle = 'rgba(100,90,70,0.1)';
                const cx = (pts[0].x+pts[1].x)/2;
                const cy = (pts[0].y+(pts[pts.length-1]?pts[pts.length-1].y:pts[0].y))/2;
                ctx.beginPath(); ctx.ellipse(cx,cy,fW*0.2,fH*0.3,0,0,Math.PI*2); ctx.fill();
            }
            // 하단 더러움 (모든 벽 공통 — 가볍게)
            if(fH > 15 && t !== 'sandbag' && t !== 'roof') {
                ctx.fillStyle = 'rgba(0,0,0,0.03)';
                const bx = Math.min(pts[0].x, pts[1].x);
                const by = (pts[pts.length-1]?pts[pts.length-1].y:pts[0].y);
                ctx.fillRect(bx, by - fH*0.2, fW, fH*0.2);
            }
        }
    }
}

function shadeColor(color, percent) {
    const num = parseInt(color.replace('#',''), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + percent));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
    const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
    return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

function drawEnemy(enemy) {
    if(!enemy || enemy.hp <= 0) return;
    try {
    const p = project(enemy.x, enemy.y, enemy.z);
    if(!p || p.z < 2) return;

    const s = p.scale;
    const t = Date.now() * 0.006;
    const isMoving = (enemy.vx && Math.abs(enemy.vx) > 0.1) || (enemy.vz && Math.abs(enemy.vz) > 0.1);
    const walkCycle = isMoving ? Math.sin(t * 1.5) : 0;
    const armSwing = isMoving ? Math.sin(t * 1.5) * 0.4 : 0;

    // 캐릭터 방향 (적이 바라보는 방향 vs 카메라 방향)
    const gunDir = enemy.yaw - yaw;
    const facingRight = Math.sin(gunDir) > 0;

    ctx.save();
    ctx.translate(p.x, p.y);

    // ===== 그림자 =====
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 6*s, 2*s, 0, 0, Math.PI*2);
    ctx.fill();

    // ===== 다리 (뒤) =====
    const legW = 3.2 * s, legH = 6 * s;
    const legSpacing = 1.8 * s;
    const backLegAngle = walkCycle * 0.5;
    const frontLegAngle = -walkCycle * 0.5;

    ctx.save();
    ctx.translate(-legSpacing, -0.5*s);
    ctx.rotate(backLegAngle);
    // 허벅지 (바지)
    const pantG = ctx.createLinearGradient(0, 0, 0, -legH*0.6);
    pantG.addColorStop(0, '#2a3a5a'); pantG.addColorStop(1, '#344870');
    ctx.fillStyle = pantG;
    drawRoundRect(-legW/2, -legH*0.6, legW, legH*0.6, 1.2*s);
    // 종아리
    ctx.fillStyle = '#253050';
    drawRoundRect(-legW/2, -legH, legW, legH*0.45, 1*s);
    // 신발
    ctx.fillStyle = '#1a1a1a';
    drawRoundRect(-legW/2 - 0.5*s, -legH - 1.5*s, legW + 1.5*s, 2.2*s, 0.8*s);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-legW/2, -legH - 1.2*s, legW*0.4, 0.6*s); // 신발 줄
    ctx.restore();

    // ===== 다리 (앞) =====
    ctx.save();
    ctx.translate(legSpacing, -0.5*s);
    ctx.rotate(frontLegAngle);
    const pantG2 = ctx.createLinearGradient(0, 0, 0, -legH*0.6);
    pantG2.addColorStop(0, '#2e4060'); pantG2.addColorStop(1, '#385078');
    ctx.fillStyle = pantG2;
    drawRoundRect(-legW/2, -legH*0.6, legW, legH*0.6, 1.2*s);
    ctx.fillStyle = '#283858';
    drawRoundRect(-legW/2, -legH, legW, legH*0.45, 1*s);
    ctx.fillStyle = '#1a1a1a';
    drawRoundRect(-legW/2 - 0.5*s, -legH - 1.5*s, legW + 1.5*s, 2.2*s, 0.8*s);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-legW/2, -legH - 1.2*s, legW*0.4, 0.6*s);
    ctx.restore();

    // ===== 몸통 (상체) =====
    const torsoW = 8 * s, torsoH = 8 * s;
    const torsoY = -legH * 0.55;

    // 팀 색상 상의
    const teamColor = enemy.color || '#f44';
    const bodyG = ctx.createLinearGradient(0, torsoY, 0, torsoY - torsoH);
    bodyG.addColorStop(0, shadeColor(teamColor, -20));
    bodyG.addColorStop(0.5, teamColor);
    bodyG.addColorStop(1, shadeColor(teamColor, 15));
    ctx.fillStyle = bodyG;
    drawRoundRect(-torsoW/2, torsoY - torsoH, torsoW, torsoH, 1.5*s);

    // 상의 디테일 — 칼라/목선
    ctx.fillStyle = shadeColor(teamColor, 30);
    drawRoundRect(-torsoW*0.3, torsoY - torsoH, torsoW*0.6, 1.8*s, 0.8*s);

    // 상의 중앙 선
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(-0.4*s, torsoY - torsoH + 1.5*s, 0.8*s, torsoH - 2*s);

    // 벨트
    ctx.fillStyle = '#2a2218';
    drawRoundRect(-torsoW/2 - 0.3*s, torsoY - 1*s, torsoW + 0.6*s, 1.5*s, 0.5*s);
    // 벨트 버클
    ctx.fillStyle = '#c0a040';
    ctx.fillRect(-1*s, torsoY - 0.8*s, 2*s, 1.2*s);

    // ===== 팔 (뒤쪽) =====
    const armW = 2.5 * s, armH = 7 * s;
    const shoulderY = torsoY - torsoH + 1.5*s;

    ctx.save();
    ctx.translate(facingRight ? -torsoW/2 - armW*0.2 : torsoW/2 + armW*0.2, shoulderY);
    ctx.rotate(-armSwing * 0.7);
    // 상완 (소매)
    ctx.fillStyle = shadeColor(teamColor, -30);
    drawRoundRect(-armW/2, 0, armW, armH*0.5, 1*s);
    // 하완 (살색)
    const skinG = ctx.createLinearGradient(0, armH*0.45, 0, armH);
    skinG.addColorStop(0, '#d4a574'); skinG.addColorStop(1, '#c09060');
    ctx.fillStyle = skinG;
    drawRoundRect(-armW/2, armH*0.45, armW, armH*0.5, 0.8*s);
    // 손
    ctx.fillStyle = '#d4a574';
    ctx.beginPath(); ctx.ellipse(0, armH, armW*0.45, armW*0.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // ===== 팔 (앞쪽 — 무기 들고 있는 팔) =====
    ctx.save();
    ctx.translate(facingRight ? torsoW/2 + armW*0.2 : -torsoW/2 - armW*0.2, shoulderY);
    ctx.rotate(armSwing * 0.5 - 0.3); // 약간 앞으로 (무기 잡기)
    ctx.fillStyle = shadeColor(teamColor, -25);
    drawRoundRect(-armW/2, 0, armW, armH*0.5, 1*s);
    const skinG2 = ctx.createLinearGradient(0, armH*0.45, 0, armH);
    skinG2.addColorStop(0, '#d4a574'); skinG2.addColorStop(1, '#c09060');
    ctx.fillStyle = skinG2;
    drawRoundRect(-armW/2, armH*0.45, armW, armH*0.5, 0.8*s);
    // 손에 무기
    ctx.fillStyle = '#333';
    ctx.fillRect(-armW*0.3, armH*0.7, armW*1.4, armW*0.3);
    ctx.fillStyle = '#555';
    const gunLen = 5 * s;
    ctx.fillRect(facingRight ? armW*0.4 : -armW*0.4 - gunLen, armH*0.6, gunLen, armW*0.25);
    ctx.restore();

    // ===== 목 =====
    const neckY = torsoY - torsoH;
    ctx.fillStyle = '#c89870';
    drawRoundRect(-1.5*s, neckY - 2*s, 3*s, 2.5*s, 0.8*s);

    // ===== 머리 =====
    const headR = 4 * s;
    const headY = neckY - headR - 1.5*s;

    // 머리 형태 (얼굴)
    const headG = ctx.createRadialGradient(0, headY, headR*0.2, 0, headY, headR);
    headG.addColorStop(0, '#e0b898'); headG.addColorStop(0.7, '#d4a574'); headG.addColorStop(1, '#c09060');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.ellipse(0, headY, headR, headR*1.05, 0, 0, Math.PI*2);
    ctx.fill();

    // 머리카락
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath();
    ctx.ellipse(0, headY - headR*0.3, headR*1.05, headR*0.7, 0, Math.PI, Math.PI*2);
    ctx.fill();
    // 앞머리
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath();
    ctx.ellipse(-headR*0.3, headY - headR*0.7, headR*0.5, headR*0.35, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headR*0.3, headY - headR*0.7, headR*0.45, headR*0.3, 0.2, 0, Math.PI*2);
    ctx.fill();

    // 눈
    const eyeSpacing = headR * 0.35;
    const eyeY = headY + headR * 0.05;
    // 눈 흰자
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-eyeSpacing, eyeY, headR*0.2, headR*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeSpacing, eyeY, headR*0.2, headR*0.15, 0, 0, Math.PI*2); ctx.fill();
    // 눈동자
    const lookX = Math.sin(gunDir) * headR * 0.08;
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath(); ctx.ellipse(-eyeSpacing + lookX, eyeY, headR*0.1, headR*0.12, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeSpacing + lookX, eyeY, headR*0.1, headR*0.12, 0, 0, Math.PI*2); ctx.fill();
    // 눈썹
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 0.8 * s;
    ctx.beginPath();
    ctx.moveTo(-eyeSpacing - headR*0.2, eyeY - headR*0.25);
    ctx.lineTo(-eyeSpacing + headR*0.2, eyeY - headR*0.22);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(eyeSpacing - headR*0.2, eyeY - headR*0.22);
    ctx.lineTo(eyeSpacing + headR*0.2, eyeY - headR*0.25);
    ctx.stroke();

    // 코
    ctx.fillStyle = '#c49060';
    ctx.beginPath();
    ctx.moveTo(0, eyeY + headR*0.1);
    ctx.lineTo(-headR*0.08, eyeY + headR*0.35);
    ctx.lineTo(headR*0.08, eyeY + headR*0.35);
    ctx.closePath();
    ctx.fill();

    // 입
    ctx.strokeStyle = '#a06040';
    ctx.lineWidth = 0.6 * s;
    ctx.beginPath();
    ctx.arc(0, eyeY + headR*0.55, headR*0.15, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // 귀
    ctx.fillStyle = '#d4a574';
    ctx.beginPath(); ctx.ellipse(-headR*0.95, headY + headR*0.1, headR*0.18, headR*0.3, -0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(headR*0.95, headY + headR*0.1, headR*0.18, headR*0.3, 0.1, 0, Math.PI*2); ctx.fill();

    // ===== 머즐 플래시 =====
    if(enemy.muzzleFlash > 0) {
        const flashX = (facingRight ? 1 : -1) * (torsoW/2 + 8*s);
        const flashY = shoulderY + armH*0.7;
        ctx.fillStyle = `rgba(255,200,50,${enemy.muzzleFlash/4})`;
        ctx.beginPath();
        ctx.arc(flashX, flashY, 5*s, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = `rgba(255,255,200,${enemy.muzzleFlash/4})`;
        ctx.beginPath();
        ctx.arc(flashX, flashY, 2.5*s, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.restore();

    // ===== HP바 =====
    const totalH = (legH + torsoH + headR*2 + 6) * s;
    const barW = 40 * s;
    const barY = p.y - totalH - 4*s;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(p.x - barW/2, barY, barW, 4*s);
    const hpRatio = enemy.hp / enemy.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#4f4' : hpRatio > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(p.x - barW/2, barY, barW * hpRatio, 4*s);

    // 이름
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.max(8, 10*s)}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillText(enemy.name, p.x, barY - 2*s);

    // 거리
    const dist = Math.round(Math.sqrt((enemy.x-player.x)**2 + (enemy.z-player.z)**2));
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.max(6, 8*s)}px 'Segoe UI'`;
    ctx.fillText(dist + 'm', p.x, barY - 12*s);
    } catch(e) { /* drawEnemy 오류 방지 */ }
}

// 둥근 사각형 헬퍼
function drawRoundRect(x, y, w, h, r) {
    if(!isFinite(x+y+w+h+r) || w <= 0 || h <= 0) { ctx.fillRect(x,y,w||1,h||1); return; }
    r = Math.max(0, Math.min(r, w/2, h/2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
}

function drawHUD() {
    const w = weapons[player.weapon];
    const cls = classes[player.selectedClass];

    // HP bar
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-60, 200, 20);
    const hpR = player.hp / player.maxHp;
    ctx.fillStyle = hpR > 0.5 ? '#4f4' : hpR > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(20, H-60, 200*hpR, 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`❤ ${Math.ceil(player.hp)} / ${player.maxHp}`, 120, H-45);

    // Armor bar
    if(player.armor > 0 || classes[player.selectedClass].armor > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(20, H-85, 200, 14);
        ctx.fillStyle = '#5bf';
        ctx.fillRect(20, H-85, 200*(player.armor/classes[player.selectedClass].armor || 0), 14);
        ctx.fillStyle = '#fff';
        ctx.font = '11px Segoe UI';
        ctx.fillText(`🛡 ${Math.ceil(player.armor)}`, 120, H-74);
    }

    // Weapon slots HUD
    const numSlots = player.weaponSlots.length;
    const slotW = 90, slotH = 28, slotGap = 4;
    const slotsStartX = W - (slotW + slotGap) * numSlots - 10;
    ctx.textAlign = 'center';
    for(let i = 0; i < numSlots; i++) {
        const sx = slotsStartX + i * (slotW + slotGap);
        const sy = H - 95;
        const isActive = player.currentSlot === i;
        ctx.fillStyle = isActive ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.4)';
        ctx.fillRect(sx, sy, slotW, slotH);
        const slotWpn = weapons[player.weaponSlots[i]];
        ctx.strokeStyle = isActive && slotWpn ? slotWpn.color : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.strokeRect(sx, sy, slotW, slotH);
        ctx.font = isActive ? 'bold 11px Segoe UI' : '10px Segoe UI';
        ctx.fillStyle = isActive ? '#fff' : '#999';
        const slotLabel = i === 0 ? `1 ${slotWpn?.name||'주무기'}` : `2 ${slotWpn?.name||'보조'}`;
        ctx.fillText(slotLabel, sx + slotW/2, sy + 18);
    }

    // Ammo (슬롯 인덱스 기반)
    ctx.textAlign = 'right';
    if(!w.melee) {
        const ammoSlot = player.currentSlot;
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillStyle = (player.ammo[ammoSlot] || 0) <= 5 ? '#f44' : '#fff';
        ctx.fillText((player.ammo[ammoSlot] || 0) + '', W-80, H-35);
        ctx.font = '16px Segoe UI';
        ctx.fillStyle = '#aaa';
        ctx.fillText('/ ' + (player.maxAmmo[ammoSlot] || 0), W-30, H-35);
    } else {
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillStyle = '#cc44ff';
        ctx.fillText('∞', W-50, H-35);
    }

    // Weapon name
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = w.color;
    ctx.fillText(w.name, W-30, H-60);

    // F키 힌트
    ctx.textAlign = 'left';
    ctx.font = '11px Segoe UI';
    ctx.fillStyle = player.meleeCooldown > 0 ? '#666' : '#cc44ff';
    ctx.fillText('[F] 근접공격', 20, H-20);

    // Reload indicator
    if(player.reloadTime > 0) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 18px Segoe UI';
        ctx.fillStyle = '#ff0';
        ctx.fillText('재장전 중...', W/2, H/2 + 60);
        const rr = 1 - player.reloadTime / w.reloadSpeed;
        ctx.fillStyle = 'rgba(255,255,0,0.3)';
        ctx.fillRect(W/2-50, H/2+65, 100*rr, 4);
    }

    // Crosshair
    if(!player.scope) {
        // 조준점
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2;
        const cs = 14;
        const gap = 5;
        ctx.beginPath();
        ctx.moveTo(W/2-cs, H/2); ctx.lineTo(W/2-gap, H/2);
        ctx.moveTo(W/2+gap, H/2); ctx.lineTo(W/2+cs, H/2);
        ctx.moveTo(W/2, H/2-cs); ctx.lineTo(W/2, H/2-gap);
        ctx.moveTo(W/2, H/2+gap); ctx.lineTo(W/2, H/2+cs);
        ctx.stroke();
        // 중앙 빨간 점
        ctx.fillStyle = 'rgba(255,50,50,0.9)';
        ctx.beginPath();
        ctx.arc(W/2, H/2, 2.5, 0, Math.PI*2);
        ctx.fill();

        // 적이 조준점 근처에 있으면 빨간 조준점으로 변경
        let aimOnEnemy = false;
        for(const e of enemies) {
            if(e.hp <= 0) continue;
            const p1 = project(e.x, e.y, e.z);
            const p2 = project(e.x, e.y+16, e.z);
            if(!p1 && !p2) continue;
            const pp = p1 || p2;
            const dx = W/2 - pp.x, dy = H/2 - pp.y;
            if(Math.sqrt(dx*dx+dy*dy) < 50) { aimOnEnemy = true; break; }
        }
        if(aimOnEnemy) {
            ctx.strokeStyle = 'rgba(255,50,50,0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(W/2, H/2, 8, 0, Math.PI*2);
            ctx.stroke();
        }
    }

    // Scope / ADS overlay
    if(player.scope) {
        if(player.weapon === 2) {
            // 스나이퍼 스코프: 큰 창문 + 얇은 검은 링 + 바깥 불투명
            const cx = W/2, cy = H/2;
            const scopeR = Math.min(W, H) * 0.38; // 큰 렌즈 창문

            // 바깥 영역 = 검은색 (총 몸체가 시야 차단)
            ctx.save();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.rect(0, 0, W, H);
            ctx.arc(cx, cy, scopeR, 0, Math.PI * 2, true); // 원형 구멍
            ctx.fill();

            // 얇은 스코프 링
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(cx, cy, scopeR, 0, Math.PI * 2);
            ctx.stroke();

            // 십자선
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(cx - scopeR * 0.7, cy); ctx.lineTo(cx - 5, cy);
            ctx.moveTo(cx + 5, cy); ctx.lineTo(cx + scopeR * 0.7, cy);
            ctx.moveTo(cx, cy - scopeR * 0.7); ctx.lineTo(cx, cy - 5);
            ctx.moveTo(cx, cy + 5); ctx.lineTo(cx, cy + scopeR * 0.7);
            ctx.stroke();

            // 중앙 점
            ctx.fillStyle = 'rgba(255,50,50,0.7)';
            ctx.beginPath(); ctx.arc(cx, cy, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        } else {
            // 일반 무기: ADS (화면 살짝 어둡게 + 크로스헤어)
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W/2-15, H/2); ctx.lineTo(W/2-5, H/2);
            ctx.moveTo(W/2+5, H/2); ctx.lineTo(W/2+15, H/2);
            ctx.moveTo(W/2, H/2-15); ctx.lineTo(W/2, H/2-5);
            ctx.moveTo(W/2, H/2+5); ctx.lineTo(W/2, H/2+15);
            ctx.stroke();
        }
    }

    // Spawn protection indicator
    if(player.spawnProtection > 0) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 16px Segoe UI';
        ctx.fillStyle = `rgba(100,200,255,${0.5 + Math.sin(Date.now()*0.01)*0.3})`;
        ctx.fillText('🛡 무적 ' + Math.ceil(player.spawnProtection/60) + '초', W/2, H/2 - 60);
        // Blue border flash
        ctx.strokeStyle = `rgba(100,200,255,${player.spawnProtection/180 * 0.3})`;
        ctx.lineWidth = 3;
        ctx.strokeRect(2, 2, W-4, H-4);
    }

    // Kill streak
    if(player.killStreak >= 2 && Date.now() - player.lastKillTime < 3000) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 24px Segoe UI';
        ctx.fillStyle = player.killStreak >= 5 ? '#f44' : player.killStreak >= 3 ? '#ff4' : '#4f4';
        const streakTexts = ['','','더블 킬!','트리플 킬!','쿼드라 킬!','펜타 킬!!','갓라이크!!!'];
        ctx.fillText(streakTexts[Math.min(player.killStreak, 6)], W/2, 80);
    }

    // KD
    ctx.textAlign = 'left';
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = '#fff';
    ctx.fillText(`킬: ${player.kills}  데스: ${player.deaths}`, 20, 30);

    // Class info
    ctx.fillStyle = cls.color;
    ctx.fillText(`${cls.name}`, 20, 50);

    // 레벨 & 랭크 HUD (우상단)
    const hRank = getCurrentRank();
    ctx.textAlign = 'right';
    ctx.font = 'bold 13px Segoe UI';
    ctx.fillStyle = hRank.color;
    ctx.fillText(`${hRank.icon} ${hRank.name}`, W-20, 55);
    ctx.font = 'bold 15px Segoe UI';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Lv.${progression.level}`, W-20, 73);
    // XP 미니바
    const hXpR = progression.xp / xpForLevel(progression.level);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(W-120, 78, 100, 5);
    ctx.fillStyle = hRank.color;
    ctx.fillRect(W-120, 78, 100 * hXpR, 5);

    // XP 획득 애니메이션
    for(let i = xpGainAnim.length-1; i >= 0; i--) {
        const xa = xpGainAnim[i];
        xa.time--;
        if(xa.time <= 0) { xpGainAnim.splice(i,1); continue; }
        const alpha = Math.min(1, xa.time / 30);
        const offsetY = (60 - xa.time) * 0.5;
        ctx.font = 'bold 14px Segoe UI';
        ctx.fillStyle = `rgba(100,255,100,${alpha})`;
        ctx.textAlign = 'center';
        ctx.fillText(`+${xa.amount} XP`, W/2, 110 + offsetY);
    }

    // 레벨업 애니메이션
    if(levelUpAnim > 0) {
        levelUpAnim--;
        const a = Math.min(1, levelUpAnim / 30);
        const scale = 1 + (120 - levelUpAnim) * 0.003;
        ctx.save();
        ctx.textAlign = 'center';
        ctx.font = `bold ${Math.floor(32 * scale)}px Segoe UI`;
        ctx.fillStyle = `rgba(255,215,0,${a})`;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 20 * a;
        ctx.fillText(`⬆ LEVEL UP! Lv.${progression.level}`, W/2, 60);
        ctx.shadowBlur = 0;
        ctx.restore();
        // 10레벨 배수면 스킨 보상 알림
        if(progression.level % 10 === 0 && levelUpAnim === 80) {
            const skinIdx = Math.floor(progression.level / 10);
            if(skinIdx < GUN_SKINS.length) {
                pendingSkinReward = GUN_SKINS[skinIdx];
            }
        }
    }

    // 스킨 보상 알림
    if(pendingSkinReward) {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(W/2-180, H/2-80, 360, 160);
        ctx.strokeStyle = '#cc66ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(W/2-180, H/2-80, 360, 160);
        ctx.textAlign = 'center';
        ctx.font = 'bold 22px Segoe UI';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('🎉 새 스킨 해금!', W/2, H/2-45);
        ctx.font = 'bold 20px Segoe UI';
        ctx.fillStyle = '#fff';
        ctx.fillText(pendingSkinReward.name, W/2, H/2-15);
        ctx.font = '14px Segoe UI';
        ctx.fillStyle = '#aaa';
        ctx.fillText(pendingSkinReward.desc, W/2, H/2+10);
        // 컬러 미리보기
        ctx.fillStyle = pendingSkinReward.colors.body;
        ctx.fillRect(W/2-60, H/2+22, 40, 15);
        ctx.fillStyle = pendingSkinReward.colors.accent;
        ctx.fillRect(W/2-15, H/2+22, 40, 15);
        ctx.fillStyle = pendingSkinReward.colors.barrel;
        ctx.fillRect(W/2+30, H/2+22, 30, 15);
        ctx.font = '12px Segoe UI';
        ctx.fillStyle = '#888';
        ctx.fillText('아무 키를 눌러 닫기', W/2, H/2+65);
    }

    ctx.textAlign = 'left';

    // Online indicator
    if(isOnline) {
        ctx.fillStyle = '#55aaff';
        ctx.font = '12px Segoe UI';
        ctx.fillText(`온라인 | 방: ${roomCode}`, 20, 68);
    }

    // Save & Quit 버튼 (좌상단)
    const sqX = W - 130, sqY = H - 30;
    ctx.fillStyle = 'rgba(255,60,60,0.6)';
    ctx.beginPath();
    ctx.roundRect(sqX, sqY, 115, 26, 6);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,100,100,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('💾 SAVE & QUIT', sqX + 57, sqY + 17);
    ctx.textAlign = 'left';

    // Kill feed
    ctx.textAlign = 'right';
    ctx.font = '12px Segoe UI';
    killFeed.forEach((kf, i) => {
        const alpha = Math.min(1, kf.time/60);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillText(`${kf.killer} ▸ ${kf.weapon} ▸ ${kf.victim}`, W-20, 30 + i*18);
    });

    // Minimap
    const mmSize = 120, mmX = W-mmSize-15, mmY = H-mmSize-15;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.fillRect(mmX, mmY, mmSize, mmSize);
    ctx.strokeRect(mmX, mmY, mmSize, mmSize);

    const mmScale = mmSize / (MAP_SIZE*2);

    // Walls on minimap
    ctx.fillStyle = 'rgba(100,100,150,0.5)';
    walls.forEach(w => {
        const wx = mmX + (w.x + MAP_SIZE) * mmScale;
        const wz = mmY + (w.z + MAP_SIZE) * mmScale;
        ctx.fillRect(wx, wz, Math.max(1, w.w*mmScale), Math.max(1, w.d*mmScale));
    });

    // Player on minimap
    ctx.fillStyle = '#4f4';
    const pmx = mmX + (player.x + MAP_SIZE) * mmScale;
    const pmy = mmY + (player.z + MAP_SIZE) * mmScale;
    ctx.beginPath(); ctx.arc(pmx, pmy, 3, 0, Math.PI*2); ctx.fill();
    // Direction
    ctx.strokeStyle = '#4f4';
    ctx.beginPath();
    ctx.moveTo(pmx, pmy);
    ctx.lineTo(pmx - Math.sin(yaw)*10, pmy + Math.cos(yaw)*10);
    ctx.stroke();

    // Enemies on minimap
    enemies.forEach(e => {
        if(e.hp <= 0) return;
        const ex = mmX + (e.x + MAP_SIZE) * mmScale;
        const ez = mmY + (e.z + MAP_SIZE) * mmScale;
        ctx.fillStyle = '#f44';
        ctx.beginPath(); ctx.arc(ex, ez, 2, 0, Math.PI*2); ctx.fill();
    });

    // Remote player on minimap
    if(isOnline && remotePlayer && remotePlayer.alive) {
        const rx = mmX + (remotePlayer.x + MAP_SIZE) * mmScale;
        const rz = mmY + (remotePlayer.z + MAP_SIZE) * mmScale;
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath(); ctx.arc(rx, rz, 3, 0, Math.PI*2); ctx.fill();
    }

    // Damage flash
    if(player.damageFlash > 0) {
        ctx.fillStyle = `rgba(255,0,0,${player.damageFlash/30})`;
        ctx.fillRect(0,0,W,H);
    }

    // Weapon model (3D)
    renderWeapon3D();
    drawMeleeEffect2D();

    // Dash cooldown (돌격병)
    if(player.selectedClass === 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(20, H-130, 80, 14);
        ctx.fillStyle = player.dashCooldown <= 0 ? '#4f4' : '#666';
        ctx.fillRect(20, H-130, 80*(1-player.dashCooldown/classes[0].abilityCooldown), 14);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(player.dashCooldown <= 0 ? 'Shift 대시' : Math.ceil(player.dashCooldown/60)+'s', 60, H-120);
    }

    // 낫 대시 쿨다운
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-110, 80, 14);
    ctx.fillStyle = player.scytheDashCooldown <= 0 ? '#c4f' : '#666';
    ctx.fillRect(20, H-110, 80*(1-player.scytheDashCooldown/120), 14);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(player.scytheDashCooldown <= 0 ? '우클릭 낫대시' : Math.ceil(player.scytheDashCooldown/60)+'s', 60, H-100);

    // 슬라이딩 쿨다운
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-90, 80, 14);
    ctx.fillStyle = player.slideCooldown <= 0 ? '#6cf' : '#666';
    ctx.fillRect(20, H-90, 80*(1-player.slideCooldown/120), 14);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(player.sliding ? '슬라이딩!' : (player.slideCooldown <= 0 ? 'C 슬라이드' : Math.ceil(player.slideCooldown/60)+'s'), 60, H-80);

    // Controls hint
    ctx.textAlign = 'left';
    ctx.font = '10px Segoe UI';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('WASD:이동 | 좌클릭:사격 | 우클릭:조준 | C:슬라이딩 | F:근접 | 1:주무기 2:보조 | R:재장전', 20, H-10);
}

function getSkinPalette(skin) {
    if (skin.id === 'default') return null;
    const sc = shadeColor;
    return {
        bodyLight: sc(skin.colors.body, 50),
        body: skin.colors.body,
        bodyDark: sc(skin.colors.body, -40),
        bodyDarker: sc(skin.colors.body, -70),
        accentLight: sc(skin.colors.accent, 40),
        accent: skin.colors.accent,
        accentDark: sc(skin.colors.accent, -50),
        barrel: skin.colors.barrel,
        barrelDark: sc(skin.colors.barrel, -40),
        barrelDarker: sc(skin.colors.barrel, -70)
    };
}

// 실린더 기반 현실적 팔 시스템 (왼팔만)
const _skinMat = new THREE.MeshStandardMaterial({color: 0xe8b88a, roughness: 0.7, metalness: 0.0});

function buildRobloxArm() {
    const arm = new THREE.Group();

    // 손목 (피부, 실린더 - 총 그립 부분)
    const wrist = new THREE.Mesh(
        new THREE.CylinderGeometry(0.038, 0.042, 0.08, 10),
        _skinMat
    );
    wrist.position.set(0, -0.02, 0);
    arm.add(wrist);

    // 소매 커프 (입구 밴드)
    const cuffMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.7, metalness: 0.0});
    const cuff = new THREE.Mesh(
        new THREE.CylinderGeometry(0.048, 0.046, 0.025, 10),
        cuffMat
    );
    cuff.position.set(0, -0.07, 0);
    arm.add(cuff);

    // 하완 소매 (손목~팔뚝)
    const sleeveMat = new THREE.MeshStandardMaterial({color: 0x0a0a0a, roughness: 0.85, metalness: 0.0});
    const lowerSleeve = new THREE.Mesh(
        new THREE.CylinderGeometry(0.046, 0.055, 0.28, 10),
        sleeveMat
    );
    lowerSleeve.position.set(0, -0.22, 0);
    arm.add(lowerSleeve);
    const upperSleeve = new THREE.Mesh(
        new THREE.CylinderGeometry(0.055, 0.066, 0.35, 10),
        sleeveMat
    );
    upperSleeve.position.set(0, -0.54, 0);
    arm.add(upperSleeve);
    return arm;
}

// 카메라 공간 팔 설정 (AK-47 기준으로 정의, 모든 무기에 동일 적용)
const _akWrapQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI/2, 0));
const _akArmPos = new THREE.Vector3(0.08, 0.0, 0);
const _akArmQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(0.25, 0, -0.75));
// AK-47 로컬 → 카메라 공간으로 변환
const ARM_CAM_POS = _akArmPos.clone().applyQuaternion(_akWrapQuat);
const ARM_CAM_QUAT = _akWrapQuat.clone().multiply(_akArmQuat);

function attachArmsToWeapon(wrapper, wpnIdx) {
    if (wrapper.userData.armsAttached) return;
    const cfg = weaponModelConfigs[wpnIdx];
    if (!cfg || !cfg.hasArm) return;
    wrapper.userData.armsAttached = true;

    const leftArm = buildRobloxArm();

    // 카메라 공간 → 이 무기의 wrapper 로컬 공간으로 역변환
    const invQuat = new THREE.Quaternion().setFromEuler(cfg.rotOffset).invert();
    const camPos = ARM_CAM_POS.clone();
    if (cfg.armCamOffset) camPos.add(cfg.armCamOffset); // 무기별 카메라 공간 오프셋
    leftArm.position.copy(camPos.applyQuaternion(invQuat));
    leftArm.quaternion.copy(invQuat.clone().multiply(ARM_CAM_QUAT));

    wrapper.add(leftArm);
    wrapper.userData.leftHand = leftArm;
    console.log(`[3D] 왼팔 부착: ${weapons[wpnIdx]?.name || wpnIdx}`);
}

// GLB 무기 모델 로드
function initWeapon3DModels() {
    if (weaponModelsLoaded) return;
    weaponModelsLoaded = true;

    weaponModelConfigs.forEach((cfg, idx) => {
        if (!cfg) return; // 제거된 무기 스킵
        gltfLoader.load(cfg.path, (gltf) => {
            const model = gltf.scene;
            model.scale.setScalar(cfg.scale);

            // Sketchfab 모델 회전 정규화
            const sfRot = cfg.sketchfabRot || [-Math.PI/2, 0, 0];
            model.traverse(child => {
                if (child.name === 'Sketchfab_model') {
                    child.rotation.set(sfRot[0], sfRot[1], sfRot[2]);
                }
            });

            // 재질 최적화: 금속성 제거, 숨길 재질 처리
            const hideMats = cfg.hideMaterials || [];
            model.traverse(child => {
                if (child.isMesh && child.material) {
                    if (hideMats.includes(child.material.name)) {
                        child.visible = false;
                        return;
                    }
                    child.material.metalness = 0;
                    child.material.roughness = 0.75;
                    child.material.needsUpdate = true;
                }
            });

            // 바운딩 박스로 모델 중심 맞추기
            model.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            const wrapper = new THREE.Group();
            wrapper.add(model);

            // 로블록스 스타일 블록 팔 부착
            attachArmsToWeapon(wrapper, idx);

            wrapper.userData.idlePos = cfg.idlePos.clone();
            wrapper.userData.adsPos = cfg.adsPos.clone();
            wrapper.userData.config = cfg;

            weaponModels3D[idx] = wrapper;
            console.log(`[3D] 무기 모델 로드 완료: ${weapons[idx]?.name || idx} (${cfg.path})`);
        },
        undefined,
        (err) => console.error(`[3D] 모델 로드 실패: ${cfg.path}`, err));
    });

}

// 스킨 적용 (GLB 모델)
function applyWeaponSkin3D(wpnIdx) {
    const skin = getSkinForWeapon(wpnIdx);
    const pal = getSkinPalette(skin);
    const model = weaponModels3D[wpnIdx];
    if (!model || !pal) return;
    model.traverse(child => {
        if (child.isMesh && child.material) {
            // GLB 모델은 기본 색상 유지, 스킨 틴트 적용
            const origColor = child.material.color.clone();
            const skinTint = new THREE.Color(pal.body || '#555');
            child.material.color.copy(origColor).lerp(skinTint, 0.3);
        }
    });
}


// ====== 3D 무기 렌더링 ======
function renderWeapon3D() {
    if (gameState !== 'playing') {
        weaponRenderer.clear();
        return;
    }

    // 모델 로드 시작
    if (!weaponModelsLoaded) initWeapon3DModels();

    const wpnIdx = player.weapon;
    if (wpnIdx >= weapons.length) { weaponRenderer.clear(); return; }

    // 모델이 아직 로드 안됐으면 대기
    if (!weaponModels3D[wpnIdx]) {
        weaponRenderer.clear();
        return;
    }

    // 무기 교체
    if (currentWeapon3D !== weaponModels3D[wpnIdx]) {
        if (currentWeapon3D) weaponScene.remove(currentWeapon3D);
        currentWeapon3D = weaponModels3D[wpnIdx];
        weaponScene.add(currentWeapon3D);
    }

    // 스나이퍼 ADS: 3D 모델 완전 제거 (2D 스코프 오버레이로 대체)
    if (wpnIdx === 2 && player.scope) {
        weaponScene.remove(currentWeapon3D);
        weaponRenderer.clear(true, true, true);
        return;
    } else {
        if (currentWeapon3D && !weaponScene.children.includes(currentWeapon3D)) {
            weaponScene.add(currentWeapon3D);
        }
    }

    // 애니메이션 계산
    const t = Date.now();
    const isMoving = keys['KeyW'] || keys['KeyA'] || keys['KeyS'] || keys['KeyD'];
    const bobX = isMoving ? Math.sin(t * 0.008) * 0.012 : Math.sin(t * 0.002) * 0.002;
    const bobY = isMoving ? Math.abs(Math.cos(t * 0.008)) * 0.015 : Math.cos(t * 0.003) * 0.002;
    const recoilKick = player.shootCooldown > 0 ? player.shootCooldown * 0.003 : 0;
    const adsLerp = player.adsAmount || 0;

    // 위치 (idle ↔ ADS 보간)
    const cfg = currentWeapon3D.userData.config || weaponModelConfigs[wpnIdx] || {};
    const idleP = currentWeapon3D.userData.idlePos || new THREE.Vector3(0.20, -0.18, -0.50);
    const adsP = currentWeapon3D.userData.adsPos || new THREE.Vector3(0.0, -0.12, -0.38);

    currentWeapon3D.position.lerpVectors(idleP, adsP, adsLerp);
    currentWeapon3D.position.x += bobX * (1 - adsLerp * 0.7);
    currentWeapon3D.position.y += bobY * (1 - adsLerp * 0.7);
    currentWeapon3D.position.z -= recoilKick * 0.06;

    // 회전 - GLB 모델 기본 방향 + 반동
    const rot = cfg.rotOffset || new THREE.Euler(0, Math.PI, 0);
    currentWeapon3D.rotation.set(rot.x, rot.y, rot.z);
    currentWeapon3D.rotation.x += recoilKick * 0.03;

    // 머즐 플래시
    if (player.muzzleFlash > 0) {
        muzzleFlashLight.position.copy(currentWeapon3D.position);
        muzzleFlashLight.position.z -= 0.3;
        muzzleFlashLight.intensity = (player.muzzleFlash / 4) * 3.0;
        muzzleFlashLight.color.set(weapons[wpnIdx].color || '#ffaa44');
    } else {
        muzzleFlashLight.intensity = 0;
    }

    weaponRenderer.render(weaponScene, weaponCamera);
}

// 근접 공격 2D 이펙트 (F키)
function drawMeleeEffect2D() {
    if (player.meleeActive && player.weapon !== 5) {
        const prog = 1 - player.meleeTime / 12;
        ctx.save();
        ctx.translate(W/2, H/2);
        ctx.rotate(-Math.PI/4 + prog * Math.PI * 0.7);
        ctx.strokeStyle = `rgba(255,220,100,${0.7 - prog*0.5})`;
        ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 20;
        ctx.lineWidth = 8;
        ctx.beginPath(); ctx.arc(0, -35, 60, -Math.PI*0.3, Math.PI*0.3); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

function drawTitle() {
    // BG
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0,0,W,H);

    // Animated bg
    const t = Date.now()*0.001;
    for(let i = 0; i < 50; i++) {
        const x = (Math.sin(i*1.3+t)*0.5+0.5)*W;
        const y = (Math.cos(i*0.7+t*0.5)*0.5+0.5)*H;
        ctx.fillStyle = `rgba(255,50,50,${0.05+Math.sin(i+t)*0.03})`;

// ====== SKIN SELECT SCREEN ======
let skinSelectWeapon = 0; // 현재 선택 중인 무기 인덱스
let skinSelectScroll = 0;

function drawSkinSelect() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0,0,W,H);
    canvas.style.cursor = 'default';

    // 방문 시 seenSkinReward 업데이트
    progression.seenSkinReward = Math.max(progression.seenSkinReward, progression.unlockedSkins.length - 1);
    saveProgression();

    ctx.textAlign = 'center';
    ctx.font = 'bold 36px Segoe UI';
    ctx.fillStyle = '#cc66ff';
    ctx.fillText('🎨 스킨 선택', W/2, 45);

    // 무기 탭
    ctx.font = 'bold 13px Segoe UI';
    const tabW = 110, tabH = 32;
    for (let i = 0; i < 7; i++) {
        const tx = 30 + i * (tabW + 6);
        const ty = 60;
        const isActive = skinSelectWeapon === i;
        const hover = canvasMouseX >= tx && canvasMouseX <= tx+tabW && canvasMouseY >= ty && canvasMouseY <= ty+tabH;
        ctx.fillStyle = isActive ? 'rgba(200,100,255,0.35)' : (hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)');
        ctx.strokeStyle = isActive ? '#cc66ff' : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.fillRect(tx, ty, tabW, tabH);
        ctx.strokeRect(tx, ty, tabW, tabH);
        ctx.fillStyle = isActive ? '#fff' : '#aaa';
        ctx.fillText(weapons[i].name, tx + tabW/2, ty + 22);
        if(hover) canvas.style.cursor = 'pointer';
    }

    // 현재 장착 스킨
    const equippedId = progression.equippedSkins[skinSelectWeapon] || 'default';
    const equippedSkin = GUN_SKINS.find(s => s.id === equippedId) || GUN_SKINS[0];
    ctx.font = '14px Segoe UI';
    ctx.fillStyle = '#888';
    ctx.fillText(`현재 장착: ${equippedSkin.name}`, W/2, 115);

    // 스킨 카드 그리기
    const cardW = 160, cardH = 200, cardGap = 15;
    const cardsPerRow = 5;
    const startX = (W - (cardW * cardsPerRow + cardGap * (cardsPerRow-1))) / 2;
    const startY = 135;

    GUN_SKINS.forEach((skin, i) => {
        const row = Math.floor(i / cardsPerRow);
        const col = i % cardsPerRow;
        const cx = startX + col * (cardW + cardGap);
        const cy = startY + row * (cardH + cardGap);

        if (cy > H) return; // 화면 밖

        const unlocked = progression.unlockedSkins.includes(skin.id);
        const equipped = equippedId === skin.id;
        const hover = canvasMouseX >= cx && canvasMouseX <= cx+cardW && canvasMouseY >= cy && canvasMouseY <= cy+cardH;

        // 카드 배경
        ctx.fillStyle = equipped ? 'rgba(200,100,255,0.2)' : (unlocked ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.4)');
        ctx.strokeStyle = equipped ? '#cc66ff' : (unlocked ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)');
        ctx.lineWidth = equipped ? 3 : 1;
        ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 8); ctx.fill(); ctx.stroke();
        if(hover && unlocked) canvas.style.cursor = 'pointer';

        // 총 미리보기 (컬러 박스)
        const prevY = cy + 20;
        ctx.fillStyle = skin.colors.body;
        ctx.fillRect(cx + 20, prevY, cardW - 40, 14);
        ctx.fillStyle = skin.colors.accent;
        ctx.fillRect(cx + 20, prevY + 14, cardW - 40, 6);
        ctx.fillStyle = skin.colors.barrel;
        ctx.fillRect(cx + 20, prevY + 20, (cardW - 40) * 0.7, 10);

        // 미리보기: 총 모양 그리기
        ctx.save();
        ctx.translate(cx + cardW/2, cy + 75);
        // 총열
        ctx.fillStyle = skin.colors.barrel;
        ctx.fillRect(-50, -4, 60, 8);
        // 본체
        ctx.fillStyle = skin.colors.body;
        ctx.fillRect(-20, -10, 55, 20);
        // 악센트
        ctx.fillStyle = skin.colors.accent;
        ctx.fillRect(-20, -10, 55, 3);
        ctx.fillRect(10, 5, 20, 12);
        ctx.restore();

        // 스킨 이름
        ctx.textAlign = 'center';
        ctx.font = 'bold 15px Segoe UI';
        ctx.fillStyle = unlocked ? '#fff' : '#555';
        ctx.fillText(skin.name, cx + cardW/2, cy + 120);

        ctx.font = '11px Segoe UI';
        ctx.fillStyle = unlocked ? '#aaa' : '#444';
        ctx.fillText(skin.desc, cx + cardW/2, cy + 140);

        if (!unlocked) {
            // 잠금 표시
            ctx.font = 'bold 28px Segoe UI';
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillText('🔒', cx + cardW/2, cy + 175);
            ctx.font = '11px Segoe UI';
            ctx.fillStyle = '#666';
            ctx.fillText(`Lv.${skin.unlockLevel} 해금`, cx + cardW/2, cy + 195);
        } else if (equipped) {
            ctx.font = 'bold 12px Segoe UI';
            ctx.fillStyle = '#cc66ff';
            ctx.fillText('✓ 장착 중', cx + cardW/2, cy + 175);
        } else {
            ctx.font = '12px Segoe UI';
            ctx.fillStyle = '#888';
            ctx.fillText('클릭하여 장착', cx + cardW/2, cy + 175);
        }
    });

    // 돌아가기 버튼
    ctx.font = '16px Segoe UI';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.fillText('Esc: 돌아가기', W/2, H - 20);
}
