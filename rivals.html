<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>라이벌 FPS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0a0a1a;
    display:flex; justify-content:center; align-items:center;
    height:100vh; overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    touch-action:none;overscroll-behavior:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
canvas {
    border-radius:8px;
    box-shadow:0 0 60px rgba(255,50,50,.3);
    max-width:100vw;
    max-height:100vh;
}
@media(min-width:1025px){#fpsControls{display:none!important}}
@media(max-width:768px){
  body{flex-direction:column;justify-content:flex-start;align-items:center}
  canvas{max-height:52vh!important;max-width:100vw!important;border-radius:0!important;box-shadow:none!important}
}
/* ===== 모바일 FPS HUD ===== */
#fpsControls{display:none;position:fixed;bottom:0;left:0;right:0;height:48vh;z-index:1000;touch-action:none;pointer-events:none}

/* ── 이동 조이스틱 - 좌측 상단(높이 올림) ── */
.fps-joy{position:absolute;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none}
.fps-joy-knob{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.15);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#fps-joy-left{left:14px;top:4px}
#fps-joy-left .fps-joy-knob{background:rgba(100,180,255,0.25);border-color:rgba(100,180,255,0.2)}

/* ── 시점 조이스틱 - 우측 상단(높이 올림) ── */
#fps-joy-right{right:14px;top:4px}

/* ── ★ 사격 버튼 - 가운데 크게 ── */
#fps-shoot{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);width:88px;height:88px;border-radius:50%;background:radial-gradient(circle,rgba(255,60,60,0.65),rgba(200,20,20,0.45));border:3px solid rgba(255,100,100,0.5);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;box-shadow:0 0 24px rgba(255,40,40,0.25)}
#fps-shoot:active{background:radial-gradient(circle,rgba(255,80,80,0.95),rgba(255,30,30,0.8));transform:translate(-50%,-50%) scale(0.9);box-shadow:0 0 36px rgba(255,40,40,0.5)}

/* ── 점프 - 사격 왼쪽 위, 겹치지 않게 ── */
#fps-jump{position:absolute;left:50%;top:45%;transform:translate(calc(-50% - 72px),calc(-50% - 20px));width:46px;height:46px;border-radius:50%;background:rgba(80,140,255,0.25);border:1.5px solid rgba(80,140,255,0.2);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6);font-size:15px}
#fps-jump:active{background:rgba(80,140,255,0.65);color:#fff}

/* ── Save & Quit - 사격 아래 ── */
#fps-savequit{position:absolute;left:50%;transform:translateX(-50%);top:calc(45% + 56px);height:28px;padding:0 14px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);font-size:9px;font-weight:700;letter-spacing:0.5px}
#fps-savequit:active{background:rgba(255,80,80,0.4);color:#fff;border-color:rgba(255,80,80,0.4)}

/* ── 보조 버튼 - 맨 아래 한 줄 ── */
.fps-sub{pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:9px;font-weight:700;position:absolute;border-radius:8px;width:52px;height:26px;bottom:6px}
.fps-sub:active{color:#fff}
#fps-reload{left:8px;background:rgba(255,200,50,0.1);border:1px solid rgba(255,200,50,0.1)}
#fps-reload:active{background:rgba(255,200,50,0.5)}
#fps-dash{left:66px;background:rgba(255,150,50,0.1);border:1px solid rgba(255,150,50,0.1)}
#fps-dash:active{background:rgba(255,150,50,0.5)}
#fps-slide{left:124px;background:rgba(100,200,255,0.1);border:1px solid rgba(100,200,255,0.1)}
#fps-slide:active{background:rgba(100,200,255,0.5)}
#fps-grenade{right:64px;background:rgba(80,200,80,0.1);border:1px solid rgba(80,200,80,0.1)}
#fps-grenade:active{background:rgba(80,200,80,0.5)}
#fps-ads{right:8px;background:rgba(180,100,255,0.1);border:1px solid rgba(180,100,255,0.1)}
#fps-ads:active,#fps-ads.on{background:rgba(180,100,255,0.5);color:#fff}

/* ── 무기 전환 바 ── */
.fps-weapon-bar{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);display:flex;gap:3px;pointer-events:auto;touch-action:none}
.fps-wslot{width:36px;height:24px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:12px}
.fps-wslot.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.4);color:#fff}
#crosshair {
    position:fixed; pointer-events:none; z-index:999;
    width:30px; height:30px;
    display:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fpsControls">
  <!-- 이동 조이스틱 (좌) -->
  <div class="fps-joy" id="fps-joy-left"><div class="fps-joy-knob"></div></div>
  <!-- 시점 조이스틱 (우) -->
  <div class="fps-joy" id="fps-joy-right"><div class="fps-joy-knob"></div></div>
  <!-- 무기바 -->
  <div class="fps-weapon-bar" id="fpsWeaponBar">
    <div class="fps-wslot active" data-slot="0">🔫</div>
    <div class="fps-wslot" data-slot="1">🔫</div>
    <div class="fps-wslot" data-slot="2">🗡️</div>
    <div class="fps-wslot" data-slot="3">💣</div>
  </div>
  <!-- 핵심 버튼 -->
  <div id="fps-shoot">🎯</div>
  <div id="fps-jump">⬆</div>
  <div id="fps-savequit">💾 SAVE & QUIT</div>
  <!-- 보조 버튼 -->
  <div class="fps-sub" id="fps-reload">장전</div>
  <div class="fps-sub" id="fps-dash">대시</div>
  <div class="fps-sub" id="fps-slide">슬라</div>
  <div class="fps-sub" id="fps-grenade">수류</div>
  <div class="fps-sub" id="fps-ads">조준</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 960, H = 640;
canvas.width = W; canvas.height = H;

// ====== SOUND SYSTEM (미리 캐시된 버퍼 방식) ======
let audioCtx = null;
const soundBuffers = {};
let soundReady = false;

function initAudio() {
    if(audioCtx) { if(audioCtx.state === 'suspended') audioCtx.resume(); return; }
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        // 모든 사운드를 미리 버퍼로 생성
        const sr = audioCtx.sampleRate;
        const make = (len, fn) => {
            const buf = audioCtx.createBuffer(1, Math.floor(sr * len), sr);
            const d = buf.getChannelData(0);
            for(let i = 0; i < d.length; i++) fn(d, i, d.length, sr);
            return buf;
        };
        // 돌격소총
        soundBuffers.rifle = make(0.12, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 3);
            d[i] = e * (Math.random()*0.6-0.3 + 0.4*Math.sin(150*2*Math.PI*t*Math.pow(1-i/n,2)));
        });
        // 샷건
        soundBuffers.shotgun = make(0.18, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 2);
            d[i] = e * (Math.random()*1.2-0.6 + 0.3*Math.sin(60*2*Math.PI*t));
        });
        // 스나이퍼
        soundBuffers.sniper = make(0.35, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 1.5);
            const crack = i < n*0.1 ? (Math.random()*2-1)*Math.pow(1-i/(n*0.1),2) : 0;
            d[i] = e * (0.5*Math.sin(180*2*Math.PI*t*Math.pow(1-i/n,1.5)) + crack*0.8)
                 + (i > n*0.4 ? 0.1*Math.sin(60*2*Math.PI*t)*Math.pow(1-i/n,3) : 0);
        });
        // 권총
        soundBuffers.pistol = make(0.08, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 4);
            d[i] = e * (Math.random()*0.5-0.25 + 0.3*Math.sin(280*2*Math.PI*i/sr));
        });
        // 로켓
        soundBuffers.rocket = make(0.3, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 1.5);
            const f = 60 + 140*(i/n);
            d[i] = e * (0.4*Math.sin(f*2*Math.PI*t) + (Math.random()*0.4-0.2)*e);
        });
        // 낫
        soundBuffers.melee = make(0.12, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 2);
            d[i] = e * 0.3 * Math.sin((400-250*i/n)*2*Math.PI*t);
        });
        // 수류탄
        soundBuffers.grenade = make(0.1, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 3);
            d[i] = e * 0.3 * Math.sin(200*2*Math.PI*i/sr);
        });
        // 폭발
        soundBuffers.explosion = make(0.4, (d,i,n,sr) => {
            const t = i/sr, e = Math.pow(1-i/n, 1.5);
            d[i] = e * (Math.random()*1.4-0.7 + 0.3*Math.sin(40*2*Math.PI*t));
        });
        // 히트
        soundBuffers.hit = make(0.06, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 4);
            d[i] = e * 0.4 * Math.sin(800*2*Math.PI*i/sr * Math.pow(1-i/n, 2));
        });
        // 헤드샷
        soundBuffers.headshot = make(0.2, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 2);
            d[i] = e * 0.4 * Math.sin(1200*2*Math.PI*i/sr * Math.pow(1-i/n*0.3, 1));
        });
        // 킬
        soundBuffers.kill = make(0.3, (d,i,n,sr) => {
            const t = i/sr;
            const notes = [523, 659, 784];
            const noteIdx = Math.min(2, Math.floor(t/0.1));
            const noteT = t - noteIdx*0.1;
            const e = noteT < 0.1 ? Math.pow(1-noteT/0.1, 2) : 0;
            d[i] = e * 0.3 * Math.sin(notes[noteIdx]*2*Math.PI*t);
        });
        // 리로드
        soundBuffers.reload = make(0.15, (d,i,n,sr) => {
            const t = i/sr;
            if(t < 0.03) d[i] = 0.3*Math.sin(600*2*Math.PI*t)*Math.pow(1-t/0.03, 3);
            else if(t > 0.08 && t < 0.12) d[i] = 0.3*Math.sin(400*2*Math.PI*t)*Math.pow(1-(t-0.08)/0.04, 3);
            else d[i] = 0;
        });
        // 대시
        soundBuffers.dash = make(0.1, (d,i,n,sr) => {
            const e = Math.pow(1-i/n, 2);
            d[i] = e * 0.25 * Math.sin((200+300*i/n)*2*Math.PI*i/sr);
        });
        // 데미지
        soundBuffers.damage = make(0.06, (d,i,n,sr) => {
            d[i] = (Math.random()*0.8-0.4) * Math.pow(1-i/n, 4);
        });
        soundReady = true;
    } catch(e) { console.log('Audio init failed:', e); }
}

let lastSoundTime = {};
function playSound(type, volume) {
    if(!soundReady || !audioCtx || !soundBuffers[type]) return;
    try {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        // 같은 소리 50ms 내 중복 방지
        const now = performance.now();
        if(lastSoundTime[type] && now - lastSoundTime[type] < 50) return;
        lastSoundTime[type] = now;

        const src = audioCtx.createBufferSource();
        src.buffer = soundBuffers[type];
        const g = audioCtx.createGain();
        g.gain.value = volume || 0.3;
        src.connect(g);
        g.connect(audioCtx.destination);
        src.start(0);
    } catch(e) {}
}

// ====== PROGRESSION SYSTEM (localStorage 기반) ======
const PROGRESSION_KEY = 'rivals_progression';
const progression = loadProgression();

function loadProgression() {
    const ALL_SKIN_IDS = ['default','crimson','arctic','neon','golden','phantom','dragon','diamond','inferno','galaxy','legendary'];
    try {
        const saved = localStorage.getItem(PROGRESSION_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            // Giyl Cho v2 마이그레이션: 레벨 100, 모든 스킨 해금
            if (!data.migrated_v2) {
                data.level = 100;
                data.xp = 0;
                data.totalKills = Math.max(data.totalKills || 0, 654);
                data.totalDeaths = Math.max(data.totalDeaths || 0, 38);
                data.unlockedSkins = ALL_SKIN_IDS.slice();
                data.migrated_v2 = true;
                try { localStorage.setItem(PROGRESSION_KEY, JSON.stringify(data)); } catch(e) {}
            }
            return {
                xp: data.xp || 0,
                level: data.level || 1,
                totalKills: data.totalKills || 0,
                totalDeaths: data.totalDeaths || 0,
                totalGames: data.totalGames || 0,
                unlockedSkins: data.unlockedSkins || ['default'],
                equippedSkins: data.equippedSkins || {0:'default',1:'default',2:'default',3:'default',4:'default',5:'default',6:'default'},
                seenSkinReward: data.seenSkinReward || 0,
                migrated_v2: data.migrated_v2 || false
            };
        }
    } catch(e) {}
    // 첫 방문: 레벨 100, 모든 스킨 해금
    const fresh = { xp:0, level:100, totalKills:654, totalDeaths:38, totalGames:0,
             unlockedSkins: ALL_SKIN_IDS.slice(),
             equippedSkins:{0:'default',1:'default',2:'default',3:'default',4:'default',5:'default',6:'default'},
             seenSkinReward:0, migrated_v2:true };
    try { localStorage.setItem(PROGRESSION_KEY, JSON.stringify(fresh)); } catch(e) {}
    return fresh;
}

function saveProgression() {
    try { localStorage.setItem(PROGRESSION_KEY, JSON.stringify(progression)); } catch(e) {}
}

function xpForLevel(lv) { return 80 + (lv - 1) * 30; }

function addXP(amount) {
    progression.xp += amount;
    let leveledUp = false;
    while (progression.xp >= xpForLevel(progression.level)) {
        progression.xp -= xpForLevel(progression.level);
        progression.level++;
        leveledUp = true;
        // 10레벨마다 스킨 보상
        if (progression.level % 10 === 0) {
            const skinIdx = Math.floor(progression.level / 10);
            if (skinIdx < GUN_SKINS.length && !progression.unlockedSkins.includes(GUN_SKINS[skinIdx].id)) {
                progression.unlockedSkins.push(GUN_SKINS[skinIdx].id);
            }
        }
    }
    saveProgression();
    if (leveledUp) {
        levelUpAnim = 120; // 2초 애니메이션
        playSound('kill', 0.5);
    }
    return leveledUp;
}

let levelUpAnim = 0;
let xpGainAnim = []; // [{amount, time}]
let pendingSkinReward = null; // 스킨 보상 팝업

// ====== GUN SKINS ======
const GUN_SKINS = [
    { id:'default', name:'기본', desc:'기본 스킨', colors:{body:'#555',accent:'#777',barrel:'#444'}, unlockLevel:0 },
    { id:'crimson', name:'크림슨', desc:'붉은 분노', colors:{body:'#8b0000',accent:'#ff2222',barrel:'#660000'}, unlockLevel:10 },
    { id:'arctic', name:'아틱', desc:'극지방 위장', colors:{body:'#b8d4e3',accent:'#ffffff',barrel:'#8aafc4'}, unlockLevel:20 },
    { id:'neon', name:'네온', desc:'사이버펑크 네온', colors:{body:'#1a1a2e',accent:'#00ff88',barrel:'#0f0f23'}, unlockLevel:30 },
    { id:'golden', name:'골든', desc:'황금 전설', colors:{body:'#daa520',accent:'#ffd700',barrel:'#b8860b'}, unlockLevel:40 },
    { id:'phantom', name:'팬텀', desc:'유령의 검은 안개', colors:{body:'#1a0a2e',accent:'#8844ff',barrel:'#0d0520'}, unlockLevel:50 },
    { id:'dragon', name:'드래곤', desc:'용의 불꽃', colors:{body:'#8b2500',accent:'#ff6600',barrel:'#5c1a00'}, unlockLevel:60 },
    { id:'diamond', name:'다이아몬드', desc:'최고의 영광', colors:{body:'#88ccff',accent:'#ffffff',barrel:'#55aaee'}, unlockLevel:70 },
    { id:'inferno', name:'인페르노', desc:'지옥불', colors:{body:'#330000',accent:'#ff4400',barrel:'#220000'}, unlockLevel:80 },
    { id:'galaxy', name:'갤럭시', desc:'우주의 신비', colors:{body:'#0a0a3e',accent:'#cc66ff',barrel:'#050530'}, unlockLevel:90 },
    { id:'legendary', name:'레전더리', desc:'전설의 무기', colors:{body:'#2a0a00',accent:'#ff0044',barrel:'#1a0500'}, unlockLevel:100 }
];

function getSkinForWeapon(weaponIdx) {
    const skinId = progression.equippedSkins[weaponIdx] || 'default';
    return GUN_SKINS.find(s => s.id === skinId) || GUN_SKINS[0];
}

// ====== RANKS ======
const RANKS = [
    { name:'브론즈 V', min:1, color:'#cd7f32', icon:'🥉' },
    { name:'브론즈 IV', min:3, color:'#cd7f32', icon:'🥉' },
    { name:'브론즈 III', min:5, color:'#cd7f32', icon:'🥉' },
    { name:'브론즈 II', min:7, color:'#cd7f32', icon:'🥉' },
    { name:'브론즈 I', min:9, color:'#cd7f32', icon:'🥉' },
    { name:'실버 V', min:11, color:'#c0c0c0', icon:'⚪' },
    { name:'실버 IV', min:14, color:'#c0c0c0', icon:'⚪' },
    { name:'실버 III', min:17, color:'#c0c0c0', icon:'⚪' },
    { name:'실버 II', min:20, color:'#c0c0c0', icon:'⚪' },
    { name:'실버 I', min:23, color:'#c0c0c0', icon:'⚪' },
    { name:'골드 V', min:26, color:'#ffd700', icon:'🥇' },
    { name:'골드 IV', min:30, color:'#ffd700', icon:'🥇' },
    { name:'골드 III', min:34, color:'#ffd700', icon:'🥇' },
    { name:'골드 II', min:38, color:'#ffd700', icon:'🥇' },
    { name:'골드 I', min:42, color:'#ffd700', icon:'🥇' },
    { name:'플래티넘 V', min:46, color:'#00cccc', icon:'💎' },
    { name:'플래티넘 IV', min:50, color:'#00cccc', icon:'💎' },
    { name:'플래티넘 III', min:55, color:'#00cccc', icon:'💎' },
    { name:'플래티넘 II', min:60, color:'#00cccc', icon:'💎' },
    { name:'플래티넘 I', min:65, color:'#00cccc', icon:'💎' },
    { name:'다이아 V', min:70, color:'#55aaff', icon:'💠' },
    { name:'다이아 IV', min:75, color:'#55aaff', icon:'💠' },
    { name:'다이아 III', min:80, color:'#55aaff', icon:'💠' },
    { name:'다이아 II', min:85, color:'#55aaff', icon:'💠' },
    { name:'다이아 I', min:90, color:'#55aaff', icon:'💠' },
    { name:'마스터', min:95, color:'#cc44ff', icon:'👑' },
    { name:'그랜드마스터', min:100, color:'#ff4444', icon:'🔥' }
];

function getCurrentRank() {
    let rank = RANKS[0];
    for (const r of RANKS) {
        if (progression.level >= r.min) rank = r;
    }
    return rank;
}

// ====== GAME STATE ======
let gameState = 'title'; // title, classSelect, playing, dead, scoreboard, lobby, waiting, skinSelect
let mouseX = W/2, mouseY = H/2;
let mouseLocked = false;
let yaw = 0, pitch = 0;
const SENSITIVITY = 0.0008;
let frameCount = 0;
let isMobile = (('ontouchstart' in window || navigator.maxTouchPoints > 0) && window.innerWidth <= 1024);

// ====== NETWORK ======
let ws = null;
let isOnline = false;
let isHost = false;
let roomCode = '';
let myPlayerId = '';
let remotePlayer = null;
let networkState = 'disconnected'; // disconnected, connecting, lobby, waiting, playing
let roomCodeInput = '';
let lobbyMode = ''; // 'create' or 'join'
let myClassSelected = false;
let netMessage = '';
let netMessageTimer = 0;
const SERVER_URL = 'wss://rivals-server-2.onrender.com';

function connectToServer(callback) {
    if(ws && ws.readyState <= 1) { if(callback) callback(); return; }
    netMessage = '서버 연결 중...';
    netMessageTimer = 999;
    ws = new WebSocket(SERVER_URL);
    networkState = 'connecting';

    ws.onopen = () => {
        networkState = 'lobby';
        netMessage = '서버 연결 완료!';
        netMessageTimer = 120;
        if(callback) callback();
    };
    ws.onclose = () => {
        networkState = 'disconnected';
        if(isOnline && gameState === 'playing') {
            netMessage = '연결이 끊겼습니다';
            netMessageTimer = 300;
            isOnline = false;
            // Fill remote player slot with bot
            if(remotePlayer) { remotePlayer = null; while(enemies.length < 8) spawnEnemy(); }
        }
    };
    ws.onerror = () => {
        netMessage = '서버 연결 실패!';
        netMessageTimer = 300;
        networkState = 'disconnected';
    };
    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleNetworkMessage(msg);
    };
}

function sendMsg(obj) {
    if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function initRemotePlayer(cls) {
    remotePlayer = {
        x:0, z:0, y:0, yaw:0, pitch:0,
        hp:100, maxHp:100, armor:0,
        kills:0, deaths:0,
        selectedClass: cls || 0,
        weapon:0, name:'상대방',
        color:'#ffaa00', muzzleFlash:0,
        spawnProtection:0,
        prevX:0, prevZ:0, prevY:0,
        targetX:0, targetZ:0, targetY:0,
        interpT:1, alive:true
    };
}

function handleNetworkMessage(msg) {
    switch(msg.type) {
        case 'room_created':
            roomCode = msg.code;
            myPlayerId = msg.playerId;
            mapSeed = msg.mapSeed;
            isHost = true;
            gameState = 'waiting';
            netMessage = '';
            break;
        case 'room_joined':
            roomCode = msg.code;
            myPlayerId = msg.playerId;
            mapSeed = msg.mapSeed;
            isHost = false;
            gameState = 'classSelect';
            netMessage = '방에 참가했습니다! 클래스를 선택하세요.';
            netMessageTimer = 180;
            break;
        case 'player_joined':
            netMessage = '상대방이 입장했습니다!';
            netMessageTimer = 120;
            // Both players present, go to class select
            gameState = 'classSelect';
            break;
        case 'opponent_class':
            if(!remotePlayer) initRemotePlayer(msg.selectedClass);
            remotePlayer.selectedClass = msg.selectedClass;
            remotePlayer.weapon = classes[msg.selectedClass].weapon;
            remotePlayer.maxHp = classes[msg.selectedClass].hp;
            remotePlayer.color = classes[msg.selectedClass].color;
            break;
        case 'start_game': {
            isOnline = true;
            if(!remotePlayer) initRemotePlayer(0);
            generateMap();
            enemies.length = 0;
            // 온라인 모드에서는 AI 봇 없음 (1v1)
            gameState = 'playing';
            if(!isMobile) { try { canvas.requestPointerLock(); } catch(e) {} }
            break;
        }
        case 'player_state':
            if(!remotePlayer) initRemotePlayer(msg.selectedClass || 0);
            remotePlayer.prevX = remotePlayer.x;
            remotePlayer.prevZ = remotePlayer.z;
            remotePlayer.prevY = remotePlayer.y;
            remotePlayer.targetX = msg.x;
            remotePlayer.targetZ = msg.z;
            remotePlayer.targetY = msg.y;
            remotePlayer.interpT = 0;
            remotePlayer.yaw = msg.yaw;
            remotePlayer.hp = msg.hp;
            remotePlayer.armor = msg.armor;
            remotePlayer.weapon = msg.weapon;
            remotePlayer.selectedClass = msg.selectedClass;
            remotePlayer.kills = msg.kills;
            remotePlayer.deaths = msg.deaths;
            remotePlayer.muzzleFlash = msg.muzzleFlash;
            remotePlayer.spawnProtection = msg.spawnProtection;
            remotePlayer.color = classes[msg.selectedClass] ? classes[msg.selectedClass].color : '#ffaa00';
            remotePlayer.maxHp = classes[msg.selectedClass] ? classes[msg.selectedClass].hp : 100;
            remotePlayer.alive = msg.hp > 0;
            break;
        case 'shoot':
            // Show remote player's muzzle flash and tracer
            if(remotePlayer) {
                remotePlayer.muzzleFlash = 4;
                if(msg.tx !== undefined) {
                    bullets.push({ x:msg.x, y:msg.y, z:msg.z, tx:msg.tx, ty:msg.ty, tz:msg.tz, life:3, tracer:true, color:weapons[msg.weapon]?.color || '#ff0' });
                }
            }
            break;
        case 'hit':
            // Remote player hit us
            if(player.spawnProtection <= 0 && player.hp > 0) {
                let dmg = msg.damage;
                if(dmg < 999 && player.armor > 0) {
                    const armorDmg = Math.min(player.armor, dmg*0.6);
                    player.armor -= armorDmg;
                    dmg *= 0.4;
                }
                player.hp -= dmg;
                player.damageFlash = 15;
                playSound('damage', 0.3);
                addDamageNumber(player.x, player.y+16, player.z, Math.round(dmg), msg.headshot);
                if(player.hp <= 0) {
                    player.deaths++;
                    progression.totalDeaths++;
                    onSessionDeath();
                    gameState = 'dead';
                    player.respawnTimer = 180;
                    sendMsg({ type: 'kill', victimName: '나', weapon: msg.weaponName || '무기' });
                }
            }
            break;
        case 'kill':
            // 상대방이 죽었음 = 내가 킬함 → 내 킬 카운트 증가
            player.kills++;
            onSessionKill();
            const killNow = Date.now();
            if(killNow - player.lastKillTime < 3000) player.killStreak++;
            else player.killStreak = 1;
            player.lastKillTime = killNow;
            if(msg.victimName) {
                addKillFeed('나', msg.victimName, msg.weapon);
            }
            break;
        case 'bot_states':
            if(!isHost && msg.bots) {
                // Sync bot data from host
                while(enemies.length < msg.bots.length) {
                    enemies.push({ x:0,z:0,y:0,vx:0,vz:0,vy:0,hp:100,maxHp:100,armor:0,
                        class:0,weapon:0,name:'Bot',color:'#f44',shootCooldown:0,muzzleFlash:0,
                        accuracy:0.3,reactionTime:60,state:'patrol',stateTimer:0,target:null,
                        targetX:0,targetZ:0,strafeDir:1,strafeTimer:0,kills:0,deaths:0,
                        spawnProtection:0,yaw:0,speed:2,onGround:true });
                }
                while(enemies.length > msg.bots.length) enemies.pop();
                msg.bots.forEach((b, i) => {
                    if(!enemies[i]) return;
                    enemies[i].x = b.x; enemies[i].z = b.z; enemies[i].y = b.y;
                    enemies[i].yaw = b.yaw; enemies[i].hp = b.hp; enemies[i].armor = b.armor;
                    enemies[i].class = b.cls; enemies[i].weapon = b.weapon;
                    enemies[i].name = b.name; enemies[i].color = b.color;
                    enemies[i].muzzleFlash = b.muzzleFlash;
                    enemies[i].kills = b.kills; enemies[i].deaths = b.deaths;
                    enemies[i].spawnProtection = b.spawnProtection;
                    enemies[i].maxHp = classes[b.cls] ? classes[b.cls].hp : 100;
                });
            }
            break;
        case 'bot_hit':
            // Guest hit a bot, host applies damage
            if(isHost && msg.botIdx !== undefined && enemies[msg.botIdx]) {
                const e = enemies[msg.botIdx];
                if(e.hp <= 0 || e.spawnProtection > 0) break;
                let dmg = msg.damage;
                if(dmg < 999 && e.armor > 0) {
                    const armorDmg = Math.min(e.armor, dmg*0.6);
                    e.armor -= armorDmg;
                    dmg *= 0.4;
                }
                e.hp -= dmg;
                addDamageNumber(e.x, e.y+16, e.z, Math.round(dmg), msg.headshot);
                for(let i=0;i<5;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, e.color, 15);
                if(e.hp <= 0) {
                    // Attribute kill to remote player
                    if(remotePlayer) remotePlayer.kills++;
                    e.deaths++;
                    addKillFeed(remotePlayer ? remotePlayer.name : '상대방', e.name, msg.weaponName || '무기');
                    for(let i=0;i<20;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, e.color, 30, 3);
                    setTimeout(() => {
                        const sp = spawnPoints[Math.floor(seededRandom()*spawnPoints.length)];
                        e.x = sp.x+(Math.random()-0.5)*30; e.z = sp.z+(Math.random()-0.5)*30;
                        e.hp = e.maxHp; e.armor = classes[e.class].armor;
                        e.state = 'patrol'; e.spawnProtection = 120;
                    }, 3000);
                }
            }
            break;
        case 'player_left':
            netMessage = '상대방이 나갔습니다';
            netMessageTimer = 300;
            remotePlayer = null;
            // 로비로 돌아가기
            gameState = 'lobby';
            isOnline = false;
            lobbyMode = '';
            break;
        case 'error':
            if(msg.message === 'room_not_found') netMessage = '방을 찾을 수 없습니다';
            else if(msg.message === 'room_full') netMessage = '방이 꽉 찼습니다';
            else netMessage = '오류: ' + msg.message;
            netMessageTimer = 180;
            break;
    }
}

// Seeded random for deterministic map
let mapSeed = 12345;
function seededRandom() {
    mapSeed = (mapSeed * 16807) % 2147483647;
    return (mapSeed - 1) / 2147483646;
}

// ====== 세션 통계 + Save & Quit ======
let sessionKills = 0;
let sessionDeaths = 0;
let sessionStartTime = null;

function startSessionTimer() {
  if (!sessionStartTime) sessionStartTime = Date.now();
}

function onSessionKill() { sessionKills++; }
function onSessionDeath() { sessionDeaths++; }

function getSessionMinutes() {
  if (!sessionStartTime) return 0;
  return Math.round((Date.now() - sessionStartTime) / 60000);
}

async function saveAndQuit() {
  progression.totalGames++;
  saveProgression();
  // 킬/데스/플레이시간을 parent에 한번에 보고 (완료까지 대기)
  const dk = sessionKills, dd = sessionDeaths, dt = getSessionMinutes();
  console.log(`[SaveQuit] 킬:${dk} 데스:${dd} 시간:${dt}분`);
  if (dk > 0 || dd > 0 || dt > 0) {
    try {
      if (parent && parent.giylReportRivals) {
        await parent.giylReportRivals(dk, dd, dt);
        console.log('[SaveQuit] 저장 완료!');
      } else {
        console.warn('[SaveQuit] parent.giylReportRivals 없음');
      }
    } catch(e) { console.error('[SaveQuit] 저장 실패:', e); }
  }
  sessionKills = 0; sessionDeaths = 0; sessionStartTime = null;
  // 홈으로 돌아가기
  try {
    if (parent && parent.goHome) parent.goHome();
  } catch(e) {
    gameState = 'title';
  }
}

const enemies = [];
const MAX_ENEMIES = 8;
const botNames = ['Shadow','Ghost','Viper','Phoenix','Storm','Blade','Raven','Wolf','Hawk','Fox','Bear','Cobra'];

function spawnEnemy() {
    if(enemies.length >= MAX_ENEMIES) return;
    const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
    const cls = Math.floor(Math.random()*classes.length);
    // 벽과 겹치지 않는 스폰 위치 찾기
    let sx = sp.x + (Math.random()-0.5)*30;
    let sz = sp.z + (Math.random()-0.5)*30;
    for(let tries=0; tries<10; tries++){
        if(!checkWallCollision(sx, sz, 8, 0)) break;
        sx = sp.x + (Math.random()-0.5)*40;
        sz = sp.z + (Math.random()-0.5)*40;
    }
    enemies.push({
        x: sx,
        z: sz,
        y: 0,
        vx: 0, vz: 0, vy: 0,
        hp: classes[cls].hp,
        maxHp: classes[cls].hp,

const bullets = [];

function addParticle(x, y, z, vx, vy, vz, color, life, size) {
    particles.push({x,y,z,vx,vy,vz,color,life,maxLife:life,size:size||2});
}

function addExplosion(x, y, z, radius) {
    playSound('explosion', 0.5);
    explosions.push({x,y,z,radius,time:0,maxTime:30});

        const a=Math.random()*Math.PI*2, p=Math.random()*Math.PI;

        addParticle(x,y,z, Math.cos(a)*Math.sin(p)*s, Math.cos(p)*s+2, Math.sin(a)*Math.sin(p)*s,
            ['#ff4400','#ff8800','#ffcc00','#ff2200'][Math.floor(Math.random()*4)], 20+Math.random()*20, 3+Math.random()*3);
    }
}

function addKillFeed(killer, victim, weapon) {
    killFeed.unshift({killer, victim, weapon, time:180});
    if(killFeed.length > 5) killFeed.pop();
}

function addDamageNumber(x, y, z, dmg, crit) {

function selectClass(idx) {
    initAudio(); // 사용자 클릭으로 오디오 활성화
    startSessionTimer();
    player.selectedClass = idx;
    const cls = classes[idx];
    player.weaponSlots = [cls.weapon, 4, 5, 6]; // 주무기, 권총, 낫, 수류탄
    player.currentSlot = 0;
    player.weapon = player.weaponSlots[0];
    player.maxHp = cls.hp;
    player.hp = cls.hp;
    player.armor = cls.armor;
    player.speed = cls.speed;
    player.ammo = [30, 8, 5, 1, 12, 1, 3];
    player.maxAmmo = [30, 8, 5, 1, 12, 1, 3];

    if(isOnline || networkState === 'lobby' || networkState === 'waiting' || ws) {
        // Online: send class selection and wait for start_game
        myClassSelected = true;
        sendMsg({ type: 'class_selected', selectedClass: idx });
        netMessage = '상대방을 기다리는 중...';
        netMessageTimer = 999;
        gameState = 'waiting';
    } else {
        // Solo
        respawn();
        gameState = 'playing';
        if(!isMobile) { try { canvas.requestPointerLock(); } catch(e) {} }
    }
}

function findSafeSpawn() {
    // 적에게서 가장 먼 스폰 포인트를 찾기
    let bestSpawn = spawnPoints[0];
    let bestMinDist = 0;
    for(const sp of spawnPoints) {
        let minDist = Infinity;
        for(const e of enemies) {
            if(e.hp <= 0) continue;
            const dx = sp.x - e.x, dz = sp.z - e.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist < minDist) minDist = dist;
        }
        if(minDist > bestMinDist) {
            bestMinDist = minDist;
            bestSpawn = sp;
        }
    }
    return bestSpawn;
}

function meleeAttack() {
    // 빠른 근접공격 - 낫 스윙
    player.spawnProtection = 0;
    const meleeRange = 35;
    const meleeDamage = 65;
    const dirX = -Math.sin(yaw);
    const dirZ = Math.cos(yaw);

    // AI 봇 히트 (솔로)
    if(!isOnline) {
        for(const e of enemies) {
            if(e.hp <= 0 || e.spawnProtection > 0) continue;
            const dx = e.x - player.x, dz = e.z - player.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist > meleeRange) continue;
            // 전방 120도 범위
            const dot = (dx*dirX + dz*dirZ) / (dist || 1);
            if(dot < 0.3) continue;
            e.hp -= meleeDamage;
            addDamageNumber(e.x, e.y+16, e.z, meleeDamage, false);
            for(let i=0;i<8;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4, '#cc44ff', 15);
            if(e.hp <= 0) onEnemyKilled(e, false);
        }
    }

    // 원격 플레이어 히트 (온라인)
    if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
        const rdx = remotePlayer.x - player.x, rdz = remotePlayer.z - player.z;
        const rdist = Math.sqrt(rdx*rdx + rdz*rdz);
        if(rdist <= meleeRange) {
            const dot = (rdx*dirX + rdz*dirZ) / (rdist || 1);
            if(dot > 0.3) {
                sendMsg({ type: 'hit', damage: meleeDamage, headshot: false, weaponName: '낫' });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, meleeDamage, false);
                for(let i=0;i<8;i++) addParticle(remotePlayer.x, remotePlayer.y+8, remotePlayer.z, (Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4, '#cc44ff', 15);
            }
        }
    }

    // 네트워크 전송
    if(isOnline) sendMsg({ type:'shoot', x:player.x, y:player.y+8, z:player.z, tx:player.x+dirX*30, ty:player.y+8, tz:player.z+dirZ*30, weapon:5 });
}

// ====== COLLISION ======
function checkWallCollision(x, z, radius, entityY) {
    for(const w of walls) {
        // 엔티티가 벽 위에 있으면 충돌 무시
        if(entityY !== undefined && w.h && entityY >= w.h) continue;
        const cx = Math.max(w.x, Math.min(w.x + w.w, x));
        const cz = Math.max(w.z, Math.min(w.z + w.d, z));
        const dx = x - cx, dz = z - cz;
        if(dx*dx + dz*dz < radius*radius) return w;
    }
    return null;
}

function moveWithCollision(entity, dx, dz, radius) {
    const newX = entity.x + dx;
    const newZ = entity.z + dz;
    const ey = entity.y !== undefined ? entity.y : 0;

    if(!checkWallCollision(newX, entity.z, radius, ey)) entity.x = newX;
    if(!checkWallCollision(entity.x, newZ, radius, ey)) entity.z = newZ;

    entity.x = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, entity.x));
    entity.z = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, entity.z));
}

function raycast(ox, oz, dx, dz, maxDist) {
    let t = 0;
    const step = 2;
    while(t < maxDist) {
        const x = ox + dx*t;
        const z = oz + dz*t;
        if(checkWallCollision(x, z, 1)) return {hit:true, dist:t, x, z};
        t += step;
    }
    return {hit:false, dist:maxDist};
}

// ====== SHOOTING ======
function playerShoot() {
    if(player.shootCooldown > 0 || player.reloadTime > 0) return;
    const w = weapons[player.weapon];

    // 낫 (3번 슬롯 클릭) = 근접공격
    if(w.melee) {
        if(player.meleeCooldown <= 0) {
            player.meleeActive = true;
            player.meleeTime = 12;
            player.meleeCooldown = 20;
            player.shootCooldown = w.fireRate;
            meleeAttack();
        }
        return;
    }

    if(player.ammo[player.weapon] <= 0) {
        if(!w.melee) reload();
        return;
    }
    // 사격하면 스폰 보호 해제
    player.spawnProtection = 0;

    const isGrenade = w.grenade;
    player.shootCooldown = w.fireRate;
    player.ammo[player.weapon]--;
    player.muzzleFlash = isGrenade ? 0 : 4;
    player.shootAnim = 1;
    playSound(w.sound, 0.35);

    const pellets = w.pellets || 1;
    for(let p = 0; p < pellets; p++) {
        const spreadX = (Math.random()-0.5) * w.spread * (player.scope ? 0.3 : 1);
        const spreadY = (Math.random()-0.5) * w.spread * (player.scope ? 0.3 : 1);
        const dirX = -Math.sin(yaw + spreadX) * Math.cos(pitch + spreadY);
        const dirZ = Math.cos(yaw + spreadX) * Math.cos(pitch + spreadY);
        const dirY = Math.sin(pitch + spreadY);

        if(w.explosive) {
            const speed = isGrenade ? 4 : 6;
            const gLife = isGrenade ? 90 : 120;
            const gvy = isGrenade ? dirY*speed + 2.5 : dirY*speed; // 수류탄은 포물선
            bullets.push({
                x:player.x, y:player.y+8, z:player.z,
                vx:dirX*speed, vy:gvy, vz:dirZ*speed,
                damage:w.damage, owner:'player', life:gLife,
                explosive:true, color:w.color, grenade:isGrenade
            });
        } else {
            // Hitscan - 화면 투영 기반 히트 판정
            let hitDist = w.range;
            let hitEnemy = null;

            for(const e of enemies) {
                if(e.hp <= 0 || e.spawnProtection > 0) continue;
                const dx3 = e.x - player.x, dz3 = e.z - player.z;
                const dist2d = Math.sqrt(dx3*dx3 + dz3*dz3);
                if(dist2d > w.range || dist2d < 1) continue;

                // 적이 화면 중앙(조준점) 근처에 있는지 투영으로 판정
                const p1 = project(e.x, e.y, e.z);         // 적 발 위치
                const p2 = project(e.x, e.y + 16, e.z);    // 적 머리 위치
                if(!p1 && !p2) continue;

                // 화면 중앙과의 거리 계산
                const screenCX = W/2, screenCY = H/2;
                let hitSize = 60; // 화면상 히트박스 크기(픽셀)
                if(p1 && p1.scale) hitSize = Math.max(40, 80 * p1.scale);

                let screenDist = Infinity;
                if(p1 && p2) {
                    // 적의 세로 범위 안에 있는지도 확인
                    const topY = Math.min(p1.y, p2.y) - hitSize/2;
                    const botY = Math.max(p1.y, p2.y) + hitSize/2;
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const dsx = screenCX - midX;
                    const dsy = screenCY - midY;
                    screenDist = Math.sqrt(dsx*dsx + dsy*dsy);
                } else {
                    const pp = p1 || p2;
                    const dsx = screenCX - pp.x;
                    const dsy = screenCY - pp.y;
                    screenDist = Math.sqrt(dsx*dsx + dsy*dsy);
                }

                if(screenDist < hitSize && dist2d < hitDist) {
                    // 벽 체크
                    const wc = raycast(player.x, player.z, dx3/dist2d, dz3/dist2d, dist2d);
                    if(!wc.hit) {
                        hitDist = dist2d;
                        hitEnemy = e;
                    }
                }
            }

            // 원격 플레이어 피격 판정 (3D 레이캐스트 기반)
            let hitRemote = false;
            if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
                const rdx = remotePlayer.x - player.x;
                const rdz = remotePlayer.z - player.z;
                const rdy = (remotePlayer.y + 8) - (player.y + 8);
                const rdist = Math.sqrt(rdx*rdx + rdz*rdz + rdy*rdy);
                if(rdist <= w.range && rdist >= 1) {
                    // 레이와 원격 플레이어 사이의 최소 거리 계산
                    const rayLen = w.range;
                    const rx = dirX * rayLen, rz = dirZ * rayLen, ry = dirY * rayLen;
                    // 레이 위의 가장 가까운 점 계산
                    const t = Math.max(0, Math.min(1, (rdx*rx + rdz*rz + rdy*ry) / (rayLen*rayLen)));
                    const closestX = player.x + rx * t;
                    const closestZ = player.z + rz * t;
                    const closestY = (player.y + 8) + ry * t;
                    const dx2 = closestX - remotePlayer.x;
                    const dz2 = closestZ - remotePlayer.z;
                    const dy2 = closestY - (remotePlayer.y + 8);
                    const minDist = Math.sqrt(dx2*dx2 + dz2*dz2 + dy2*dy2);
                    // 히트박스 반경: 몸통 8, 높이 고려
                    const hitRadius = 10;
                    if(minDist < hitRadius) {
                        const dist2d = Math.sqrt(rdx*rdx + rdz*rdz);
                        const rwc = raycast(player.x, player.z, rdx/(dist2d||1), rdz/(dist2d||1), dist2d);
                        if(!rwc.hit) {
                            hitRemote = true;
                            hitDist = rdist;
                        }
                    }
                }
            }

            // 벽 임팩트 (적 안 맞았을 때)
            if(!hitEnemy && !hitRemote) {
                const wallHit = raycast(player.x, player.z, dirX, dirZ, w.range);
                if(wallHit.hit) {
                    for(let i=0;i<3;i++) addParticle(wallHit.x, 8, wallHit.z, (Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2, '#aaa', 15);
                    hitDist = wallHit.dist;
                }
            }

            if(hitRemote) {
                // 헤드샷 판정: 레이가 머리 높이(y+12~y+16)에 맞았는지
                const rHitY = (player.y+8) + dirY * hitDist;
                const headY = remotePlayer.y + 12;
                const headshot = rHitY >= headY;
                // 스나이퍼 헤드샷 = 무조건 원킬 (999 데미지)
                let dmg;
                if(headshot && wpnIdx === 2) {
                    dmg = 999;
                } else {
                    dmg = w.damage * (headshot ? 2.5 : 1);
                    if(w.pellets) dmg = w.damage;
                }
                sendMsg({ type: 'hit', damage: dmg, headshot, weaponName: w.name });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, Math.round(dmg), headshot);
                playSound(headshot ? 'headshot' : 'hit', 0.4);
                for(let i=0;i<5;i++) addParticle(remotePlayer.x, remotePlayer.y+8, remotePlayer.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, remotePlayer.color, 15);
            } else if(hitEnemy) {
                // 헤드샷 판정: 조준점이 적 머리 높이 근처인지
                const eHitY = (player.y+8) + dirY * hitDist;
                const eHeadY = hitEnemy.y + 12;
                const headshot = eHitY >= eHeadY;
                // 스나이퍼 헤드샷 = 무조건 원킬
                let dmg;
                if(headshot && wpnIdx === 2) {
                    dmg = 999;
                } else {
                    dmg = w.damage * (headshot ? 2.5 : 1);
                    if(w.pellets) dmg = w.damage;
                }

                if(isOnline && !isHost) {
                    // Guest: send bot_hit to host
                    const botIdx = enemies.indexOf(hitEnemy);
                    sendMsg({ type: 'bot_hit', botIdx, damage: dmg, headshot, weaponName: w.name });
                    addDamageNumber(hitEnemy.x, hitEnemy.y+16, hitEnemy.z, Math.round(dmg), headshot);
                    playSound(headshot ? 'headshot' : 'hit', 0.4);
                    for(let i=0;i<5;i++) addParticle(hitEnemy.x, hitEnemy.y+8, hitEnemy.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, hitEnemy.color, 15);
                } else {
                    // Solo or Host: apply damage locally
                    if(dmg < 999 && hitEnemy.armor > 0) {
                        const armorDmg = Math.min(hitEnemy.armor, dmg*0.6);
                        hitEnemy.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    hitEnemy.hp -= dmg;
                    addDamageNumber(hitEnemy.x, hitEnemy.y+16, hitEnemy.z, Math.round(dmg), headshot);
                    playSound(headshot ? 'headshot' : 'hit', 0.4);
                    for(let i=0;i<5;i++) addParticle(hitEnemy.x, hitEnemy.y+8, hitEnemy.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, hitEnemy.color, 15);
                    if(hitEnemy.hp <= 0) onEnemyKilled(hitEnemy, headshot);
                    hitEnemy.state = 'chase';
                    hitEnemy.stateTimer = 120;
                }
            }

            // Tracer
            const hitTarget = hitRemote ? remotePlayer : hitEnemy;
            const tracerTx = hitTarget ? hitTarget.x : player.x+dirX*hitDist;
            const tracerTy = hitTarget ? hitTarget.y+8 : player.y+8+dirY*hitDist;
            const tracerTz = hitTarget ? hitTarget.z : player.z+dirZ*hitDist;
            bullets.push({
                x:player.x, y:player.y+8, z:player.z,
                tx:tracerTx, ty:tracerTy, tz:tracerTz,
                life:3, tracer:true, color:w.color
            });

            // Send shoot event for tracer
            if(isOnline) {
                sendMsg({ type:'shoot', x:player.x, y:player.y+8, z:player.z, tx:tracerTx, ty:tracerTy, tz:tracerTz, weapon:player.weapon });
            }
        }
    }
}

function onEnemyKilled(enemy, headshot) {
    player.kills++;
    onSessionKill();
    enemy.deaths++;
    progression.totalKills++;
    const now = Date.now();
    if(now - player.lastKillTime < 3000) player.killStreak++;
    else player.killStreak = 1;
    player.lastKillTime = now;

    // XP 획득: 킬 15xp, 헤드샷 보너스 +10, 연킬 보너스
    let xpGain = 15;
    if (headshot) xpGain += 10;
    if (player.killStreak >= 3) xpGain += 5 * Math.min(player.killStreak, 6);
    xpGainAnim.push({ amount: xpGain, time: 60 });
    addXP(xpGain);

    addKillFeed('나', enemy.name, weapons[player.weapon].name + (headshot?' 🎯':''));
    playSound('kill', 0.4);

    // Death particles
    for(let i=0;i<20;i++) addParticle(enemy.x, enemy.y+8, enemy.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, enemy.color, 30, 3);

    // Respawn enemy after delay
    setTimeout(() => {
        const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
        enemy.x = sp.x + (Math.random()-0.5)*30;
        enemy.z = sp.z + (Math.random()-0.5)*30;
        enemy.hp = enemy.maxHp;
        enemy.armor = classes[enemy.class].armor;
        enemy.state = 'patrol';
        enemy.spawnProtection = 120;
    }, 3000);
}

// ====== BOT AI ======
function findBotTarget(bot) {
    // 가장 가까운 보이는 타겟 찾기 (플레이어 또는 다른 봇)
    let bestTarget = null;
    let bestDist = Infinity;

    // 플레이어 체크
    if(gameState === 'playing' && player.hp > 0 && player.spawnProtection <= 0) {
        const dx = player.x - bot.x, dz = player.z - bot.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < 250) {
            const wallCheck = raycast(bot.x, bot.z, dx/dist, dz/dist, dist);
            if(!wallCheck.hit) {
                bestTarget = { type:'player', x:player.x, z:player.z, dist };
                bestDist = dist;
            }
        }
    }

    // 원격 플레이어 체크
    if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
        const rdx = remotePlayer.x - bot.x, rdz = remotePlayer.z - bot.z;
        const rdist = Math.sqrt(rdx*rdx + rdz*rdz);
        if(rdist < bestDist && rdist < 250) {
            const wc = raycast(bot.x, bot.z, rdx/rdist, rdz/rdist, rdist);
            if(!wc.hit) {
                bestTarget = { type:'remote', x:remotePlayer.x, z:remotePlayer.z, dist:rdist };
                bestDist = rdist;
            }
        }
    }

    // 다른 봇 체크
    for(const other of enemies) {
        if(other === bot || other.hp <= 0 || other.spawnProtection > 0) continue;
        const dx = other.x - bot.x, dz = other.z - bot.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < bestDist && dist < 200) {
            const wallCheck = raycast(bot.x, bot.z, dx/dist, dz/dist, dist);
            if(!wallCheck.hit) {
                bestTarget = { type:'bot', ref:other, x:other.x, z:other.z, dist };
                bestDist = dist;
            }
        }
    }
    return bestTarget;
}

function updateBot(bot) {
    if(bot.hp <= 0) return;

    bot.shootCooldown = Math.max(0, bot.shootCooldown-1);
    bot.stateTimer = Math.max(0, bot.stateTimer-1);
    bot.strafeTimer--;
    bot.muzzleFlash = Math.max(0, bot.muzzleFlash-1);
    if(bot.spawnProtection > 0) bot.spawnProtection--;

    // 타겟 찾기
    const target = findBotTarget(bot);
    let tx = 0, tz = 0, distToTarget = 999, angleToTarget = 0, canSeeTarget = false;

    if(target) {
        tx = target.x - bot.x;
        tz = target.z - bot.z;
        distToTarget = target.dist;
        angleToTarget = Math.atan2(tx, tz);
        canSeeTarget = true;
    }

    // State machine
    if(bot.stateTimer <= 0) {
        if(canSeeTarget && distToTarget < 200) {
            bot.state = distToTarget < 40 ? 'flee' : 'attack';
            bot.stateTimer = 60 + Math.random()*60;
        } else if(canSeeTarget) {
            bot.state = 'chase';
            bot.stateTimer = 90;
        } else {
            bot.state = 'patrol';
            bot.targetX = (Math.random()-0.5)*MAP_SIZE*1.6;
            bot.targetZ = (Math.random()-0.5)*MAP_SIZE*1.6;
            bot.stateTimer = 120 + Math.random()*120;
        }
    }

    let moveX = 0, moveZ = 0;

    switch(bot.state) {
        case 'patrol': {
            const tdx = bot.targetX - bot.x, tdz = bot.targetZ - bot.z;
            const td = Math.sqrt(tdx*tdx + tdz*tdz);
            if(td > 5) { moveX = tdx/td; moveZ = tdz/td; }
            else bot.stateTimer = 0;
            bot.yaw = Math.atan2(tdx, tdz);
            break;
        }
        case 'chase': {
            if(canSeeTarget) {
                moveX = tx/distToTarget;
                moveZ = tz/distToTarget;
                bot.yaw += (angleToTarget - bot.yaw) * 0.08;
                if(distToTarget < weapons[bot.weapon].range) {
                    bot.state = 'attack';
                    bot.stateTimer = 60;
                }
            } else { bot.stateTimer = 0; }
            break;
        }
        case 'attack': {
            if(canSeeTarget) {
                bot.yaw += (angleToTarget - bot.yaw) * 0.1;
                if(bot.strafeTimer <= 0) {
                    bot.strafeDir *= -1;
                    bot.strafeTimer = 30 + Math.random()*40;
                }
                const strafeAngle = bot.yaw + Math.PI/2;
                moveX = Math.sin(strafeAngle) * bot.strafeDir * 0.5;
                moveZ = Math.cos(strafeAngle) * bot.strafeDir * 0.5;

                if(bot.shootCooldown <= 0 && distToTarget < weapons[bot.weapon].range) {
                    botShoot(bot, target);
                }
            } else { bot.state = 'patrol'; bot.stateTimer = 0; }
            break;
        }
        case 'flee': {
            if(canSeeTarget) {
                moveX = -tx/distToTarget;
                moveZ = -tz/distToTarget;
                bot.yaw = angleToTarget;
                if(bot.shootCooldown <= 0) botShoot(bot, target);
                if(distToTarget > 80) { bot.state = 'attack'; bot.stateTimer = 60; }
            } else { bot.stateTimer = 0; }
            break;
        }
    }

    const prevX = bot.x, prevZ = bot.z;
    moveWithCollision(bot, moveX * bot.speed * 0.5, moveZ * bot.speed * 0.5, 5);

    // Stuck detection: 이동 못하면 새 목표로 전환
    const movedDist = Math.abs(bot.x - prevX) + Math.abs(bot.z - prevZ);
    if(!bot.stuckCounter) bot.stuckCounter = 0;
    if(movedDist < 0.1) bot.stuckCounter++;
    else bot.stuckCounter = 0;
    if(bot.stuckCounter > 30) {
        bot.state = 'patrol';
        bot.targetX = (Math.random()-0.5) * MAP_SIZE * 1.2;
        bot.targetZ = (Math.random()-0.5) * MAP_SIZE * 1.2;
        bot.stateTimer = 60;
        bot.stuckCounter = 0;
    }

    // Bot vs bot collision (물리)
    for(const other of enemies) {
        if(other === bot || other.hp <= 0) continue;
        const bx = bot.x - other.x, bz = bot.z - other.z;
        const bd = Math.sqrt(bx*bx + bz*bz);
        if(bd < 10) {
            bot.x += (bx/bd)*2;
            bot.z += (bz/bd)*2;
        }
    }
}

function botShoot(bot, target) {
    const w = weapons[bot.weapon];
    bot.shootCooldown = w.fireRate + 20; // 더 긴 쿨다운
    bot.muzzleFlash = 4;

    const dist = target.dist;
    const spread = w.spread * (1/bot.accuracy) * (dist > 100 ? 2.0 : 1.3);
    const dx = target.x - bot.x + (Math.random()-0.5)*spread*dist;
    const dz = target.z - bot.z + (Math.random()-0.5)*spread*dist;
    const d = Math.sqrt(dx*dx + dz*dz);

    const wallHit = raycast(bot.x, bot.z, dx/d, dz/d, dist);
    if(wallHit.hit && wallHit.dist < dist) return;

    if(w.explosive) {
        bullets.push({
            x:bot.x, y:8, z:bot.z,
            vx:(dx/d)*5, vy:0.5, vz:(dz/d)*5,
            damage:w.damage*0.4, owner:'bot', ownerRef:bot, life:80,
            explosive:true, color:w.color
        });
    } else {
        const hitChance = bot.accuracy * (dist < 50 ? 0.7 : dist < 100 ? 0.4 : 0.15);

        if(target.type === 'player') {
            // 플레이어에게 사격
            if(Math.random() < hitChance && gameState === 'playing' && player.spawnProtection <= 0) {
                const pellets = w.pellets || 1;
                let totalDmg = 0;
                for(let p=0;p<pellets;p++) {
                    let dmg = w.damage * (0.5 + Math.random()*0.3);
                    if(player.armor > 0) {
                        const armorDmg = Math.min(player.armor, dmg*0.6);
                        player.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    totalDmg += dmg;
                }
                player.hp -= totalDmg;
                player.damageFlash = 15;
                addDamageNumber(player.x, player.y+16, player.z, Math.round(totalDmg), false);

                if(player.hp <= 0) {
                    player.deaths++;
                    progression.totalDeaths++;
                    onSessionDeath();
                    bot.kills++;
                    player.killStreak = 0;
                    addKillFeed(bot.name, '나', weapons[bot.weapon].name);
                    gameState = 'dead';
                    player.respawnTimer = 180;
                }
            }
        } else if(target.type === 'remote') {
            // 원격 플레이어에게 사격 (호스트가 계산하고 전송)
            if(Math.random() < hitChance && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
                let dmg = w.damage * (0.5 + Math.random()*0.3);
                sendMsg({ type:'hit', damage:dmg, headshot:false, weaponName:bot.name+'의 '+w.name });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, Math.round(dmg), false);
            }
        } else if(target.type === 'bot') {
            // 다른 봇에게 사격
            const victim = target.ref;
            if(Math.random() < hitChance && victim.hp > 0 && victim.spawnProtection <= 0) {
                const pellets = w.pellets || 1;
                let totalDmg = 0;
                for(let p=0;p<pellets;p++) {
                    let dmg = w.damage * (0.5 + Math.random()*0.3);
                    if(victim.armor > 0) {
                        const armorDmg = Math.min(victim.armor, dmg*0.6);
                        victim.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    totalDmg += dmg;
                }
                victim.hp -= totalDmg;
                addDamageNumber(victim.x, victim.y+16, victim.z, Math.round(totalDmg), false);

                // 맞은 봇이 반격
                victim.state = 'chase';
                victim.stateTimer = 120;

                if(victim.hp <= 0) {
                    bot.kills++;
                    victim.deaths++;
                    addKillFeed(bot.name, victim.name, weapons[bot.weapon].name);
                    // 봇 리스폰
                    for(let i=0;i<15;i++) addParticle(victim.x, victim.y+8, victim.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, victim.color, 30, 3);
                    setTimeout(() => {
                        const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
                        victim.x = sp.x + (Math.random()-0.5)*30;
                        victim.z = sp.z + (Math.random()-0.5)*30;
                        victim.hp = victim.maxHp;
                        victim.armor = classes[victim.class].armor;
                        victim.state = 'patrol';
                        victim.spawnProtection = 120;
                    }, 3000);
                }
            }
        }
    }

    // Tracer
    bullets.push({
        x:bot.x, y:8, z:bot.z,
        tx:target.x, ty:8, tz:target.z,
        life:3, tracer:true, color:w.color
    });
}

// ====== 3D PROJECTION ======
function project(wx, wy, wz) {
    const dx = wx - player.x;
    const camH = player.sliding ? 4 : 10; // 슬라이딩 시 카메라 낮아짐
    const dy = wy - (player.y + camH);
    const dz = wz - player.z;

    const cosY = Math.cos(-yaw), sinY = Math.sin(-yaw);
    const rx = dx * cosY - dz * sinY;
    const rz = dx * sinY + dz * cosY;

    const cosP = Math.cos(-pitch), sinP = Math.sin(-pitch);
    const ry = dy * cosP - rz * sinP;
    const rz2 = dy * sinP + rz * cosP;

    if(rz2 < 1) return null;

    const fov = player.scope ? (player.weapon === 2 ? 800 : 550) : 400;
    const sx = W/2 + (rx / rz2) * fov;
    const sy = H/2 - (ry / rz2) * fov;
    const scale = fov / rz2;

    return {x:sx, y:sy, z:rz2, scale};
}
