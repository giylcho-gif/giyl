<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>라이벌 FPS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0a0a1a;
    display:flex; justify-content:center; align-items:center;
    height:100vh; overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    touch-action:none;overscroll-behavior:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
canvas {
    border-radius:8px;
    box-shadow:0 0 60px rgba(255,50,50,.3);
    max-width:100vw;
    max-height:100vh;
}
@media(max-width:768px){canvas{max-height:60vh!important}}
#fpsControls{display:none;position:fixed;bottom:0;left:0;right:0;height:180px;z-index:1000;touch-action:none;pointer-events:none}
.fps-joy{position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);pointer-events:auto;touch-action:none}
.fps-joy-knob{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.3);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#fps-joy-left{left:20px;bottom:20px}
#fps-joy-right{right:20px;bottom:20px}
#fps-shoot{position:absolute;right:160px;bottom:55px;width:60px;height:60px;border-radius:50%;background:rgba(255,50,50,0.6);border:2px solid rgba(255,100,100,0.5);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:13px}
#fps-shoot:active{background:rgba(255,50,50,0.9)}
#fps-jump{position:absolute;right:160px;bottom:130px;width:50px;height:50px;border-radius:50%;background:rgba(100,150,255,0.5);border:2px solid rgba(100,150,255,0.4);pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
#fps-jump:active{background:rgba(100,150,255,0.8)}
#crosshair {
    position:fixed; pointer-events:none; z-index:999;
    width:30px; height:30px;
    display:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 960, H = 640;
canvas.width = W; canvas.height = H;

// ====== GAME STATE ======
let gameState = 'title'; // title, classSelect, playing, dead, scoreboard, lobby, waiting
let mouseX = W/2, mouseY = H/2;
let mouseLocked = false;
let yaw = 0, pitch = 0;
const SENSITIVITY = 0.0008;
let frameCount = 0;

// ====== NETWORK ======
let ws = null;
let isOnline = false;
let isHost = false;
let roomCode = '';
let myPlayerId = '';
let remotePlayer = null;
let networkState = 'disconnected'; // disconnected, connecting, lobby, waiting, playing
let roomCodeInput = '';
let lobbyMode = ''; // 'create' or 'join'
let myClassSelected = false;
let netMessage = '';
let netMessageTimer = 0;
const SERVER_URL = 'wss://rivals-server-2.onrender.com';

function connectToServer(callback) {
    if(ws && ws.readyState <= 1) { if(callback) callback(); return; }
    netMessage = '서버 연결 중...';
    netMessageTimer = 999;
    ws = new WebSocket(SERVER_URL);
    networkState = 'connecting';

    ws.onopen = () => {
        networkState = 'lobby';
        netMessage = '서버 연결 완료!';
        netMessageTimer = 120;
        if(callback) callback();
    };
    ws.onclose = () => {
        networkState = 'disconnected';
        if(isOnline && gameState === 'playing') {
            netMessage = '연결이 끊겼습니다';
            netMessageTimer = 300;
            isOnline = false;
            // Fill remote player slot with bot
            if(remotePlayer) { remotePlayer = null; while(enemies.length < 8) spawnEnemy(); }
        }
    };
    ws.onerror = () => {
        netMessage = '서버 연결 실패!';
        netMessageTimer = 300;
        networkState = 'disconnected';
    };
    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleNetworkMessage(msg);
    };
}

function sendMsg(obj) {
    if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function initRemotePlayer(cls) {
    remotePlayer = {
        x:0, z:0, y:0, yaw:0, pitch:0,
        hp:100, maxHp:100, armor:0,
        kills:0, deaths:0,
        selectedClass: cls || 0,
        weapon:0, name:'상대방',
        color:'#ffaa00', muzzleFlash:0,
        spawnProtection:0,
        prevX:0, prevZ:0, prevY:0,
        targetX:0, targetZ:0, targetY:0,
        interpT:1, alive:true
    };
}

function handleNetworkMessage(msg) {
    switch(msg.type) {
        case 'room_created':
            roomCode = msg.code;
            myPlayerId = msg.playerId;
            mapSeed = msg.mapSeed;
            isHost = true;
            gameState = 'waiting';
            netMessage = '';
            break;
        case 'room_joined':
            roomCode = msg.code;
            myPlayerId = msg.playerId;
            mapSeed = msg.mapSeed;
            isHost = false;
            gameState = 'classSelect';
            netMessage = '방에 참가했습니다! 클래스를 선택하세요.';
            netMessageTimer = 180;
            break;
        case 'player_joined':
            netMessage = '상대방이 입장했습니다!';
            netMessageTimer = 120;
            // Both players present, go to class select
            gameState = 'classSelect';
            break;
        case 'opponent_class':
            if(!remotePlayer) initRemotePlayer(msg.selectedClass);
            remotePlayer.selectedClass = msg.selectedClass;
            remotePlayer.weapon = classes[msg.selectedClass].weapon;
            remotePlayer.maxHp = classes[msg.selectedClass].hp;
            remotePlayer.color = classes[msg.selectedClass].color;
            break;
        case 'start_game': {
            isOnline = true;
            if(!remotePlayer) initRemotePlayer(0);
            generateMap();
            enemies.length = 0;
            // 온라인 모드에서는 AI 봇 없음 (1v1)
            gameState = 'playing';
            try { canvas.requestPointerLock(); } catch(e) {}
            break;
        }
        case 'player_state':
            if(!remotePlayer) initRemotePlayer(msg.selectedClass || 0);
            remotePlayer.prevX = remotePlayer.x;
            remotePlayer.prevZ = remotePlayer.z;
            remotePlayer.prevY = remotePlayer.y;
            remotePlayer.targetX = msg.x;
            remotePlayer.targetZ = msg.z;
            remotePlayer.targetY = msg.y;
            remotePlayer.interpT = 0;
            remotePlayer.yaw = msg.yaw;
            remotePlayer.hp = msg.hp;
            remotePlayer.armor = msg.armor;
            remotePlayer.weapon = msg.weapon;
            remotePlayer.selectedClass = msg.selectedClass;
            remotePlayer.kills = msg.kills;
            remotePlayer.deaths = msg.deaths;
            remotePlayer.muzzleFlash = msg.muzzleFlash;
            remotePlayer.spawnProtection = msg.spawnProtection;
            remotePlayer.color = classes[msg.selectedClass] ? classes[msg.selectedClass].color : '#ffaa00';
            remotePlayer.maxHp = classes[msg.selectedClass] ? classes[msg.selectedClass].hp : 100;
            remotePlayer.alive = msg.hp > 0;
            break;
        case 'shoot':
            // Show remote player's muzzle flash and tracer
            if(remotePlayer) {
                remotePlayer.muzzleFlash = 4;
                if(msg.tx !== undefined) {
                    bullets.push({ x:msg.x, y:msg.y, z:msg.z, tx:msg.tx, ty:msg.ty, tz:msg.tz, life:3, tracer:true, color:weapons[msg.weapon]?.color || '#ff0' });
                }
            }
            break;
        case 'hit':
            // Remote player hit us
            if(player.spawnProtection <= 0 && player.hp > 0) {
                let dmg = msg.damage;
                if(player.armor > 0) {
                    const armorDmg = Math.min(player.armor, dmg*0.6);
                    player.armor -= armorDmg;
                    dmg *= 0.4;
                }
                player.hp -= dmg;
                player.damageFlash = 15;
                addDamageNumber(player.x, player.y+16, player.z, Math.round(dmg), msg.headshot);
                if(player.hp <= 0) {
                    player.deaths++;
                    gameState = 'dead';
                    player.respawnTimer = 180;
                    sendMsg({ type: 'kill', victimName: '나', weapon: msg.weaponName || '무기' });
                }
            }
            break;
        case 'kill':
            // 상대방이 죽었음 = 내가 킬함 → 내 킬 카운트 증가
            player.kills++;
            const killNow = Date.now();
            if(killNow - player.lastKillTime < 3000) player.killStreak++;
            else player.killStreak = 1;
            player.lastKillTime = killNow;
            if(msg.victimName) {
                addKillFeed('나', msg.victimName, msg.weapon);
            }
            break;
        case 'bot_states':
            if(!isHost && msg.bots) {
                // Sync bot data from host
                while(enemies.length < msg.bots.length) {
                    enemies.push({ x:0,z:0,y:0,vx:0,vz:0,vy:0,hp:100,maxHp:100,armor:0,
                        class:0,weapon:0,name:'Bot',color:'#f44',shootCooldown:0,muzzleFlash:0,
                        accuracy:0.3,reactionTime:60,state:'patrol',stateTimer:0,target:null,
                        targetX:0,targetZ:0,strafeDir:1,strafeTimer:0,kills:0,deaths:0,
                        spawnProtection:0,yaw:0,speed:2,onGround:true });
                }
                while(enemies.length > msg.bots.length) enemies.pop();
                msg.bots.forEach((b, i) => {
                    if(!enemies[i]) return;
                    enemies[i].x = b.x; enemies[i].z = b.z; enemies[i].y = b.y;
                    enemies[i].yaw = b.yaw; enemies[i].hp = b.hp; enemies[i].armor = b.armor;
                    enemies[i].class = b.cls; enemies[i].weapon = b.weapon;
                    enemies[i].name = b.name; enemies[i].color = b.color;
                    enemies[i].muzzleFlash = b.muzzleFlash;
                    enemies[i].kills = b.kills; enemies[i].deaths = b.deaths;
                    enemies[i].spawnProtection = b.spawnProtection;
                    enemies[i].maxHp = classes[b.cls] ? classes[b.cls].hp : 100;
                });
            }
            break;
        case 'bot_hit':
            // Guest hit a bot, host applies damage
            if(isHost && msg.botIdx !== undefined && enemies[msg.botIdx]) {
                const e = enemies[msg.botIdx];
                if(e.hp <= 0 || e.spawnProtection > 0) break;
                let dmg = msg.damage;
                if(e.armor > 0) {
                    const armorDmg = Math.min(e.armor, dmg*0.6);
                    e.armor -= armorDmg;
                    dmg *= 0.4;
                }
                e.hp -= dmg;
                addDamageNumber(e.x, e.y+16, e.z, Math.round(dmg), msg.headshot);
                for(let i=0;i<5;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, e.color, 15);
                if(e.hp <= 0) {
                    // Attribute kill to remote player
                    if(remotePlayer) remotePlayer.kills++;
                    e.deaths++;
                    addKillFeed(remotePlayer ? remotePlayer.name : '상대방', e.name, msg.weaponName || '무기');
                    for(let i=0;i<20;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, e.color, 30, 3);
                    setTimeout(() => {
                        const sp = spawnPoints[Math.floor(seededRandom()*spawnPoints.length)];
                        e.x = sp.x+(Math.random()-0.5)*30; e.z = sp.z+(Math.random()-0.5)*30;
                        e.hp = e.maxHp; e.armor = classes[e.class].armor;
                        e.state = 'patrol'; e.spawnProtection = 120;
                    }, 3000);
                }
            }
            break;
        case 'player_left':
            netMessage = '상대방이 나갔습니다';
            netMessageTimer = 300;
            remotePlayer = null;
            // 로비로 돌아가기
            gameState = 'lobby';
            isOnline = false;
            lobbyMode = '';
            break;
        case 'error':
            if(msg.message === 'room_not_found') netMessage = '방을 찾을 수 없습니다';
            else if(msg.message === 'room_full') netMessage = '방이 꽉 찼습니다';
            else netMessage = '오류: ' + msg.message;
            netMessageTimer = 180;
            break;
    }
}

// Seeded random for deterministic map
let mapSeed = 12345;
function seededRandom() {
    mapSeed = (mapSeed * 16807) % 2147483647;
    return (mapSeed - 1) / 2147483646;
}

// ====== PLAYER ======
const player = {
    x: 0, z: 0, y: 0,
    vx: 0, vz: 0, vy: 0,
    hp: 100, maxHp: 100,
    armor: 0,
    kills: 0, deaths: 0,
    weapon: 0,
    weaponSlots: [0, 4, 5, 6], // 주무기, 권총, 낫, 수류탄
    currentSlot: 0,
    ammo: [30, 8, 5, 1, 12, 1, 3],
    maxAmmo: [30, 8, 5, 1, 12, 1, 3],
    reloadTime: 0,
    shootCooldown: 0,
    meleeActive: false,
    meleeTime: 0,
    meleeCooldown: 0,
    respawnTimer: 0,
    spawnProtection: 0,
    speed: 2.2,
    jumpForce: 3.5,
    onGround: false,
    damageFlash: 0,
    killStreak: 0,
    lastKillTime: 0,
    dashCooldown: 0,
    dashing: false,
    dashTime: 0,
    dashDir: {x:0, z:0},
    scytheDashing: false,
    scytheDashTime: 0,
    scytheDashCooldown: 0,
    scytheDashDir: {x:0, z:0},
    selectedClass: 0,
    scope: false,
    muzzleFlash: 0
};

// ====== WEAPONS ======
const weapons = [
    { name:'돌격소총', damage:18, fireRate:6, reloadSpeed:90, spread:0.015, auto:true, range:300, color:'#ff6b35', ammoName:'5.56mm', icon:'▄█▀', sound:'rifle' },
    { name:'샷건', damage:12, fireRate:30, reloadSpeed:60, spread:0.08, auto:false, range:100, color:'#ffaa00', pellets:8, ammoName:'12게이지', icon:'▄██', sound:'shotgun' },
    { name:'스나이퍼', damage:95, fireRate:50, reloadSpeed:120, spread:0.001, auto:false, range:500, color:'#00ccff', ammoName:'.50 BMG', icon:'━━▄', sound:'sniper', scope:true },
    { name:'로켓런처', damage:80, fireRate:60, reloadSpeed:150, spread:0.005, auto:false, range:400, color:'#ff3333', ammoName:'로켓', icon:'◄━━', sound:'rocket', explosive:true },
    { name:'권총', damage:22, fireRate:10, reloadSpeed:50, spread:0.02, auto:false, range:200, color:'#cccccc', ammoName:'9mm', icon:'▄▀', sound:'pistol' },
    { name:'낫', damage:65, fireRate:20, reloadSpeed:0, spread:0, auto:false, range:30, color:'#cc44ff', ammoName:'', icon:'⌒', sound:'melee', melee:true },
    { name:'수류탄', damage:90, fireRate:40, reloadSpeed:0, spread:0.01, auto:false, range:300, color:'#44cc44', ammoName:'수류탄', icon:'●', sound:'grenade', explosive:true, grenade:true }
];

// ====== CLASSES ======
const classes = [
    { name:'돌격병', desc:'빠른 이동 + 돌격소총', weapon:0, hp:100, armor:0, speed:2.5, color:'#ff6b35', ability:'대시', abilityCooldown:180 },
    { name:'탱커', desc:'높은 체력 + 샷건', weapon:1, hp:150, armor:50, speed:1.8, color:'#44aa44', ability:'보호막', abilityCooldown:300 },
    { name:'저격수', desc:'스나이퍼 + 스코프', weapon:2, hp:80, armor:0, speed:2.2, color:'#00ccff', ability:'투명화', abilityCooldown:360 },
    { name:'폭파병', desc:'로켓런처 + 폭발', weapon:3, hp:100, armor:25, speed:2.0, color:'#ff3333', ability:'지뢰', abilityCooldown:240 }
];

// ====== MAP ======
const MAP_SIZE = 400;
const walls = [];
const buildings = [];
const spawnPoints = [
    {x:-150, z:-150}, {x:150, z:-150}, {x:-150, z:150}, {x:150, z:150},
    {x:0, z:-180}, {x:0, z:180}, {x:-180, z:0}, {x:180, z:0}
];

function generateMap() {
    walls.length = 0;
    buildings.length = 0;

    // Border walls (높은 외곽)
    walls.push({x:-MAP_SIZE, z:-MAP_SIZE, w:MAP_SIZE*2, d:5, h:35, color:'#2a2a3a'});
    walls.push({x:-MAP_SIZE, z:MAP_SIZE-5, w:MAP_SIZE*2, d:5, h:35, color:'#2a2a3a'});
    walls.push({x:-MAP_SIZE, z:-MAP_SIZE, w:5, d:MAP_SIZE*2, h:35, color:'#2a2a3a'});
    walls.push({x:MAP_SIZE-5, z:-MAP_SIZE, w:5, d:MAP_SIZE*2, h:35, color:'#2a2a3a'});

    // ===== 중앙 타워 (높은 구조물, 낫 대시로만 올라감) =====
    buildings.push({x:-20, z:-20, w:40, d:40, h:28, color:'#3a3a5a', name:'중앙 타워'});
    walls.push({x:-20, z:-20, w:40, d:4, h:28, color:'#3a3a5a'});
    walls.push({x:-20, z:16, w:40, d:4, h:28, color:'#3a3a5a'});
    walls.push({x:-20, z:-20, w:4, d:40, h:28, color:'#3a3a5a'});
    walls.push({x:16, z:-20, w:4, d:40, h:28, color:'#3a3a5a'});
    // 타워 위 장식 기둥
    walls.push({x:-15, z:-15, w:6, d:6, h:35, color:'#5050aa'});
    walls.push({x:9, z:-15, w:6, d:6, h:35, color:'#5050aa'});
    walls.push({x:-15, z:9, w:6, d:6, h:35, color:'#5050aa'});
    walls.push({x:9, z:9, w:6, d:6, h:35, color:'#5050aa'});

    // ===== 4코너 건물 (중간 높이) =====
    const cornerData = [
        {x:-160, z:-160, color:'#5a3a3a'},  // 빨강 톤
        {x:120, z:-160, color:'#3a5a3a'},   // 초록 톤
        {x:-160, z:120, color:'#3a3a5a'},   // 파랑 톤
        {x:120, z:120, color:'#5a5a3a'}     // 노랑 톤
    ];
    cornerData.forEach(c => {
        buildings.push({x:c.x, z:c.z, w:45, d:45, h:22, color:c.color});
        walls.push({x:c.x, z:c.z, w:45, d:4, h:22, color:c.color});
        walls.push({x:c.x, z:c.z+41, w:45, d:4, h:22, color:c.color});
        walls.push({x:c.x, z:c.z, w:4, d:45, h:22, color:c.color});
        walls.push({x:c.x+41, z:c.z, w:4, d:45, h:22, color:c.color});
    });

    // ===== 중간 거리 직사각 건물 4개 =====
    const midBuildings = [
        {x:-90, z:-25, w:30, d:50, h:20, color:'#4a4050'},
        {x:60, z:-25, w:30, d:50, h:20, color:'#504a40'},
        {x:-25, z:-90, w:50, d:30, h:20, color:'#404a50'},
        {x:-25, z:60, w:50, d:30, h:20, color:'#504040'}
    ];
    midBuildings.forEach(b => {
        buildings.push({...b});
        walls.push({x:b.x, z:b.z, w:b.w, d:4, h:b.h, color:b.color});
        walls.push({x:b.x, z:b.z+b.d-4, w:b.w, d:4, h:b.h, color:b.color});
        walls.push({x:b.x, z:b.z, w:4, d:b.d, h:b.h, color:b.color});
        walls.push({x:b.x+b.w-4, z:b.z, w:4, d:b.d, h:b.h, color:b.color});
    });

    // ===== 길고 낮은 엄폐벽 (다양한 높이) =====
    const coverWalls = [
        // 내부 십자형 엄폐
        {x:-55, z:-3, w:25, d:6, h:10, color:'#666'},
        {x:30, z:-3, w:25, d:6, h:10, color:'#666'},
        {x:-3, z:-55, w:6, d:25, h:10, color:'#666'},
        {x:-3, z:30, w:6, d:25, h:10, color:'#666'},
        // 중간 거리 엄폐
        {x:-110, z:50, w:30, d:4, h:12, color:'#555'},
        {x:80, z:-50, w:30, d:4, h:12, color:'#555'},
        {x:50, z:110, w:4, d:30, h:12, color:'#555'},
        {x:-50, z:-110, w:4, d:30, h:12, color:'#555'},
        // 외곽 긴 벽
        {x:-180, z:-60, w:35, d:4, h:14, color:'#4a4a4a'},
        {x:145, z:60, w:35, d:4, h:14, color:'#4a4a4a'},
        {x:-60, z:170, w:4, d:35, h:14, color:'#4a4a4a'},
        {x:60, z:-180, w:4, d:35, h:14, color:'#4a4a4a'},
        // 대각선 방향 벽
        {x:-130, z:-30, w:20, d:4, h:11, color:'#5a5a5a'},
        {x:110, z:30, w:20, d:4, h:11, color:'#5a5a5a'},
        {x:-30, z:130, w:4, d:20, h:11, color:'#5a5a5a'},
        {x:30, z:-130, w:4, d:20, h:11, color:'#5a5a5a'}
    ];
    coverWalls.forEach(c => walls.push(c));

    // ===== 높은 감시탑 (4개, 모서리 사이) =====
    const towers = [
        {x:-100, z:100, color:'#6a4a6a'},
        {x:100, z:-100, color:'#6a6a4a'},
        {x:100, z:100, color:'#4a6a6a'},
        {x:-100, z:-100, color:'#6a5a4a'}
    ];
    towers.forEach(t => {
        // 베이스
        walls.push({x:t.x-8, z:t.z-8, w:16, d:16, h:26, color:t.color});
        // 꼭대기 돌출

const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;

    // Lobby room code input
    if(gameState === 'lobby' && lobbyMode === 'join') {
        if(e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key) && roomCodeInput.length < 4) {
            roomCodeInput += e.key.toUpperCase();
        }
        if(e.code === 'Backspace') roomCodeInput = roomCodeInput.slice(0, -1);
        if(e.code === 'Enter' && roomCodeInput.length === 4) {
            sendMsg({ type: 'join_room', code: roomCodeInput });
        }
        if(e.code === 'Escape') { lobbyMode = ''; roomCodeInput = ''; }
        return;
    }
    if((gameState === 'lobby' || gameState === 'waiting') && e.code === 'Escape') {
        gameState = 'title'; isOnline = false; lobbyMode = ''; myClassSelected = false;
        if(ws) { ws.close(); ws = null; }
        return;
    }

    if(gameState === 'title' && e.code === 'Space') {
        isOnline = false; gameState = 'classSelect';
    }
    if(gameState === 'classSelect') {
        if(e.code === 'Digit1') selectClass(0);
        if(e.code === 'Digit2') selectClass(1);
        if(e.code === 'Digit3') selectClass(2);
        if(e.code === 'Digit4') selectClass(3);
    }
    if(gameState === 'dead' && e.code === 'Space' && player.respawnTimer <= 0) respawn();
    if(gameState === 'scoreboard' && e.code === 'Tab') { e.preventDefault(); gameState = 'playing'; return; }
    if(gameState === 'playing') {
        if(e.code === 'KeyR' && player.reloadTime <= 0 && !weapons[player.weapon].melee) reload();
        if(e.code === 'Tab') { e.preventDefault(); gameState = 'scoreboard'; return; }
        // 무기 전환 1~4
        if(e.code === 'Digit1') { player.currentSlot = 0; player.weapon = player.weaponSlots[0]; player.scope = false; player.reloadTime = 0; }
        if(e.code === 'Digit2') { player.currentSlot = 1; player.weapon = player.weaponSlots[1]; player.scope = false; player.reloadTime = 0; }
        if(e.code === 'Digit3') { player.currentSlot = 2; player.weapon = player.weaponSlots[2]; player.scope = false; player.reloadTime = 0; }
        if(e.code === 'Digit4') { player.currentSlot = 3; player.weapon = player.weaponSlots[3]; player.scope = false; player.reloadTime = 0; }
        // F키 빠른 근접공격 (낫)
        if(e.code === 'KeyF' && player.meleeCooldown <= 0 && !player.meleeActive) {
            player.meleeActive = true;
            player.meleeTime = 12;
            player.meleeCooldown = 20;
            meleeAttack();
        }
        if(e.code === 'ShiftLeft' && player.dashCooldown <= 0 && player.selectedClass === 0) startDash();
        if(e.code === 'KeyQ') useAbility();
    }
});

function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) * (W / rect.width),
        y: (e.clientY - rect.top) * (H / rect.height)
    };
}

function handleMouseDown(e) {
    const coords = getCanvasCoords(e);
    canvasMouseX = coords.x;
    canvasMouseY = coords.y;

    if(gameState === 'playing') {
        shooting = true;
        if(!mouseLocked) {
            try { canvas.requestPointerLock(); } catch(e) {}
        }
    } else if(gameState === 'title') {
        const btnW = 200, btnH = 50;
        const soloX = W/2 - btnW - 20, soloY = H/2 + 30;
        const onX = W/2 + 20, onY = H/2 + 30;
        if(coords.x >= soloX && coords.x <= soloX+btnW && coords.y >= soloY && coords.y <= soloY+btnH) {
            isOnline = false; gameState = 'classSelect';
        } else if(coords.x >= onX && coords.x <= onX+btnW && coords.y >= onY && coords.y <= onY+btnH) {
            gameState = 'lobby'; lobbyMode = '';
            connectToServer();
        }
    } else if(gameState === 'lobby') {
        const btnW = 260, btnH = 60;
        const crX = W/2 - btnW/2, crY = 160, jrY = 260;
        if(coords.x >= crX && coords.x <= crX+btnW && coords.y >= crY && coords.y <= crY+btnH) {
            connectToServer(() => { sendMsg({ type: 'create_room' }); });
        } else if(coords.x >= crX && coords.x <= crX+btnW && coords.y >= jrY && coords.y <= jrY+btnH) {
            lobbyMode = 'join'; roomCodeInput = '';
        }
    } else if(gameState === 'classSelect') {

            }
        }

        respawn();
    }
}

function selectClass(idx) {
    player.selectedClass = idx;
    const cls = classes[idx];
    player.weaponSlots = [cls.weapon, 4, 5, 6]; // 주무기, 권총, 낫, 수류탄
    player.currentSlot = 0;
    player.weapon = player.weaponSlots[0];
    player.maxHp = cls.hp;
    player.hp = cls.hp;
    player.armor = cls.armor;
    player.speed = cls.speed;
    player.ammo = [30, 8, 5, 1, 12, 1, 3];
    player.maxAmmo = [30, 8, 5, 1, 12, 1, 3];

    if(isOnline || networkState === 'lobby' || networkState === 'waiting' || ws) {
        // Online: send class selection and wait for start_game
        myClassSelected = true;
        sendMsg({ type: 'class_selected', selectedClass: idx });
        netMessage = '상대방을 기다리는 중...';
        netMessageTimer = 999;
        gameState = 'waiting';
    } else {
        // Solo
        respawn();
        gameState = 'playing';
        try { canvas.requestPointerLock(); } catch(e) {}
    }
}

function findSafeSpawn() {
    // 적에게서 가장 먼 스폰 포인트를 찾기
    let bestSpawn = spawnPoints[0];
    let bestMinDist = 0;
    for(const sp of spawnPoints) {
        let minDist = Infinity;
        for(const e of enemies) {
            if(e.hp <= 0) continue;
            const dx = sp.x - e.x, dz = sp.z - e.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist < minDist) minDist = dist;
        }
        if(minDist > bestMinDist) {
            bestMinDist = minDist;
            bestSpawn = sp;
        }
    }
    return bestSpawn;
}

function meleeAttack() {
    // 빠른 근접공격 - 낫 스윙
    player.spawnProtection = 0;
    const meleeRange = 35;
    const meleeDamage = 65;
    const dirX = -Math.sin(yaw);
    const dirZ = Math.cos(yaw);

    // AI 봇 히트 (솔로)
    if(!isOnline) {
        for(const e of enemies) {
            if(e.hp <= 0 || e.spawnProtection > 0) continue;
            const dx = e.x - player.x, dz = e.z - player.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if(dist > meleeRange) continue;
            // 전방 120도 범위
            const dot = (dx*dirX + dz*dirZ) / (dist || 1);
            if(dot < 0.3) continue;
            e.hp -= meleeDamage;
            addDamageNumber(e.x, e.y+16, e.z, meleeDamage, false);
            for(let i=0;i<8;i++) addParticle(e.x, e.y+8, e.z, (Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4, '#cc44ff', 15);
            if(e.hp <= 0) onEnemyKilled(e, false);
        }
    }

    // 원격 플레이어 히트 (온라인)
    if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
        const rdx = remotePlayer.x - player.x, rdz = remotePlayer.z - player.z;
        const rdist = Math.sqrt(rdx*rdx + rdz*rdz);
        if(rdist <= meleeRange) {
            const dot = (rdx*dirX + rdz*dirZ) / (rdist || 1);
            if(dot > 0.3) {
                sendMsg({ type: 'hit', damage: meleeDamage, headshot: false, weaponName: '낫' });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, meleeDamage, false);
                for(let i=0;i<8;i++) addParticle(remotePlayer.x, remotePlayer.y+8, remotePlayer.z, (Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4, '#cc44ff', 15);
            }
        }
    }

    // 네트워크 전송
    if(isOnline) sendMsg({ type:'shoot', x:player.x, y:player.y+8, z:player.z, tx:player.x+dirX*30, ty:player.y+8, tz:player.z+dirZ*30, weapon:5 });
}

function respawn() {
    const sp = findSafeSpawn();
    player.x = sp.x + (Math.random()-0.5)*20;
    player.z = sp.z + (Math.random()-0.5)*20;
    player.y = 0;

    player.currentSlot = 0;
    player.weapon = player.weaponSlots[0];
    player.ammo = [30, 8, 5, 1, 12, 1, 3];
    player.reloadTime = 0;
    player.shootCooldown = 0;
    player.killStreak = 0;
    player.scope = false;
    player.meleeActive = false;
    player.meleeTime = 0;
    player.meleeCooldown = 0;
    player.scytheDashing = false;

// ====== COLLISION ======
function checkWallCollision(x, z, radius, entityY) {
    for(const w of walls) {
        // 엔티티가 벽 위에 있으면 충돌 무시
        if(entityY !== undefined && w.h && entityY >= w.h) continue;
        const cx = Math.max(w.x, Math.min(w.x + w.w, x));
        const cz = Math.max(w.z, Math.min(w.z + w.d, z));
        const dx = x - cx, dz = z - cz;
        if(dx*dx + dz*dz < radius*radius) return w;
    }
    return null;
}

function moveWithCollision(entity, dx, dz, radius) {
    const newX = entity.x + dx;
    const newZ = entity.z + dz;
    const ey = entity.y !== undefined ? entity.y : 0;

    if(!checkWallCollision(newX, entity.z, radius, ey)) entity.x = newX;
    if(!checkWallCollision(entity.x, newZ, radius, ey)) entity.z = newZ;

    entity.x = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, entity.x));
    entity.z = Math.max(-MAP_SIZE+5, Math.min(MAP_SIZE-5, entity.z));
}

function raycast(ox, oz, dx, dz, maxDist) {
    let t = 0;
    const step = 2;
    while(t < maxDist) {
        const x = ox + dx*t;
        const z = oz + dz*t;
        if(checkWallCollision(x, z, 1)) return {hit:true, dist:t, x, z};
        t += step;
    }
    return {hit:false, dist:maxDist};
}

// ====== SHOOTING ======
function playerShoot() {
    if(player.shootCooldown > 0 || player.reloadTime > 0) return;
    const w = weapons[player.weapon];

    // 낫 (3번 슬롯 클릭) = 근접공격
    if(w.melee) {
        if(player.meleeCooldown <= 0) {
            player.meleeActive = true;
            player.meleeTime = 12;
            player.meleeCooldown = 20;
            player.shootCooldown = w.fireRate;
            meleeAttack();
        }
        return;
    }

    if(player.ammo[player.weapon] <= 0) {
        if(!w.melee) reload();
        return;
    }
    // 사격하면 스폰 보호 해제
    player.spawnProtection = 0;

    const isGrenade = w.grenade;
    player.shootCooldown = w.fireRate;
    player.ammo[player.weapon]--;
    player.muzzleFlash = isGrenade ? 0 : 4;

    const pellets = w.pellets || 1;
    for(let p = 0; p < pellets; p++) {
        const spreadX = (Math.random()-0.5) * w.spread * (player.scope ? 0.3 : 1);
        const spreadY = (Math.random()-0.5) * w.spread * (player.scope ? 0.3 : 1);
        const dirX = -Math.sin(yaw + spreadX) * Math.cos(pitch + spreadY);
        const dirZ = Math.cos(yaw + spreadX) * Math.cos(pitch + spreadY);
        const dirY = Math.sin(pitch + spreadY);

        if(w.explosive) {
            const speed = isGrenade ? 4 : 6;
            const gLife = isGrenade ? 90 : 120;
            const gvy = isGrenade ? dirY*speed + 2.5 : dirY*speed; // 수류탄은 포물선
            bullets.push({
                x:player.x, y:player.y+8, z:player.z,
                vx:dirX*speed, vy:gvy, vz:dirZ*speed,
                damage:w.damage, owner:'player', life:gLife,
                explosive:true, color:w.color, grenade:isGrenade
            });
        } else {
            // Hitscan - 화면 투영 기반 히트 판정
            let hitDist = w.range;
            let hitEnemy = null;

            for(const e of enemies) {
                if(e.hp <= 0 || e.spawnProtection > 0) continue;
                const dx3 = e.x - player.x, dz3 = e.z - player.z;
                const dist2d = Math.sqrt(dx3*dx3 + dz3*dz3);
                if(dist2d > w.range || dist2d < 1) continue;

                // 적이 화면 중앙(조준점) 근처에 있는지 투영으로 판정
                const p1 = project(e.x, e.y, e.z);         // 적 발 위치
                const p2 = project(e.x, e.y + 16, e.z);    // 적 머리 위치
                if(!p1 && !p2) continue;

                // 화면 중앙과의 거리 계산
                const screenCX = W/2, screenCY = H/2;
                let hitSize = 60; // 화면상 히트박스 크기(픽셀)
                if(p1 && p1.scale) hitSize = Math.max(40, 80 * p1.scale);

                let screenDist = Infinity;
                if(p1 && p2) {
                    // 적의 세로 범위 안에 있는지도 확인
                    const topY = Math.min(p1.y, p2.y) - hitSize/2;
                    const botY = Math.max(p1.y, p2.y) + hitSize/2;
                    const midX = (p1.x + p2.x) / 2;
                    const midY = (p1.y + p2.y) / 2;
                    const dsx = screenCX - midX;
                    const dsy = screenCY - midY;
                    screenDist = Math.sqrt(dsx*dsx + dsy*dsy);
                } else {
                    const pp = p1 || p2;
                    const dsx = screenCX - pp.x;
                    const dsy = screenCY - pp.y;
                    screenDist = Math.sqrt(dsx*dsx + dsy*dsy);
                }

                if(screenDist < hitSize && dist2d < hitDist) {
                    // 벽 체크
                    const wc = raycast(player.x, player.z, dx3/dist2d, dz3/dist2d, dist2d);
                    if(!wc.hit) {
                        hitDist = dist2d;
                        hitEnemy = e;
                    }
                }
            }

            // 원격 플레이어 피격 판정 (3D 레이캐스트 기반)
            let hitRemote = false;
            if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
                const rdx = remotePlayer.x - player.x;
                const rdz = remotePlayer.z - player.z;
                const rdy = (remotePlayer.y + 8) - (player.y + 8);
                const rdist = Math.sqrt(rdx*rdx + rdz*rdz + rdy*rdy);
                if(rdist <= w.range && rdist >= 1) {
                    // 레이와 원격 플레이어 사이의 최소 거리 계산
                    const rayLen = w.range;
                    const rx = dirX * rayLen, rz = dirZ * rayLen, ry = dirY * rayLen;
                    // 레이 위의 가장 가까운 점 계산
                    const t = Math.max(0, Math.min(1, (rdx*rx + rdz*rz + rdy*ry) / (rayLen*rayLen)));
                    const closestX = player.x + rx * t;
                    const closestZ = player.z + rz * t;
                    const closestY = (player.y + 8) + ry * t;
                    const dx2 = closestX - remotePlayer.x;
                    const dz2 = closestZ - remotePlayer.z;
                    const dy2 = closestY - (remotePlayer.y + 8);
                    const minDist = Math.sqrt(dx2*dx2 + dz2*dz2 + dy2*dy2);
                    // 히트박스 반경: 몸통 8, 높이 고려
                    const hitRadius = 10;
                    if(minDist < hitRadius) {
                        const dist2d = Math.sqrt(rdx*rdx + rdz*rdz);
                        const rwc = raycast(player.x, player.z, rdx/(dist2d||1), rdz/(dist2d||1), dist2d);
                        if(!rwc.hit) {
                            hitRemote = true;
                            hitDist = rdist;
                        }
                    }
                }
            }

            // 벽 임팩트 (적 안 맞았을 때)
            if(!hitEnemy && !hitRemote) {
                const wallHit = raycast(player.x, player.z, dirX, dirZ, w.range);
                if(wallHit.hit) {
                    for(let i=0;i<3;i++) addParticle(wallHit.x, 8, wallHit.z, (Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2, '#aaa', 15);
                    hitDist = wallHit.dist;
                }
            }

            if(hitRemote) {
                // Send hit to remote player
                const headshot = Math.random() < 0.15;
                let dmg = w.damage * (headshot ? 2.5 : 1);
                if(w.pellets) dmg = w.damage;
                sendMsg({ type: 'hit', damage: dmg, headshot, weaponName: w.name });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, Math.round(dmg), headshot);
                for(let i=0;i<5;i++) addParticle(remotePlayer.x, remotePlayer.y+8, remotePlayer.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, remotePlayer.color, 15);
            } else if(hitEnemy) {
                const headshot = Math.random() < 0.15;
                let dmg = w.damage * (headshot ? 2.5 : 1);
                if(w.pellets) dmg = w.damage;

                if(isOnline && !isHost) {
                    // Guest: send bot_hit to host
                    const botIdx = enemies.indexOf(hitEnemy);
                    sendMsg({ type: 'bot_hit', botIdx, damage: dmg, headshot, weaponName: w.name });
                    addDamageNumber(hitEnemy.x, hitEnemy.y+16, hitEnemy.z, Math.round(dmg), headshot);
                    for(let i=0;i<5;i++) addParticle(hitEnemy.x, hitEnemy.y+8, hitEnemy.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, hitEnemy.color, 15);
                } else {
                    // Solo or Host: apply damage locally
                    if(hitEnemy.armor > 0) {
                        const armorDmg = Math.min(hitEnemy.armor, dmg*0.6);
                        hitEnemy.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    hitEnemy.hp -= dmg;
                    addDamageNumber(hitEnemy.x, hitEnemy.y+16, hitEnemy.z, Math.round(dmg), headshot);
                    for(let i=0;i<5;i++) addParticle(hitEnemy.x, hitEnemy.y+8, hitEnemy.z, (Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3, hitEnemy.color, 15);
                    if(hitEnemy.hp <= 0) onEnemyKilled(hitEnemy, headshot);
                    hitEnemy.state = 'chase';
                    hitEnemy.stateTimer = 120;
                }
            }

            // Tracer
            const hitTarget = hitRemote ? remotePlayer : hitEnemy;
            const tracerTx = hitTarget ? hitTarget.x : player.x+dirX*hitDist;
            const tracerTy = hitTarget ? hitTarget.y+8 : player.y+8+dirY*hitDist;
            const tracerTz = hitTarget ? hitTarget.z : player.z+dirZ*hitDist;
            bullets.push({
                x:player.x, y:player.y+8, z:player.z,
                tx:tracerTx, ty:tracerTy, tz:tracerTz,
                life:3, tracer:true, color:w.color
            });

            // Send shoot event for tracer
            if(isOnline) {
                sendMsg({ type:'shoot', x:player.x, y:player.y+8, z:player.z, tx:tracerTx, ty:tracerTy, tz:tracerTz, weapon:player.weapon });
            }
        }
    }
}

function onEnemyKilled(enemy, headshot) {
    player.kills++;
    enemy.deaths++;
    const now = Date.now();
    if(now - player.lastKillTime < 3000) player.killStreak++;
    else player.killStreak = 1;
    player.lastKillTime = now;

    addKillFeed('나', enemy.name, weapons[player.weapon].name + (headshot?' 🎯':''));

    // Death particles
    for(let i=0;i<20;i++) addParticle(enemy.x, enemy.y+8, enemy.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, enemy.color, 30, 3);

    // Respawn enemy after delay
    setTimeout(() => {
        const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
        enemy.x = sp.x + (Math.random()-0.5)*30;
        enemy.z = sp.z + (Math.random()-0.5)*30;
        enemy.hp = enemy.maxHp;
        enemy.armor = classes[enemy.class].armor;
        enemy.state = 'patrol';
        enemy.spawnProtection = 120;
    }, 3000);
}

// ====== BOT AI ======
function findBotTarget(bot) {
    // 가장 가까운 보이는 타겟 찾기 (플레이어 또는 다른 봇)
    let bestTarget = null;
    let bestDist = Infinity;

    // 플레이어 체크
    if(gameState === 'playing' && player.hp > 0 && player.spawnProtection <= 0) {
        const dx = player.x - bot.x, dz = player.z - bot.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < 250) {
            const wallCheck = raycast(bot.x, bot.z, dx/dist, dz/dist, dist);
            if(!wallCheck.hit) {
                bestTarget = { type:'player', x:player.x, z:player.z, dist };
                bestDist = dist;
            }
        }
    }

    // 원격 플레이어 체크
    if(isOnline && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
        const rdx = remotePlayer.x - bot.x, rdz = remotePlayer.z - bot.z;
        const rdist = Math.sqrt(rdx*rdx + rdz*rdz);
        if(rdist < bestDist && rdist < 250) {
            const wc = raycast(bot.x, bot.z, rdx/rdist, rdz/rdist, rdist);
            if(!wc.hit) {
                bestTarget = { type:'remote', x:remotePlayer.x, z:remotePlayer.z, dist:rdist };
                bestDist = rdist;
            }
        }
    }

    // 다른 봇 체크
    for(const other of enemies) {
        if(other === bot || other.hp <= 0 || other.spawnProtection > 0) continue;
        const dx = other.x - bot.x, dz = other.z - bot.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if(dist < bestDist && dist < 200) {
            const wallCheck = raycast(bot.x, bot.z, dx/dist, dz/dist, dist);
            if(!wallCheck.hit) {
                bestTarget = { type:'bot', ref:other, x:other.x, z:other.z, dist };
                bestDist = dist;
            }
        }
    }
    return bestTarget;
}

function updateBot(bot) {
    if(bot.hp <= 0) return;

    bot.shootCooldown = Math.max(0, bot.shootCooldown-1);
    bot.stateTimer = Math.max(0, bot.stateTimer-1);
    bot.strafeTimer--;
    bot.muzzleFlash = Math.max(0, bot.muzzleFlash-1);
    if(bot.spawnProtection > 0) bot.spawnProtection--;

    // 타겟 찾기
    const target = findBotTarget(bot);
    let tx = 0, tz = 0, distToTarget = 999, angleToTarget = 0, canSeeTarget = false;

    if(target) {
        tx = target.x - bot.x;
        tz = target.z - bot.z;
        distToTarget = target.dist;
        angleToTarget = Math.atan2(tx, tz);
        canSeeTarget = true;
    }

    // State machine
    if(bot.stateTimer <= 0) {
        if(canSeeTarget && distToTarget < 200) {
            bot.state = distToTarget < 40 ? 'flee' : 'attack';
            bot.stateTimer = 60 + Math.random()*60;
        } else if(canSeeTarget) {
            bot.state = 'chase';
            bot.stateTimer = 90;
        } else {
            bot.state = 'patrol';
            bot.targetX = (Math.random()-0.5)*MAP_SIZE*1.5;
            bot.targetZ = (Math.random()-0.5)*MAP_SIZE*1.5;
            bot.stateTimer = 120 + Math.random()*120;
        }
    }

    let moveX = 0, moveZ = 0;

    switch(bot.state) {
        case 'patrol': {
            const tdx = bot.targetX - bot.x, tdz = bot.targetZ - bot.z;
            const td = Math.sqrt(tdx*tdx + tdz*tdz);
            if(td > 5) { moveX = tdx/td; moveZ = tdz/td; }
            else bot.stateTimer = 0;
            bot.yaw = Math.atan2(tdx, tdz);
            break;
        }
        case 'chase': {
            if(canSeeTarget) {
                moveX = tx/distToTarget;
                moveZ = tz/distToTarget;
                bot.yaw += (angleToTarget - bot.yaw) * 0.08;
                if(distToTarget < weapons[bot.weapon].range) {
                    bot.state = 'attack';
                    bot.stateTimer = 60;
                }
            } else { bot.stateTimer = 0; }
            break;
        }
        case 'attack': {
            if(canSeeTarget) {
                bot.yaw += (angleToTarget - bot.yaw) * 0.1;
                if(bot.strafeTimer <= 0) {
                    bot.strafeDir *= -1;
                    bot.strafeTimer = 30 + Math.random()*40;
                }
                const strafeAngle = bot.yaw + Math.PI/2;
                moveX = Math.sin(strafeAngle) * bot.strafeDir * 0.5;
                moveZ = Math.cos(strafeAngle) * bot.strafeDir * 0.5;

                if(bot.shootCooldown <= 0 && distToTarget < weapons[bot.weapon].range) {
                    botShoot(bot, target);
                }
            } else { bot.state = 'patrol'; bot.stateTimer = 0; }
            break;
        }
        case 'flee': {
            if(canSeeTarget) {
                moveX = -tx/distToTarget;
                moveZ = -tz/distToTarget;
                bot.yaw = angleToTarget;
                if(bot.shootCooldown <= 0) botShoot(bot, target);
                if(distToTarget > 80) { bot.state = 'attack'; bot.stateTimer = 60; }
            } else { bot.stateTimer = 0; }
            break;
        }
    }

    moveWithCollision(bot, moveX * bot.speed * 0.5, moveZ * bot.speed * 0.5, 5);

    // Bot vs bot collision (물리)
    for(const other of enemies) {
        if(other === bot || other.hp <= 0) continue;
        const bx = bot.x - other.x, bz = bot.z - other.z;
        const bd = Math.sqrt(bx*bx + bz*bz);
        if(bd < 10) {
            bot.x += (bx/bd)*2;
            bot.z += (bz/bd)*2;
        }
    }
}

function botShoot(bot, target) {
    const w = weapons[bot.weapon];
    bot.shootCooldown = w.fireRate + 20; // 더 긴 쿨다운
    bot.muzzleFlash = 4;

    const dist = target.dist;
    const spread = w.spread * (1/bot.accuracy) * (dist > 100 ? 2.0 : 1.3);
    const dx = target.x - bot.x + (Math.random()-0.5)*spread*dist;
    const dz = target.z - bot.z + (Math.random()-0.5)*spread*dist;
    const d = Math.sqrt(dx*dx + dz*dz);

    const wallHit = raycast(bot.x, bot.z, dx/d, dz/d, dist);
    if(wallHit.hit && wallHit.dist < dist) return;

    if(w.explosive) {
        bullets.push({
            x:bot.x, y:8, z:bot.z,
            vx:(dx/d)*5, vy:0.5, vz:(dz/d)*5,
            damage:w.damage*0.4, owner:'bot', ownerRef:bot, life:80,
            explosive:true, color:w.color
        });
    } else {
        const hitChance = bot.accuracy * (dist < 50 ? 0.7 : dist < 100 ? 0.4 : 0.15);

        if(target.type === 'player') {
            // 플레이어에게 사격
            if(Math.random() < hitChance && gameState === 'playing' && player.spawnProtection <= 0) {
                const pellets = w.pellets || 1;
                let totalDmg = 0;
                for(let p=0;p<pellets;p++) {
                    let dmg = w.damage * (0.5 + Math.random()*0.3);
                    if(player.armor > 0) {
                        const armorDmg = Math.min(player.armor, dmg*0.6);
                        player.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    totalDmg += dmg;
                }
                player.hp -= totalDmg;
                player.damageFlash = 15;
                addDamageNumber(player.x, player.y+16, player.z, Math.round(totalDmg), false);

                if(player.hp <= 0) {
                    player.deaths++;
                    bot.kills++;
                    player.killStreak = 0;
                    addKillFeed(bot.name, '나', weapons[bot.weapon].name);
                    gameState = 'dead';
                    player.respawnTimer = 180;
                }
            }
        } else if(target.type === 'remote') {
            // 원격 플레이어에게 사격 (호스트가 계산하고 전송)
            if(Math.random() < hitChance && remotePlayer && remotePlayer.alive && remotePlayer.spawnProtection <= 0) {
                let dmg = w.damage * (0.5 + Math.random()*0.3);
                sendMsg({ type:'hit', damage:dmg, headshot:false, weaponName:bot.name+'의 '+w.name });
                addDamageNumber(remotePlayer.x, remotePlayer.y+16, remotePlayer.z, Math.round(dmg), false);
            }
        } else if(target.type === 'bot') {
            // 다른 봇에게 사격
            const victim = target.ref;
            if(Math.random() < hitChance && victim.hp > 0 && victim.spawnProtection <= 0) {
                const pellets = w.pellets || 1;
                let totalDmg = 0;
                for(let p=0;p<pellets;p++) {
                    let dmg = w.damage * (0.5 + Math.random()*0.3);
                    if(victim.armor > 0) {
                        const armorDmg = Math.min(victim.armor, dmg*0.6);
                        victim.armor -= armorDmg;
                        dmg *= 0.4;
                    }
                    totalDmg += dmg;
                }
                victim.hp -= totalDmg;
                addDamageNumber(victim.x, victim.y+16, victim.z, Math.round(totalDmg), false);

                // 맞은 봇이 반격
                victim.state = 'chase';
                victim.stateTimer = 120;

                if(victim.hp <= 0) {
                    bot.kills++;
                    victim.deaths++;
                    addKillFeed(bot.name, victim.name, weapons[bot.weapon].name);
                    // 봇 리스폰
                    for(let i=0;i<15;i++) addParticle(victim.x, victim.y+8, victim.z, (Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5, victim.color, 30, 3);
                    setTimeout(() => {
                        const sp = spawnPoints[Math.floor(Math.random()*spawnPoints.length)];
                        victim.x = sp.x + (Math.random()-0.5)*30;
                        victim.z = sp.z + (Math.random()-0.5)*30;
                        victim.hp = victim.maxHp;
                        victim.armor = classes[victim.class].armor;
                        victim.state = 'patrol';
                        victim.spawnProtection = 120;
                    }, 3000);
                }
            }
        }
    }

    // Tracer
    bullets.push({
        x:bot.x, y:8, z:bot.z,
        tx:target.x, ty:8, tz:target.z,
        life:3, tracer:true, color:w.color
    });
}

// ====== 3D PROJECTION ======
function project(wx, wy, wz) {
    const dx = wx - player.x;
    const dy = wy - (player.y + 10);
    const dz = wz - player.z;

    const cosY = Math.cos(-yaw), sinY = Math.sin(-yaw);
    const rx = dx * cosY - dz * sinY;
    const rz = dx * sinY + dz * cosY;

    const cosP = Math.cos(-pitch), sinP = Math.sin(-pitch);
    const ry = dy * cosP - rz * sinP;
    const rz2 = dy * sinP + rz * cosP;

    if(rz2 < 1) return null;

    const fov = player.scope ? 200 : 400;
    const sx = W/2 + (rx / rz2) * fov;
    const sy = H/2 - (ry / rz2) * fov;
    const scale = fov / rz2;

    return {x:sx, y:sy, z:rz2, scale};
}

// ====== RENDER ======
function drawGround() {
    // Sky gradient
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0, '#1a0a2e');
    sky.addColorStop(0.4, '#2d1b4e');
    sky.addColorStop(0.6, '#4a2a5a');
    sky.addColorStop(1, '#1a1a2e');
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,W,H);

    // Horizon
    const horizonY = H/2 - Math.sin(pitch) * 400;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, horizonY, W, H);

    // Ground grid
    ctx.strokeStyle = 'rgba(100,100,255,0.1)';
    ctx.lineWidth = 1;
    const gridSize = 40;
    for(let gx = -MAP_SIZE; gx <= MAP_SIZE; gx += gridSize) {
        const p1 = project(gx, 0, -MAP_SIZE);
        const p2 = project(gx, 0, MAP_SIZE);
        if(p1 && p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }
    }
    for(let gz = -MAP_SIZE; gz <= MAP_SIZE; gz += gridSize) {
        const p1 = project(-MAP_SIZE, 0, gz);
        const p2 = project(MAP_SIZE, 0, gz);
        if(p1 && p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }
    }
}

function drawWall(wall) {
    const corners3D = [
        [wall.x, 0, wall.z],
        [wall.x+wall.w, 0, wall.z],
        [wall.x+wall.w, 0, wall.z+wall.d],
        [wall.x, 0, wall.z+wall.d],
        [wall.x, wall.h, wall.z],
        [wall.x+wall.w, wall.h, wall.z],
        [wall.x+wall.w, wall.h, wall.z+wall.d],
        [wall.x, wall.h, wall.z+wall.d]
    ];

    const projected = corners3D.map(c => project(c[0], c[1], c[2]));
    if(projected.every(p => !p)) return;

    const faces = [
        [0,1,5,4], // front
        [1,2,6,5], // right
        [2,3,7,6], // back
        [3,0,4,7], // left
        [4,5,6,7]  // top
    ];

    const baseColor = wall.color || '#555';
    const shades = [baseColor, shadeColor(baseColor,-20), shadeColor(baseColor,-40), shadeColor(baseColor,-20), shadeColor(baseColor,20)];

    // Sort faces by average z
    const faceData = faces.map((f, i) => {
        const avgZ = f.reduce((s,idx) => s + (projected[idx]?projected[idx].z:999), 0) / 4;
        return {indices:f, shade:shades[i], avgZ};
    }).sort((a,b) => b.avgZ - a.avgZ);

    for(const face of faceData) {
        const pts = face.indices.map(i => projected[i]).filter(p => p);
        if(pts.length < 3) continue;

        ctx.fillStyle = face.shade;
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }
}

function shadeColor(color, percent) {
    const num = parseInt(color.replace('#',''), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + percent));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
    const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
    return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

function drawEnemy(enemy) {
    if(enemy.hp <= 0) return;

    const p = project(enemy.x, enemy.y, enemy.z);
    if(!p || p.z < 2) return;

    const s = p.scale;
    const bodyH = 16 * s;
    const bodyW = 8 * s;
    const headR = 4 * s;

    // Body
    ctx.fillStyle = enemy.color;
    ctx.fillRect(p.x - bodyW/2, p.y - bodyH, bodyW, bodyH * 0.7);

    // Head
    ctx.fillStyle = shadeColor(enemy.color, 30);
    ctx.beginPath();
    ctx.arc(p.x, p.y - bodyH - headR, headR, 0, Math.PI*2);
    ctx.fill();

    // Legs
    ctx.fillStyle = shadeColor(enemy.color, -30);
    ctx.fillRect(p.x - bodyW/3, p.y - bodyH*0.3, bodyW/4, bodyH*0.3);
    ctx.fillRect(p.x + bodyW/8, p.y - bodyH*0.3, bodyW/4, bodyH*0.3);

    // Arms / weapon
    const gunDir = enemy.yaw - yaw;
    ctx.fillStyle = '#444';
    ctx.fillRect(p.x + Math.sin(gunDir)*bodyW*0.8, p.y - bodyH*0.6, bodyW*0.6, bodyW*0.15);

    // Muzzle flash
    if(enemy.muzzleFlash > 0) {
        ctx.fillStyle = `rgba(255,200,50,${enemy.muzzleFlash/4})`;
        const flashX = p.x + Math.sin(gunDir)*bodyW*1.5;
        const flashY = p.y - bodyH*0.6;
        ctx.beginPath();
        ctx.arc(flashX, flashY, 5*s, 0, Math.PI*2);
        ctx.fill();
    }

    // HP bar
    const barW = 40 * s;
    const barY = p.y - bodyH - headR*2 - 8*s;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(p.x - barW/2, barY, barW, 4*s);
    const hpRatio = enemy.hp / enemy.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#4f4' : hpRatio > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(p.x - barW/2, barY, barW * hpRatio, 4*s);

    // Name
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.max(8, 10*s)}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillText(enemy.name, p.x, barY - 2*s);

    // Distance
    const dist = Math.round(Math.sqrt((enemy.x-player.x)**2 + (enemy.z-player.z)**2));
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.max(6, 8*s)}px 'Segoe UI'`;
    ctx.fillText(dist + 'm', p.x, barY - 12*s);
}

function drawHUD() {
    const w = weapons[player.weapon];
    const cls = classes[player.selectedClass];

    // HP bar
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-60, 200, 20);
    const hpR = player.hp / player.maxHp;
    ctx.fillStyle = hpR > 0.5 ? '#4f4' : hpR > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(20, H-60, 200*hpR, 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`❤ ${Math.ceil(player.hp)} / ${player.maxHp}`, 120, H-45);

    // Armor bar
    if(player.armor > 0 || classes[player.selectedClass].armor > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(20, H-85, 200, 14);
        ctx.fillStyle = '#5bf';
        ctx.fillRect(20, H-85, 200*(player.armor/classes[player.selectedClass].armor || 0), 14);
        ctx.fillStyle = '#fff';
        ctx.font = '11px Segoe UI';
        ctx.fillText(`🛡 ${Math.ceil(player.armor)}`, 120, H-74);
    }

    // Weapon slots HUD
    const slotNames = ['1 주무기', '2 보조', '3 낫', '4 수류탄'];
    const slotW = 70, slotH = 28, slotGap = 4;
    const slotsStartX = W - (slotW + slotGap) * 4 - 10;
    ctx.textAlign = 'center';
    for(let i = 0; i < 4; i++) {
        const sx = slotsStartX + i * (slotW + slotGap);
        const sy = H - 95;
        const isActive = player.currentSlot === i;
        ctx.fillStyle = isActive ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.4)';
        ctx.fillRect(sx, sy, slotW, slotH);
        ctx.strokeStyle = isActive ? weapons[player.weaponSlots[i]].color : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.strokeRect(sx, sy, slotW, slotH);
        ctx.font = isActive ? 'bold 11px Segoe UI' : '10px Segoe UI';
        ctx.fillStyle = isActive ? '#fff' : '#999';
        ctx.fillText(slotNames[i], sx + slotW/2, sy + 18);
    }

    // Ammo (낫은 탄약 없음)
    ctx.textAlign = 'right';
    if(!w.melee) {
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillStyle = player.ammo[player.weapon] <= 5 ? '#f44' : '#fff';
        ctx.fillText(player.ammo[player.weapon] + '', W-80, H-35);
        ctx.font = '16px Segoe UI';
        ctx.fillStyle = '#aaa';
        ctx.fillText('/ ' + player.maxAmmo[player.weapon], W-30, H-35);
    } else {
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillStyle = '#cc44ff';
        ctx.fillText('∞', W-50, H-35);
    }

    // Weapon name
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = w.color;
    ctx.fillText(w.name, W-30, H-60);

    // F키 힌트
    ctx.textAlign = 'left';
    ctx.font = '11px Segoe UI';
    ctx.fillStyle = player.meleeCooldown > 0 ? '#666' : '#cc44ff';
    ctx.fillText('[F] 근접공격', 20, H-20);

    // Reload indicator
    if(player.reloadTime > 0) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 18px Segoe UI';
        ctx.fillStyle = '#ff0';
        ctx.fillText('재장전 중...', W/2, H/2 + 60);
        const rr = 1 - player.reloadTime / w.reloadSpeed;
        ctx.fillStyle = 'rgba(255,255,0,0.3)';
        ctx.fillRect(W/2-50, H/2+65, 100*rr, 4);
    }

    // Crosshair
    if(!player.scope) {
        // 조준점
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2;
        const cs = 14;
        const gap = 5;
        ctx.beginPath();
        ctx.moveTo(W/2-cs, H/2); ctx.lineTo(W/2-gap, H/2);
        ctx.moveTo(W/2+gap, H/2); ctx.lineTo(W/2+cs, H/2);
        ctx.moveTo(W/2, H/2-cs); ctx.lineTo(W/2, H/2-gap);
        ctx.moveTo(W/2, H/2+gap); ctx.lineTo(W/2, H/2+cs);
        ctx.stroke();
        // 중앙 빨간 점
        ctx.fillStyle = 'rgba(255,50,50,0.9)';
        ctx.beginPath();
        ctx.arc(W/2, H/2, 2.5, 0, Math.PI*2);
        ctx.fill();

        // 적이 조준점 근처에 있으면 빨간 조준점으로 변경
        let aimOnEnemy = false;
        for(const e of enemies) {
            if(e.hp <= 0) continue;
            const p1 = project(e.x, e.y, e.z);
            const p2 = project(e.x, e.y+16, e.z);
            if(!p1 && !p2) continue;
            const pp = p1 || p2;
            const dx = W/2 - pp.x, dy = H/2 - pp.y;
            if(Math.sqrt(dx*dx+dy*dy) < 50) { aimOnEnemy = true; break; }
        }
        if(aimOnEnemy) {
            ctx.strokeStyle = 'rgba(255,50,50,0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(W/2, H/2, 8, 0, Math.PI*2);
            ctx.stroke();
        }
    }

    // Scope overlay
    if(player.scope) {
        ctx.strokeStyle = 'rgba(0,200,255,0.6)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H);
        ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(W/2, H/2, 100, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(W/2, H/2, 200, 0, Math.PI*2);
        ctx.stroke();

        // Scope vignette
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.beginPath();
        ctx.rect(0,0,W,H);
        ctx.arc(W/2, H/2, 250, 0, Math.PI*2, true);
        ctx.fill();
    }

    // Spawn protection indicator
    if(player.spawnProtection > 0) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 16px Segoe UI';
        ctx.fillStyle = `rgba(100,200,255,${0.5 + Math.sin(Date.now()*0.01)*0.3})`;
        ctx.fillText('🛡 무적 ' + Math.ceil(player.spawnProtection/60) + '초', W/2, H/2 - 60);
        // Blue border flash
        ctx.strokeStyle = `rgba(100,200,255,${player.spawnProtection/180 * 0.3})`;
        ctx.lineWidth = 3;
        ctx.strokeRect(2, 2, W-4, H-4);
    }

    // Kill streak
    if(player.killStreak >= 2 && Date.now() - player.lastKillTime < 3000) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 24px Segoe UI';
        ctx.fillStyle = player.killStreak >= 5 ? '#f44' : player.killStreak >= 3 ? '#ff4' : '#4f4';
        const streakTexts = ['','','더블 킬!','트리플 킬!','쿼드라 킬!','펜타 킬!!','갓라이크!!!'];
        ctx.fillText(streakTexts[Math.min(player.killStreak, 6)], W/2, 80);
    }

    // KD
    ctx.textAlign = 'left';
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = '#fff';
    ctx.fillText(`킬: ${player.kills}  데스: ${player.deaths}`, 20, 30);

    // Class info
    ctx.fillStyle = cls.color;
    ctx.fillText(`${cls.name}`, 20, 50);

    // Online indicator
    if(isOnline) {
        ctx.fillStyle = '#55aaff';
        ctx.font = '12px Segoe UI';
        ctx.fillText(`온라인 | 방: ${roomCode}`, 20, 68);
    }

    // Kill feed
    ctx.textAlign = 'right';
    ctx.font = '12px Segoe UI';
    killFeed.forEach((kf, i) => {
        const alpha = Math.min(1, kf.time/60);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillText(`${kf.killer} ▸ ${kf.weapon} ▸ ${kf.victim}`, W-20, 30 + i*18);
    });

    // Minimap
    const mmSize = 120, mmX = W-mmSize-15, mmY = H-mmSize-15;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.fillRect(mmX, mmY, mmSize, mmSize);
    ctx.strokeRect(mmX, mmY, mmSize, mmSize);

    const mmScale = mmSize / (MAP_SIZE*2);

    // Walls on minimap
    ctx.fillStyle = 'rgba(100,100,150,0.5)';
    walls.forEach(w => {
        const wx = mmX + (w.x + MAP_SIZE) * mmScale;
        const wz = mmY + (w.z + MAP_SIZE) * mmScale;
        ctx.fillRect(wx, wz, Math.max(1, w.w*mmScale), Math.max(1, w.d*mmScale));
    });

    // Player on minimap
    ctx.fillStyle = '#4f4';
    const pmx = mmX + (player.x + MAP_SIZE) * mmScale;
    const pmy = mmY + (player.z + MAP_SIZE) * mmScale;
    ctx.beginPath(); ctx.arc(pmx, pmy, 3, 0, Math.PI*2); ctx.fill();
    // Direction
    ctx.strokeStyle = '#4f4';
    ctx.beginPath();
    ctx.moveTo(pmx, pmy);
    ctx.lineTo(pmx - Math.sin(yaw)*10, pmy + Math.cos(yaw)*10);
    ctx.stroke();

    // Enemies on minimap
    enemies.forEach(e => {
        if(e.hp <= 0) return;
        const ex = mmX + (e.x + MAP_SIZE) * mmScale;
        const ez = mmY + (e.z + MAP_SIZE) * mmScale;
        ctx.fillStyle = '#f44';
        ctx.beginPath(); ctx.arc(ex, ez, 2, 0, Math.PI*2); ctx.fill();
    });

    // Remote player on minimap
    if(isOnline && remotePlayer && remotePlayer.alive) {
        const rx = mmX + (remotePlayer.x + MAP_SIZE) * mmScale;
        const rz = mmY + (remotePlayer.z + MAP_SIZE) * mmScale;
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath(); ctx.arc(rx, rz, 3, 0, Math.PI*2); ctx.fill();
    }

    // Damage flash
    if(player.damageFlash > 0) {
        ctx.fillStyle = `rgba(255,0,0,${player.damageFlash/30})`;
        ctx.fillRect(0,0,W,H);
    }

    // Weapon model
    drawWeaponModel();

    // Dash cooldown (돌격병)
    if(player.selectedClass === 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(20, H-130, 80, 14);
        ctx.fillStyle = player.dashCooldown <= 0 ? '#4f4' : '#666';
        ctx.fillRect(20, H-130, 80*(1-player.dashCooldown/classes[0].abilityCooldown), 14);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(player.dashCooldown <= 0 ? 'Shift 대시' : Math.ceil(player.dashCooldown/60)+'s', 60, H-120);
    }

    // 낫 대시 쿨다운
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-110, 80, 14);
    ctx.fillStyle = player.scytheDashCooldown <= 0 ? '#c4f' : '#666';
    ctx.fillRect(20, H-110, 80*(1-player.scytheDashCooldown/120), 14);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(player.scytheDashCooldown <= 0 ? '우클릭 낫대시' : Math.ceil(player.scytheDashCooldown/60)+'s', 60, H-100);

    // Controls hint
    ctx.textAlign = 'left';
    ctx.font = '10px Segoe UI';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('WASD:이동 | 좌클릭:사격 | 우클릭:낫대시/스코프 | F:근접공격 | 1~4:무기 | R:재장전 | Tab:스코어', 20, H-10);
}

function drawWeaponModel() {
    const w = weapons[player.weapon];
    const t = Date.now();
    const isMoving = keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'];
    const bobX = isMoving ? Math.sin(t*0.01) * 3 : Math.sin(t*0.003) * 0.5;
    const bobY = isMoving ? Math.abs(Math.cos(t*0.01)) * 4 : Math.cos(t*0.004) * 0.5;
    const recoil = player.shootCooldown > 0 ? player.shootCooldown * 2 : 0;

    if(player.scope) return;

    ctx.save();

    // 총 위치: 화면 정중앙 하단 - 총구가 위를 향하는 1인칭 시점
    const gunX = W/2 + bobX;

    ctx.translate(gunX, gunY);

    const wpnIdx = player.weapon;

        ctx.strokeStyle = '#cc44ff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(3, -170);
        ctx.quadraticCurveTo(50, -180, 55, -140);
        ctx.stroke();
        // 날 면
        ctx.fillStyle = 'rgba(204,68,255,0.3)';
        ctx.beginPath();
        ctx.moveTo(3, -170);
        ctx.quadraticCurveTo(50, -180, 55, -140);
        ctx.lineTo(3, -145);
        ctx.fill();
        // 날 끝
        ctx.fillStyle = '#cc44ff';
        ctx.beginPath(); ctx.arc(55, -140, 3, 0, Math.PI*2); ctx.fill();
    } else if(wpnIdx === 6) {
        // ===== 수류탄 =====
        ctx.fillStyle = '#c4956a';
        ctx.fillRect(-8, -50, 20, 24); // 손
        // 몸통
        ctx.fillStyle = '#3a5a3a';
        ctx.beginPath(); ctx.arc(2, -80, 16, 0, Math.PI*2); ctx.fill();
        // 레버
        ctx.fillStyle = '#777';
        ctx.fillRect(-2, -100, 4, 22);
        // 핀
        ctx.fillStyle = '#ddd';
        ctx.beginPath(); ctx.arc(6, -100, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -100, 2, 0, Math.PI*2);
        ctx.fillStyle = '#aaa'; ctx.fill();
        // 줄무늬
        ctx.fillStyle = '#44cc44';
        ctx.fillRect(-14, -84, 32, 3);
        ctx.fillRect(-14, -76, 32, 3);
    }

    ctx.restore();

    // F키 근접공격 이펙트 (현재 무기와 별개로)
    if(player.meleeActive && wpnIdx !== 5) {
        ctx.save();
        const swingProgress = 1 - player.meleeTime/12;
        const swingAngle = swingProgress * Math.PI * 0.8 - 0.4;
        const slashX = W/2 + 60;
        const slashY = H - 150;
        ctx.translate(slashX, slashY);
        ctx.rotate(swingAngle - 0.5);
        // 빠른 낫 슬래시 이펙트
        ctx.strokeStyle = `rgba(204,68,255,${1 - swingProgress})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(30, -30, 40, -60);
        ctx.stroke();
        // 슬래시 호
        ctx.strokeStyle = `rgba(204,68,255,${0.6 - swingProgress*0.6})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(0, -30, 50, -Math.PI*0.3, Math.PI*0.3);
        ctx.stroke();
        ctx.restore();
    }

    // 머즐 플래시 (총구 위치에서)
    if(player.muzzleFlash > 0) {
        const muzzleY2 = gunY - (wpnIdx===3 ? 175 : wpnIdx===2 ? 210 : 190) + recoil;
        const intensity = player.muzzleFlash / 4;

        ctx.fillStyle = `rgba(255,200,50,${intensity})`;
        ctx.beginPath();
        ctx.arc(gunX, muzzleY2, 14+Math.random()*8, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = `rgba(255,255,200,${intensity})`;
        ctx.beginPath();
        ctx.arc(gunX, muzzleY2, 7, 0, Math.PI*2);
        ctx.fill();

        // 총구 불꽃 라인
        ctx.strokeStyle = `rgba(255,150,30,${intensity*0.5})`;
        ctx.lineWidth = 2;
        for(let i=0;i<5;i++){
            const a = Math.random()*Math.PI*2;
            const r = 15+Math.random()*15;
            ctx.beginPath();
            ctx.moveTo(gunX, muzzleY2);
            ctx.lineTo(gunX+Math.cos(a)*r, muzzleY2+Math.sin(a)*r);
            ctx.stroke();
        }
    }
}
