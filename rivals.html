const snowflakes = [];
for(let i = 0; i < 60; i++) {
    snowflakes.push({x: Math.random()*2000-1000, y: Math.random()*800, s: 1+Math.random()*2, sp: 0.3+Math.random()*0.7, d: Math.random()*0.5-0.25});
}

function drawGround() {
    // 겨울 하늘 — 흐리고 무거운 구름
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#4a5568');
    sky.addColorStop(0.3, '#6a7585');
    sky.addColorStop(0.5, '#8a95a0');
    sky.addColorStop(0.7, '#9aa5ae');
    sky.addColorStop(1, '#b0b8c0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 지평선 — 눈 덮인 바닥
    const horizonY = H/2 - Math.sin(pitch) * 400;
    const groundGrad = ctx.createLinearGradient(0, horizonY, 0, H);
    groundGrad.addColorStop(0, '#c8cdd2');
    groundGrad.addColorStop(0.2, '#b8bec5');
    groundGrad.addColorStop(0.5, '#a8aeb5');
    groundGrad.addColorStop(1, '#909aa2');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, horizonY, W, H);

    // 바닥 그리드 (눈 위 발자국/타이어 자국 느낌)
    ctx.strokeStyle = 'rgba(130,140,150,0.1)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    for(let gx = -MAP_SIZE; gx <= MAP_SIZE; gx += gridSize) {
        const p1 = project(gx, 0, -MAP_SIZE);
        const p2 = project(gx, 0, MAP_SIZE);
        if(p1 && p2) {
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }
    }
    for(let gz = -MAP_SIZE; gz <= MAP_SIZE; gz += gridSize) {
        const p1 = project(-MAP_SIZE, 0, gz);
        const p2 = project(MAP_SIZE, 0, gz);
        if(p1 && p2) {
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }
    }

    // 눈 내리는 이펙트
    ctx.fillStyle = 'rgba(230,235,240,0.6)';
    for(const sf of snowflakes) {
        sf.y += sf.sp;
        sf.x += sf.d;
        if(sf.y > H) { sf.y = -5; sf.x = Math.random()*W; }
        if(sf.x > W) sf.x = 0;
        if(sf.x < 0) sf.x = W;
        ctx.beginPath();
        ctx.arc(sf.x, sf.y, sf.s, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawWall(wall) {
    const corners3D = [
        [wall.x, 0, wall.z],
        [wall.x+wall.w, 0, wall.z],
        [wall.x+wall.w, 0, wall.z+wall.d],
        [wall.x, 0, wall.z+wall.d],
        [wall.x, wall.h, wall.z],
        [wall.x+wall.w, wall.h, wall.z],
        [wall.x+wall.w, wall.h, wall.z+wall.d],
        [wall.x, wall.h, wall.z+wall.d]
    ];

    const projected = corners3D.map(c => project(c[0], c[1], c[2]));
    if(projected.every(p => !p)) return;

    const faces = [
        [0,1,5,4], [1,2,6,5], [2,3,7,6], [3,0,4,7], [4,5,6,7]
    ];

    const bc = wall.color || '#555';
    const t = wall.t || '';
    const shades = [bc, shadeColor(bc,-15), shadeColor(bc,-30), shadeColor(bc,-15), shadeColor(bc,20)];

    const faceData = faces.map((f, i) => {
        const avgZ = f.reduce((s,idx) => s + (projected[idx]?projected[idx].z:999), 0) / 4;
        return {indices:f, shade:shades[i], avgZ, fi:i};
    }).sort((a,b) => b.avgZ - a.avgZ);

    for(const face of faceData) {
        const pts = face.indices.map(i => projected[i]).filter(p => p);
        if(pts.length < 3) continue;

        ctx.fillStyle = face.shade;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for(let k=1;k<pts.length;k++) ctx.lineTo(pts[k].x, pts[k].y);
        ctx.closePath();
        ctx.fill();

        // 타입별 디테일
        if(face.fi === 4) {
            // 윗면: 눈 덮인 지붕이면 하얀 오버레이
            if(t === 'roof') {
                ctx.fillStyle = 'rgba(210,220,230,0.4)';
                ctx.fill();
            }
        } else if(face.fi < 4) {
            const fW = Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
            const fH = Math.hypot(pts[0].x-pts[pts.length-1].x, pts[0].y-pts[pts.length-1].y);
            if(t === 'concrete') {
                // 콘크리트 줄무늬
                ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
                const steps = Math.min(4, Math.floor(fH/12));
                for(let s=1;s<=steps;s++){
                    const r = s/(steps+1);
                    const x1 = pts[0].x+(pts[pts.length-1].x-pts[0].x)*r;
                    const y1 = pts[0].y+(pts[pts.length-1].y-pts[0].y)*r;
                    const x2 = pts[1].x+(pts[2] ? pts[2].x-pts[1].x : 0)*r;
                    const y2 = pts[1].y+(pts[2] ? pts[2].y-pts[1].y : 0)*r;
                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                }
            } else if(t === 'metal') {
                // 금속판 접합 라인
                ctx.strokeStyle = 'rgba(150,160,170,0.12)'; ctx.lineWidth = 1;
                const steps = Math.min(3, Math.floor(fW/20));
                for(let s=1;s<=steps;s++){
                    const r = s/(steps+1);
                    const x1 = pts[0].x+(pts[1].x-pts[0].x)*r;
                    const y1 = pts[0].y+(pts[1].y-pts[0].y)*r;
                    const x2 = pts[pts.length-1].x+(pts[2]?pts[2].x-pts[pts.length-1].x:0)*r;
                    const y2 = pts[pts.length-1].y+(pts[2]?pts[2].y-pts[pts.length-1].y:0)*r;
                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                }
            } else if(t === 'wood') {
                // 나무 결 (수평선)
                ctx.strokeStyle = 'rgba(90,60,30,0.08)'; ctx.lineWidth = 1;
                for(let s=1;s<=3;s++){
                    const r = s/4;
                    const x1 = pts[0].x+(pts[pts.length-1].x-pts[0].x)*r;
                    const y1 = pts[0].y+(pts[pts.length-1].y-pts[0].y)*r;
                    const x2 = pts[1].x+(pts[2]?pts[2].x-pts[1].x:0)*r;
                    const y2 = pts[1].y+(pts[2]?pts[2].y-pts[1].y:0)*r;
                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                }
            } else if(t === 'sandbag') {
                // 모래주머니 패턴 (둥근 범프)
                ctx.fillStyle = 'rgba(100,90,70,0.1)';
                const cx = (pts[0].x+pts[1].x)/2;
                const cy = (pts[0].y+(pts[pts.length-1]?pts[pts.length-1].y:pts[0].y))/2;
                ctx.beginPath(); ctx.ellipse(cx,cy,fW*0.2,fH*0.3,0,0,Math.PI*2); ctx.fill();
            }
            // 하단 더러움 (모든 벽 공통 — 가볍게)
            if(fH > 15 && t !== 'sandbag' && t !== 'roof') {
                ctx.fillStyle = 'rgba(0,0,0,0.03)';
                const bx = Math.min(pts[0].x, pts[1].x);
                const by = (pts[pts.length-1]?pts[pts.length-1].y:pts[0].y);
                ctx.fillRect(bx, by - fH*0.2, fW, fH*0.2);
            }
        }
    }
}

function shadeColor(color, percent) {
    const num = parseInt(color.replace('#',''), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + percent));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
    const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
    return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

function drawEnemy(enemy) {
    if(!enemy || enemy.hp <= 0) return;
    try {
    const p = project(enemy.x, enemy.y, enemy.z);
    if(!p || p.z < 2) return;

    const s = p.scale;
    const t = Date.now() * 0.006;
    const isMoving = (enemy.vx && Math.abs(enemy.vx) > 0.1) || (enemy.vz && Math.abs(enemy.vz) > 0.1);
    const walkCycle = isMoving ? Math.sin(t * 1.5) : 0;
    const armSwing = isMoving ? Math.sin(t * 1.5) * 0.4 : 0;

    // 캐릭터 방향 (적이 바라보는 방향 vs 카메라 방향)
    const gunDir = enemy.yaw - yaw;
    const facingRight = Math.sin(gunDir) > 0;

    ctx.save();
    ctx.translate(p.x, p.y);

    // ===== 그림자 =====
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 6*s, 2*s, 0, 0, Math.PI*2);
    ctx.fill();

    // ===== 다리 (뒤) =====
    const legW = 3.2 * s, legH = 6 * s;
    const legSpacing = 1.8 * s;
    const backLegAngle = walkCycle * 0.5;
    const frontLegAngle = -walkCycle * 0.5;

    ctx.save();
    ctx.translate(-legSpacing, -0.5*s);
    ctx.rotate(backLegAngle);
    // 허벅지 (바지)
    const pantG = ctx.createLinearGradient(0, 0, 0, -legH*0.6);
    pantG.addColorStop(0, '#2a3a5a'); pantG.addColorStop(1, '#344870');
    ctx.fillStyle = pantG;
    drawRoundRect(-legW/2, -legH*0.6, legW, legH*0.6, 1.2*s);
    // 종아리
    ctx.fillStyle = '#253050';
    drawRoundRect(-legW/2, -legH, legW, legH*0.45, 1*s);
    // 신발
    ctx.fillStyle = '#1a1a1a';
    drawRoundRect(-legW/2 - 0.5*s, -legH - 1.5*s, legW + 1.5*s, 2.2*s, 0.8*s);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-legW/2, -legH - 1.2*s, legW*0.4, 0.6*s); // 신발 줄
    ctx.restore();

    // ===== 다리 (앞) =====
    ctx.save();
    ctx.translate(legSpacing, -0.5*s);
    ctx.rotate(frontLegAngle);
    const pantG2 = ctx.createLinearGradient(0, 0, 0, -legH*0.6);
    pantG2.addColorStop(0, '#2e4060'); pantG2.addColorStop(1, '#385078');
    ctx.fillStyle = pantG2;
    drawRoundRect(-legW/2, -legH*0.6, legW, legH*0.6, 1.2*s);
    ctx.fillStyle = '#283858';
    drawRoundRect(-legW/2, -legH, legW, legH*0.45, 1*s);
    ctx.fillStyle = '#1a1a1a';
    drawRoundRect(-legW/2 - 0.5*s, -legH - 1.5*s, legW + 1.5*s, 2.2*s, 0.8*s);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-legW/2, -legH - 1.2*s, legW*0.4, 0.6*s);
    ctx.restore();

    // ===== 몸통 (상체) =====
    const torsoW = 8 * s, torsoH = 8 * s;
    const torsoY = -legH * 0.55;

    // 팀 색상 상의
    const teamColor = enemy.color || '#f44';
    const bodyG = ctx.createLinearGradient(0, torsoY, 0, torsoY - torsoH);
    bodyG.addColorStop(0, shadeColor(teamColor, -20));
    bodyG.addColorStop(0.5, teamColor);
    bodyG.addColorStop(1, shadeColor(teamColor, 15));
    ctx.fillStyle = bodyG;
    drawRoundRect(-torsoW/2, torsoY - torsoH, torsoW, torsoH, 1.5*s);

    // 상의 디테일 — 칼라/목선
    ctx.fillStyle = shadeColor(teamColor, 30);
    drawRoundRect(-torsoW*0.3, torsoY - torsoH, torsoW*0.6, 1.8*s, 0.8*s);

    // 상의 중앙 선
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(-0.4*s, torsoY - torsoH + 1.5*s, 0.8*s, torsoH - 2*s);

    // 벨트
    ctx.fillStyle = '#2a2218';
    drawRoundRect(-torsoW/2 - 0.3*s, torsoY - 1*s, torsoW + 0.6*s, 1.5*s, 0.5*s);
    // 벨트 버클
    ctx.fillStyle = '#c0a040';
    ctx.fillRect(-1*s, torsoY - 0.8*s, 2*s, 1.2*s);

    // ===== 팔 (뒤쪽) =====
    const armW = 2.5 * s, armH = 7 * s;
    const shoulderY = torsoY - torsoH + 1.5*s;

    ctx.save();
    ctx.translate(facingRight ? -torsoW/2 - armW*0.2 : torsoW/2 + armW*0.2, shoulderY);
    ctx.rotate(-armSwing * 0.7);
    // 상완 (소매)
    ctx.fillStyle = shadeColor(teamColor, -30);
    drawRoundRect(-armW/2, 0, armW, armH*0.5, 1*s);
    // 하완 (살색)
    const skinG = ctx.createLinearGradient(0, armH*0.45, 0, armH);
    skinG.addColorStop(0, '#d4a574'); skinG.addColorStop(1, '#c09060');
    ctx.fillStyle = skinG;
    drawRoundRect(-armW/2, armH*0.45, armW, armH*0.5, 0.8*s);
    // 손
    ctx.fillStyle = '#d4a574';
    ctx.beginPath(); ctx.ellipse(0, armH, armW*0.45, armW*0.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // ===== 팔 (앞쪽 — 무기 들고 있는 팔) =====
    ctx.save();
    ctx.translate(facingRight ? torsoW/2 + armW*0.2 : -torsoW/2 - armW*0.2, shoulderY);
    ctx.rotate(armSwing * 0.5 - 0.3); // 약간 앞으로 (무기 잡기)
    ctx.fillStyle = shadeColor(teamColor, -25);
    drawRoundRect(-armW/2, 0, armW, armH*0.5, 1*s);
    const skinG2 = ctx.createLinearGradient(0, armH*0.45, 0, armH);
    skinG2.addColorStop(0, '#d4a574'); skinG2.addColorStop(1, '#c09060');
    ctx.fillStyle = skinG2;
    drawRoundRect(-armW/2, armH*0.45, armW, armH*0.5, 0.8*s);
    // 손에 무기
    ctx.fillStyle = '#333';
    ctx.fillRect(-armW*0.3, armH*0.7, armW*1.4, armW*0.3);
    ctx.fillStyle = '#555';
    const gunLen = 5 * s;
    ctx.fillRect(facingRight ? armW*0.4 : -armW*0.4 - gunLen, armH*0.6, gunLen, armW*0.25);
    ctx.restore();

    // ===== 목 =====
    const neckY = torsoY - torsoH;
    ctx.fillStyle = '#c89870';
    drawRoundRect(-1.5*s, neckY - 2*s, 3*s, 2.5*s, 0.8*s);

    // ===== 머리 =====
    const headR = 4 * s;
    const headY = neckY - headR - 1.5*s;

    // 머리 형태 (얼굴)
    const headG = ctx.createRadialGradient(0, headY, headR*0.2, 0, headY, headR);
    headG.addColorStop(0, '#e0b898'); headG.addColorStop(0.7, '#d4a574'); headG.addColorStop(1, '#c09060');
    ctx.fillStyle = headG;
    ctx.beginPath();
    ctx.ellipse(0, headY, headR, headR*1.05, 0, 0, Math.PI*2);
    ctx.fill();

    // 머리카락
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath();
    ctx.ellipse(0, headY - headR*0.3, headR*1.05, headR*0.7, 0, Math.PI, Math.PI*2);
    ctx.fill();
    // 앞머리
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath();
    ctx.ellipse(-headR*0.3, headY - headR*0.7, headR*0.5, headR*0.35, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headR*0.3, headY - headR*0.7, headR*0.45, headR*0.3, 0.2, 0, Math.PI*2);
    ctx.fill();

    // 눈
    const eyeSpacing = headR * 0.35;
    const eyeY = headY + headR * 0.05;
    // 눈 흰자
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-eyeSpacing, eyeY, headR*0.2, headR*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeSpacing, eyeY, headR*0.2, headR*0.15, 0, 0, Math.PI*2); ctx.fill();
    // 눈동자
    const lookX = Math.sin(gunDir) * headR * 0.08;
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath(); ctx.ellipse(-eyeSpacing + lookX, eyeY, headR*0.1, headR*0.12, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeSpacing + lookX, eyeY, headR*0.1, headR*0.12, 0, 0, Math.PI*2); ctx.fill();
    // 눈썹
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 0.8 * s;
    ctx.beginPath();
    ctx.moveTo(-eyeSpacing - headR*0.2, eyeY - headR*0.25);
    ctx.lineTo(-eyeSpacing + headR*0.2, eyeY - headR*0.22);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(eyeSpacing - headR*0.2, eyeY - headR*0.22);
    ctx.lineTo(eyeSpacing + headR*0.2, eyeY - headR*0.25);
    ctx.stroke();

    // 코
    ctx.fillStyle = '#c49060';
    ctx.beginPath();
    ctx.moveTo(0, eyeY + headR*0.1);
    ctx.lineTo(-headR*0.08, eyeY + headR*0.35);
    ctx.lineTo(headR*0.08, eyeY + headR*0.35);
    ctx.closePath();
    ctx.fill();

    // 입
    ctx.strokeStyle = '#a06040';
    ctx.lineWidth = 0.6 * s;
    ctx.beginPath();
    ctx.arc(0, eyeY + headR*0.55, headR*0.15, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // 귀
    ctx.fillStyle = '#d4a574';
    ctx.beginPath(); ctx.ellipse(-headR*0.95, headY + headR*0.1, headR*0.18, headR*0.3, -0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(headR*0.95, headY + headR*0.1, headR*0.18, headR*0.3, 0.1, 0, Math.PI*2); ctx.fill();

    // ===== 머즐 플래시 =====
    if(enemy.muzzleFlash > 0) {
        const flashX = (facingRight ? 1 : -1) * (torsoW/2 + 8*s);
        const flashY = shoulderY + armH*0.7;
        ctx.fillStyle = `rgba(255,200,50,${enemy.muzzleFlash/4})`;
        ctx.beginPath();
        ctx.arc(flashX, flashY, 5*s, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = `rgba(255,255,200,${enemy.muzzleFlash/4})`;
        ctx.beginPath();
        ctx.arc(flashX, flashY, 2.5*s, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.restore();

    // ===== HP바 =====
    const totalH = (legH + torsoH + headR*2 + 6) * s;
    const barW = 40 * s;
    const barY = p.y - totalH - 4*s;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(p.x - barW/2, barY, barW, 4*s);
    const hpRatio = enemy.hp / enemy.maxHp;
    ctx.fillStyle = hpRatio > 0.5 ? '#4f4' : hpRatio > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(p.x - barW/2, barY, barW * hpRatio, 4*s);

    // 이름
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.max(8, 10*s)}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillText(enemy.name, p.x, barY - 2*s);

    // 거리
    const dist = Math.round(Math.sqrt((enemy.x-player.x)**2 + (enemy.z-player.z)**2));
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.max(6, 8*s)}px 'Segoe UI'`;
    ctx.fillText(dist + 'm', p.x, barY - 12*s);
    } catch(e) { /* drawEnemy 오류 방지 */ }
}

// 둥근 사각형 헬퍼
function drawRoundRect(x, y, w, h, r) {
    if(!isFinite(x+y+w+h+r) || w <= 0 || h <= 0) { ctx.fillRect(x,y,w||1,h||1); return; }
    r = Math.max(0, Math.min(r, w/2, h/2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
}

function drawHUD() {
    const w = weapons[player.weapon];
    const cls = classes[player.selectedClass];

    // HP bar
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-60, 200, 20);
    const hpR = player.hp / player.maxHp;
    ctx.fillStyle = hpR > 0.5 ? '#4f4' : hpR > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(20, H-60, 200*hpR, 20);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`❤ ${Math.ceil(player.hp)} / ${player.maxHp}`, 120, H-45);

    // Armor bar
    if(player.armor > 0 || classes[player.selectedClass].armor > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(20, H-85, 200, 14);
        ctx.fillStyle = '#5bf';
        ctx.fillRect(20, H-85, 200*(player.armor/classes[player.selectedClass].armor || 0), 14);
        ctx.fillStyle = '#fff';
        ctx.font = '11px Segoe UI';
        ctx.fillText(`🛡 ${Math.ceil(player.armor)}`, 120, H-74);
    }

    // Weapon slots HUD
    const slotNames = ['1 주무기', '2 보조', '3 낫', '4 수류탄'];
    const slotW = 70, slotH = 28, slotGap = 4;
    const slotsStartX = W - (slotW + slotGap) * 4 - 10;
    ctx.textAlign = 'center';
    for(let i = 0; i < 4; i++) {
        const sx = slotsStartX + i * (slotW + slotGap);
        const sy = H - 95;
        const isActive = player.currentSlot === i;
        ctx.fillStyle = isActive ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.4)';
        ctx.fillRect(sx, sy, slotW, slotH);
        ctx.strokeStyle = isActive ? weapons[player.weaponSlots[i]].color : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.strokeRect(sx, sy, slotW, slotH);
        ctx.font = isActive ? 'bold 11px Segoe UI' : '10px Segoe UI';
        ctx.fillStyle = isActive ? '#fff' : '#999';
        ctx.fillText(slotNames[i], sx + slotW/2, sy + 18);
    }

    // Ammo (낫은 탄약 없음)
    ctx.textAlign = 'right';
    if(!w.melee) {
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillStyle = player.ammo[player.weapon] <= 5 ? '#f44' : '#fff';
        ctx.fillText(player.ammo[player.weapon] + '', W-80, H-35);
        ctx.font = '16px Segoe UI';
        ctx.fillStyle = '#aaa';
        ctx.fillText('/ ' + player.maxAmmo[player.weapon], W-30, H-35);
    } else {
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillStyle = '#cc44ff';
        ctx.fillText('∞', W-50, H-35);
    }

    // Weapon name
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = w.color;
    ctx.fillText(w.name, W-30, H-60);

    // F키 힌트
    ctx.textAlign = 'left';
    ctx.font = '11px Segoe UI';
    ctx.fillStyle = player.meleeCooldown > 0 ? '#666' : '#cc44ff';
    ctx.fillText('[F] 근접공격', 20, H-20);

    // Reload indicator
    if(player.reloadTime > 0) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 18px Segoe UI';
        ctx.fillStyle = '#ff0';
        ctx.fillText('재장전 중...', W/2, H/2 + 60);
        const rr = 1 - player.reloadTime / w.reloadSpeed;
        ctx.fillStyle = 'rgba(255,255,0,0.3)';
        ctx.fillRect(W/2-50, H/2+65, 100*rr, 4);
    }

    // Crosshair
    if(!player.scope) {
        // 조준점
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2;
        const cs = 14;
        const gap = 5;
        ctx.beginPath();
        ctx.moveTo(W/2-cs, H/2); ctx.lineTo(W/2-gap, H/2);
        ctx.moveTo(W/2+gap, H/2); ctx.lineTo(W/2+cs, H/2);
        ctx.moveTo(W/2, H/2-cs); ctx.lineTo(W/2, H/2-gap);
        ctx.moveTo(W/2, H/2+gap); ctx.lineTo(W/2, H/2+cs);
        ctx.stroke();
        // 중앙 빨간 점
        ctx.fillStyle = 'rgba(255,50,50,0.9)';
        ctx.beginPath();
        ctx.arc(W/2, H/2, 2.5, 0, Math.PI*2);
        ctx.fill();

        // 적이 조준점 근처에 있으면 빨간 조준점으로 변경
        let aimOnEnemy = false;
        for(const e of enemies) {
            if(e.hp <= 0) continue;
            const p1 = project(e.x, e.y, e.z);
            const p2 = project(e.x, e.y+16, e.z);
            if(!p1 && !p2) continue;
            const pp = p1 || p2;
            const dx = W/2 - pp.x, dy = H/2 - pp.y;
            if(Math.sqrt(dx*dx+dy*dy) < 50) { aimOnEnemy = true; break; }
        }
        if(aimOnEnemy) {
            ctx.strokeStyle = 'rgba(255,50,50,0.9)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(W/2, H/2, 8, 0, Math.PI*2);
            ctx.stroke();
        }
    }

    // Scope / ADS overlay
    if(player.scope) {
        if(player.weapon === 2) {
            // 스나이퍼: 스코프 오버레이
            ctx.strokeStyle = 'rgba(0,200,255,0.6)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H);
            ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
            ctx.stroke();
            ctx.beginPath(); ctx.arc(W/2, H/2, 100, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(W/2, H/2, 200, 0, Math.PI*2); ctx.stroke();
            // 비네트
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.beginPath(); ctx.rect(0,0,W,H);
            ctx.arc(W/2, H/2, 250, 0, Math.PI*2, true); ctx.fill();
        } else {
            // 일반 무기: ADS 효과 (화면 살짝 어둡게 + 정밀 크로스헤어)
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,W,H);
            // 정밀 조준선
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W/2-15, H/2); ctx.lineTo(W/2-5, H/2);
            ctx.moveTo(W/2+5, H/2); ctx.lineTo(W/2+15, H/2);
            ctx.moveTo(W/2, H/2-15); ctx.lineTo(W/2, H/2-5);
            ctx.moveTo(W/2, H/2+5); ctx.lineTo(W/2, H/2+15);
            ctx.stroke();
        }
    }

    // Spawn protection indicator
    if(player.spawnProtection > 0) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 16px Segoe UI';
        ctx.fillStyle = `rgba(100,200,255,${0.5 + Math.sin(Date.now()*0.01)*0.3})`;
        ctx.fillText('🛡 무적 ' + Math.ceil(player.spawnProtection/60) + '초', W/2, H/2 - 60);
        // Blue border flash
        ctx.strokeStyle = `rgba(100,200,255,${player.spawnProtection/180 * 0.3})`;
        ctx.lineWidth = 3;
        ctx.strokeRect(2, 2, W-4, H-4);
    }

    // Kill streak
    if(player.killStreak >= 2 && Date.now() - player.lastKillTime < 3000) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 24px Segoe UI';
        ctx.fillStyle = player.killStreak >= 5 ? '#f44' : player.killStreak >= 3 ? '#ff4' : '#4f4';
        const streakTexts = ['','','더블 킬!','트리플 킬!','쿼드라 킬!','펜타 킬!!','갓라이크!!!'];
        ctx.fillText(streakTexts[Math.min(player.killStreak, 6)], W/2, 80);
    }

    // KD
    ctx.textAlign = 'left';
    ctx.font = 'bold 14px Segoe UI';
    ctx.fillStyle = '#fff';
    ctx.fillText(`킬: ${player.kills}  데스: ${player.deaths}`, 20, 30);

    // Class info
    ctx.fillStyle = cls.color;
    ctx.fillText(`${cls.name}`, 20, 50);

    // 레벨 & 랭크 HUD (우상단)
    const hRank = getCurrentRank();
    ctx.textAlign = 'right';
    ctx.font = 'bold 13px Segoe UI';
    ctx.fillStyle = hRank.color;
    ctx.fillText(`${hRank.icon} ${hRank.name}`, W-20, 55);
    ctx.font = 'bold 15px Segoe UI';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Lv.${progression.level}`, W-20, 73);
    // XP 미니바
    const hXpR = progression.xp / xpForLevel(progression.level);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(W-120, 78, 100, 5);
    ctx.fillStyle = hRank.color;
    ctx.fillRect(W-120, 78, 100 * hXpR, 5);

    // XP 획득 애니메이션
    for(let i = xpGainAnim.length-1; i >= 0; i--) {
        const xa = xpGainAnim[i];
        xa.time--;
        if(xa.time <= 0) { xpGainAnim.splice(i,1); continue; }
        const alpha = Math.min(1, xa.time / 30);
        const offsetY = (60 - xa.time) * 0.5;
        ctx.font = 'bold 14px Segoe UI';
        ctx.fillStyle = `rgba(100,255,100,${alpha})`;
        ctx.textAlign = 'center';
        ctx.fillText(`+${xa.amount} XP`, W/2, 110 + offsetY);
    }

    // 레벨업 애니메이션
    if(levelUpAnim > 0) {
        levelUpAnim--;
        const a = Math.min(1, levelUpAnim / 30);
        const scale = 1 + (120 - levelUpAnim) * 0.003;
        ctx.save();
        ctx.textAlign = 'center';
        ctx.font = `bold ${Math.floor(32 * scale)}px Segoe UI`;
        ctx.fillStyle = `rgba(255,215,0,${a})`;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 20 * a;
        ctx.fillText(`⬆ LEVEL UP! Lv.${progression.level}`, W/2, 60);
        ctx.shadowBlur = 0;
        ctx.restore();
        // 10레벨 배수면 스킨 보상 알림
        if(progression.level % 10 === 0 && levelUpAnim === 80) {
            const skinIdx = Math.floor(progression.level / 10);
            if(skinIdx < GUN_SKINS.length) {
                pendingSkinReward = GUN_SKINS[skinIdx];
            }
        }
    }

    // 스킨 보상 알림
    if(pendingSkinReward) {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(W/2-180, H/2-80, 360, 160);
        ctx.strokeStyle = '#cc66ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(W/2-180, H/2-80, 360, 160);
        ctx.textAlign = 'center';
        ctx.font = 'bold 22px Segoe UI';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('🎉 새 스킨 해금!', W/2, H/2-45);
        ctx.font = 'bold 20px Segoe UI';
        ctx.fillStyle = '#fff';
        ctx.fillText(pendingSkinReward.name, W/2, H/2-15);
        ctx.font = '14px Segoe UI';
        ctx.fillStyle = '#aaa';
        ctx.fillText(pendingSkinReward.desc, W/2, H/2+10);
        // 컬러 미리보기
        ctx.fillStyle = pendingSkinReward.colors.body;
        ctx.fillRect(W/2-60, H/2+22, 40, 15);
        ctx.fillStyle = pendingSkinReward.colors.accent;
        ctx.fillRect(W/2-15, H/2+22, 40, 15);
        ctx.fillStyle = pendingSkinReward.colors.barrel;
        ctx.fillRect(W/2+30, H/2+22, 30, 15);
        ctx.font = '12px Segoe UI';
        ctx.fillStyle = '#888';
        ctx.fillText('아무 키를 눌러 닫기', W/2, H/2+65);
    }

    ctx.textAlign = 'left';

    // Online indicator
    if(isOnline) {
        ctx.fillStyle = '#55aaff';
        ctx.font = '12px Segoe UI';
        ctx.fillText(`온라인 | 방: ${roomCode}`, 20, 68);
    }

    // Save & Quit 버튼 (좌상단)
    const sqX = W - 130, sqY = H - 30;
    ctx.fillStyle = 'rgba(255,60,60,0.6)';
    ctx.beginPath();
    ctx.roundRect(sqX, sqY, 115, 26, 6);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,100,100,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('💾 SAVE & QUIT', sqX + 57, sqY + 17);
    ctx.textAlign = 'left';

    // Kill feed
    ctx.textAlign = 'right';
    ctx.font = '12px Segoe UI';
    killFeed.forEach((kf, i) => {
        const alpha = Math.min(1, kf.time/60);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillText(`${kf.killer} ▸ ${kf.weapon} ▸ ${kf.victim}`, W-20, 30 + i*18);
    });

    // Minimap
    const mmSize = 120, mmX = W-mmSize-15, mmY = H-mmSize-15;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.fillRect(mmX, mmY, mmSize, mmSize);
    ctx.strokeRect(mmX, mmY, mmSize, mmSize);

    const mmScale = mmSize / (MAP_SIZE*2);

    // Walls on minimap
    ctx.fillStyle = 'rgba(100,100,150,0.5)';
    walls.forEach(w => {
        const wx = mmX + (w.x + MAP_SIZE) * mmScale;
        const wz = mmY + (w.z + MAP_SIZE) * mmScale;
        ctx.fillRect(wx, wz, Math.max(1, w.w*mmScale), Math.max(1, w.d*mmScale));
    });

    // Player on minimap
    ctx.fillStyle = '#4f4';
    const pmx = mmX + (player.x + MAP_SIZE) * mmScale;
    const pmy = mmY + (player.z + MAP_SIZE) * mmScale;
    ctx.beginPath(); ctx.arc(pmx, pmy, 3, 0, Math.PI*2); ctx.fill();
    // Direction
    ctx.strokeStyle = '#4f4';
    ctx.beginPath();
    ctx.moveTo(pmx, pmy);
    ctx.lineTo(pmx - Math.sin(yaw)*10, pmy + Math.cos(yaw)*10);
    ctx.stroke();

    // Enemies on minimap
    enemies.forEach(e => {
        if(e.hp <= 0) return;
        const ex = mmX + (e.x + MAP_SIZE) * mmScale;
        const ez = mmY + (e.z + MAP_SIZE) * mmScale;
        ctx.fillStyle = '#f44';
        ctx.beginPath(); ctx.arc(ex, ez, 2, 0, Math.PI*2); ctx.fill();
    });

    // Remote player on minimap
    if(isOnline && remotePlayer && remotePlayer.alive) {
        const rx = mmX + (remotePlayer.x + MAP_SIZE) * mmScale;
        const rz = mmY + (remotePlayer.z + MAP_SIZE) * mmScale;
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath(); ctx.arc(rx, rz, 3, 0, Math.PI*2); ctx.fill();
    }

    // Damage flash
    if(player.damageFlash > 0) {
        ctx.fillStyle = `rgba(255,0,0,${player.damageFlash/30})`;
        ctx.fillRect(0,0,W,H);
    }

    // Weapon model
    drawWeaponModel();

    // Dash cooldown (돌격병)
    if(player.selectedClass === 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(20, H-130, 80, 14);
        ctx.fillStyle = player.dashCooldown <= 0 ? '#4f4' : '#666';
        ctx.fillRect(20, H-130, 80*(1-player.dashCooldown/classes[0].abilityCooldown), 14);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(player.dashCooldown <= 0 ? 'Shift 대시' : Math.ceil(player.dashCooldown/60)+'s', 60, H-120);
    }

    // 낫 대시 쿨다운
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-110, 80, 14);
    ctx.fillStyle = player.scytheDashCooldown <= 0 ? '#c4f' : '#666';
    ctx.fillRect(20, H-110, 80*(1-player.scytheDashCooldown/120), 14);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(player.scytheDashCooldown <= 0 ? '우클릭 낫대시' : Math.ceil(player.scytheDashCooldown/60)+'s', 60, H-100);

    // 슬라이딩 쿨다운
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(20, H-90, 80, 14);
    ctx.fillStyle = player.slideCooldown <= 0 ? '#6cf' : '#666';
    ctx.fillRect(20, H-90, 80*(1-player.slideCooldown/120), 14);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(player.sliding ? '슬라이딩!' : (player.slideCooldown <= 0 ? 'C 슬라이드' : Math.ceil(player.slideCooldown/60)+'s'), 60, H-80);

    // Controls hint
    ctx.textAlign = 'left';
    ctx.font = '10px Segoe UI';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('WASD:이동 | 좌클릭:사격 | 우클릭:조준/낫대시 | C:슬라이딩 | F:근접 | 1~4:무기 | R:재장전', 20, H-10);
}

function drawWeaponModel() {
    const w = weapons[player.weapon];
    const t = Date.now();
    const isMoving = keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'];
    const bobX = isMoving ? Math.sin(t*0.008) * 5 : Math.sin(t*0.002) * 1;
    const bobY = isMoving ? Math.abs(Math.cos(t*0.008)) * 6 : Math.cos(t*0.003) * 1;
    const recoilKick = player.shootCooldown > 0 ? player.shootCooldown * 1.5 : 0;

    const wpnIdx = player.weapon;

    // 스나이퍼 스코프 모드에서는 총 숨김
    if(player.scope && wpnIdx === 2) return;

    // 원래 스타일: 화면 우하단, 총구가 왼쪽(앞)을 향함
    const adsLerp = player.adsAmount;

    // 위치: idle(우하단) -> ADS(중앙)
    const baseX = (W * 0.62 + bobX) * (1-adsLerp) + (W * 0.50) * adsLerp;
    const baseY = (H * 0.72 + bobY) * (1-adsLerp) + (H * 0.60 + bobY*0.3) * adsLerp;

    ctx.save();
    ctx.translate(baseX, baseY);
    ctx.rotate(-0.15);

    // 3D 면 헬퍼
    function box3D(x, y, bw, bh, depth, face, top, side) {
        const sx = depth * 0.35, sy = -depth * 0.5;
        // 윗면
        if(top) {
            ctx.fillStyle = top;
            ctx.beginPath();
            ctx.moveTo(x, y); ctx.lineTo(x+sx, y+sy);
            ctx.lineTo(x+bw+sx, y+sy); ctx.lineTo(x+bw, y);
            ctx.closePath(); ctx.fill();
        }
        // 옆면
        if(side) {
            ctx.fillStyle = side;
            ctx.beginPath();
            ctx.moveTo(x+bw, y); ctx.lineTo(x+bw+sx, y+sy);
            ctx.lineTo(x+bw+sx, y+bh+sy); ctx.lineTo(x+bw, y+bh);
            ctx.closePath(); ctx.fill();
        }
        // 앞면
        ctx.fillStyle = face;
        ctx.fillRect(x, y, bw, bh);
    }

    // 3D 원통 (가로)
    function tube(x, y, len, r, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y - r, len, r*2);
        const g = ctx.createLinearGradient(x, y-r, x, y+r);
        g.addColorStop(0, 'rgba(255,255,255,0.12)');
        g.addColorStop(0.4, 'rgba(255,255,255,0.02)');
        g.addColorStop(1, 'rgba(0,0,0,0.15)');
        ctx.fillStyle = g;
        ctx.fillRect(x, y - r, len, r*2);
        // 총구 쪽 원
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.ellipse(x, y, r, r*0.7, 0, 0, Math.PI*2); ctx.fill();
    }

    // 밀리터리 팔 (긴 전투복 소매 + 택티컬 장갑)
    function drawArm(x, y, angle, len) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(-1, 1);
        ctx.rotate(-angle);

        // === 전투복 소매 (팔뚝~어깨) ===
        // 팔 두께 (어깨 쪽 두껍게, 손목 쪽 가늘게)
        const armW1 = 18; // 어깨 쪽
        const armW2 = 13; // 손목 쪽
        // OCP/멀티캠 기본색
        const sleeveGrad = ctx.createLinearGradient(0, -armW1/2, 0, armW1/2);
        sleeveGrad.addColorStop(0, '#5a6a48'); sleeveGrad.addColorStop(0.3, '#4e5e3c');
        sleeveGrad.addColorStop(0.7, '#435332'); sleeveGrad.addColorStop(1, '#3a4a2a');
        ctx.fillStyle = sleeveGrad;
        // 사다리꼴 팔 (어깨→손목)
        ctx.beginPath();
        ctx.moveTo(-10, -armW1/2); ctx.lineTo(len-10, -armW2/2);
        ctx.lineTo(len-10, armW2/2); ctx.lineTo(-10, armW1/2);
        ctx.closePath(); ctx.fill();

        // 멀티캠 위장 패턴 (불규칙)
        const camoColors = ['rgba(80,70,40,0.18)', 'rgba(50,45,25,0.15)', 'rgba(100,90,60,0.12)', 'rgba(35,40,20,0.2)'];
        for(let i = 0; i < Math.floor(len/12); i++) {
            ctx.fillStyle = camoColors[i % camoColors.length];
            const cx = -5 + i*12 + Math.sin(i*2.3)*3;
            const cy = -6 + Math.sin(i*1.7)*4;
            const cw = 8 + Math.sin(i*3.1)*3;
            const ch = 5 + Math.cos(i*2.7)*2;
            ctx.beginPath();
            ctx.ellipse(cx, cy, cw/2, ch/2, i*0.3, 0, Math.PI*2);
            ctx.fill();
        }
        // 소매 주름 (빛 반사)
        ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
        for(let i = 0; i < 3; i++) {
            const px = 10 + i * (len/4);
            ctx.beginPath();
            ctx.moveTo(px, -armW1/2+3); ctx.lineTo(px+8, -armW2/2+2);
            ctx.stroke();
        }
        // 소매 그림자 (하단)
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.beginPath();
        ctx.moveTo(-10, armW1/2-4); ctx.lineTo(len-10, armW2/2-3);

    const activeSkin = getSkinForWeapon(player.weapon);
    if (activeSkin.id !== 'default') {
        // source-atop: 이미 그려진 무기 픽셀 위에만 색상 적용
        ctx.globalCompositeOperation = 'source-atop';
        ctx.globalAlpha = 0.45;
        ctx.fillStyle = activeSkin.colors.body;
        ctx.fillRect(-300, -150, 600, 300);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
        // 악센트 글로우 라인
        ctx.strokeStyle = activeSkin.colors.accent;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.005)*0.15;
        ctx.beginPath();
        ctx.moveTo(-80, -6); ctx.lineTo(60, -14);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-80, 6); ctx.lineTo(60, 14);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    ctx.restore();

    // F키 근접공격 이펙트
    if(player.meleeActive && wpnIdx !== 5) {
        ctx.save();
        const swP = 1 - player.meleeTime/12;
        const swA = swP * Math.PI * 0.8 - 0.4;
        ctx.translate(W/2 + 80, H/2 - 30);
        ctx.rotate(swA - 0.5);
        ctx.shadowColor = '#cc44ff'; ctx.shadowBlur = 15;
        ctx.strokeStyle = `rgba(204,68,255,${1-swP})`;
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(40,-40,55,-75); ctx.stroke();
        ctx.strokeStyle = `rgba(204,68,255,${0.6-swP*0.6})`;
        ctx.lineWidth = 8;
        ctx.beginPath(); ctx.arc(0,-35,60,-Math.PI*0.3,Math.PI*0.3); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// ====== SKIN SELECT SCREEN ======
let skinSelectWeapon = 0; // 현재 선택 중인 무기 인덱스
let skinSelectScroll = 0;

function drawSkinSelect() {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0,0,W,H);
    canvas.style.cursor = 'default';

    // 방문 시 seenSkinReward 업데이트
    progression.seenSkinReward = Math.max(progression.seenSkinReward, progression.unlockedSkins.length - 1);
    saveProgression();

    ctx.textAlign = 'center';
    ctx.font = 'bold 36px Segoe UI';
    ctx.fillStyle = '#cc66ff';
    ctx.fillText('🎨 스킨 선택', W/2, 45);

    // 무기 탭
    ctx.font = 'bold 13px Segoe UI';
    const tabW = 110, tabH = 32;
    for (let i = 0; i < 7; i++) {
        const tx = 30 + i * (tabW + 6);
        const ty = 60;
        const isActive = skinSelectWeapon === i;
        const hover = canvasMouseX >= tx && canvasMouseX <= tx+tabW && canvasMouseY >= ty && canvasMouseY <= ty+tabH;
        ctx.fillStyle = isActive ? 'rgba(200,100,255,0.35)' : (hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)');
        ctx.strokeStyle = isActive ? '#cc66ff' : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.fillRect(tx, ty, tabW, tabH);
        ctx.strokeRect(tx, ty, tabW, tabH);
        ctx.fillStyle = isActive ? '#fff' : '#aaa';
        ctx.fillText(weapons[i].name, tx + tabW/2, ty + 22);
        if(hover) canvas.style.cursor = 'pointer';
    }

    // 현재 장착 스킨
    const equippedId = progression.equippedSkins[skinSelectWeapon] || 'default';
    const equippedSkin = GUN_SKINS.find(s => s.id === equippedId) || GUN_SKINS[0];
    ctx.font = '14px Segoe UI';
    ctx.fillStyle = '#888';
    ctx.fillText(`현재 장착: ${equippedSkin.name}`, W/2, 115);

    // 스킨 카드 그리기
    const cardW = 160, cardH = 200, cardGap = 15;
    const cardsPerRow = 5;
    const startX = (W - (cardW * cardsPerRow + cardGap * (cardsPerRow-1))) / 2;
    const startY = 135;

    GUN_SKINS.forEach((skin, i) => {
        const row = Math.floor(i / cardsPerRow);
        const col = i % cardsPerRow;
        const cx = startX + col * (cardW + cardGap);
        const cy = startY + row * (cardH + cardGap);

        if (cy > H) return; // 화면 밖

        const unlocked = progression.unlockedSkins.includes(skin.id);
        const equipped = equippedId === skin.id;
        const hover = canvasMouseX >= cx && canvasMouseX <= cx+cardW && canvasMouseY >= cy && canvasMouseY <= cy+cardH;

        // 카드 배경
        ctx.fillStyle = equipped ? 'rgba(200,100,255,0.2)' : (unlocked ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.4)');
        ctx.strokeStyle = equipped ? '#cc66ff' : (unlocked ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)');
        ctx.lineWidth = equipped ? 3 : 1;
        ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 8); ctx.fill(); ctx.stroke();
        if(hover && unlocked) canvas.style.cursor = 'pointer';

        // 총 미리보기 (컬러 박스)
        const prevY = cy + 20;
        ctx.fillStyle = skin.colors.body;
        ctx.fillRect(cx + 20, prevY, cardW - 40, 14);
        ctx.fillStyle = skin.colors.accent;
        ctx.fillRect(cx + 20, prevY + 14, cardW - 40, 6);
        ctx.fillStyle = skin.colors.barrel;
        ctx.fillRect(cx + 20, prevY + 20, (cardW - 40) * 0.7, 10);

        // 미리보기: 총 모양 그리기
        ctx.save();
        ctx.translate(cx + cardW/2, cy + 75);
        // 총열
        ctx.fillStyle = skin.colors.barrel;
        ctx.fillRect(-50, -4, 60, 8);
        // 본체
        ctx.fillStyle = skin.colors.body;
        ctx.fillRect(-20, -10, 55, 20);
        // 악센트
        ctx.fillStyle = skin.colors.accent;
        ctx.fillRect(-20, -10, 55, 3);
        ctx.fillRect(10, 5, 20, 12);
        ctx.restore();

        // 스킨 이름
        ctx.textAlign = 'center';
        ctx.font = 'bold 15px Segoe UI';
        ctx.fillStyle = unlocked ? '#fff' : '#555';
        ctx.fillText(skin.name, cx + cardW/2, cy + 120);

        ctx.font = '11px Segoe UI';
        ctx.fillStyle = unlocked ? '#aaa' : '#444';
        ctx.fillText(skin.desc, cx + cardW/2, cy + 140);

        if (!unlocked) {
            // 잠금 표시
            ctx.font = 'bold 28px Segoe UI';
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillText('🔒', cx + cardW/2, cy + 175);
            ctx.font = '11px Segoe UI';
            ctx.fillStyle = '#666';
            ctx.fillText(`Lv.${skin.unlockLevel} 해금`, cx + cardW/2, cy + 195);
        } else if (equipped) {
            ctx.font = 'bold 12px Segoe UI';
            ctx.fillStyle = '#cc66ff';
            ctx.fillText('✓ 장착 중', cx + cardW/2, cy + 175);
        } else {
            ctx.font = '12px Segoe UI';
            ctx.fillStyle = '#888';
            ctx.fillText('클릭하여 장착', cx + cardW/2, cy + 175);
        }
    });

    // 돌아가기 버튼
    ctx.font = '16px Segoe UI';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.fillText('Esc: 돌아가기', W/2, H - 20);
}

// ====== MAIN UPDATE ======
function update() {
  try {
    // 모바일: 조이스틱 처리
    if(isMobile) {
      // 이동 조이스틱 → keys 매핑 (데드존 0.2)
      if(window._mobileJoyLActive) {
        const lx=window._mobileJoyLx, ly=window._mobileJoyLy;
        keys['KeyW'] = ly < -0.2;
        keys['KeyS'] = ly > 0.2;
        keys['KeyA'] = lx < -0.2;
        keys['KeyD'] = lx > 0.2;
      }
      // 시점 조이스틱
      if(window._mobileJoyRActive) {
        yaw += window._mobileJoyRx * 0.04;
        pitch -= window._mobileJoyRy * 0.03;
        pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
      } else {
        pitch *= 0.85;
        if(Math.abs(pitch) < 0.005) pitch = 0;
      }
    }
    if(gameState === 'playing') {
        // Player movement
        let mx = 0, mz = 0;
        if(keys['KeyW']) { mx -= Math.sin(yaw); mz += Math.cos(yaw); }
        if(keys['KeyS']) { mx += Math.sin(yaw); mz -= Math.cos(yaw); }
        if(keys['KeyA']) { mx -= Math.cos(yaw); mz -= Math.sin(yaw); }
        if(keys['KeyD']) { mx += Math.cos(yaw); mz += Math.sin(yaw); }

        const len = Math.sqrt(mx*mx + mz*mz);
        if(len > 0) { mx /= len; mz /= len; }

        // 슬라이딩 쿨다운
        if(player.slideCooldown > 0) player.slideCooldown--;

        if(player.sliding) {
            player.slideTime--;
            // 슬라이딩 감속
            player.slideSpeed *= 0.95;
            moveWithCollision(player, player.slideDir.x * player.slideSpeed, player.slideDir.z * player.slideSpeed, 5);
            if(player.slideTime <= 0 || player.slideSpeed < 0.5) {
                player.sliding = false;
            }
            // 슬라이딩 바닥 파티클
            if(frameCount % 3 === 0) {
                addParticle(player.x, player.y+0.5, player.z,
                    (Math.random()-0.5)*1, Math.random()*0.3, (Math.random()-0.5)*1,
                    '#888', 6, 1);
            }
        } else if(player.dashing) {
            mx = player.dashDir.x;
            mz = player.dashDir.z;
            player.dashTime--;
            if(player.dashTime <= 0) player.dashing = false;
            moveWithCollision(player, mx * player.speed * 3, mz * player.speed * 3, 5);
        } else if(player.scytheDashing) {
            // 낫 대시: 앞으로 빠르게 이동 (높이는 vy로 처리)
            player.scytheDashTime--;
            if(player.scytheDashTime <= 0) player.scytheDashing = false;
            moveWithCollision(player, player.scytheDashDir.x * player.speed * 2.5, player.scytheDashDir.z * player.speed * 2.5, 5);
            // 대시 중 보라색 파티클
            if(frameCount % 2 === 0) {
                addParticle(player.x, player.y+5, player.z,
                    (Math.random()-0.5)*2, Math.random()*1, (Math.random()-0.5)*2,
                    '#cc44ff', 10, 2);
            }
        } else {
            const spd = player.scope ? player.speed * 0.4 : player.speed;
            moveWithCollision(player, mx * spd, mz * spd, 5);
        }

        // Jump
        if(keys['Space'] && player.onGround) {
            player.vy = player.jumpForce;
            player.onGround = false;
        }
        player.vy -= 0.4; // gravity
        player.y += player.vy;
        // 벽 위 착지 처리
        let floorY = 0;
        for(const w of walls) {
            if(w.h && player.x + 5 > w.x && player.x - 5 < w.x + w.w &&
               player.z + 5 > w.z && player.z - 5 < w.z + w.d) {
                if(player.y <= w.h && player.y + player.vy <= w.h && player.vy <= 0) {
                    if(floorY < w.h) floorY = w.h;
                }
            }
        }
        if(player.y <= floorY) { player.y = floorY; player.vy = 0; player.onGround = true; }

        // Spawn protection countdown
        if(player.spawnProtection > 0) {
            player.spawnProtection--;
        }

        // Shooting & melee
        player.shootCooldown = Math.max(0, player.shootCooldown-1);
        player.muzzleFlash = Math.max(0, player.muzzleFlash-1);
        player.damageFlash = Math.max(0, player.damageFlash-1);
        player.dashCooldown = Math.max(0, player.dashCooldown-1);
        player.scytheDashCooldown = Math.max(0, player.scytheDashCooldown-1);
        player.meleeCooldown = Math.max(0, player.meleeCooldown-1);
        // ADS 부드러운 보간
        const adsTarget = player.scope ? 1 : 0;
        player.adsAmount += (adsTarget - player.adsAmount) * 0.2;
        // 발사 애니메이션 감쇠
        player.shootAnim *= 0.85;
        if(player.meleeTime > 0) { player.meleeTime--; if(player.meleeTime <= 0) player.meleeActive = false; }

        if(player.reloadTime > 0) {
            player.reloadTime--;
            if(player.reloadTime <= 0) {
                player.ammo[player.weapon] = player.maxAmmo[player.weapon];
            }
        }

        if(shooting && weapons[player.weapon].auto) playerShoot();
        else if(shooting) { playerShoot(); shooting = false; }

        // Update bots (solo mode only)
        if(!isOnline) enemies.forEach(updateBot);

        // Update bullets
        for(let i = bullets.length-1; i >= 0; i--) {
            const b = bullets[i];
            b.life--;
            if(b.life <= 0) {
                if(b.explosive) addExplosion(b.x, b.y, b.z, 40);
                bullets.splice(i, 1);
                continue;
            }
            if(b.tracer) continue;

            b.x += b.vx; b.y += b.vy; b.z += b.vz;
            b.vy -= 0.05;

            // Collision
            if(checkWallCollision(b.x, b.z, 2) || b.y <= 0) {
                if(b.explosive) addExplosion(b.x, Math.max(0,b.y), b.z, 40);
                bullets.splice(i, 1);
            }
        }

        // Explosions damage
        for(const exp of explosions) {
            if(exp.time === 1) {
                // Damage nearby
                const dx = player.x - exp.x, dz = player.z - exp.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if(dist < exp.radius && player.spawnProtection <= 0) {
                    const dmg = 60 * (1 - dist/exp.radius);
                    player.hp -= dmg;
                    player.damageFlash = 15;
                    if(player.hp <= 0) {
                        player.deaths++;
                        progression.totalDeaths++;
                        onSessionDeath();
                        gameState = 'dead';
                        player.respawnTimer = 180;
                    }
                }
                enemies.forEach(e => {
                    if(e.hp <= 0 || e.spawnProtection > 0) return;
                    const edx = e.x - exp.x, edz = e.z - exp.z;
                    const edist = Math.sqrt(edx*edx + edz*edz);
                    if(edist < exp.radius) {
                        const dmg = 60 * (1 - edist/exp.radius);
                        e.hp -= dmg;
                        if(e.hp <= 0) onEnemyKilled(e, false);
                    }
                });
            }
        }

        // Update effects
        for(let i = explosions.length-1; i >= 0; i--) {
            explosions[i].time++;
            if(explosions[i].time >= explosions[i].maxTime) explosions.splice(i, 1);
        }

        for(let i = particles.length-1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.z += p.vz;
            p.vy -= 0.15;
            p.life--;
            if(p.life <= 0) particles.splice(i, 1);
        }

        for(let i = damageNumbers.length-1; i >= 0; i--) {
            damageNumbers[i].time++;
            damageNumbers[i].vy *= 0.95;
            if(damageNumbers[i].time > 40) damageNumbers.splice(i, 1);
        }

        killFeed.forEach(kf => kf.time--);
        killFeed = killFeed.filter(kf => kf.time > 0);

        // Spawn bots (solo mode only)
        if(!isOnline) {
            const maxBots = 8;
            while(enemies.length < maxBots) spawnEnemy();
        }

        // Network sync
        if(isOnline) {
            // Interpolate remote player
            if(remotePlayer) {
                remotePlayer.interpT = Math.min(1, remotePlayer.interpT + 0.25);
                const t = remotePlayer.interpT;
                remotePlayer.x = remotePlayer.prevX + (remotePlayer.targetX - remotePlayer.prevX) * t;
                remotePlayer.z = remotePlayer.prevZ + (remotePlayer.targetZ - remotePlayer.prevZ) * t;
                remotePlayer.y = remotePlayer.prevY + (remotePlayer.targetY - remotePlayer.prevY) * t;
                remotePlayer.muzzleFlash = Math.max(0, remotePlayer.muzzleFlash - 1);
            }

            // Send player state at 15Hz
            if(frameCount % 4 === 0) {
                sendMsg({
                    type:'player_state',
                    x:player.x, z:player.z, y:player.y,
                    yaw, pitch,
                    hp:player.hp, armor:player.armor,
                    weapon:player.weapon,
                    selectedClass:player.selectedClass,
                    kills:player.kills, deaths:player.deaths,
                    muzzleFlash:player.muzzleFlash,
                    spawnProtection:player.spawnProtection
                });
            }

            // (봇 상태 전송 제거 - 온라인은 1v1 전용)
        }
        frameCount++;
    }

    // Network message timer
    if(netMessageTimer > 0) netMessageTimer--;
  } catch(e) { console.error('[RIVALS UPDATE ERR]', e.message, e.stack); }
}

// ====== RENDER LOOP ======
function render() {
    ctx.clearRect(0,0,W,H);

    if(gameState === 'title') { drawTitle(); }
    else if(gameState === 'lobby') { drawLobby(); }
    else if(gameState === 'waiting') { drawWaiting(); }
    else if(gameState === 'classSelect') { drawClassSelect(); }
    else if(gameState === 'skinSelect') { drawSkinSelect(); }
    else {
        drawGround();

        // Unified depth sorting: walls + enemies together
        const renderables = [];
        walls.forEach(w => {
            const cx = w.x + w.w/2 - player.x;
            const cz = w.z + w.d/2 - player.z;
            renderables.push({type:'wall', data:{...w, dist:cx*cx+cz*cz}, dist:cx*cx+cz*cz});
        });
        enemies.filter(e => e.hp > 0).forEach(e => {
            const dx = e.x - player.x, dz = e.z - player.z;
            const d = dx*dx + dz*dz;
            renderables.push({type:'enemy', data:{...e, dist:d, ref:e}, dist:d});
        });
        if(isOnline && remotePlayer && remotePlayer.alive) {
            const rdx = remotePlayer.x - player.x, rdz = remotePlayer.z - player.z;
            const rDist = rdx*rdx + rdz*rdz;
            renderables.push({type:'enemy', data:{...remotePlayer, class:remotePlayer.selectedClass, dist:rDist, ref:remotePlayer}, dist:rDist});
        }
        renderables.sort((a,b) => b.dist - a.dist);
        renderables.forEach(r => r.type==='wall' ? drawWall(r.data) : drawEnemy(r.data));

        // Draw bullets
        bullets.forEach(b => {
            if(b.tracer) {
                const p1 = project(b.x, b.y, b.z);
                const p2 = project(b.tx, b.ty, b.tz);
                if(p1 && p2) {
                    ctx.strokeStyle = b.color || '#ff0';
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = b.life / 3;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            } else {
                const p = project(b.x, b.y, b.z);
                if(p) {
                    ctx.fillStyle = b.color || '#ff0';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(2, 4*p.scale), 0, Math.PI*2);
                    ctx.fill();
                }
            }
        });

        // Draw particles
        particles.forEach(p => {
            const pp = project(p.x, p.y, p.z);
            if(pp) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.beginPath();
                ctx.arc(pp.x, pp.y, Math.max(1, p.size*pp.scale), 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        });

        // Draw explosions
        explosions.forEach(exp => {
            const p = project(exp.x, exp.y, exp.z);
            if(p) {
                const progress = exp.time / exp.maxTime;
                const r = exp.radius * p.scale * (0.5 + progress * 0.5);
                ctx.fillStyle = `rgba(255,${Math.floor(100+progress*100)},0,${1-progress})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r, 0, Math.PI*2);
                ctx.fill();
            }
        });

        // Damage numbers
        damageNumbers.forEach(dn => {
            const p = project(dn.x, dn.y + dn.time*0.5, dn.z);
            if(p) {
                ctx.font = `bold ${dn.crit ? 20 : 14}px Segoe UI`;
                ctx.textAlign = 'center';
                ctx.fillStyle = dn.crit ? '#ff0' : '#fff';
                ctx.globalAlpha = 1 - dn.time/40;
                ctx.fillText((dn.crit?'💥 ':'') + dn.dmg, p.x, p.y);
                ctx.globalAlpha = 1;
            }
        });

        drawHUD();

        if(gameState === 'dead') drawDead();
        if(gameState === 'scoreboard') drawScoreboard();
    }
}

// 고정 60fps 게임 루프 (모든 플레이어 동일 속도)
let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 60; // 16.67ms

let _dbgFrameCount = 0;
let _dbgLastLog = 0;
let _dbgFreezeCheck = 0;
function gameLoop(timestamp) {
    try {
        if(!lastTime) lastTime = timestamp;
        const elapsed = Math.min(timestamp - lastTime, 100);
        lastTime = timestamp;
        accumulator += elapsed;

        let updateCount = 0;
        while(accumulator >= FIXED_DT) {
            update();
            accumulator -= FIXED_DT;
            updateCount++;
            if(updateCount > 10) { accumulator = 0; break; } // 안전장치: 무한루프 방지
        }
        render();
        _dbgFrameCount++;
        // 5초마다 상태 로그
        if(timestamp - _dbgLastLog > 5000) {
            console.log(`[RIVALS DBG] fps:${Math.round(_dbgFrameCount/5)} state:${gameState} enemies:${enemies.filter(e=>e.hp>0).length} walls:${walls.length} player:(${player.x.toFixed(0)},${player.y.toFixed(0)},${player.z.toFixed(0)}) hp:${player.hp}`);
            _dbgFrameCount = 0;
            _dbgLastLog = timestamp;
        }
    } catch(err) {
        console.error('[RIVALS CRASH]', err.message, err.stack);
    }
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

    window._mobileJoyRy=dy/maxR;
  });
  const resetR=()=>{joyRId=null;knobR.style.transform='translate(-50%,-50%)';window._mobileJoyRActive=false;window._mobileJoyRx=0;window._mobileJoyRy=0;};
  joyR.addEventListener('pointerup',resetR);
  joyR.addEventListener('pointercancel',resetR);

  // === 사격 버튼 (길게 누르면 연사) ===
  const shootBtn=document.getElementById('fps-shoot');
  shootBtn.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState!=='playing'||player.hp<=0)return;
    mobileShootHeld=true;
    playerShoot(); // 즉시 1발
    // 연사: auto무기면 60ms마다 반복 사격
    clearInterval(mobileShootInterval);
    mobileShootInterval=setInterval(()=>{
      if(!mobileShootHeld||gameState!=='playing'||player.hp<=0){clearInterval(mobileShootInterval);return;}
      if(weapons[player.weapon].auto) playerShoot();
    },60);
  },{passive:false});
  const stopShoot=()=>{mobileShootHeld=false;clearInterval(mobileShootInterval);shooting=false;};
  shootBtn.addEventListener('pointerup',stopShoot);
  shootBtn.addEventListener('pointercancel',stopShoot);
  shootBtn.addEventListener('pointerleave',stopShoot);

  // === 점프 버튼 ===
  document.getElementById('fps-jump').addEventListener('pointerdown',e=>{
    e.preventDefault(); keys['Space']=true;
    setTimeout(()=>{keys['Space']=false;},100);
  },{passive:false});

  // === 슬라이딩 버튼 ===
  document.getElementById('fps-slide').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(!player.sliding && player.slideCooldown<=0 && player.onGround) startSlide();
  },{passive:false});

  // === 리로드 버튼 ===
  document.getElementById('fps-reload').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState==='playing') reload();
  },{passive:false});

  // === 대시/능력 버튼 ===
  document.getElementById('fps-dash').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState!=='playing')return;
    // 클래스 0 = 대시, 그 외 = useAbility
    if(player.selectedClass===0 && !player.dashing && player.dashCooldown<=0){
      startDash();
    } else {
      useAbility();
    }
  },{passive:false});

  // === ADS(조준) 토글 ===
  const adsBtn=document.getElementById('fps-ads');
  adsBtn.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState!=='playing')return;
    if(player.weapon!==5 && player.weapon!==6){
      player.scope=!player.scope;
      adsBtn.classList.toggle('on',player.scope);
    } else if(player.weapon===5 && player.scytheDashCooldown<=0){
      startScytheDash();
    }
  },{passive:false});

  // === 수류탄 버튼 (4번 슬롯으로 전환 후 사격) ===
  document.getElementById('fps-grenade').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState!=='playing')return;
    // 수류탄 슬롯으로 전환
    player.currentSlot=3;
    player.weapon=player.weaponSlots[3];
    player.scope=false;player.reloadTime=0;
    updateMobileWeaponBar();
    // 즉시 투척
    setTimeout(()=>playerShoot(),50);
  },{passive:false});

  // === Save & Quit 버튼 ===
  document.getElementById('fps-savequit').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState==='playing'||gameState==='dead') saveAndQuit();
  },{passive:false});

  // === 무기 전환 바 터치 ===
  document.querySelectorAll('.fps-wslot').forEach(slot=>{
    slot.addEventListener('pointerdown',e=>{
      e.preventDefault();
      const idx=parseInt(slot.dataset.slot);
      if(isNaN(idx))return;
      player.currentSlot=idx;
      player.weapon=player.weaponSlots[idx];
      player.scope=false;player.reloadTime=0;
      updateMobileWeaponBar();
      if(adsBtn)adsBtn.classList.remove('on');
    },{passive:false});
  });

  // === 타이틀/클래스 선택 터치 ===
  canvas.addEventListener('touchstart',e=>{
    if(gameState==='title'){gameState='classSelect';}
  });

  // === 터치 스크롤 방지 ===
  document.addEventListener('touchmove',e=>{
    if(e.target.closest('#fpsControls'))e.preventDefault();
  },{passive:false});

  // === 게임루프에서 무기바 자동 업데이트 ===
  setInterval(()=>{
    if(gameState==='playing' && isMobile) updateMobileWeaponBar();
  },200);
}
</script>
</body>
</html>
