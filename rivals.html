// ====== MAIN UPDATE ======
function update() {
  try {
    // 모바일: 조이스틱 처리
    if(isMobile) {
      // 이동 조이스틱 → keys 매핑 (데드존 0.2)
      if(window._mobileJoyLActive) {
        const lx=window._mobileJoyLx, ly=window._mobileJoyLy;
        keys['KeyW'] = ly < -0.2;
        keys['KeyS'] = ly > 0.2;
        keys['KeyA'] = lx < -0.2;
        keys['KeyD'] = lx > 0.2;
      }
      // 시점 조이스틱
      if(window._mobileJoyRActive) {
        yaw += window._mobileJoyRx * 0.04;
        pitch -= window._mobileJoyRy * 0.03;
        pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
      } else {
        pitch *= 0.85;
        if(Math.abs(pitch) < 0.005) pitch = 0;
      }
    }
    if(gameState === 'playing') {
        // Player movement
        let mx = 0, mz = 0;
        if(keys['KeyW']) { mx -= Math.sin(yaw); mz += Math.cos(yaw); }
        if(keys['KeyS']) { mx += Math.sin(yaw); mz -= Math.cos(yaw); }
        if(keys['KeyA']) { mx += Math.cos(yaw); mz += Math.sin(yaw); }
        if(keys['KeyD']) { mx -= Math.cos(yaw); mz -= Math.sin(yaw); }

        const len = Math.sqrt(mx*mx + mz*mz);
        if(len > 0) { mx /= len; mz /= len; }

        // 슬라이딩 쿨다운
        if(player.slideCooldown > 0) player.slideCooldown--;

        if(player.sliding) {
            player.slideTime--;
            // 슬라이딩 감속
            player.slideSpeed *= 0.95;
            moveWithCollision(player, player.slideDir.x * player.slideSpeed, player.slideDir.z * player.slideSpeed, 5);
            if(player.slideTime <= 0 || player.slideSpeed < 0.5) {
                player.sliding = false;
            }
            // 슬라이딩 바닥 파티클
            if(frameCount % 3 === 0) {
                addParticle(player.x, player.y+0.5, player.z,
                    (Math.random()-0.5)*1, Math.random()*0.3, (Math.random()-0.5)*1,
                    '#888', 6, 1);
            }
        } else if(player.dashing) {
            mx = player.dashDir.x;
            mz = player.dashDir.z;
            player.dashTime--;
            if(player.dashTime <= 0) player.dashing = false;
            moveWithCollision(player, mx * player.speed * 3, mz * player.speed * 3, 5);
        } else if(player.scytheDashing) {
            // 낫 대시: 앞으로 빠르게 이동 (높이는 vy로 처리)
            player.scytheDashTime--;
            if(player.scytheDashTime <= 0) player.scytheDashing = false;
            moveWithCollision(player, player.scytheDashDir.x * player.speed * 2.5, player.scytheDashDir.z * player.speed * 2.5, 5);
            // 대시 중 보라색 파티클
            if(frameCount % 2 === 0) {
                addParticle(player.x, player.y+5, player.z,
                    (Math.random()-0.5)*2, Math.random()*1, (Math.random()-0.5)*2,
                    '#cc44ff', 10, 2);
            }
        } else {
            const spd = player.scope ? player.speed * 0.4 : player.speed;
            moveWithCollision(player, mx * spd, mz * spd, 5);
        }

        // Jump
        if(keys['Space'] && player.onGround) {
            player.vy = player.jumpForce;
            player.onGround = false;
        }
        player.vy -= 0.4; // gravity
        player.y += player.vy;
        // 3D 맵 바닥 충돌 (레이캐스트)
        let floorY = getFloorHeight(player.x, player.z);
        if (floorY === -Infinity) floorY = 0; // 바닥 못 찾으면 0
        if(player.y <= floorY) { player.y = floorY; player.vy = 0; player.onGround = true; }

        // Spawn protection countdown
        if(player.spawnProtection > 0) {
            player.spawnProtection--;
        }

        // Shooting & melee
        player.shootCooldown = Math.max(0, player.shootCooldown-1);
        player.muzzleFlash = Math.max(0, player.muzzleFlash-1);
        player.damageFlash = Math.max(0, player.damageFlash-1);
        player.dashCooldown = Math.max(0, player.dashCooldown-1);
        player.scytheDashCooldown = Math.max(0, player.scytheDashCooldown-1);
        player.meleeCooldown = Math.max(0, player.meleeCooldown-1);
        // ADS 부드러운 보간
        const adsTarget = player.scope ? 1 : 0;
        player.adsAmount += (adsTarget - player.adsAmount) * 0.2;
        // 발사 애니메이션 감쇠
        player.shootAnim *= 0.85;
        if(player.meleeTime > 0) { player.meleeTime--; if(player.meleeTime <= 0) player.meleeActive = false; }

        if(player.reloadTime > 0) {
            player.reloadTime--;
            if(player.reloadTime <= 0) {
                player.ammo[player.currentSlot] = player.maxAmmo[player.currentSlot];
            }
        }

        if(shooting && weapons[player.weapon].auto) playerShoot();
        else if(shooting) { playerShoot(); shooting = false; }

        // AI 봇 업데이트
        if(!isOnline) enemies.forEach(updateBot);

        // Update bullets
        for(let i = bullets.length-1; i >= 0; i--) {
            const b = bullets[i];
            b.life--;
            if(b.life <= 0) {
                if(b.explosive) addExplosion(b.x, b.y, b.z, 40);
                bullets.splice(i, 1);
                continue;
            }
            if(b.tracer) continue;

            b.x += b.vx; b.y += b.vy; b.z += b.vz;
            b.vy -= 0.05;

            // Collision
            if(checkWallCollision(b.x, b.z, 2) || b.y <= 0) {
                if(b.explosive) addExplosion(b.x, Math.max(0,b.y), b.z, 40);
                bullets.splice(i, 1);
            }
        }

        // Explosions damage
        for(const exp of explosions) {
            if(exp.time === 1) {
                // Damage nearby
                const dx = player.x - exp.x, dz = player.z - exp.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if(dist < exp.radius && player.spawnProtection <= 0) {
                    const dmg = 60 * (1 - dist/exp.radius);
                    player.hp -= dmg;
                    player.damageFlash = 15;
                    if(player.hp <= 0) {
                        player.deaths++;
                        progression.totalDeaths++;
                        onSessionDeath();
                        gameState = 'dead';
                        player.respawnTimer = 180;
                    }
                }
                enemies.forEach(e => {
                    if(e.hp <= 0 || e.spawnProtection > 0) return;
                    const edx = e.x - exp.x, edz = e.z - exp.z;
                    const edist = Math.sqrt(edx*edx + edz*edz);
                    if(edist < exp.radius) {
                        const dmg = 60 * (1 - edist/exp.radius);
                        e.hp -= dmg;
                        if(e.hp <= 0) onEnemyKilled(e, false);
                    }
                });
            }
        }

        // Update effects
        for(let i = explosions.length-1; i >= 0; i--) {
            explosions[i].time++;
            if(explosions[i].time >= explosions[i].maxTime) explosions.splice(i, 1);
        }

        for(let i = particles.length-1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.z += p.vz;
            p.vy -= 0.15;
            p.life--;
            if(p.life <= 0) particles.splice(i, 1);
        }

        for(let i = damageNumbers.length-1; i >= 0; i--) {
            damageNumbers[i].time++;
            damageNumbers[i].vy *= 0.95;
            if(damageNumbers[i].time > 40) damageNumbers.splice(i, 1);
        }

        killFeed.forEach(kf => kf.time--);
        killFeed = killFeed.filter(kf => kf.time > 0);

        // AI 봇 리스폰
        if(!isOnline) {
            const maxBots = 8;
            while(enemies.length < maxBots) spawnEnemy();
        }

        // Network sync
        if(isOnline) {
            // Interpolate remote player
            if(remotePlayer) {
                remotePlayer.interpT = Math.min(1, remotePlayer.interpT + 0.25);
                const t = remotePlayer.interpT;
                remotePlayer.x = remotePlayer.prevX + (remotePlayer.targetX - remotePlayer.prevX) * t;
                remotePlayer.z = remotePlayer.prevZ + (remotePlayer.targetZ - remotePlayer.prevZ) * t;
                remotePlayer.y = remotePlayer.prevY + (remotePlayer.targetY - remotePlayer.prevY) * t;
                remotePlayer.muzzleFlash = Math.max(0, remotePlayer.muzzleFlash - 1);
            }

            // Send player state at 15Hz
            if(frameCount % 4 === 0) {
                sendMsg({
                    type:'player_state',
                    x:player.x, z:player.z, y:player.y,
                    yaw, pitch,
                    hp:player.hp, armor:player.armor,
                    weapon:player.weapon,
                    selectedClass:player.selectedClass,
                    kills:player.kills, deaths:player.deaths,
                    muzzleFlash:player.muzzleFlash,
                    spawnProtection:player.spawnProtection
                });
            }

            // (봇 상태 전송 제거 - 온라인은 1v1 전용)
        }
        frameCount++;
    }

    // Network message timer
    if(netMessageTimer > 0) netMessageTimer--;
  } catch(e) { console.error('[RIVALS UPDATE ERR]', e.message, e.stack); }
}

// ====== RENDER LOOP ======
function render() {
    ctx.clearRect(0,0,W,H);

    if(gameState === 'title') { drawTitle(); }
    else if(gameState === 'lobby') { drawLobby(); }
    else if(gameState === 'waiting') { drawWaiting(); }
    else if(gameState === 'classSelect') { drawClassSelect(); }
    else if(gameState === 'secondarySelect') { drawSecondarySelect(); }
    else if(gameState === 'skinSelect') { drawSkinSelect(); }
    else {
        // 3D 적 모델 동기화 + 맵 렌더링
        syncEnemy3D();
        renderMap3D();

        drawGround();

        // 적 이름표/HP바 비활성화

        // Draw bullets
        bullets.forEach(b => {
            if(b.tracer) {
                const p1 = project(b.x, b.y, b.z);
                const p2 = project(b.tx, b.ty, b.tz);
                if(p1 && p2) {
                    ctx.strokeStyle = b.color || '#ff0';
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = b.life / 3;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            } else {
                const p = project(b.x, b.y, b.z);
                if(p) {
                    ctx.fillStyle = b.color || '#ff0';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(2, 4*p.scale), 0, Math.PI*2);
                    ctx.fill();
                }
            }
        });

        // Draw particles
        particles.forEach(p => {
            const pp = project(p.x, p.y, p.z);
            if(pp) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.beginPath();
                ctx.arc(pp.x, pp.y, Math.max(1, p.size*pp.scale), 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        });

        // Draw explosions
        explosions.forEach(exp => {
            const p = project(exp.x, exp.y, exp.z);
            if(p) {
                const progress = exp.time / exp.maxTime;
                const r = exp.radius * p.scale * (0.5 + progress * 0.5);
                ctx.fillStyle = `rgba(255,${Math.floor(100+progress*100)},0,${1-progress})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r, 0, Math.PI*2);
                ctx.fill();
            }
        });

        // Damage numbers
        damageNumbers.forEach(dn => {
            const p = project(dn.x, dn.y + dn.time*0.5, dn.z);
            if(p) {
                ctx.font = `bold ${dn.crit ? 20 : 14}px Segoe UI`;
                ctx.textAlign = 'center';
                ctx.fillStyle = dn.crit ? '#ff0' : '#fff';
                ctx.globalAlpha = 1 - dn.time/40;
                ctx.fillText((dn.crit?'💥 ':'') + dn.dmg, p.x, p.y);
                ctx.globalAlpha = 1;
            }
        });

        drawHUD();

        if(gameState === 'dead') drawDead();
        if(gameState === 'scoreboard') drawScoreboard();
    }
}

// 고정 60fps 게임 루프 (모든 플레이어 동일 속도)
let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 60; // 16.67ms

let _dbgFrameCount = 0;
let _dbgLastLog = 0;
let _dbgFreezeCheck = 0;
function gameLoop(timestamp) {
    try {
        if(!lastTime) lastTime = timestamp;
        const elapsed = Math.min(timestamp - lastTime, 100);
        lastTime = timestamp;
        accumulator += elapsed;

        let updateCount = 0;
        while(accumulator >= FIXED_DT) {
            update();
            accumulator -= FIXED_DT;
            updateCount++;
            if(updateCount > 10) { accumulator = 0; break; } // 안전장치: 무한루프 방지
        }
        render();
        _dbgFrameCount++;
        // 5초마다 상태 로그
        if(timestamp - _dbgLastLog > 5000) {
            console.log(`[RIVALS DBG] fps:${Math.round(_dbgFrameCount/5)} state:${gameState} enemies:${enemies.filter(e=>e.hp>0).length} walls:${walls.length} player:(${player.x.toFixed(0)},${player.y.toFixed(0)},${player.z.toFixed(0)}) hp:${player.hp}`);
            _dbgFrameCount = 0;
            _dbgLastLog = timestamp;
        }
    } catch(err) {
        console.error('[RIVALS CRASH]', err.message, err.stack);
    }
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

    e.preventDefault();
    if(gameState!=='playing')return;
    // 클래스 0 = 대시, 그 외 = useAbility
    if(player.selectedClass===0 && !player.dashing && player.dashCooldown<=0){
      startDash();
    } else {
      useAbility();
    }
  },{passive:false});

  // === ADS(조준) 토글 ===
  const adsBtn=document.getElementById('fps-ads');
  adsBtn.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState!=='playing')return;
    if(player.weapon!==5 && player.weapon!==6){
      player.scope=!player.scope;
      adsBtn.classList.toggle('on',player.scope);
    } else if(player.weapon===5 && player.scytheDashCooldown<=0){
      startScytheDash();
    }
  },{passive:false});

  // === 수류탄 버튼 (4번 슬롯으로 전환 후 사격) ===
  document.getElementById('fps-grenade').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState!=='playing')return;
    // 수류탄 슬롯으로 전환
    player.currentSlot=3;
    player.weapon=player.weaponSlots[3];
    player.scope=false;player.reloadTime=0;
    updateMobileWeaponBar();
    // 즉시 투척
    setTimeout(()=>playerShoot(),50);
  },{passive:false});

  // === Save & Quit 버튼 ===
  document.getElementById('fps-savequit').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(gameState==='playing'||gameState==='dead') saveAndQuit();
  },{passive:false});

  // === 무기 전환 바 터치 ===
  document.querySelectorAll('.fps-wslot').forEach(slot=>{
    slot.addEventListener('pointerdown',e=>{
      e.preventDefault();
      const idx=parseInt(slot.dataset.slot);
      if(isNaN(idx))return;
      player.currentSlot=idx;
      player.weapon=player.weaponSlots[idx];
      player.scope=false;player.reloadTime=0;
      updateMobileWeaponBar();
      if(adsBtn)adsBtn.classList.remove('on');
    },{passive:false});
  });

  // === 타이틀/클래스 선택 터치 ===
  canvas.addEventListener('touchstart',e=>{
    if(gameState==='title'){gameState='classSelect';}
  });

  // === 터치 스크롤 방지 ===
  document.addEventListener('touchmove',e=>{
    if(e.target.closest('#fpsControls'))e.preventDefault();
  },{passive:false});

  // === 게임루프에서 무기바 자동 업데이트 ===
  setInterval(()=>{
    if(gameState==='playing' && isMobile) updateMobileWeaponBar();
  },200);
}
</script>
</body>
</html>
