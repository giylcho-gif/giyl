const MODEL_URL = 'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Assets@main/Models/Fox/glTF-Binary/Fox.glb';
let realisticModel = null;
let realisticWrapper = null; // wrapper group to fix Fox orientation
let realisticMixer = null;
let realisticActions = {};
let realisticCurrentAction = null;
let modelLoaded = false;

const gltfLoader = new GLTFLoader();

function showLoading(show) {
  const el = document.getElementById('loading');
  el.style.display = show ? 'flex' : 'none';
}

function setLoadProgress(pct, text) {
  const bar = document.getElementById('loadBar');
  const txt = document.getElementById('loadText');
  if (bar) bar.style.width = pct + '%';
  if (txt && text) txt.textContent = text;
}

function loadRealisticModel() {
  return new Promise((resolve, reject) => {
    if (realisticModel) { resolve(); return; }
    showLoading(true);
    setLoadProgress(5, 'Connecting to CDN...');

    // Estimated file size ~2.1MB for Soldier.glb
    const ESTIMATED_SIZE = 2200000;
    let fakeProgress = 5;
    const fakeInterval = setInterval(() => {
      if (fakeProgress < 85) {
        fakeProgress += 2;
        setLoadProgress(fakeProgress, `Loading model... ${fakeProgress}%`);
      }
    }, 100);

    gltfLoader.load(
      MODEL_URL,
      (gltf) => {
        clearInterval(fakeInterval);
        setLoadProgress(90, 'Processing animations...');

        realisticModel = gltf.scene;
        // Fox model is large — scale down to fit scene
        realisticModel.scale.set(0.025, 0.025, 0.025);
        realisticModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        // Setup animation mixer
        realisticMixer = new THREE.AnimationMixer(realisticModel);
        const animations = gltf.animations;

        // Find root bone name to strip its position/rotation tracks
        // This lets character group control movement & rotation
        let rootBoneName = '';
        realisticModel.traverse(child => {
          if (child.isBone && !rootBoneName) rootBoneName = child.name;
        });
        console.log('Root bone:', rootBoneName);

        // Map animations by name, stripping root motion
        realisticActions = {};
        animations.forEach((clip) => {
          // Remove root bone position/quaternion tracks so we control movement
          if (rootBoneName) {
            clip.tracks = clip.tracks.filter(track => {
              const isRoot = track.name.startsWith(rootBoneName);
              const isRot = track.name.endsWith('.quaternion');
              // Only remove root rotation — keep position so fox stands properly
              if (isRoot && isRot) {
                console.log('Stripped root track:', track.name);
                return false;
              }
              return true;
            });
          }
          const action = realisticMixer.clipAction(clip);
          realisticActions[clip.name] = action;
          console.log('Animation found:', clip.name);
        });

        console.log('Fox model loaded! Animations:', Object.keys(realisticActions));
        console.log('Fox bounding check — children:', realisticModel.children.length);
        setLoadProgress(100, 'Complete!');
        modelLoaded = true;
        setTimeout(() => showLoading(false), 400);
        resolve();
      },
      (progress) => {
        if (progress.total > 0) {
          clearInterval(fakeInterval);
          const pct = Math.round((progress.loaded / progress.total) * 85) + 5;
          setLoadProgress(pct, `Loading... ${Math.round(progress.loaded / 1024)}KB`);
        }
      },
      (error) => {
        clearInterval(fakeInterval);
        console.error('Model load error:', error);
        setLoadProgress(0, 'Load failed! ' + (error.message || error));
        setTimeout(() => showLoading(false), 3000);
        reject(error);
      }
    );
  });
}

function buildRealistic() {

// ═══════════════════════════════════════════════
//  FOX SNOW ON BACK
// ═══════════════════════════════════════════════
let foxSnow = null;
let foxBB = null;

function addFoxExtras(bbox) {
  foxBB = bbox;

  // ── SNOW ON BACK ──
  const SNOW_N = 50;
  const snowGeo = new THREE.BufferGeometry();
  const sp = new Float32Array(SNOW_N * 3);
  const topY = bbox.max.y;
  const backTop = topY + 0.01;
  const bodyMinZ = bbox.min.z + (bbox.max.z - bbox.min.z) * 0.15;
  const bodyMaxZ = bbox.max.z - (bbox.max.z - bbox.min.z) * 0.35;
  const bodyW = (bbox.max.x - bbox.min.x) * 0.6;

  for (let i = 0; i < SNOW_N; i++) {
    sp[i * 3]     = (Math.random() - 0.5) * bodyW;
    sp[i * 3 + 1] = backTop + Math.random() * 0.02;
    sp[i * 3 + 2] = bodyMinZ + Math.random() * (bodyMaxZ - bodyMinZ);
  }
  snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3));
  foxSnow = new THREE.Points(snowGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.035, transparent: true, opacity: 0.85,
    depthWrite: false, sizeAttenuation: true
  }));
  character.add(foxSnow);
}

function updateFoxExtras(dt, time) {
  if (!foxSnow || !foxBB || currentType !== 'realistic') return;
  const sp = foxSnow.geometry.attributes.position;
  const topY = foxBB.max.y + 0.01;
  for (let i = 0; i < sp.count; i++) {
    sp.array[i * 3 + 1] += Math.sin(time * 1.5 + i * 2.1) * 0.0002;
    if (currentAnim === 'walk' || currentAnim === 'run') {
      sp.array[i * 3 + 1] -= dt * 0.12;
      if (sp.array[i * 3 + 1] < foxBB.min.y) {
        const bodyMinZ = foxBB.min.z + (foxBB.max.z - foxBB.min.z) * 0.15;
        const bodyMaxZ = foxBB.max.z - (foxBB.max.z - foxBB.min.z) * 0.35;
        const bodyW = (foxBB.max.x - foxBB.min.x) * 0.6;
        sp.array[i * 3]     = (Math.random() - 0.5) * bodyW;
        sp.array[i * 3 + 1] = topY + Math.random() * 0.02;
        sp.array[i * 3 + 2] = bodyMinZ + Math.random() * (bodyMaxZ - bodyMinZ);
      }
    } else {
      if (sp.array[i * 3 + 1] < topY - 0.02) sp.array[i * 3 + 1] += dt * 0.08;
    }
  }
  sp.needsUpdate = true;
}

function playRealisticAnim(name) {
  const action = realisticActions[name];
  if (!action) return;

  if (realisticCurrentAction && realisticCurrentAction !== action) {
    realisticCurrentAction.fadeOut(0.3);
  }

  action.reset().fadeIn(0.3).play();
  realisticCurrentAction = action;
}

// ═══════════════════════════════════════════════
//  ANIMATION SYSTEM
// ═══════════════════════════════════════════════
function animVoxel(dt) {
  const t = animTime;
  const p = parts;
  switch (currentAnim) {
    case 'idle': {
      const b = Math.sin(t * 2) * 0.02;
      if (p.body) p.body.position.y = 5.5 * V + b;
      if (p.head) p.head.position.y = 10 * V + b * 1.2;
      if (p.leftArm) { p.leftArm.rotation.x = Math.sin(t * 1.5) * 0.03; p.leftArm.rotation.z = 0.05; }
      if (p.rightArm) { p.rightArm.rotation.x = Math.sin(t * 1.5 + 0.5) * 0.03; p.rightArm.rotation.z = -0.05; }
      if (p.leftLeg) p.leftLeg.rotation.x = 0;
      if (p.rightLeg) p.rightLeg.rotation.x = 0;
      break;
    }
    case 'walk': {
      const sw = Math.sin(t * 8) * 0.6;
      const bn = Math.abs(Math.sin(t * 8)) * 0.05;
      if (p.leftArm) { p.leftArm.rotation.x = sw; p.leftArm.rotation.z = 0.05; }
      if (p.rightArm) { p.rightArm.rotation.x = -sw; p.rightArm.rotation.z = -0.05; }
      if (p.leftLeg) p.leftLeg.rotation.x = -sw * 0.7;
      if (p.rightLeg) p.rightLeg.rotation.x = sw * 0.7;
      if (p.body) p.body.position.y = 5.5 * V + bn;
      if (p.head) p.head.position.y = 10 * V + bn;
      break;
    }
    case 'wave': {
      if (p.leftArm) { p.leftArm.rotation.x = Math.sin(t * 1.5) * 0.03; p.leftArm.rotation.z = 0.05; }
      if (p.rightArm) { p.rightArm.rotation.x = 0; p.rightArm.rotation.z = -2.5 + Math.sin(t * 6) * 0.3; }
      if (p.leftLeg) p.leftLeg.rotation.x = 0;
      if (p.rightLeg) p.rightLeg.rotation.x = 0;
      const b2 = Math.sin(t * 2) * 0.02;
      if (p.body) p.body.position.y = 5.5 * V + b2;
      if (p.head) { p.head.position.y = 10 * V + b2; p.head.rotation.z = Math.sin(t * 3) * 0.1; }
      break;
    }
    case 'jump':
      if (!isJumping) { isJumping = true; jumpVelocity = 5; }
      break;
  }
}

function animateCharacter(dt) {
  animTime += dt;

  if (currentType === 'voxel') animVoxel(dt);

  // Realistic mixer update (only for fox GLB)
  if (currentType === 'realistic' && realisticMixer && currentAnimal === 'fox') {
    realisticMixer.update(dt);
  }

  // Jump physics
  if (isJumping) {
    charY += jumpVelocity * dt;
    jumpVelocity -= 14 * dt;
    if (charY <= 0) {
      charY = 0;
      isJumping = false;
      jumpVelocity = 0;
      if (currentAnim === 'jump') {
        setTimeout(() => { if (currentAnim === 'jump') { isJumping = true; jumpVelocity = 5; } }, 400);
      }
    }
    // In-air pose
    const tuck = charY > 0 ? Math.min(charY * 0.4, 0.4) : 0;
    if (parts.leftLeg) parts.leftLeg.rotation.x = tuck;
    if (parts.rightLeg) parts.rightLeg.rotation.x = -tuck * 0.5;
  }

  character.position.y = charY;
}

// ═══════════════════════════════════════════════
const keys = {};
const moveSpeed = 3;

// e.code 기반으로 키 매핑 (한글 입력 모드에서도 작동)
function codeToKey(code) {
  const map = {
    'KeyW': 'w', 'KeyA': 'a', 'KeyS': 's', 'KeyD': 'd',
    'ArrowUp': 'arrowup', 'ArrowDown': 'arrowdown',
    'ArrowLeft': 'arrowleft', 'ArrowRight': 'arrowright',
    'ShiftLeft': 'shift', 'ShiftRight': 'shift',
    'Space': ' '
  };
  return map[code] || null;
}

window.addEventListener('keydown', e => {
  const k = codeToKey(e.code);
  if (k) keys[k] = true;
  if (k === ' ' && !isJumping) { isJumping = true; jumpVelocity = 5; }
});
window.addEventListener('keyup', e => {
  const k = codeToKey(e.code);
  if (k) keys[k] = false;
});

const runSpeed = 9;

// ═══════════════════════════════════════════════
//  PUNCH / ATTACK SYSTEM (E key)
// ═══════════════════════════════════════════════
let isPunching = false;
let punchTime = 0;
const PUNCH_DURATION = 0.35; // seconds
const PUNCH_COOLDOWN = 0.5;
let punchCooldownTimer = 0;
let punchHand = 'right'; // alternate hands

// Punch impact effect
const punchEffects = [];

function createPunchEffect() {
  const group = new THREE.Group();

  // Shockwave ring
  const ringGeo = new THREE.RingGeometry(0.05, 0.15, 16);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffdd44, transparent: true, opacity: 1,
    side: THREE.DoubleSide, depthWrite: false
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  group.add(ring);

  // Impact flash
  const flashGeo = new THREE.SphereGeometry(0.1, 8, 8);
  const flashMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const flash = new THREE.Mesh(flashGeo, flashMat);
  group.add(flash);

  // Sparks (small particles in random directions)
  const sparkCount = 8;
  const sparkGeo = new THREE.BufferGeometry();
  const sparkPositions = new Float32Array(sparkCount * 3);
  sparkGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparkPositions, 3));
  const sparkMat = new THREE.PointsMaterial({
    color: 0xffaa22, size: 0.08, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const sparks = new THREE.Points(sparkGeo, sparkMat);
  group.add(sparks);

  // Spark velocities
  const sparkVels = [];
  for (let i = 0; i < sparkCount; i++) {
    sparkVels.push(
      (Math.random() - 0.5) * 4,
      (Math.random() - 0.5) * 4,
      (Math.random() - 0.5) * 4
    );
  }

  // Position at punch point (forward direction of character)
  const fwd = new THREE.Vector3(0, 0, 1).applyEuler(character.rotation);
  const punchReach = currentType === 'realistic' ? 1.5 : 0.8;
  const punchHeight = currentType === 'realistic' ? 1.5 : 2.0 * V;
  group.position.set(
    character.position.x + fwd.x * punchReach,
    character.position.y + punchHeight,
    character.position.z + fwd.z * punchReach
  );
  // Face camera (billboard-ish)
  group.lookAt(camera.position);

  scene.add(group);
  punchEffects.push({
    group, ring, ringMat, flash, flashMat,
    sparks, sparkMat, sparkVels,
    life: 0, maxLife: 0.4
  });
}

function updatePunchEffects(dt) {
  for (let i = punchEffects.length - 1; i >= 0; i--) {
    const pe = punchEffects[i];
    pe.life += dt;
    const t = pe.life / pe.maxLife; // 0→1

    // Expand ring
    const ringScale = 1 + t * 8;
    pe.ring.scale.set(ringScale, ringScale, ringScale);
    pe.ringMat.opacity = 1 - t;

    // Flash shrinks
    pe.flash.scale.setScalar(1 - t * 0.8);
    pe.flashMat.opacity = 1 - t;

    // Sparks fly outward
    const sp = pe.sparks.geometry.attributes.position;
    for (let s = 0; s < sp.count; s++) {
      sp.array[s * 3] += pe.sparkVels[s * 3] * dt;
      sp.array[s * 3 + 1] += pe.sparkVels[s * 3 + 1] * dt;
      sp.array[s * 3 + 2] += pe.sparkVels[s * 3 + 2] * dt;
    }
    sp.needsUpdate = true;
    pe.sparkMat.opacity = 1 - t;

    if (pe.life >= pe.maxLife) {
      scene.remove(pe.group);
      pe.ring.geometry.dispose(); pe.ringMat.dispose();
      pe.flash.geometry.dispose(); pe.flashMat.dispose();
      pe.sparks.geometry.dispose(); pe.sparkMat.dispose();
      punchEffects.splice(i, 1);
    }
  }
}

function startPunch() {
  if (isPunching || punchCooldownTimer > 0) return;
  isPunching = true;
  punchTime = 0;
  punchHand = punchHand === 'right' ? 'left' : 'right';

  // For realistic mode, we manually animate since Soldier.glb has no punch anim
  if (currentType === 'realistic' && realisticMixer) {
    // Stop current anim briefly
    // We'll handle it in the punch animation update
  }
}

function updatePunch(dt) {
  if (punchCooldownTimer > 0) {
    punchCooldownTimer -= dt;
  }

  if (!isPunching) return;

  punchTime += dt;
  const t = punchTime / PUNCH_DURATION; // 0→1

  if (currentType === 'voxel') {
    // Voxel punch: arm swings forward fast
    const arm = punchHand === 'right' ? parts.rightArm : parts.leftArm;
    if (arm) {
      if (t < 0.3) {
        // Wind-up (slight pull back)
        const wu = t / 0.3;
        arm.rotation.x = wu * 0.5; // pull back
        arm.rotation.z = punchHand === 'right' ? -0.05 - wu * 0.2 : 0.05 + wu * 0.2;
      } else if (t < 0.6) {
        // Strike forward
        const st = (t - 0.3) / 0.3;
        arm.rotation.x = 0.5 - st * 2.2; // swing forward (goes to -1.7)
        arm.rotation.z = punchHand === 'right' ? -0.25 + st * 0.15 : 0.25 - st * 0.15;
      } else {
        // Recovery
        const rc = (t - 0.6) / 0.4;
        arm.rotation.x = -1.7 + rc * 1.7; // back to 0
        arm.rotation.z = punchHand === 'right' ? -0.1 + rc * 0.05 : 0.1 - rc * 0.05;
      }
    }

    // Slight body twist
    if (parts.body) {
      const twist = punchHand === 'right' ? 1 : -1;
      if (t < 0.5) {
        parts.body.rotation.y = Math.sin(t / 0.5 * Math.PI) * 0.2 * twist;
      } else {
        parts.body.rotation.y = Math.sin((1 - (t - 0.5) / 0.5) * Math.PI * 0.5) * 0.2 * twist;
      }
    }

    // Spawn effect at the peak of the punch
    if (t >= 0.45 && t < 0.5) {
      createPunchEffect();
    }

  } else if (currentType === 'realistic') {
    // Bite attack for realistic mode (Fox GLB or geometry animal)
    const model = (currentAnimal === 'fox' && realisticModel) ? realisticModel : playerAnimalMesh;
    if (model) {
      const fwd = new THREE.Vector3(0, 0, 1).applyEuler(character.rotation);
      if (t < 0.15) {
        const wu = t / 0.15;
        model.position.y = -wu * 0.15;
        model.rotation.x = wu * 0.12;
      } else if (t < 0.35) {
        const st = (t - 0.15) / 0.2;
        model.position.y = -0.15 + st * 0.4;
        model.rotation.x = 0.12 - st * 0.45;
        character.position.x += fwd.x * 12 * dt;
        character.position.z += fwd.z * 12 * dt;
      } else if (t < 0.55) {
        const shake = Math.sin((t - 0.35) * 60) * 0.04;
        model.position.y = 0.25;
        model.rotation.x = -0.33;
        model.rotation.z = shake;
      } else {
        const rc = (t - 0.55) / 0.45;
        model.position.y = 0.25 * (1 - rc);
        model.rotation.x = -0.33 * (1 - rc);
        model.rotation.z = 0;
      }

      if (t >= 0.3 && t < 0.35) {
        createPunchEffect();
      }
    }
  }

  // End punch
  if (punchTime >= PUNCH_DURATION) {
    isPunching = false;
    punchTime = 0;
    punchCooldownTimer = PUNCH_COOLDOWN - PUNCH_DURATION;

    // Reset parts
    if (currentType === 'voxel') {
      if (parts.body) parts.body.rotation.y = 0;
      if (parts.rightArm) { parts.rightArm.rotation.x = 0; parts.rightArm.rotation.z = -0.05; }
      if (parts.leftArm) { parts.leftArm.rotation.x = 0; parts.leftArm.rotation.z = 0.05; }
    } else if (currentType === 'realistic') {
      const model = (currentAnimal === 'fox' && realisticModel) ? realisticModel : playerAnimalMesh;
      if (model) {
        model.position.y = 0;
        model.rotation.x = 0;
        model.rotation.z = 0;
      }
    }
  }
}

// E / Enter key listener
window.addEventListener('keydown', e => {
  // Animal modal open: number keys to pick animal
  const modal = document.getElementById('animalModal');
  if (modal && modal.style.display === 'flex') {
    // 1~9 = index 0~8, 0 = index 9
    const numMap = { 'Digit1':0, 'Digit2':1, 'Digit3':2, 'Digit4':3, 'Digit5':4,
                     'Digit6':5, 'Digit7':6, 'Digit8':7, 'Digit9':8, 'Digit0':9 };
    const idx = numMap[e.code];
    if (idx !== undefined && idx < PLAYER_ANIMALS.length) {
      switchAnimal(PLAYER_ANIMALS[idx].id);
      toggleAnimalModal();
      return;
    }
    if (e.code === 'Escape' || e.code === 'KeyT') { toggleAnimalModal(); return; }
    return; // block other keys while modal is open
  }

  // T key — toggle animal modal (realistic mode only)
  if (e.code === 'KeyT' && currentType === 'realistic') {
    toggleAnimalModal();
    return;
  }

  if (e.code === 'KeyE' || e.key === 'Enter') {
    if (currentType === 'realistic') {
      tryInteract();
    } else {
      startPunch();
    }
  }
});

let camAngle = Math.PI; // camera orbit angle around character
const CAM_ROTATE_SPEED = 2.5; // radians per sec

function handleMovement(dt) {
  // Left/Right arrow = rotate camera around character
  if (keys['arrowleft'] || keys['a']) camAngle += CAM_ROTATE_SPEED * dt;
  if (keys['arrowright'] || keys['d']) camAngle -= CAM_ROTATE_SPEED * dt;

  // W or Up arrow = move forward in camera direction
  const wantForward = keys['w'] || keys['arrowup'];

  const isMoving = wantForward;
  const isRunning = isMoving && keys['shift'];
  const speed = isRunning ? runSpeed : moveSpeed;

  if (isMoving) {
    // Forward = direction camera is looking at (from camAngle)
    const dx = -Math.sin(camAngle);
    const dz = -Math.cos(camAngle);
    const angle = Math.atan2(dx, dz);
    character.rotation.y = angle;
    character.position.x += dx * speed * dt;
    character.position.z += dz * speed * dt;
    character.position.x = Math.max(-290, Math.min(290, character.position.x));
    character.position.z = Math.max(-290, Math.min(290, character.position.z));

    if (currentType === 'realistic') {
      const wantAnim = isRunning ? 'run' : 'walk';
      if (currentAnim !== wantAnim) {
        currentAnim = wantAnim;
        if (currentAnimal === 'fox') {
          playRealisticAnim(isRunning ? 'Run' : 'Walk');
        } else {
          playAnimalAnim(isRunning ? 'Run' : 'Walk');
        }
      }
    } else {
      if (currentAnim === 'idle') {
        currentAnim = 'walk';
      }
    }
  } else {
    // Stopped moving
    if (currentType === 'realistic') {
      if (currentAnim === 'walk' || currentAnim === 'run') {
        currentAnim = 'idle';
        if (currentAnimal === 'fox') {
          playRealisticAnim('Survey');
        } else {
          playAnimalAnim('Idle');
        }
      }
    } else if (currentAnim === 'walk') {
      const activeBtn = document.querySelector('#ui .anim-btns button.active');
      if (activeBtn && activeBtn.dataset.anim !== 'walk') {
        currentAnim = activeBtn.dataset.anim;
      } else {
        currentAnim = 'idle';
      }
    }
  }

  // Camera follow — orbit around character using camAngle
  const camY = currentType === 'realistic' ? 1.0 : 1.5;
  const camDist = currentType === 'realistic' ? 8 : 10;
  const camHeight = currentType === 'realistic' ? 4 : 5;

  const targetPos = new THREE.Vector3(character.position.x, camY, character.position.z);
  controls.target.lerp(targetPos, 0.12);

  const wantCamPos = new THREE.Vector3(
    character.position.x + Math.sin(camAngle) * camDist,
    character.position.y + camHeight,
    character.position.z + Math.cos(camAngle) * camDist
  );
  camera.position.lerp(wantCamPos, 0.1);
}

// ═══════════════════════════════════════════════
//  UI SYSTEM
// ═══════════════════════════════════════════════
function buildVoxelUI() {
  const ui = document.getElementById('ui');
  ui.style.display = '';
  // Hide animal button in voxel mode
  const ab = document.getElementById('animalBtn');
  if (ab) ab.style.display = 'none';
  const am = document.getElementById('animalModal');
  if (am) am.style.display = 'none';
  const c = voxelColors;
  ui.innerHTML = `
    <h2>Voxel Character</h2>
    <div class="ctrl-group"><label>Skin</label><input type="color" data-key="skin" value="${c.skin}"></div>
    <div class="ctrl-group"><label>Shirt</label><input type="color" data-key="shirt" value="${c.shirt}"></div>
    <div class="ctrl-group"><label>Pants</label><input type="color" data-key="pants" value="${c.pants}"></div>
    <div class="ctrl-group"><label>Hair</label><input type="color" data-key="hair" value="${c.hair}"></div>
    <div class="ctrl-group"><label>Eyes</label><input type="color" data-key="eye" value="${c.eye}"></div>
    <div class="ctrl-group"><label>Animation</label>
      <div class="btn-row anim-btns">
        <button class="active" data-anim="idle">Idle</button>
        <button data-anim="walk">Walk</button>
        <button data-anim="wave">Wave</button>
        <button data-anim="jump">Jump</button>
      </div>
    </div>
  `;
  ui.querySelectorAll('input[type="color"]').forEach(inp => {
    inp.addEventListener('input', e => {
      voxelColors[e.target.dataset.key] = e.target.value;
      buildVoxel();
    });
  });
  bindAnimBtns();
}

function buildRealisticUI() {
  const ui = document.getElementById('ui');
  ui.innerHTML = '';
  ui.style.display = 'none';
  // Show animal button in realistic mode
  const ab = document.getElementById('animalBtn');
  if (ab) ab.style.display = 'block';
}

function bindAnimBtns() {
  document.querySelectorAll('.anim-btns button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.anim-btns button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentAnim = btn.dataset.anim;
      animTime = 0;
    });
  });
}

// ═══════════════════════════════════════════════
//  CHARACTER SWITCH
// ═══════════════════════════════════════════════
async function switchCharacter(type) {
  currentType = type;
  currentAnim = 'idle';
  animTime = 0;

  document.querySelectorAll('#charSelect button').forEach(b => {
    const btnType = b.getAttribute('onclick').includes(type) ? true : false;
    b.classList.toggle('active', btnType);
  });

  switchEnvironment(type);

  if (type === 'voxel') {
    buildVoxel();
    buildVoxelUI();
    updateGrowthUI(); // hides HUD for voxel
    camera.position.set(4, 4, 8);
    controls.target.set(0, 1.5, 0);
  } else if (type === 'realistic') {
    try {
      await loadRealisticModel();
      buildRealistic();
      buildRealisticUI();
      updateGrowthUI();
      camera.position.set(4, 3, 8);
      controls.target.set(0, 1.0, 0);
    } catch (e) {
      console.warn('Realistic model failed, falling back to voxel');
      currentType = 'voxel';
      switchEnvironment('voxel');
      buildVoxel();
      buildVoxelUI();
      camera.position.set(4, 4, 8);
      controls.target.set(0, 1.5, 0);
    }
  }
}
window.switchCharacter = switchCharacter;

// Init
switchCharacter('voxel');

// ═══════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════
const clock = new THREE.Clock();
let totalTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  totalTime += dt;

  animateCharacter(dt);
  handleMovement(dt);
  updatePunch(dt);
  updatePunchEffects(dt);
  updateWinterAnimations(dt, totalTime);
  updateFoxExtras(dt, totalTime);
  updateFruits(dt);
  updateAnimals(dt);
  updateFoxGrowth(dt);
  animatePlayerAnimal(dt);
  controls.update();
  if (useComposer) {
    composer.render();
  } else {
    renderer.render(scene, camera);
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
