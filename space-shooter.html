<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스페이스 슈터</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  touch-action: none;
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================
//  스페이스 슈터 - Space Shooter Game
// ============================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 720;
canvas.width = W;
canvas.height = H;

// --- Game State ---
let state = 'title'; // title, playing, gameover, paused
let score = 0;
let highScore = parseInt(localStorage.getItem('spaceShooterHigh')) || 0;
let lives = 3;
let level = 1;
let levelTimer = 0;
let frameCount = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let bossWarningTimer = 0;

// --- Player ---
const player = {
  x: W / 2,
  y: H - 80,
  w: 32,
  h: 32,
  speed: 5,
  fireRate: 12,
  fireCooldown: 0,
  powerLevel: 0,
  invincible: 0,
  shield: false,
  shieldTimer: 0,
  bombCount: 1,
};

// --- Input ---
const keys = {};
let touchX = null;
let touchActive = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
  if (state === 'title' && (e.key === ' ' || e.key === 'Enter')) startGame();
  if (state === 'gameover' && (e.key === ' ' || e.key === 'Enter')) state = 'title';
  if (state === 'playing' && e.key === 'b') useBomb();
  if (state === 'playing' && e.key === 'p') state = 'paused';
  else if (state === 'paused' && e.key === 'p') state = 'playing';
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - r.left) * (W / r.width);
  touchActive = true;
  if (state === 'title') startGame();
  if (state === 'gameover') state = 'title';
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  touchX = (e.touches[0].clientX - r.left) * (W / r.width);
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
});
canvas.addEventListener('click', e => {
  if (state === 'title') startGame();
  if (state === 'gameover') state = 'title';
});

// --- Arrays ---
let bullets = [];
let enemyBullets = [];
let enemies = [];
let particles = [];
let powerups = [];
let stars = [];
let boss = null;

// --- Star field ---
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 0.5 + Math.random() * 2.5,
      size: Math.random() < 0.3 ? 2 : 1,
      brightness: 0.3 + Math.random() * 0.7,
    });
  }
}
initStars();

// --- Helper ---
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function rectCollide(a, b) {
  return a.x - a.w/2 < b.x + b.w/2 &&
         a.x + a.w/2 > b.x - b.w/2 &&
         a.y - a.h/2 < b.y + b.h/2 &&
         a.y + a.h/2 > b.y - b.h/2;
}

// --- Colors ---
const COLORS = {
  playerBody: '#00d4ff',
  playerWing: '#0088cc',
  playerEngine: '#ff6600',
  bullet: '#ffff00',
  bulletGlow: '#ffaa00',
  enemyA: '#ff4444',
  enemyB: '#ff8800',
  enemyC: '#cc44ff',
  boss: '#ff2222',
  bossAccent: '#ffcc00',
  shield: '#44ccff',
  explosion: ['#ffffff', '#ffff44', '#ffaa00', '#ff4400', '#cc2200', '#660000'],
  powerup: '#44ff88',
};

// --- Spawn enemies ---
function spawnEnemy() {
  const types = ['basic', 'zigzag', 'fast', 'tank', 'shooter'];
  const available = types.slice(0, Math.min(2 + Math.floor(level / 2), types.length));
  const type = available[randInt(0, available.length - 1)];

  const e = {
    x: rand(30, W - 30),
    y: -30,
    w: 24, h: 24,
    type,
    hp: 1,
    maxHp: 1,
    speed: 1.5,
    timer: 0,
    angle: 0,
    startX: 0,
    scoreValue: 100,
  };

  switch (type) {
    case 'basic':
      e.speed = 1.2 + level * 0.1;
      e.hp = e.maxHp = 1;
      e.scoreValue = 100;
      break;
    case 'zigzag':
      e.speed = 1.5 + level * 0.08;
      e.hp = e.maxHp = 1;
      e.startX = e.x;
      e.scoreValue = 150;
      break;
    case 'fast':
      e.speed = 3 + level * 0.15;
      e.hp = e.maxHp = 1;
      e.w = 18; e.h = 18;
      e.scoreValue = 200;
      break;
    case 'tank':
      e.speed = 0.8;
      e.hp = e.maxHp = 3 + Math.floor(level / 3);
      e.w = 30; e.h = 30;
      e.scoreValue = 300;
      break;
    case 'shooter':
      e.speed = 1;
      e.hp = e.maxHp = 2;
      e.scoreValue = 250;
      break;
  }
  enemies.push(e);
}

// --- Boss ---
function spawnBoss() {
  bossWarningTimer = 120;
  setTimeout(() => {
    boss = {
      x: W / 2,
      y: -60,
      w: 80,
      h: 60,
      hp: 30 + level * 15,
      maxHp: 30 + level * 15,
      speed: 1,
      phase: 0,
      timer: 0,
      pattern: 0,
      entering: true,
      scoreValue: 2000 + level * 500,
    };
  }, 2000);
}

// --- Bullets ---
function fireBullet() {
  if (player.fireCooldown > 0) return;
  player.fireCooldown = player.fireRate;

  const bw = 4, bh = 12;
  bullets.push({ x: player.x, y: player.y - 20, w: bw, h: bh, dx: 0, dy: -8, dmg: 1 });

  if (player.powerLevel >= 1) {
    bullets.push({ x: player.x - 12, y: player.y - 15, w: bw, h: bh, dx: -0.5, dy: -8, dmg: 1 });
    bullets.push({ x: player.x + 12, y: player.y - 15, w: bw, h: bh, dx: 0.5, dy: -8, dmg: 1 });
  }
  if (player.powerLevel >= 2) {
    bullets.push({ x: player.x - 20, y: player.y - 10, w: bw, h: bh, dx: -1.5, dy: -7, dmg: 1 });
    bullets.push({ x: player.x + 20, y: player.y - 10, w: bw, h: bh, dx: 1.5, dy: -7, dmg: 1 });
  }
  if (player.powerLevel >= 3) {
    bullets.push({ x: player.x, y: player.y - 22, w: 6, h: 16, dx: 0, dy: -10, dmg: 2 });
  }
}

function fireEnemyBullet(ex, ey, speed = 3) {
  const dx = player.x - ex;
  const dy = player.y - ey;
  const len = Math.hypot(dx, dy);
  enemyBullets.push({
    x: ex, y: ey, w: 6, h: 6,
    dx: (dx / len) * speed,
    dy: (dy / len) * speed,
  });
}

// --- Particles ---
function spawnExplosion(x, y, count = 15, colorSet = COLORS.explosion) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(1, 5);
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: rand(15, 40),
      maxLife: 40,
      size: rand(2, 6),
      color: colorSet[randInt(0, colorSet.length - 1)],
    });
  }
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return;
  const types = ['power', 'shield', 'bomb', 'life'];
  const weights = [40, 25, 20, 15];
  let r = rand(0, 100);
  let type = 'power';
  for (let i = 0; i < types.length; i++) {
    r -= weights[i];
    if (r <= 0) { type = types[i]; break; }
  }
  powerups.push({ x, y, w: 18, h: 18, type, dy: 1.5, timer: 0 });
}

// --- Bomb ---
function useBomb() {
  if (player.bombCount <= 0) return;
  player.bombCount--;
  shakeTimer = 20;
  shakeIntensity = 8;

  // Destroy all enemies on screen
  for (const e of enemies) {
    score += e.scoreValue;
    spawnExplosion(e.x, e.y, 10);
  }
  enemies = [];
  enemyBullets = [];

  // Damage boss
  if (boss && !boss.entering) {
    boss.hp -= 10;
    spawnExplosion(boss.x, boss.y, 25);
  }

  // Big white flash particle
  particles.push({
    x: W / 2, y: H / 2,
    dx: 0, dy: 0,
    life: 30, maxLife: 30,
    size: W, color: '#ffffff',
    isBomb: true,
  });
}

// --- Game Start/Reset ---
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  levelTimer = 0;
  frameCount = 0;
  player.x = W / 2;
  player.y = H - 80;
  player.powerLevel = 0;
  player.invincible = 60;
  player.shield = false;
  player.shieldTimer = 0;
  player.bombCount = 1;
  player.fireRate = 12;
  bullets = [];
  enemyBullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  boss = null;
  bossWarningTimer = 0;
}

// --- Draw Functions ---
function drawPlayer() {
  const px = player.x, py = player.y;
  const c = ctx;

  if (player.invincible > 0 && Math.floor(frameCount / 3) % 2 === 0) return;

  c.save();
  c.translate(px, py);

  // Engine flame
  const flicker = Math.sin(frameCount * 0.5) * 3;
  const grad = c.createLinearGradient(0, 10, 0, 25 + flicker);
  grad.addColorStop(0, '#ffaa00');
  grad.addColorStop(0.5, '#ff4400');
  grad.addColorStop(1, 'transparent');
  c.fillStyle = grad;
  c.beginPath();
  c.moveTo(-6, 12);
  c.lineTo(6, 12);
  c.lineTo(2, 25 + flicker);
  c.lineTo(-2, 25 + flicker);
  c.closePath();
  c.fill();

  // Side engines
  c.fillStyle = grad;
  c.beginPath();
  c.moveTo(-14, 8);
  c.lineTo(-8, 8);
  c.lineTo(-10, 18 + flicker * 0.6);
  c.lineTo(-14, 18 + flicker * 0.6);
  c.closePath();
  c.fill();
  c.beginPath();
  c.moveTo(8, 8);
  c.lineTo(14, 8);
  c.lineTo(14, 18 + flicker * 0.6);
  c.lineTo(10, 18 + flicker * 0.6);
  c.closePath();
  c.fill();

  // Body
  c.fillStyle = COLORS.playerBody;
  c.beginPath();
  c.moveTo(0, -18);
  c.lineTo(-10, 5);
  c.lineTo(-8, 14);
  c.lineTo(8, 14);
  c.lineTo(10, 5);
  c.closePath();
  c.fill();

  // Cockpit
  const cockpitGrad = c.createRadialGradient(0, -4, 2, 0, -4, 8);
  cockpitGrad.addColorStop(0, '#aaeeff');
  cockpitGrad.addColorStop(1, '#004466');
  c.fillStyle = cockpitGrad;
  c.beginPath();
  c.ellipse(0, -4, 5, 7, 0, 0, Math.PI * 2);
  c.fill();

  // Wings
  c.fillStyle = COLORS.playerWing;
  c.beginPath();
  c.moveTo(-10, 2);
  c.lineTo(-22, 12);
  c.lineTo(-16, 14);
  c.lineTo(-8, 10);
  c.closePath();
  c.fill();
  c.beginPath();
  c.moveTo(10, 2);
  c.lineTo(22, 12);
  c.lineTo(16, 14);
  c.lineTo(8, 10);
  c.closePath();
  c.fill();

  // Wing tips
  c.fillStyle = '#ff4400';
  c.fillRect(-22, 10, 4, 4);
  c.fillRect(18, 10, 4, 4);

  c.restore();

  // Shield effect
  if (player.shield) {
    c.save();
    c.globalAlpha = 0.3 + Math.sin(frameCount * 0.1) * 0.15;
    c.strokeStyle = COLORS.shield;
    c.lineWidth = 2;
    c.beginPath();
    c.arc(px, py, 28, 0, Math.PI * 2);
    c.stroke();
    c.globalAlpha = 0.1;
    c.fillStyle = COLORS.shield;
    c.fill();
    c.restore();
  }
}

function drawEnemy(e) {
  const c = ctx;
  c.save();
  c.translate(e.x, e.y);

  switch (e.type) {
    case 'basic':
      c.fillStyle = COLORS.enemyA;
      c.beginPath();
      c.moveTo(0, -12);
      c.lineTo(-12, 8);
      c.lineTo(-8, 12);
      c.lineTo(8, 12);
      c.lineTo(12, 8);
      c.closePath();
      c.fill();
      c.fillStyle = '#ff8888';
      c.beginPath();
      c.ellipse(0, 2, 4, 5, 0, 0, Math.PI * 2);
      c.fill();
      break;

    case 'zigzag':
      c.fillStyle = COLORS.enemyB;
      c.beginPath();
      c.moveTo(0, -10);
      c.lineTo(-14, 0);
      c.lineTo(-8, 12);
      c.lineTo(8, 12);
      c.lineTo(14, 0);
      c.closePath();
      c.fill();
      c.fillStyle = '#ffcc44';
      c.fillRect(-3, -4, 6, 8);
      break;

    case 'fast':
      c.fillStyle = '#44ccff';
      c.beginPath();
      c.moveTo(0, -10);
      c.lineTo(-8, 6);
      c.lineTo(0, 3);
      c.lineTo(8, 6);
      c.closePath();
      c.fill();
      break;

    case 'tank':
      c.fillStyle = '#888888';
      c.fillRect(-15, -12, 30, 24);
      c.fillStyle = '#aaaaaa';
      c.fillRect(-12, -9, 24, 18);
      c.fillStyle = '#ff4444';
      c.beginPath();
      c.arc(0, 0, 6, 0, Math.PI * 2);
      c.fill();
      // HP bar
      if (e.hp < e.maxHp) {
        c.fillStyle = '#333';
        c.fillRect(-15, -18, 30, 4);
        c.fillStyle = '#44ff44';
        c.fillRect(-15, -18, 30 * (e.hp / e.maxHp), 4);
      }
      break;

    case 'shooter':
      c.fillStyle = COLORS.enemyC;
      c.beginPath();
      c.moveTo(0, -12);
      c.lineTo(-10, -2);
      c.lineTo(-14, 10);
      c.lineTo(0, 6);
      c.lineTo(14, 10);
      c.lineTo(10, -2);
      c.closePath();
      c.fill();
      c.fillStyle = '#ee88ff';
      c.beginPath();
      c.arc(0, 0, 4, 0, Math.PI * 2);
      c.fill();
      break;
  }
  c.restore();
}

function drawBoss(b) {
  const c = ctx;
  c.save();
  c.translate(b.x, b.y);

  // Main body
  const bodyGrad = c.createLinearGradient(0, -30, 0, 30);
  bodyGrad.addColorStop(0, '#cc0000');
  bodyGrad.addColorStop(0.5, '#ff2222');
  bodyGrad.addColorStop(1, '#880000');
  c.fillStyle = bodyGrad;
  c.beginPath();
  c.moveTo(0, -30);
  c.bezierCurveTo(-20, -30, -40, -15, -40, 0);
  c.bezierCurveTo(-40, 20, -20, 30, 0, 25);
  c.bezierCurveTo(20, 30, 40, 20, 40, 0);
  c.bezierCurveTo(40, -15, 20, -30, 0, -30);
  c.fill();

  // Wings
  c.fillStyle = '#aa0000';
  c.beginPath();
  c.moveTo(-30, -5);
  c.lineTo(-55, -15);
  c.lineTo(-50, 10);
  c.lineTo(-30, 15);
  c.closePath();
  c.fill();
  c.beginPath();
  c.moveTo(30, -5);
  c.lineTo(55, -15);
  c.lineTo(50, 10);
  c.lineTo(30, 15);
  c.closePath();
  c.fill();

  // Cannons
  c.fillStyle = '#ffcc00';
  c.fillRect(-45, 5, 8, 12);
  c.fillRect(37, 5, 8, 12);

  // Core
  const coreGrad = c.createRadialGradient(0, 0, 3, 0, 0, 15);
  coreGrad.addColorStop(0, '#ffffff');
  coreGrad.addColorStop(0.4, COLORS.bossAccent);
  coreGrad.addColorStop(1, '#ff4400');
  c.fillStyle = coreGrad;
  c.beginPath();
  c.arc(0, 0, 12, 0, Math.PI * 2);
  c.fill();

  // Eye
  c.fillStyle = '#ffffff';
  c.beginPath();
  c.arc(0, -8, 5, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#ff0000';
  c.beginPath();
  c.arc(0, -8, 2.5, 0, Math.PI * 2);
  c.fill();

  c.restore();

  // HP bar
  c.fillStyle = '#333';
  c.fillRect(W / 2 - 100, 20, 200, 10);
  c.fillStyle = b.hp > b.maxHp * 0.3 ? '#ff4444' : '#ff0000';
  c.fillRect(W / 2 - 100, 20, 200 * (b.hp / b.maxHp), 10);
  c.strokeStyle = '#666';
  c.lineWidth = 1;
  c.strokeRect(W / 2 - 100, 20, 200, 10);
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', W / 2, 17);
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = COLORS.bulletGlow;
  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS.bullet;
  ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
  ctx.restore();
}

function drawEnemyBullet(b) {
  ctx.save();
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#ff6666';
  ctx.beginPath();
  ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPowerup(p) {
  const c = ctx;
  c.save();
  c.translate(p.x, p.y);
  const bob = Math.sin(p.timer * 0.1) * 3;
  c.translate(0, bob);

  c.globalAlpha = 0.3;
  c.fillStyle = '#ffffff';
  c.beginPath();
  c.arc(0, 0, 14, 0, Math.PI * 2);
  c.fill();
  c.globalAlpha = 1;

  let color, symbol;
  switch (p.type) {
    case 'power': color = '#ff8800'; symbol = 'P'; break;
    case 'shield': color = '#44ccff'; symbol = 'S'; break;
    case 'bomb': color = '#ff4444'; symbol = 'B'; break;
    case 'life': color = '#44ff44'; symbol = '♥'; break;
  }

  c.fillStyle = color;
  c.beginPath();
  c.arc(0, 0, 10, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = '#ffffff';
  c.lineWidth = 1.5;
  c.stroke();

  c.fillStyle = '#fff';
  c.font = 'bold 12px monospace';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(symbol, 0, 1);

  c.restore();
}

function drawParticles() {
  for (const p of particles) {
    if (p.isBomb) {
      ctx.save();
      ctx.globalAlpha = p.life / p.maxLife * 0.4;
      ctx.fillStyle = p.color;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
      continue;
    }
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.save();
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
    ctx.restore();
  }
}

function drawHUD() {
  const c = ctx;

  // Score
  c.fillStyle = '#ffffff';
  c.font = 'bold 18px monospace';
  c.textAlign = 'left';
  c.fillText(`SCORE: ${score}`, 10, 30);

  // High Score
  c.font = '12px monospace';
  c.fillStyle = '#888888';
  c.fillText(`HI: ${Math.max(score, highScore)}`, 10, 48);

  // Level
  c.fillStyle = '#ffcc00';
  c.font = 'bold 14px monospace';
  c.textAlign = 'center';
  c.fillText(`LEVEL ${level}`, W / 2, H - 10);

  // Lives
  c.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    c.fillStyle = '#ff4444';
    c.font = '18px sans-serif';
    c.fillText('♥', W - 10 - i * 22, 28);
  }

  // Bombs
  c.fillStyle = '#ffaa00';
  c.font = '14px monospace';
  c.textAlign = 'right';
  c.fillText(`BOMB: ${player.bombCount}`, W - 10, 50);

  // Power level
  c.fillStyle = '#44ff88';
  c.font = '12px monospace';
  c.textAlign = 'left';
  c.fillText(`POWER: ${'■'.repeat(player.powerLevel)}${'□'.repeat(3 - player.powerLevel)}`, 10, 68);
}

function drawTitle() {
  const c = ctx;

  // Background glow
  const grad = c.createRadialGradient(W / 2, H / 3, 50, W / 2, H / 3, 300);
  grad.addColorStop(0, 'rgba(0, 80, 150, 0.3)');
  grad.addColorStop(1, 'transparent');
  c.fillStyle = grad;
  c.fillRect(0, 0, W, H);

  // Title
  c.save();
  c.shadowColor = '#00aaff';
  c.shadowBlur = 20;
  c.fillStyle = '#ffffff';
  c.font = 'bold 48px monospace';
  c.textAlign = 'center';
  c.fillText('SPACE', W / 2, H / 3 - 20);
  c.fillText('SHOOTER', W / 2, H / 3 + 35);
  c.restore();

  // Subtitle blink
  if (Math.floor(frameCount / 30) % 2 === 0) {
    c.fillStyle = '#aaaaaa';
    c.font = '16px monospace';
    c.fillText('PRESS SPACE OR CLICK TO START', W / 2, H / 2 + 40);
  }

  // High score
  c.fillStyle = '#ffcc00';
  c.font = '14px monospace';
  c.fillText(`HIGH SCORE: ${highScore}`, W / 2, H / 2 + 80);

  // Controls
  c.fillStyle = '#666666';
  c.font = '12px monospace';
  c.fillText('← → 이동  |  자동 발사  |  B 폭탄  |  P 일시정지', W / 2, H - 40);
}

function drawGameOver() {
  const c = ctx;

  c.fillStyle = 'rgba(0, 0, 0, 0.7)';
  c.fillRect(0, 0, W, H);

  c.save();
  c.shadowColor = '#ff0000';
  c.shadowBlur = 20;
  c.fillStyle = '#ff4444';
  c.font = 'bold 42px monospace';
  c.textAlign = 'center';
  c.fillText('GAME OVER', W / 2, H / 3);
  c.restore();

  c.fillStyle = '#ffffff';
  c.font = '20px monospace';
  c.fillText(`SCORE: ${score}`, W / 2, H / 2 - 10);

  if (score >= highScore) {
    c.fillStyle = '#ffcc00';
    c.font = 'bold 16px monospace';
    c.fillText('★ NEW HIGH SCORE! ★', W / 2, H / 2 + 25);
  }

  if (Math.floor(frameCount / 30) % 2 === 0) {
    c.fillStyle = '#888888';
    c.font = '14px monospace';
    c.fillText('PRESS SPACE OR CLICK', W / 2, H / 2 + 70);
  }
}

function drawPaused() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2);
  ctx.font = '14px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Press P to resume', W / 2, H / 2 + 30);
}

// --- Boss patterns ---
function updateBossAttack(b) {
  b.timer++;

  if (b.entering) {
    b.y += 1.5;
    if (b.y >= 80) {
      b.entering = false;
      b.timer = 0;
    }
    return;
  }

  // Move side to side
  b.x += Math.sin(b.timer * 0.02) * b.speed * 2;
  b.x = Math.max(50, Math.min(W - 50, b.x));

  // Attack patterns
  switch (b.pattern) {
    case 0: // Spread shot
      if (b.timer % 30 === 0) {
        for (let i = -2; i <= 2; i++) {
          const angle = Math.PI / 2 + i * 0.3;
          enemyBullets.push({
            x: b.x, y: b.y + 25,
            w: 6, h: 6,
            dx: Math.cos(angle) * 3,
            dy: Math.sin(angle) * 3,
          });
        }
      }
      break;

    case 1: // Circle burst
      if (b.timer % 60 === 0) {
        for (let i = 0; i < 12; i++) {
          const angle = (i / 12) * Math.PI * 2;
          enemyBullets.push({
            x: b.x, y: b.y,
            w: 6, h: 6,
            dx: Math.cos(angle) * 2.5,
            dy: Math.sin(angle) * 2.5,
          });
        }
      }
      break;

    case 2: // Aimed rapid fire
      if (b.timer % 10 === 0) {
        fireEnemyBullet(b.x - 40, b.y + 10, 4);
        fireEnemyBullet(b.x + 40, b.y + 10, 4);
      }
      break;
  }

  // Switch pattern
  if (b.timer > 180) {
    b.timer = 0;
    b.pattern = (b.pattern + 1) % 3;
    b.speed = rand(0.8, 2);
  }
}

// --- Player hit ---
function playerHit() {
  if (player.invincible > 0) return;
  if (player.shield) {
    player.shield = false;
    player.shieldTimer = 0;
    shakeTimer = 5;
    shakeIntensity = 3;
    return;
  }

  lives--;
  player.invincible = 90;
  player.powerLevel = Math.max(0, player.powerLevel - 1);
  shakeTimer = 15;
  shakeIntensity = 6;
  spawnExplosion(player.x, player.y, 20);

  if (lives <= 0) {
    state = 'gameover';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('spaceShooterHigh', highScore);
    }
    // 점수 보고
    try { if(parent && parent.giylReportScore) parent.giylReportScore('spaceshooter', score); } catch(e){}
  }
}

// --- Update ---
function update() {
  frameCount++;

  if (state !== 'playing') return;

  // --- Stars ---
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  // --- Player movement ---
  if (touchActive && touchX !== null) {
    const dx = touchX - player.x;
    if (Math.abs(dx) > 3) player.x += Math.sign(dx) * player.speed;
  } else {
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
  }
  player.x = Math.max(20, Math.min(W - 20, player.x));
  player.y = Math.max(40, Math.min(H - 20, player.y));

  // --- Auto fire ---
  if (player.fireCooldown > 0) player.fireCooldown--;
  fireBullet();

  // --- Invincibility ---
  if (player.invincible > 0) player.invincible--;

  // --- Shield timer ---
  if (player.shield) {
    player.shieldTimer--;
    if (player.shieldTimer <= 0) player.shield = false;
  }

  // --- Level progression ---
  levelTimer++;
  if (levelTimer > 1200 && !boss) { // Every 20 seconds
    level++;
    levelTimer = 0;
    if (level % 3 === 0) {
      spawnBoss();
    }
  }

  // --- Spawn enemies ---
  const spawnRate = Math.max(20, 60 - level * 4);
  if (!boss && frameCount % spawnRate === 0) {
    spawnEnemy();
  }

  // --- Boss warning ---
  if (bossWarningTimer > 0) bossWarningTimer--;

  // --- Update bullets ---
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.dx;
    b.y += b.dy;
    if (b.y < -20 || b.x < -20 || b.x > W + 20) {
      bullets.splice(i, 1);
    }
  }

  // --- Update enemy bullets ---
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.dx;
    b.y += b.dy;
    if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) {
      enemyBullets.splice(i, 1);
      continue;
    }
    // Hit player
    if (rectCollide(b, { x: player.x, y: player.y, w: 12, h: 12 })) {
      enemyBullets.splice(i, 1);
      playerHit();
    }
  }

  // --- Update enemies ---
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.timer++;

    switch (e.type) {
      case 'basic':
        e.y += e.speed;
        break;
      case 'zigzag':
        e.y += e.speed;
        e.x = e.startX + Math.sin(e.timer * 0.05) * 60;
        break;
      case 'fast':
        e.y += e.speed;
        break;
      case 'tank':
        e.y += e.speed;
        break;
      case 'shooter':
        e.y += e.speed;
        if (e.timer % 90 === 0 && e.y > 0) {
          fireEnemyBullet(e.x, e.y);
        }
        break;
    }

    // Off screen
    if (e.y > H + 30) {
      enemies.splice(i, 1);
      continue;
    }

    // Hit player
    if (rectCollide(e, { x: player.x, y: player.y, w: 16, h: 16 })) {
      enemies.splice(i, 1);
      playerHit();
      continue;
    }

    // Hit by bullet
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (rectCollide(bullets[j], e)) {
        e.hp -= bullets[j].dmg;
        bullets.splice(j, 1);
        if (e.hp <= 0) {
          score += e.scoreValue;
          spawnExplosion(e.x, e.y, 12);
          spawnPowerup(e.x, e.y);
          enemies.splice(i, 1);
        } else {
          // Hit flash
          spawnExplosion(e.x, e.y, 3, ['#ffffff', '#ffff00']);
        }
        break;
      }
    }
  }

  // --- Update boss ---
  if (boss) {
    updateBossAttack(boss);

    // Hit by bullet
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (!boss.entering && rectCollide(bullets[j], boss)) {
        boss.hp -= bullets[j].dmg;
        bullets.splice(j, 1);
        spawnExplosion(
          boss.x + rand(-20, 20),
          boss.y + rand(-15, 15),
          3, ['#ffffff', '#ffff00']
        );
        if (boss.hp <= 0) {
          score += boss.scoreValue;
          for (let k = 0; k < 5; k++) {
            setTimeout(() => {
              if (boss === null) return;
              spawnExplosion(
                boss.x + rand(-40, 40),
                boss.y + rand(-30, 30),
                20
              );
            }, k * 200);
          }
          setTimeout(() => {
            boss = null;
            shakeTimer = 25;
            shakeIntensity = 10;
            // Drop powerups
            for (let k = 0; k < 3; k++) {
              powerups.push({
                x: W / 2 + rand(-60, 60),
                y: 80 + rand(-20, 20),
                w: 18, h: 18,
                type: ['power', 'bomb', 'life'][k],
                dy: 1.5,
                timer: 0,
              });
            }
          }, 1000);
          break;
        }
      }
    }

    // Boss collide player
    if (boss && !boss.entering && rectCollide(
      { x: player.x, y: player.y, w: 16, h: 16 },
      boss
    )) {
      playerHit();
    }
  }

  // --- Update powerups ---
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.dy;
    p.timer++;
    if (p.y > H + 20) {
      powerups.splice(i, 1);
      continue;
    }
    if (rectCollide(p, { x: player.x, y: player.y, w: 24, h: 24 })) {
      switch (p.type) {
        case 'power':
          player.powerLevel = Math.min(3, player.powerLevel + 1);
          if (player.powerLevel >= 2) player.fireRate = 10;
          if (player.powerLevel >= 3) player.fireRate = 8;
          break;
        case 'shield':
          player.shield = true;
          player.shieldTimer = 600;
          break;
        case 'bomb':
          player.bombCount = Math.min(5, player.bombCount + 1);
          break;
        case 'life':
          lives = Math.min(5, lives + 1);
          break;
      }
      spawnExplosion(p.x, p.y, 8, ['#ffffff', '#44ff88', '#88ffcc']);
      powerups.splice(i, 1);
    }
  }

  // --- Update particles ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
    if (!p.isBomb) {
      p.dx *= 0.97;
      p.dy *= 0.97;
    }
    if (p.life <= 0) particles.splice(i, 1);
  }

  // --- Shake timer ---
  if (shakeTimer > 0) shakeTimer--;
}

// --- Render ---
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const dx = (Math.random() - 0.5) * shakeIntensity;
    const dy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(dx, dy);
  }

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#000011');
  bgGrad.addColorStop(0.5, '#000822');
  bgGrad.addColorStop(1, '#001133');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Stars
  drawStars();

  if (state === 'title') {
    drawTitle();
    ctx.restore();
    return;
  }

  // Powerups
  for (const p of powerups) drawPowerup(p);

  // Player bullets
  for (const b of bullets) drawBullet(b);

  // Enemy bullets
  for (const b of enemyBullets) drawEnemyBullet(b);

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Boss
  if (boss) drawBoss(boss);

  // Player
  drawPlayer();

  // Particles
  drawParticles();

  // HUD
  drawHUD();

  // Boss warning
  if (bossWarningTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.abs(Math.sin(bossWarningTimer * 0.15));
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ WARNING ⚠', W / 2, H / 2);
    ctx.font = '16px monospace';
    ctx.fillText('BOSS APPROACHING', W / 2, H / 2 + 30);
    ctx.restore();
  }

  // Level up notification
  if (levelTimer < 60) {
    ctx.save();
    ctx.globalAlpha = 1 - levelTimer / 60;
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}`, W / 2, H / 2 - 50);
    ctx.restore();
  }

  // Gameover / Paused
  if (state === 'gameover') drawGameOver();
  if (state === 'paused') drawPaused();

  ctx.restore();
}

// --- Audio (Simple web audio beeps) ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, duration = 0.05, volume = 0.1, type = 'square') {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}

// Add sound triggers
const _origFireBullet = fireBullet;
// We'll add minimal sound hooks in the game loop instead

// --- Main Loop ---
function gameLoop() {
  update();
  render();

  // Stars update even on title
  if (state === 'title' || state === 'gameover') {
    for (const s of stars) {
      s.y += s.speed * 0.5;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }
    frameCount++;
  }

  requestAnimationFrame(gameLoop);
}

// --- Canvas scaling ---
function resizeCanvas() {
  const ratio = W / H;
  let cw = window.innerWidth;
  let ch = window.innerHeight;
  if (cw / ch > ratio) {
    cw = ch * ratio;
  } else {
    ch = cw / ratio;
  }
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- Start ---
gameLoop();
</script>
